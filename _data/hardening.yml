- id: m365-021
  platform: m365-collab
  category: services
  severity: high
  title: Technical notification email contacts must be configured.
  description: 'Technical contacts configured: 1. Emails: admin@contoso.com'
  reference: MS.EXO.1.1v1 — CIS M365 / Microsoft Secure Score — Exchange Online
  tags:
  - exchange-online
  - notification
  - administration
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: If technical notification contacts are not configured, critical security alerts from Microsoft (service degradation, compliance violations, data breach notifications) go unnoticed.
      Attackers benefit from delayed incident response — every hour of undetected access increases data exfiltration potential.
    implementationNotes: '# Check current notification contacts

      Connect-MgGraph -Scopes ''Organization.ReadWrite.All''

      $org = Get-MgOrganization

      $org.TechnicalNotificationMails


      # Set technical contacts

      Update-MgOrganization -OrganizationId $org.Id -TechnicalNotificationMails @(''secops@domain.com'',''it-admin@domain.com'')


      # Verify

      (Get-MgOrganization).TechnicalNotificationMails'
    validationNotes: '# Verify contacts are set

      (Get-MgOrganization).TechnicalNotificationMails

      # Expected: At least one valid monitored mailbox


      # Check it''s a shared/group mailbox (not personal)

      Get-EXOMailbox -Identity secops@domain.com | Select RecipientTypeDetails'
    tuningNotes: Use a distribution group or shared mailbox that multiple team members monitor. Never use a personal mailbox — when that person leaves, alerts go to a dead inbox. Consider also configuring
      Security & Compliance alerts to a Teams channel.
    advancedDetection: '// KQL: Detect changes to notification contacts

      AuditLogs

      | where TimeGenerated > ago(7d)

      | where OperationName == ''Update organization''

      | where TargetResources[0].modifiedProperties has ''TechnicalNotificationMails''

      | project TimeGenerated, InitiatedBy.user.userPrincipalName, TargetResources[0].modifiedProperties'
