  description: SharePoint should use Conditional Access policy for access control.
  reference: MS.SHAREPOINT.1.3v1 — CIS M365 / Microsoft Secure Score — SharePoint Online
  tags:
  - sharepoint-online
  - conditional-access
  - access-control
  - zero-trust
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Without Conditional Access for SharePoint, there's no way to enforce device compliance, location restrictions, or MFA specifically for SharePoint access. An attacker with stolen credentials
      can access all SharePoint sites from any device, any location.
    implementationNotes: "# Set SharePoint to use Conditional Access instead of network-based controls\nSet-SPOTenant -ConditionalAccessPolicy AllowLimitedAccess\n\n# Create CA policy for SharePoint\n$params\
      \ = @{\n  DisplayName = 'Require Compliant Device for SharePoint'\n  State = 'enabledForReportingButNotEnforced'\n  Conditions = @{\n    Users = @{ IncludeUsers = @('All'); ExcludeUsers = @('<breakglass-id>')\
      \ }\n    Applications = @{ IncludeApplications = @('SharePoint Online') }\n  }\n  GrantControls = @{ BuiltInControls = @('compliantDevice'); Operator = 'OR' }\n  SessionControls = @{ ApplicationEnforcedRestrictions\
      \ = @{ IsEnabled = $true } }\n}\nNew-MgIdentityConditionalAccessPolicy @params"
    validationNotes: '# Verify tenant setting

      (Get-SPOTenant).ConditionalAccessPolicy

      # Expected: AllowLimitedAccess


      # Verify CA policy exists

      Get-MgIdentityConditionalAccessPolicy | Where-Object { $_.DisplayName -like ''*SharePoint*'' } | Select DisplayName, State'
    tuningNotes: Start in report-only mode. AllowLimitedAccess gives browser-only access (no download/sync) to non-compliant devices rather than blocking completely. This provides security while maintaining
      usability for BYOD users.
    advancedDetection: '// KQL: Detect SharePoint access from non-compliant devices

      SigninLogs

      | where TimeGenerated > ago(24h)

      | where ResourceDisplayName == ''SharePoint Online''

      | where DeviceDetail.isCompliant != true

      | summarize Count=count() by UserPrincipalName, tostring(DeviceDetail.operatingSystem), ConditionalAccessStatus'
