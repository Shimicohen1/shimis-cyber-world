- id: m365-084
  platform: m365-purview
  category: encryption
  severity: high
  title: At least one sensitivity label should enforce encryption.
  description: 'Labels with encryption: 0 of 0.'
  reference: MS.PURVIEW.2.2v1 — CIS M365 / Microsoft Secure Score — Purview
  tags:
  - purview
  - sensitivity-labels
  - encryption
  - dlp
  - data-classification
  commandLanguage: powershell
  premium:
    attackPerspective: Sensitivity labels with encryption are the last line of defense — even if an attacker exfiltrates a document, they cannot read it without the decryption key tied to Azure RMS. Without
      enforced encryption on sensitive content, a single compromised mailbox or OneDrive can lead to massive data breach exposure.
    implementationNotes: "# Connect to Security & Compliance\nConnect-IPPSSession\n\n# List existing sensitivity labels\nGet-Label | Select DisplayName, Priority, ContentType, Disabled | Format-Table\n\n\
      # Create an encryption-enforced label\nNew-Label -DisplayName 'Confidential - Encrypted' \\\n  -Tooltip 'Apply to sensitive documents requiring encryption' \\\n  -EncryptionEnabled $true \\\n  -EncryptionProtectionType\
      \ Template \\\n  -EncryptionDoNotForward $false \\\n  -ContentType 'File, Email'\n\n# Publish label policy\nNew-LabelPolicy -Name 'SCW-Label-Policy' \\\n  -Labels 'Confidential - Encrypted' \\\n \
      \ -ExchangeLocation All \\\n  -ModernGroupLocation All"
    validationNotes: '# Verify labels are published

      Get-LabelPolicy | Select Name, Enabled, Labels | Format-Table


      # Check encryption settings on label

      Get-Label -Identity ''Confidential - Encrypted'' | Select EncryptionEnabled, EncryptionProtectionType'
    tuningNotes: Start with a 'Confidential' label that recommends (not mandates) encryption. Gradually move to mandatory labeling once users are trained. Focus on auto-labeling for high-confidence patterns
      (credit cards, SSNs) before expanding. Monitor label usage in Content Explorer to understand classification patterns.
    advancedDetection: '// KQL: Track sensitivity label application

      InformationProtectionEvents_CL

      | where TimeGenerated > ago(7d)

      | summarize LabelCount = count() by LabelName_s, Application_s, UserId_s

      | sort by LabelCount desc


      // Detect label downgrades (potential data leak attempt)

      MicrosoftPurviewInformationProtection

      | where Activity == ''SensitivityLabelChanged''

      | where OldSensitivityLabelId > NewSensitivityLabelId

      | project TimeGenerated, UserId, FileName, OldLabel, NewLabel'
