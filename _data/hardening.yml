  tags:
  - sharepoint-online
  - link-sharing
  - anonymous-links
  - data-protection
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Anonymous 'Anyone with the link' sharing creates URLs that require no authentication — they can be forwarded, posted on social media, or discovered by web crawlers. Once created,
      the sharing link persists until explicitly removed.
    implementationNotes: '# Set default link type to internal only

      Set-SPOTenant -DefaultSharingLinkType Internal

      Set-SPOTenant -DefaultLinkPermission View


      # Require expiration on anonymous links

      Set-SPOTenant -RequireAnonymousLinksExpireInDays 30


      # Verify

      Get-SPOTenant | Select DefaultSharingLinkType, DefaultLinkPermission, RequireAnonymousLinksExpireInDays'
    validationNotes: 'Get-SPOTenant | Select DefaultSharingLinkType, DefaultLinkPermission, RequireAnonymousLinksExpireInDays

      # Expected: Internal, View, 30 (or less)'
    tuningNotes: Set DefaultLinkPermission to View, not Edit. Users can change to Edit when needed, but the default should be least-privilege. 30-day expiration for anonymous links is a good balance — shorter
      for sensitive sites.
    advancedDetection: '// KQL: Detect anonymous link creation

      OfficeActivity

      | where TimeGenerated > ago(24h)

      | where Operation == ''AnonymousLinkCreated''

      | project TimeGenerated, UserId, ObjectId, Site_

      | summarize LinkCount=count() by UserId, bin(TimeGenerated, 1h)

      | where LinkCount > 5'
