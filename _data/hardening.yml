- id: aws-005
  platform: aws
  category: network
  severity: critical
  title: Remove 0.0.0.0/0 from security groups
  description: No security group should allow unrestricted inbound access (0.0.0.0/0 on sensitive ports).
  reference: CIS AWS Foundations Benchmark 5.2
  command: "# Find SGs with 0.0.0.0/0 inbound\naws ec2 describe-security-groups --query \\\n  'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]].[GroupId,GroupName]' \\\n  --output table\n"
  premium:
    attackPerspective: Open security groups are the cloud equivalent of an open firewall. Automated scanners constantly probe AWS IP ranges for exposed services. The Capital One breach (2019) leveraged
      a misconfigured security group that allowed SSRF to the metadata service, leading to 100M+ records exposed.
    implementationNotes: '1. Run the audit command to find open SGs

      2. For each open SG: identify the associated resources (EC2, RDS, etc.)

      3. Determine the minimum required CIDR ranges

      4. Replace 0.0.0.0/0 with specific CIDRs or prefix lists

      5. For admin access: use VPN CIDR or AWS SSM Session Manager instead

      6. Test connectivity after changes'
    validationNotes: "# Re-run the audit\naws ec2 describe-security-groups --query \\\n  'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]]' --output table\n# Should return empty\n\n# For\
      \ IPv6\naws ec2 describe-security-groups --query \\\n  'SecurityGroups[?IpPermissions[?Ipv6Ranges[?CidrIpv6==`::/0`]]]' --output table"
    tuningNotes: ALBs and CloudFront distributions legitimately need 0.0.0.0/0 on ports 80/443. Focus on removing open access to SSH (22), RDP (3389), databases (3306, 5432, 1433), and admin ports.
    relatedIds:
    - aws-004
    - aws-019
    - aws-020
  tags:
  - security-groups
  - network
  - cis-benchmark
  - ssrf
  - exposure
  commandLanguage: bash
  commandFull: "# Complete SG audit and remediation script\n#!/bin/bash\necho \"=== Security Groups with 0.0.0.0/0 inbound ===\"\naws ec2 describe-security-groups \\\n  --query 'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]].[GroupId,GroupName,Description]'\
    \ \\\n  --output table\n\necho \"\"\necho \"=== Details of open rules ===\"\nfor sg in $(aws ec2 describe-security-groups \\\n  --query 'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]].GroupId'\
    \ \\\n  --output text); do\n  echo \"--- $sg ---\"\n  aws ec2 describe-security-groups --group-ids \"$sg\" \\\n    --query 'SecurityGroups[].IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]].{From:FromPort,To:ToPort,Proto:IpProtocol}'\
    \ \\\n    --output table\ndone\n\necho \"\"\necho \"=== IPv6 check (open ::/0) ===\"\naws ec2 describe-security-groups \\\n  --query 'SecurityGroups[?IpPermissions[?Ipv6Ranges[?CidrIpv6==`::/0`]]].[GroupId,GroupName]'\
    \ \\\n  --output table"
- id: aws-006
  platform: aws
  category: logging
  severity: critical
  title: Enable CloudTrail in all regions
  description: CloudTrail must log API calls across all regions with log file validation enabled.
  reference: CIS AWS Foundations Benchmark 3.1
  command: "# Check CloudTrail status\naws cloudtrail describe-trails --query 'trailList[].{Name:Name,Multi:IsMultiRegionTrail,Logging:HasCustomEventSelectors}'\n# Create multi-region trail\naws cloudtrail\
    \ create-trail --name scw-audit-trail \\\n  --s3-bucket-name scw-cloudtrail-logs \\\n  --is-multi-region-trail \\\n  --enable-log-file-validation\n"
  premium:
    attackPerspective: CloudTrail is the audit trail attackers try to disable first. Sophisticated threat actors will attempt to stop trails, delete logs, or modify S3 bucket policies to prevent logging.
      Without multi-region trails, attackers can spin up resources in unmonitored regions for crypto mining or data staging.
    implementationNotes: '1. Check existing trails: aws cloudtrail describe-trails

      2. If no multi-region trail exists, create one

      3. Configure S3 bucket with versioning, MFA delete, and lifecycle rules

      4. Enable log file validation for tamper detection

      5. Enable CloudTrail Insights for anomaly detection

      6. Set up CloudWatch alarms for trail modifications'
