    validationNotes: '(Get-CsTeamsMeetingPolicy -Identity Global).AllowPSTNUsersToBypassLobby

      # Expected: False'
    tuningNotes: This adds friction for legitimate dial-in users. The organizer must manually admit them. For meeting-heavy organizations, consider announcing the policy change and providing instructions
      for organizers.
    advancedDetection: '// KQL: Detect PSTN meeting joins

      OfficeActivity

      | where RecordType == ''MicrosoftTeams''

      | where Operation == ''MeetingParticipantJoined''

      | where Members has ''PSTN''

      | project TimeGenerated, MeetingId=ObjectId, Members'
