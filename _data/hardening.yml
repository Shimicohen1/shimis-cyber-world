  - governance
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Without domain restrictions, users can share with any external email domain. Domain whitelisting limits sharing to approved partner organizations, reducing the attack surface for
      data exfiltration to personal email accounts.
    implementationNotes: '# Set allowed domains for sharing

      Set-SPOTenant -SharingDomainRestrictionMode AllowList -SharingAllowedDomainList ''partner1.com partner2.com consultancy.com''


      # Or use block list for known consumer domains

      Set-SPOTenant -SharingDomainRestrictionMode BlockList -SharingBlockedDomainList ''gmail.com yahoo.com hotmail.com outlook.com''


      # Verify

      Get-SPOTenant | Select SharingDomainRestrictionMode, SharingAllowedDomainList, SharingBlockedDomainList'
    validationNotes: 'Get-SPOTenant | Select SharingDomainRestrictionMode, SharingAllowedDomainList

      # Expected: AllowList with specific domains'
    tuningNotes: AllowList is more secure but requires maintenance as new partners are added. BlockList is easier to maintain but can be bypassed with custom domains. Consider using AllowList for sensitive
      sites and BlockList org-wide.
    advancedDetection: '// KQL: Detect sharing to non-whitelisted domains

      OfficeActivity

      | where Operation in (''SharingInvitationCreated'',''SharingSet'')

      | extend TargetDomain = tostring(split(TargetUserOrGroupName, ''@'')[1])

      | where TargetDomain !in~ (''partner1.com'',''partner2.com'')  // Your whitelist

