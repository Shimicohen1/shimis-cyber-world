  category: services
  severity: high
  title: Disable unused APIs
  description: Disable GCP APIs not required for the project to reduce attack surface.
  reference: CIS GCP Foundations Benchmark 1.11
  command: '# List enabled APIs

    gcloud services list --enabled --format="table(config.name)"

    # Disable unused

    gcloud services disable <service-name>.googleapis.com

    '
- id: lin-016
  platform: linux
  category: identity
  severity: critical
  title: Configure SSH idle timeout
  description: Disconnect idle SSH sessions after 300 seconds to prevent session hijacking.
  reference: CIS Linux Benchmark 5.2.16
  command: '# /etc/ssh/sshd_config

    ClientAliveInterval 300

    ClientAliveCountMax 0

    sudo systemctl restart sshd

    '
- id: lin-017
  platform: linux
  category: identity
  severity: high
  title: Restrict cron to authorized users
  description: Only allow specific users to create cron jobs. Deny all others by default.
  reference: CIS Linux Benchmark 5.1.8
  command: 'sudo rm -f /etc/cron.deny

    echo root | sudo tee /etc/cron.allow

    sudo chmod 600 /etc/cron.allow

    '
- id: lin-018
  platform: linux
  category: identity
  severity: high
  title: Set default umask to 027
  description: Ensure new files are not world-readable by default.
  reference: CIS Linux Benchmark 5.4.4
  command: '# /etc/profile and /etc/bashrc

    umask 027

    '
- id: lin-019
  platform: linux
  category: identity
  severity: critical
  title: Ensure no accounts have empty passwords
  description: Find and remediate any accounts that can authenticate without a password.
  reference: CIS Linux Benchmark 6.2.1
  command: '# Find accounts with empty passwords

    sudo awk -F: ''($2 == "") {print $1}'' /etc/shadow

    # Lock any found accounts

    sudo passwd -l <username>

    '
- id: lin-020
  platform: linux
  category: identity
  severity: high
  title: Ensure root is the only UID 0 account
  description: No account other than root should have UID 0.
  reference: CIS Linux Benchmark 6.2.2
  command: 'awk -F: ''($3 == 0) { print $1 }'' /etc/passwd

    # Should only show: root

    '
- id: lin-021
  platform: linux
  category: identity
  severity: medium
  title: Set SSH MaxAuthTries to 4
  description: Limit authentication attempts per connection to mitigate brute force attacks.
  reference: CIS Linux Benchmark 5.2.7
  command: '# /etc/ssh/sshd_config

    MaxAuthTries 4

    sudo systemctl restart sshd

    '
- id: lin-022
  platform: linux
  category: identity
  severity: high
  title: Disable SSH X11 forwarding
  description: Prevent X11 forwarding which can be exploited for session hijacking.
  reference: CIS Linux Benchmark 5.2.6
  command: '# /etc/ssh/sshd_config

    X11Forwarding no

    sudo systemctl restart sshd

    '
- id: lin-023
  platform: linux
  category: identity
  severity: medium
  title: Configure SSH banner
  description: Display legal warning banner before SSH authentication.
  reference: CIS Linux Benchmark 5.2.15
  command: 'echo ''Authorized users only. All activity is monitored.'' | sudo tee /etc/issue.net

    # /etc/ssh/sshd_config

    Banner /etc/issue.net

    '
- id: lin-024
  platform: linux
  category: identity
  severity: high
  title: Enforce minimum password age (7 days)
  description: Prevent users from immediately changing passwords back to bypass rotation.
  reference: CIS Linux Benchmark 5.4.1.2
  command: '# /etc/login.defs

    PASS_MIN_DAYS 7

    # For existing users

    sudo chage --mindays 7 <username>

    '
- id: lin-025
  platform: linux
  category: identity
  severity: critical
  title: Restrict SSH to specific users/groups
  description: Use AllowUsers or AllowGroups to limit who can SSH into the system.
  reference: CIS Linux Benchmark 5.2.4
  command: '# /etc/ssh/sshd_config

    AllowGroups sshusers

    # Add users to group

    sudo groupadd sshusers

    sudo usermod -aG sshusers <username>

    sudo systemctl restart sshd

    '
- id: lin-026
  platform: linux
  category: network
  severity: high
  title: Disable source routing
  description: Prevent attackers from specifying the route packets take through the network.
  reference: CIS Linux Benchmark 3.2.1
  command: '# /etc/sysctl.conf

    net.ipv4.conf.all.accept_source_route = 0

    net.ipv4.conf.default.accept_source_route = 0

    net.ipv6.conf.all.accept_source_route = 0

    sudo sysctl -p

    '
- id: lin-027
  platform: linux
  category: network
  severity: high
  title: Enable TCP SYN cookies
  description: Protect against SYN flood denial-of-service attacks.
  reference: CIS Linux Benchmark 3.2.8
  command: '# /etc/sysctl.conf

    net.ipv4.tcp_syncookies = 1

    sudo sysctl -p

    '
- id: lin-028
  platform: linux
  category: network
  severity: high
  title: Enable reverse path filtering
  description: Drop packets with spoofed source addresses using reverse path validation.
  reference: CIS Linux Benchmark 3.2.7
  command: '# /etc/sysctl.conf

    net.ipv4.conf.all.rp_filter = 1

    net.ipv4.conf.default.rp_filter = 1

    sudo sysctl -p

    '
- id: lin-029
  platform: linux
  category: network
  severity: medium
  title: Disable IPv6 if not required
  description: Reduce attack surface by disabling IPv6 when not in use.
  reference: CIS Linux Benchmark 3.1.2
  command: '# /etc/sysctl.conf

    net.ipv6.conf.all.disable_ipv6 = 1

    net.ipv6.conf.default.disable_ipv6 = 1

    net.ipv6.conf.lo.disable_ipv6 = 1

    sudo sysctl -p

    '
- id: lin-030
  platform: linux
  category: network
  severity: critical
  title: Log suspicious (martian) packets
  description: Enable logging of packets with impossible addresses for network forensics.
  reference: CIS Linux Benchmark 3.2.4
  command: '# /etc/sysctl.conf

    net.ipv4.conf.all.log_martians = 1

    net.ipv4.conf.default.log_martians = 1

    sudo sysctl -p

    '
- id: lin-031
  platform: linux
  category: network
  severity: high
  title: Disable DCCP, SCTP, RDS, TIPC protocols
  description: Disable uncommon network protocols that are rarely needed but increase attack surface.
  reference: CIS Linux Benchmark 3.4
  command: '# /etc/modprobe.d/CIS.conf

    install dccp /bin/true

    install sctp /bin/true

    install rds /bin/true

    install tipc /bin/true

    '
- id: lin-032
  platform: linux
  category: network
  severity: high
  title: Disable wireless interfaces (servers)
  description: Servers should not have active wireless interfaces. Disable them.
  reference: CIS Linux Benchmark 3.1.3
  command: '# List wireless interfaces

    iwconfig 2>/dev/null | grep -v ''no wireless''

    # Disable

    sudo ip link set wlan0 down

    # Blacklist driver

    echo ''blacklist cfg80211'' | sudo tee /etc/modprobe.d/nowifi.conf

    '
- id: lin-033
  platform: linux
  category: logging
  severity: critical
  title: Configure auditd rules for privilege escalation
  description: Audit all use of sudo, su, and setuid/setgid changes.
  reference: CIS Linux Benchmark 4.1.12
  command: '# /etc/audit/rules.d/privilege.rules

    -a always,exit -F path=/usr/bin/sudo -F perm=x -k priv_esc

    -a always,exit -F path=/usr/bin/su -F perm=x -k priv_esc

    -w /etc/sudoers -p wa -k scope

    -w /etc/sudoers.d/ -p wa -k scope

    sudo augenrules --load

    '
- id: lin-034
  platform: linux
  category: logging
  severity: high
  title: Audit file deletions by users
  description: Log when users delete files to detect data destruction or covering tracks.
  reference: CIS Linux Benchmark 4.1.14
  command: '# /etc/audit/rules.d/delete.rules

    -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -F auid>=1000 -F auid!=4294967295 -k delete

    sudo augenrules --load

    '
- id: lin-035
  platform: linux
  category: logging
  severity: high
  title: Ensure log files have correct permissions
  description: Log files should not be readable by unprivileged users.
  reference: CIS Linux Benchmark 4.2.3
  command: 'sudo find /var/log -type f -exec chmod g-wx,o-rwx {} +

    sudo chmod 640 /var/log/syslog /var/log/auth.log

    '
- id: lin-036
  platform: linux
  category: logging
  severity: critical
  title: Audit kernel module loading/unloading
  description: Detect rootkits and unauthorized kernel modifications by auditing module changes.
  reference: CIS Linux Benchmark 4.1.17
  command: '# /etc/audit/rules.d/modules.rules

    -w /sbin/insmod -p x -k modules

    -w /sbin/rmmod -p x -k modules

    -w /sbin/modprobe -p x -k modules

    -a always,exit -F arch=b64 -S init_module -S delete_module -k modules

    sudo augenrules --load

    '
- id: lin-037
  platform: linux
  category: logging
  severity: high
  title: Monitor login/logout events
  description: Audit successful and failed login attempts for threat detection.
  reference: CIS Linux Benchmark 4.1.8
  command: '# /etc/audit/rules.d/logins.rules

    -w /var/log/lastlog -p wa -k logins

    -w /var/run/faillock/ -p wa -k logins

    -w /var/log/tallylog -p wa -k logins

    sudo augenrules --load

    '
- id: lin-038
  platform: linux
  category: logging
  severity: high
  title: Enable process accounting
  description: Track all process execution for forensic investigations.
  reference: CIS Linux Benchmark 4.1.3
  command: 'sudo apt install acct  # Debian/Ubuntu

    sudo systemctl enable --now acct

    # View last commands

    lastcomm --user <username>

    '
- id: lin-039
  platform: linux
  category: logging
  severity: medium
  title: Configure log rotation
  description: Ensure logs are rotated and retained for at least 90 days.
  reference: CIS Linux Benchmark 4.3
  command: '# /etc/logrotate.conf

    rotate 13

    weekly

    compress

    delaycompress

    # Verify

    logrotate -d /etc/logrotate.conf

    '
- id: lin-040
  platform: linux
  category: encryption
  severity: critical
  title: Disable SSH weak key exchange algorithms
  description: Remove diffie-hellman-group1-sha1 and other weak KEX algorithms.
  reference: CIS Linux Benchmark 5.2.14
  command: '# /etc/ssh/sshd_config

    KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512

    sudo systemctl restart sshd

    '
- id: lin-041
  platform: linux
  category: encryption
  severity: high
  title: Set SSH protocol to version 2 only
  description: SSH protocol version 1 has known vulnerabilities. Enforce version 2.
  reference: CIS Linux Benchmark 5.2.2
  command: '# /etc/ssh/sshd_config

    Protocol 2

    sudo systemctl restart sshd

    '
- id: lin-042
  platform: linux
  category: encryption
  severity: high
  title: Configure SSH host key algorithms
  description: Use only strong host key algorithms (Ed25519, RSA with SHA-256+).
  reference: CIS Linux Benchmark 5.2.13
  command: '# /etc/ssh/sshd_config

    HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256

    sudo systemctl restart sshd

    '
- id: lin-043
  platform: linux
  category: encryption
  severity: medium
  title: Verify integrity of installed packages
  description: Check that no system packages have been tampered with.
  reference: CIS Linux Benchmark 1.8
  command: '# Debian/Ubuntu

    sudo debsums --changed

    # RHEL/CentOS

    sudo rpm -Va --nomtime --nosize --nomd5

    '
- id: lin-044
  platform: linux
  category: services
  severity: critical
  title: Disable USB storage (servers)
  description: Prevent data exfiltration via USB on servers.
  reference: CIS Linux Benchmark 1.1.24
  command: '# /etc/modprobe.d/usb-storage.conf

    install usb-storage /bin/true

    # Blacklist immediately

    sudo rmmod usb-storage 2>/dev/null

    '
- id: lin-045
  platform: linux
  category: services
  severity: high
  title: Set sticky bit on world-writable directories
  description: Prevent users from deleting/renaming files owned by others in shared directories.
  reference: CIS Linux Benchmark 1.1.21
  command: '# Find world-writable dirs without sticky bit

    sudo find / -type d \( -perm -0002 -a ! -perm -1000 \) 2>/dev/null

    # Fix

    sudo chmod +t /tmp /var/tmp

    '
- id: lin-046
  platform: linux
  category: services
  severity: high
  title: Disable core dumps
  description: Prevent core dumps that may contain sensitive data like passwords or encryption keys.
  reference: CIS Linux Benchmark 1.5.1
  command: '# /etc/security/limits.conf

    * hard core 0

    # /etc/sysctl.conf

    fs.suid_dumpable = 0

    sudo sysctl -p

    '
- id: lin-047
  platform: linux
  category: services
  severity: critical
  title: Enable SELinux or AppArmor
  description: Mandatory Access Control limits the blast radius of compromised processes.
  reference: CIS Linux Benchmark 1.6
  command: '# Check SELinux status

    sudo sestatus

    # Or AppArmor

    sudo aa-status

    # Enable AppArmor (Debian/Ubuntu)

    sudo systemctl enable --now apparmor

    '
- id: lin-048
  platform: linux
  category: services
  severity: high
  title: Disable automounting (autofs)
  description: Prevent automatic mounting of removable media that could introduce malware.
  reference: CIS Linux Benchmark 1.1.22
  command: 'sudo systemctl disable --now autofs 2>/dev/null

    sudo apt purge autofs 2>/dev/null

    '
- id: lin-049
  platform: linux
  category: services
  severity: high
  title: Set GRUB bootloader password
  description: Protect bootloader to prevent single-user mode access or boot parameter changes.
  reference: CIS Linux Benchmark 1.4.1
  command: '# Generate password hash

    sudo grub2-mkpasswd-pbkdf2

    # Add to /etc/grub.d/40_custom:

    set superusers="admin"

    password_pbkdf2 admin <hash>

    sudo update-grub

    '
- id: lin-050
  platform: linux
  category: services
  severity: high
  title: Restrict access to /boot/grub/grub.cfg
  description: Ensure bootloader config is only accessible by root.
  reference: CIS Linux Benchmark 1.4.2
  command: 'sudo chown root:root /boot/grub/grub.cfg

    sudo chmod 600 /boot/grub/grub.cfg

    '
- id: lin-051
  platform: linux
  category: services
  severity: medium
  title: Disable Ctrl-Alt-Del reboot
  description: Prevent physical console users from rebooting the system.
  reference: CIS Linux Benchmark 1.5.2
  command: 'sudo systemctl mask ctrl-alt-del.target

    sudo systemctl daemon-reload

    '
- id: lin-052
  platform: linux
  category: services
  severity: high
  title: Mount /tmp with noexec,nosuid,nodev
  description: Prevent execution of binaries and setuid programs from /tmp.
  reference: CIS Linux Benchmark 1.1.2-1.1.4
  command: '# /etc/fstab

    tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev 0 0

    sudo mount -o remount /tmp

    # Verify

    mount | grep /tmp

    '
- id: lin-053
  platform: linux
  category: services
  severity: high
  title: Separate /var, /var/log, /var/log/audit partitions
  description: Isolate log partitions to prevent log exhaustion from filling root filesystem.
  reference: CIS Linux Benchmark 1.1.10-1.1.13
  command: '# Check current mounts

    df -h /var /var/log /var/log/audit

    # Should be separate partitions

    lsblk

    '
- id: lin-054
  platform: linux
  category: services
  severity: medium
  title: Configure AIDE file integrity monitoring
  description: Detect unauthorized changes to critical system files using AIDE.
  reference: CIS Linux Benchmark 1.3
  command: 'sudo apt install aide aide-common

    sudo aideinit

    # Add cron job for daily checks

    echo ''0 5 * * * root /usr/bin/aide --check'' | sudo tee /etc/cron.d/aide

    '
- id: lin-055
  platform: linux
  category: patching
  severity: critical
  title: Verify GPG keys for package repositories
  description: Ensure all repositories use signed packages to prevent supply chain attacks.
  reference: CIS Linux Benchmark 1.2.2
  command: '# Debian/Ubuntu

    apt-key list

    # RHEL/CentOS

    rpm -qa gpg-pubkey*

    # Verify repo config

    grep -r ''gpgcheck'' /etc/yum.repos.d/

    '
- id: lin-056
  platform: linux
  category: patching
  severity: high
  title: Remove unnecessary packages
  description: Minimize attack surface by removing packages not required for the server's role.
  reference: CIS Linux Benchmark 2.2
  command: '# List installed packages

    dpkg -l | wc -l  # Debian

    rpm -qa | wc -l  # RHEL

    # Remove common unnecessary packages

    sudo apt purge telnet rsh-client xinetd ypbind 2>/dev/null

    '
- id: lin-057
  platform: linux
  category: patching
  severity: high
  title: Enable kernel live patching
  description: Apply critical kernel patches without rebooting using Livepatch or kpatch.
  reference: AWS Well-Architected — Reliability
  command: '# Ubuntu

    sudo snap install canonical-livepatch

    sudo canonical-livepatch enable <token>

    # RHEL

    sudo yum install kpatch

    sudo systemctl enable --now kpatch

    '
- id: lin-058
  platform: linux
  category: patching
  severity: medium
  title: Check for known vulnerable packages
  description: Scan installed packages against CVE databases.
  reference: NIST SP 800-40
  command: '# Debian/Ubuntu

    sudo apt install debsecan

    debsecan --suite $(lsb_release -cs)

    # RHEL

    sudo yum updateinfo list security

    '
- id: win-011
  platform: windows
  category: identity
  severity: critical
  title: Enable Credential Guard
  description: Isolate LSASS process using virtualization-based security to prevent credential theft (Mimikatz).
  reference: CIS Windows Server Benchmark 18.3.6
  command: '# PowerShell (requires Hyper-V)

    Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\DeviceGuard'' -Name ''EnableVirtualizationBasedSecurity'' -Value 1

    Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\Lsa'' -Name ''LsaCfgFlags'' -Value 1

    '
- id: win-012
  platform: windows
  category: identity
  severity: critical
  title: Configure account lockout duration (30 min)
  description: Set account lockout duration to at least 30 minutes after failed attempts.
  reference: CIS Windows Server Benchmark 1.2.1
  command: '# PowerShell

    net accounts /lockoutduration:30

    # Verify

    net accounts | findstr /i ''lockout''

    '
- id: win-013
  platform: windows
  category: identity
  severity: high
  title: Restrict anonymous access to SAM/shares
  description: Prevent anonymous enumeration of SAM accounts and network shares.
  reference: CIS Windows Server Benchmark 2.3.10.1-2.3.10.2
  command: 'Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\Lsa'' -Name ''RestrictAnonymousSAM'' -Value 1

    Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\Lsa'' -Name ''RestrictAnonymous'' -Value 1

    '
- id: win-014
  platform: windows
  category: identity
  severity: critical
  title: Disable Guest account
  description: The Guest account must be disabled on all systems.
  reference: CIS Windows Server Benchmark 2.3.1.2
  command: 'Disable-LocalUser -Name ''Guest''

    Get-LocalUser Guest | Select Name,Enabled

    '
- id: win-015
  platform: windows
  category: identity
  severity: high
  title: Enable LAPS (Local Admin Password Solution)
  description: Randomize local admin passwords across all domain workstations and servers.
  reference: CIS Windows Server Benchmark 18.2.1
  command: '# Check LAPS status

    Get-AdmPwdPassword -ComputerName <hostname>

    # Or Windows LAPS (new)

    Get-LapsAADPassword -DeviceIds <device_id>

    '
- id: win-016
  platform: windows
  category: identity
  severity: high
  title: Set password length to minimum 14 characters
  description: Enforce minimum password length of 14 characters via Group Policy.
  reference: CIS Windows Server Benchmark 1.1.4
  command: '# GPO: Computer Configuration → Windows Settings → Security Settings →

    # Account Policies → Password Policy → Minimum password length = 14

    net accounts /minpwlen:14

    '
- id: win-017
  platform: windows
  category: identity
  severity: high
  title: Enable password history (24 passwords)
  description: Prevent password reuse by remembering the last 24 passwords.
  reference: CIS Windows Server Benchmark 1.1.1
  command: 'net accounts /uniquepw:24

    '
- id: win-018
  platform: windows
  category: identity
  severity: high
  title: Set maximum password age to 365 days
  description: Force password rotation at least annually.
  reference: CIS Windows Server Benchmark 1.1.3
  command: 'net accounts /maxpwage:365

    '
- id: win-019
  platform: windows
  category: identity
  severity: critical
  title: Configure User Account Control (UAC)
  description: Ensure UAC is enabled and set to 'always notify' for admin actions.
  reference: CIS Windows Server Benchmark 2.3.17
  command: 'Set-ItemProperty -Path ''HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'' -Name ''EnableLUA'' -Value 1

    Set-ItemProperty -Path ''HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'' -Name ''ConsentPromptBehaviorAdmin'' -Value 2

    '
- id: win-020
  platform: windows
  category: identity
  severity: high
  title: Restrict remote desktop access
  description: Limit RDP access to specific security groups and require NLA.
  reference: CIS Windows Server Benchmark 18.9.65
  command: '# Require Network Level Authentication

    Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'' -Name ''UserAuthentication'' -Value 1

    # Restrict to RDP Users group only via GPO

    '
- id: win-021
  platform: windows
  category: network
  severity: critical
  title: Disable WDigest authentication
  description: Prevent plaintext password storage in memory (used by Mimikatz).
  reference: CIS Windows Server Benchmark 18.3.7
  command: 'Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest'' -Name ''UseLogonCredential'' -Value 0

    '
- id: win-022
  platform: windows
  category: network
  severity: high
  title: Disable NetBIOS over TCP/IP
  description: Reduce attack surface by disabling NetBIOS name resolution.
  reference: CIS Windows Server Benchmark 18.5.8
  command: '# Disable via PowerShell for all NICs

    Get-WmiObject Win32_NetworkAdapterConfiguration -Filter ''IPEnabled=True'' | ForEach-Object { $_.SetTcpipNetbios(2) }

    '
- id: win-023
  platform: windows
  category: network
  severity: high
  title: Disable LLMNR
  description: Prevent LLMNR poisoning attacks used for credential harvesting (Responder).
  reference: CIS Windows Server Benchmark 18.5.5
  command: '# Registry

    New-Item -Path ''HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient'' -Force

    Set-ItemProperty -Path ''HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient'' -Name ''EnableMulticast'' -Value 0

    '
- id: win-024
  platform: windows
  category: network
  severity: critical
  title: Enable Windows Firewall logging
  description: Log all dropped and allowed connections for forensic analysis.
  reference: CIS Windows Server Benchmark 9.1.7-9.1.8
  command: 'Set-NetFirewallProfile -Profile Domain,Public,Private -LogAllowed True -LogBlocked True -LogMaxSizeKilobytes 16384

    # Check log location

    Get-NetFirewallProfile | Select Name,LogFileName

    '
- id: win-025
  platform: windows
  category: network
  severity: high
  title: Configure SMB signing (required)
  description: Require SMB packet signing to prevent man-in-the-middle attacks.
  reference: CIS Windows Server Benchmark 2.3.8.1-2.3.8.2
  command: 'Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters'' -Name ''RequireSecuritySignature'' -Value 1

    Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters'' -Name ''RequireSecuritySignature'' -Value 1

    '
- id: win-026
  platform: windows
  category: network
  severity: high
  title: Disable mDNS (Multicast DNS)
  description: Prevent mDNS poisoning attacks on the local network.
  reference: MITRE ATT&CK T1557
  command: '# Registry

    Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Services\Dnscache\Parameters'' -Name ''EnableMDNS'' -Value 0

    '
- id: win-027
  platform: windows
  category: network
  severity: high
  title: Configure IPSec for sensitive traffic
  description: Use Windows IPSec policies for encryption of sensitive internal traffic.
  reference: CIS Windows Server Benchmark 9.3
  command: '# Create IPSec rule via PowerShell

    New-NetIPsecRule -DisplayName ''Encrypt-Sensitive'' -InboundSecurity Require -OutboundSecurity Require

    '
- id: win-028
  platform: windows
  category: logging
  severity: critical
  title: Enable command line in process creation events
  description: Log full command line in Event ID 4688 for process tracking.
  reference: CIS Windows Server Benchmark 18.9.3.1
