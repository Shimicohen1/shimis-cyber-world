- id: m365-083
  platform: m365-power
  category: encryption
  severity: high
  title: Environment creation should be restricted to admins only.
  description: Verify in PP Admin Center → Settings → Environment creation.
  reference: MS.POWERPLATFORM.1.2v1 — CIS M365 / Microsoft Secure Score — Power Platform
  command: '# PP Admin Center → Settings → Environment creation'
  premium:
    attackPerspective: When any user can create Power Platform environments, they can establish isolated spaces outside IT governance. These shadow environments bypass DLP policies (if policies aren't scoped
      to 'all environments'), lack monitoring, and can host data stores (Dataverse) with no backup or retention policy. An attacker creates an environment, moves sensitive data there, and operates completely
      undetected.
    implementationNotes: '# Power Platform Admin Center → Settings → Governance

      # ''Who can create production and sandbox environments'' → Only specific admins


      # PowerShell:

      $settings = Get-TenantSettings

      $settings.powerPlatform.environments.disableEnvironmentCreationByNonAdminUsers = $true

      Set-TenantSettings -RequestBody $settings


      # For developer environments specifically:

      # These are harder to restrict — consider monitoring instead of blocking

      # Developers get one personal environment by default


      # Create managed environments for teams:

      # Admin Center → Environments → New → Set admin as creator

      # Apply DLP policy → Add team members with appropriate roles'
    validationNotes: '# Verify environment creation is restricted

      $settings = Get-TenantSettings

      Write-Host "Non-admin env creation disabled: $($settings.powerPlatform.environments.disableEnvironmentCreationByNonAdminUsers)"


      # List all environments and their creators:

      Get-AdminPowerAppEnvironment | Select DisplayName, EnvironmentType, CreatedBy, CreatedTime | Sort-Object CreatedTime -Descending | Format-Table


      # Check for recently created environments:

      Get-AdminPowerAppEnvironment | Where-Object { $_.CreatedTime -gt (Get-Date).AddDays(-30) } | Format-Table DisplayName, CreatedBy, EnvironmentType'
    tuningNotes: Developer environments are auto-provisioned and harder to restrict without blocking the Developer plan entirely. Focus governance on production and sandbox environments. For developer environments,
      apply a restrictive DLP policy that prevents business data connectors, so they can only work with test data.
    advancedDetection: '// KQL: Monitor environment creation

      PowerPlatformAdminActivity_CL

      | where TimeGenerated > ago(30d)

      | where Operation_s == ''CreateEnvironment''

      | project TimeGenerated, UserId_s, EnvironmentName_s, EnvironmentType_s

      | sort by TimeGenerated desc


      // Alert on non-admin environment creation

      PowerPlatformAdminActivity_CL

      | where Operation_s == ''CreateEnvironment''

      | where UserRole_s != ''Admin'' and UserRole_s != ''GlobalAdmin'''
