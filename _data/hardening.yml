- id: gcp-034
  platform: gcp
  category: services
  severity: high
  title: Restrict public access to Cloud SQL
  description: Ensure Cloud SQL instances don't have public IPs. Use Cloud SQL Proxy.
  reference: CIS GCP Foundations Benchmark 6.5
  command: '# Find SQL instances with public IPs

    gcloud sql instances list --format=''table(name,ipAddresses[].type,settings.ipConfiguration.authorizedNetworks[].value)''

    '
  premium:
    attackPerspective: Cloud SQL instances with public IPs are directly reachable from the internet. Even with SSL and strong passwords, they're exposed to brute-force attacks, zero-day exploits in the
      database engine, and DDoS. A public Cloud SQL IP combined with a weak password or an unpatched vulnerability is a trivial target. The Shodan search engine actively indexes GCP Cloud SQL instances.
    implementationNotes: "# Remove public IP from existing instance:\ngcloud sql instances patch INSTANCE_NAME --no-assign-ip\n\n# Create instance with private IP only:\ngcloud sql instances create my-db\
      \ \\\n  --network=production-vpc \\\n  --no-assign-ip \\\n  --database-version=POSTGRES_15 \\\n  --tier=db-custom-4-16384 \\\n  --region=us-central1\n\n# For apps outside GCP that need access, use\
      \ Cloud SQL Auth Proxy:\n# Download: https://cloud.google.com/sql/docs/postgres/sql-proxy\n./cloud-sql-proxy PROJECT:REGION:INSTANCE --private-ip\n\n# Or use Private Service Connect for cross-VPC\
      \ access:\ngcloud sql instances patch INSTANCE_NAME \\\n  --enable-private-service-connect \\\n  --allowed-psc-projects=PROJECT_ID"
    validationNotes: "# Find Cloud SQL instances with public IPs:\nfor project in $(gcloud projects list --format='value(projectId)'); do\n  gcloud sql instances list --project=$project \\\n    --format='table(name,ipAddresses[].type,ipAddresses[].ipAddress)'\
      \ \\\n    --filter='ipAddresses.type:PRIMARY' 2>/dev/null\ndone\n\n# Verify SSL is required (if public IP must remain):\ngcloud sql instances describe INSTANCE_NAME --format='value(settings.ipConfiguration.requireSsl)'"
    tuningNotes: Remove public IPs as the primary mitigation. If external access is absolutely needed (legacy apps, partner connections), use Cloud SQL Auth Proxy with IAM authentication instead of direct
      public IP access. The proxy handles encryption, authentication, and authorization without exposing the database port directly.
    advancedDetection: "-- Monitor Cloud SQL connection patterns\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.requestMetadata.callerIp,\n  protopayload_auditlog.resourceName\n\
      FROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.serviceName = 'cloudsql.googleapis.com'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\n\
      ORDER BY timestamp DESC"
    relatedIds:
