# ═══════════════════════════════════════════════════════════════
#  Fortinet FortiGate
# ═══════════════════════════════════════════════════════════════
- id: fg-001
  platform: fortinet
  category: network
  severity: critical
  title: Enforce explicit deny-all as the last firewall policy
  description: The final policy must be an explicit deny-all with logging enabled. FortiGate has an implicit deny but it does not log — leaving you blind to blocked traffic.
  reference: Fortinet Best Practices — Security Policy Ordering
  command: 'config firewall policy

    edit 9999

      set name "deny-all-log"

      set srcintf "any"

      set dstintf "any"

      set srcaddr "all"

      set dstaddr "all"

      set action deny

      set schedule "always"

      set logtraffic all

    next

    end'
  premium:
    attackPerspective: Attackers conducting recon scans rely on silent drops to map your perimeter. Without logging on the deny rule, you cannot see brute-force attempts, port scans, or C2 callback failures. In the 2023 Volt Typhoon campaign, defenders who logged denied traffic detected the initial probing 72 hours before exploitation.
    implementationNotes: '1. Create policy with the highest numeric ID to ensure it stays last

      2. Enable logtraffic "all" not "utm" — you want connection-level logs even without UTM

      3. Schedule a monthly review to ensure no new rules push below the deny-all

      4. Use the policy move command if needed: move firewall policy 9999 after <last-allow-policy>'
    validationNotes: '# Verify last policy is deny-all:

      show firewall policy | tail -20


      # Test: generate traffic from untrusted zone to random port

      execute ping-options source <untrusted-ip>

      execute ping <internal-ip>

      # Should be denied + logged


      # Check logs:

      execute log filter category traffic

      execute log filter field action deny

      execute log display'
    tuningNotes: On high-traffic firewalls, the deny-all log can be noisy. Use log-rate-limiting or forward only to SIEM and filter there. Never disable logging on deny — the noise IS the intelligence.
    advancedDetection: '# SIEM query to detect scanning patterns in denied traffic

      index=fortigate sourcetype=fgt_traffic action=deny

      | stats dc(dstport) as ports_scanned, count by srcip

      | where ports_scanned > 20

      | sort -ports_scanned'
    relatedIds:
    - fg-002
    - fg-005
  tags:
  - firewall
  - default-deny
  - logging
  - perimeter
  commandLanguage: fortigate-cli
  commandFull: 'config firewall policy

    edit 9999

      set name "deny-all-log"

      set srcintf "any"

      set dstintf "any"

      set srcaddr "all"

      set dstaddr "all"

      set action deny

      set schedule "always"

      set logtraffic all

      set comments "Explicit deny-all with logging — DO NOT MOVE"

    next

    end


    # Verify position:

    show firewall policy | grep -A2 "edit 9999"'
- id: fg-002
  platform: fortinet
  category: network
  severity: critical
  title: Enable IPS with block action on all allow policies
  description: Attach an IPS sensor with action=block to every firewall policy that allows traffic. Without IPS, allowed traffic flows uninspected for exploits and known attacks.
  reference: Fortinet Best Practices — IPS Configuration
  command: 'config ips sensor

    edit "strict-ips"

      config entries

        edit 1

          set severity critical high medium

          set action block

          set status enable

        next

      end

    next

    end


    config firewall policy

    edit <policy-id>

      set ips-sensor "strict-ips"

    next

    end'
  premium:
    attackPerspective: IPS is the primary defense against exploit-based initial access. Without it, CVE exploits for VPN portals (FortiOS CVE-2023-27997), web servers, and SMB services pass through undetected. The 2024 FortiGate zero-day campaigns specifically targeted organizations without IPS inspection enabled on VPN policies.
    implementationNotes: '1. Create sensor with block for critical+high, alert for medium

      2. Attach to ALL allow policies — not just internet-facing

      3. Enable protocol anomaly detection in sensor settings

      4. Schedule weekly IPS signature updates'
    validationNotes: '# Verify IPS is active:

      diagnose ips session status

      diagnose ips signature count

      # Test with EICAR download — IPS should block'
    tuningNotes: Initial deployment may generate false positives on internal applications. Set medium severity to alert-only for week 1, review logs, then promote to block.
    advancedDetection: '# Detect IPS bypass attempts

      index=fortigate sourcetype=fgt_ips action=detected severity=critical

      | stats count by srcip, attack_name

      | where count > 3'
    relatedIds:
    - fg-001
    - fg-003
  tags:
  - ips
  - intrusion-prevention
  - exploit
  - signatures
  commandLanguage: fortigate-cli
  commandFull: 'config ips sensor

    edit "strict-ips"

      config entries

        edit 1

          set severity critical high

          set action block

          set status enable

        next

        edit 2

          set severity medium

          set action pass

          set log enable

          set status enable

        next

      end

    next

    end'
- id: fg-003
  platform: fortinet
  category: network
  severity: critical
  title: Enable SSL deep inspection on outbound traffic
  description: Without SSL inspection, 85%+ of internet traffic is invisible. Configure deep inspection with a trusted CA certificate to inspect HTTPS for malware, C2, and data exfiltration.
  reference: Fortinet Best Practices — SSL/SSH Inspection
  command: 'config firewall ssl-ssh-profile

    edit "deep-inspect"

      config https

        set ports 443

        set status deep-inspection

      end

      set caname "FortiGate-CA"

    next

    end'
  premium:
    attackPerspective: Modern malware exclusively uses HTTPS for C2 communication. Without SSL inspection, your IPS, DLP, and antivirus are blind to 85% of traffic. Cobalt Strike, Sliver, and Brute Ratel all use HTTPS with valid TLS certificates. APT groups like Volt Typhoon used encrypted channels that deep inspection would have caught.
    implementationNotes: '1. Generate or import a CA certificate for deep inspection

      2. Deploy the CA cert to all endpoints via GPO/MDM

      3. Create an exempt list for healthcare/banking/privacy-sensitive domains

      4. Start with alert-only on a pilot group before enforcing'
    validationNotes: '# Verify deep inspection is active:

      diagnose test application ssl 1

      # Browse to HTTPS site — verify cert is issued by FortiGate CA'
    tuningNotes: Add financial institutions, healthcare portals, and government sites to the exempt list. Deep inspection of certificate-pinned apps will break them. Monitor CPU utilization — deep inspection is compute-intensive on older hardware.
    advancedDetection: '# Detect C2 in decrypted traffic

      index=fortigate sourcetype=fgt_traffic ssl_action="deep-inspection"

      | where dest_category IN ("malware","botnet","phishing")

      | stats count by srcip, dest_fqdn'
    relatedIds:
    - fg-002
    - fg-005
  tags:
  - ssl-inspection
  - tls
  - deep-inspection
  - visibility
  commandLanguage: fortigate-cli
  commandFull: 'config firewall ssl-ssh-profile

    edit "deep-inspect"

      config https

        set ports 443

        set status deep-inspection

        set client-cert-request bypass

      end

      set caname "FortiGate-CA"

      set untrusted-caname "FortiGate-CA"

      set server-cert-mode re-sign

    next

    end'
- id: fg-004
  platform: fortinet
  category: identity
  severity: critical
  title: Enforce MFA on all admin accounts and disable HTTP management
  description: Require two-factor authentication for all FortiGate admin accounts. Disable HTTP management — use HTTPS only. FortiGate admin portals have been targeted by zero-day attacks.
  reference: Fortinet PSIRT — Admin Authentication Hardening
  command: 'config system admin

    edit "admin"

      set two-factor fortitoken-cloud

      set trusthost1 10.0.0.0/24

    next

    end


    config system global

      set admin-https-redirect enable

      set admin-sport 8443

    end'
  premium:
    attackPerspective: FortiGate management interfaces are the #1 target for initial access. CVE-2024-55591, CVE-2023-27997, and CVE-2022-40684 all targeted the admin portal directly. If an attacker gains admin access to your FortiGate, they own your entire network — they can disable IPS, create VPN backdoors, and intercept all traffic. The 2024 mass exploitation compromised 150,000+ devices.
    implementationNotes: '1. Enable FortiToken Cloud MFA for ALL admin accounts

      2. Change default HTTPS port from 443 to non-standard (e.g., 8443)

      3. Disable HTTP management entirely

      4. Restrict management access to specific trusted IPs via trusthost

      5. Create read-only audit account for compliance teams'
    validationNotes: '# Verify MFA is enabled:

      get system admin

      # Check each user has two-factor set


      # Verify HTTP is disabled:

      get system global | grep admin-


      # Test from untrusted IP — should be denied'
    tuningNotes: If using SAML/RADIUS for admin auth, ensure the IdP enforces MFA. Local admin accounts should be break-glass only. Rotate admin passwords quarterly.
    advancedDetection: '# Detect admin login anomalies

      index=fortigate sourcetype=fgt_event subtype=system level=warning action=login

      | stats count by srcip, admin, status

      | where status="failed" AND count > 3'
    relatedIds:
    - fg-005
    - fg-009
  tags:
  - admin-access
  - mfa
  - management
  - zero-day
  commandLanguage: fortigate-cli
  commandFull: 'config system admin

    edit "admin"

      set two-factor fortitoken-cloud

      set trusthost1 10.0.0.0/24

      set trusthost2 192.168.1.0/24

    next

    end


    config system global

      set admin-https-redirect enable

      set admin-sport 8443

      set admin-ssh-port 2222

      set admintimeout 15

    end'
- id: fg-005
  platform: fortinet
  category: network
  severity: high
  title: Enable web filtering to block high-risk URL categories
  description: Block access to malware, phishing, newly-registered, and dynamic DNS domains. FortiGuard URL database covers 300M+ URLs classified into 90+ categories.
  reference: Fortinet Best Practices — Web Filtering
  command: 'config webfilter profile

    edit "strict-web"

      config ftgd-wf

        config filters

          edit 1

            set category 26

            set action block

          next

        end

      end

    next

    end'
  premium:
    attackPerspective: 80% of phishing and malware delivery uses web redirects through newly-registered or compromised domains. In the SolarWinds attack, the C2 domain was categorized as a CDN — teams that monitored newly-registered domain access caught it earlier.
    implementationNotes: '1. Block categories: Malware, Phishing, Spam URLs, Dynamic DNS, Newly-registered

      2. Set Potentially Liable and Adult categories to warn

      3. Enable FortiGuard inline cloud scanning for uncategorized URLs

      4. Create bypass groups for IT teams if needed'
    validationNotes: '# Test web filter:

      diagnose webfilter fortiguard url-rating <test-domain>

      # Should return category and action'
    tuningNotes: Marketing teams may need social media sites that overlap with risky categories. Create per-group policies rather than global exceptions.
    advancedDetection: '# Detect users repeatedly hitting blocked sites

      index=fortigate sourcetype=fgt_webfilter action=blocked catdesc="Malware"

      | stats count by srcip, hostname

      | where count > 5'
    relatedIds:
    - fg-003
    - fg-001
  tags:
  - web-filtering
  - url-filtering
  - phishing
  - malware
  commandLanguage: fortigate-cli
  commandFull: 'config webfilter profile

    edit "strict-web"

      set feature-set flow

      config ftgd-wf

        config filters

          edit 1

            set category 26

            set action block

          next

          edit 2

            set category 61

            set action block

          next

          edit 3

            set category 62

            set action block

          next

        end

      end

    next

    end'
- id: fg-006
  platform: fortinet
  category: patching
  severity: critical
  title: Keep FortiOS updated — subscribe to PSIRT advisories
  description: FortiGate has had more actively exploited zero-days than any other firewall vendor in 2023-2025. Apply patches within 48h for critical CVEs. CISA KEV lists 15+ FortiGate CVEs.
  reference: Fortinet PSIRT — fortiguard.fortinet.com/psirt
  command: '# Check current version:

    get system status | grep Version


    # Check for updates:

    diagnose autoupdate versions


    # Subscribe to PSIRT:

    # https://fortiguard.fortinet.com/psirt'
  premium:
    attackPerspective: CVE-2024-55591 (auth bypass), CVE-2023-27997 (RCE via SSL-VPN), CVE-2022-40684 (auth bypass) — each was mass-exploited within days of disclosure. Threat actors including Volt Typhoon and APT28 specifically target unpatched FortiGate devices as initial access vectors.
    implementationNotes: '1. Subscribe to fortiguard.fortinet.com/psirt for email alerts

      2. CRITICAL patches within 48h, HIGH within 7 days

      3. Test firmware on HA-secondary before production

      4. Keep N-1 firmware backup on the device

      5. Document current firmware in asset inventory'
    validationNotes: '# Verify current firmware:

      get system status

      # Compare against latest at support.fortinet.com


      # Check HA sync status if applicable:

      get system ha status'
    tuningNotes: If running HA, upgrade secondary first, verify failover, then primary. Never upgrade both simultaneously. Keep auto signature updates on — only firmware updates should be manual.
    advancedDetection: '# Detect vulnerable firmware in fleet

      index=fortigate sourcetype=fgt_event subtype=system

      | stats latest(firmware) as version by devname

      | eval is_vulnerable=if(version < "7.4.4", "YES", "NO")'
    relatedIds:
    - fg-004
    - fg-002
  tags:
  - patching
  - firmware
  - zero-day
  - psirt
  - cve
  commandLanguage: fortigate-cli
  commandFull: '# Full firmware upgrade procedure:

    # Step 1: Backup config

    execute backup config tftp <backup-file> <tftp-server>


    # Step 2: Download firmware from support.fortinet.com

    # Step 3: Upgrade secondary (HA)

    execute ha manage 1 admin

    execute restore image tftp <firmware> <server>


    # Step 4: Verify after reboot

    get system status | grep Version'
- id: fg-007
  platform: fortinet
  category: network
  severity: high
  title: Enable application control to block high-risk apps
  description: Block proxy avoidance, P2P, unauthorised remote access tools (TeamViewer, AnyDesk, ngrok) that bypass security controls.
  reference: Fortinet Best Practices — Application Control
  command: 'config application list

    edit "strict-appctrl"

      config entries

        edit 1

          set category 22

          set action block

        next

      end

    next

    end'
  premium:
    attackPerspective: Attackers use legitimate remote access tools to maintain persistence without triggering EDR. In the Conti ransomware playbooks leaked in 2022, AnyDesk was the primary persistence mechanism. Proxy avoidance tools let users bypass all your web filtering and IPS inspection entirely.
    implementationNotes: '1. Block categories: Proxy, P2P, Remote Access (except approved tools)

      2. Create exceptions for IT-approved remote tools

      3. Set action=monitor for 1 week before blocking

      4. Enable deep app inspection (NGFW mode) for encrypted app detection'
    validationNotes: '# Verify app control is active:

      diagnose application status

      # Test: try using teamviewer.com — should be blocked'
    tuningNotes: Some IT teams legitimately use remote access tools. Create per-group policies that allow specific approved tools only for IT host groups.
    advancedDetection: '# Detect unauthorized remote access tool usage

      index=fortigate sourcetype=fgt_app app_category="Remote.Access"

      | where action!="blocked"

      | stats count by srcip, app, user'
    relatedIds:
    - fg-005
    - fg-003
  tags:
  - application-control
  - remote-access
  - proxy-avoidance
  commandLanguage: fortigate-cli
  commandFull: 'config application list

    edit "strict-appctrl"

      config entries

        edit 1

          set category 22

          set action block

          set log enable

        next

        edit 2

          set category 1

          set action block

          set log enable

        next

      end

    next

    end'
- id: fg-008
  platform: fortinet
  category: logging
  severity: high
  title: Forward all logs to SIEM via syslog or FortiAnalyzer
  description: Configure centralized log forwarding for traffic, IPS, web filter, application, and event logs. Attackers who compromise FortiGate will clear local logs first.
  reference: Fortinet Best Practices — Log Management
  command: 'config log syslogd setting

    set status enable

    set server <siem-ip>

    set port 514

    set facility local7

    set format cef

    end'
  premium:
    attackPerspective: In the 2023 FortiGate exploitation campaigns, organizations with FortiAnalyzer or SIEM detected compromises within hours. Those relying on local logs lost all evidence when attackers wiped them post-exploitation.
    implementationNotes: '1. Forward to SIEM via syslog (CEF format for Splunk/Sentinel compatibility)

      2. Or deploy FortiAnalyzer for native Fortinet correlation

      3. Enable all log types: traffic, utm, event, dns

      4. Set severity to Information — you need visibility into allowed traffic too

      5. Ensure log disk is not filling up'
    validationNotes: '# Verify syslog is sending:

      diagnose log test

      # Check syslog connectivity:

      execute telnet <siem-ip> 514

      # Verify on SIEM side that logs are arriving'
    tuningNotes: Traffic logs on busy firewalls can exceed 10GB/day. Use log filters to reduce noise but never disable security event forwarding.
    advancedDetection: '# Detect log forwarding failures (meta-monitoring)

      index=_internal sourcetype=splunkd

      | where source_ip="<fortigate-ip>"

      | timechart span=1h count

      | where count < 100'
    relatedIds:
    - fg-001
    - fg-009
  tags:
  - siem
  - syslog
  - logging
  - fortianalyzer
  commandLanguage: fortigate-cli
  commandFull: 'config log syslogd setting

    set status enable

    set server <siem-ip>

    set port 514

    set facility local7

    set format cef

    end


    config log syslogd filter

    set severity information

    set forward-traffic enable

    set local-traffic enable

    end'
- id: fg-009
  platform: fortinet
  category: network
  severity: high
  title: Segment networks with zones and least-privilege inter-zone rules
  description: Do not put all subnets in a single trust zone. Create zones for servers, workstations, IoT, and OT with explicit allow rules between them.
  reference: Fortinet Best Practices — Network Segmentation
  command: 'config system zone

    edit "servers"

      set interface "port3" "port4"

    next

    edit "workstations"

      set interface "port5" "port6"

    next

    edit "iot"

      set interface "port7"

    next

    end'
  premium:
    attackPerspective: Flat networks are a ransomware operators paradise. The Colonial Pipeline attack spread across flat OT/IT networks in under 2 hours. Segmentation forces attackers through chokepoints where IPS and logging can detect them. Zone-based policies reduce blast radius from 100% to the compromised zone.
    implementationNotes: '1. Create zones: Servers, Workstations, IoT, OT, DMZ, Management

      2. Default: deny all inter-zone traffic, then allow specific services

      3. Use VDOMs for true multi-tenancy or hard separation between IT and OT

      4. Apply IPS and app control on ALL inter-zone policies'
    validationNotes: '# Verify zone configuration:

      get system zone

      show firewall policy | grep -A5 srcintf


      # Test inter-zone isolation:

      # From workstation zone, ping IoT zone — should be denied'
    tuningNotes: Start by logging inter-zone traffic in allow mode for 2 weeks to understand legitimate flows. Then create allow rules for documented flows and switch to implicit deny.
    advancedDetection: '# Detect lateral movement via inter-zone anomalies

      index=fortigate sourcetype=fgt_traffic srcintf="workstations" dstintf="servers"

      | where dstport NOT IN (443, 22, 3389)

      | stats count by srcip, dstip, dstport'
    relatedIds:
    - fg-001
    - fg-010
  tags:
  - segmentation
  - zones
  - vdom
  - lateral-movement
  commandLanguage: fortigate-cli
  commandFull: 'config system zone

    edit "servers"

      set interface "port3" "port4"

    next

    edit "workstations"

      set interface "port5" "port6"

    next

    edit "iot"

      set interface "port7"

    next

    edit "management"

      set interface "mgmt"

    next

    end'
- id: fg-010
  platform: fortinet
  category: services
  severity: high
  title: Harden SSL-VPN with MFA and geo-restrictions
  description: FortiGate SSL-VPN is the most targeted attack surface. Require MFA, restrict source countries, limit sessions, and disable split tunneling.
  reference: Fortinet SSL-VPN Hardening Guide
  command: 'config vpn ssl settings

    set force-two-factor-auth enable

    set banned-cipher SHA1 MD5 NULL

    set tunnel-ip-pools "SSLVPN_TUNNEL_ADDR1"

    set idle-timeout 1800

    set auth-timeout 28800

    set login-attempt-limit 3

    set login-block-time 300

    end'
  premium:
    attackPerspective: FortiGate SSL-VPN has been the entry point for hundreds of breaches. CVE-2023-27997 and CVE-2024-21762 were exploited in the wild within 24 hours. Attackers scan for FortiGate VPN portals as priority targets. The Lapsus$ group specifically targeted VPNs without MFA.
    implementationNotes: '1. Enforce FortiToken Cloud MFA on all VPN users

      2. Enable client certificate validation for managed devices

      3. Restrict source IPs by geography

      4. Disable split tunneling — force all traffic through VPN

      5. Set idle timeout to 30 min, session timeout to 8 hours

      6. Disable SSL-VPN web portal if not needed'
    validationNotes: '# Verify MFA is required:

      get vpn ssl settings | grep two-factor

      # Should show: enable


      # Check active sessions:

      diagnose vpn ssl list'
    tuningNotes: If employees travel internationally, use a curated geo-allow list. Consider ZTNA (FortiSASE) as modern replacement — provides per-app access instead of full network access.
    advancedDetection: '# Detect VPN brute-force

      index=fortigate sourcetype=fgt_event subtype=vpn action=ssl-login-fail

      | stats count by srcip, user

      | where count > 5'
    relatedIds:
    - fg-004
    - fg-011
  tags:
  - ssl-vpn
  - vpn
  - mfa
  - remote-access
  commandLanguage: fortigate-cli
  commandFull: 'config vpn ssl settings

    set force-two-factor-auth enable

    set banned-cipher SHA1 MD5 NULL

    set dtls-tunnel disable

    set tunnel-ip-pools "SSLVPN_TUNNEL_ADDR1"

    set idle-timeout 1800

    set auth-timeout 28800

    set login-attempt-limit 3

    set login-block-time 300

    end'
- id: fg-011
  platform: fortinet
  category: network
  severity: high
  title: Enable DNS filtering to sinkhole C2 and DGA domains
  description: Use FortiGuard DNS filtering to sinkhole malicious, phishing, and botnet domains at the DNS layer before connections are established.
  reference: Fortinet Best Practices — DNS Security
  command: 'config dnsfilter profile

    edit "strict-dns"

      set block-action redirect

      config ftgd-dns

        config filters

          edit 1

            set category 26

            set action block

          next

        end

      end

    next

    end'
  premium:
    attackPerspective: DNS is the first step in nearly every attack — malware must resolve a C2 domain before connecting. DGA malware like Emotet generates thousands of random domains daily — DNS filtering with ML-based DGA detection catches this pattern before a TCP connection is even established.
    implementationNotes: '1. Block categories: Malware, Phishing, Botnet, Spam URLs

      2. Force all DNS through FortiGate by blocking outbound UDP/TCP 53 to other servers

      3. Consider DNS-over-HTTPS blocking to prevent bypass

      4. Enable FortiGuard DNS security service for real-time intelligence'
    validationNotes: '# Verify DNS filter:

      diagnose dnsfilter cache dump

      diagnose dnsfilter lookup <test-domain>


      # Verify DNS is forced through firewall:

      diagnose sniffer packet any "port 53" 4 10'
    tuningNotes: Internal DNS servers should point to FortiGate as forwarder. Block direct DNS to 8.8.8.8, 1.1.1.1 to prevent bypass.
    advancedDetection: '# Detect DNS tunnelling

      index=fortigate sourcetype=fgt_dns

      | eval query_len=len(query)

      | where query_len > 50

      | stats count by srcip

      | where count > 100'
    relatedIds:
    - fg-005
    - fg-003
  tags:
  - dns
  - dns-filtering
  - c2
  - dga
  - sinkhole
  commandLanguage: fortigate-cli
  commandFull: 'config dnsfilter profile

    edit "strict-dns"

      set block-action redirect

      config ftgd-dns

        config filters

          edit 1

            set category 26

            set action block

          next

          edit 2

            set category 61

            set action block

          next

          edit 3

            set category 62

            set action block

          next

        end

      end

    next

    end'
- id: fg-012
  platform: fortinet
  category: services
  severity: high
  title: Enable FortiSandbox or FortiGuard inline sandbox
  description: Forward suspicious files to sandbox for dynamic analysis. Catches zero-day malware that passes signature-based antivirus by observing file behaviour in a controlled environment.
  reference: Fortinet Best Practices — Sandbox Integration
  command: 'config system fortisandbox

    set status enable

    set server "fortisandbox.fortiguard.com"

    set enc-algorithm AES256

    end


    config antivirus profile

    edit "strict-av"

      config http

        set options scan avmonitor quarantine

        set outbreak-prevention block

      end

    next

    end'
  premium:
    attackPerspective: Signature-based AV catches known malware. Zero-day payloads bypass it entirely. The 2024 QakBot resurgence used novel packers that evaded all signature engines but were caught by behavioural sandbox analysis. Sandbox detonation observes file behaviour — it catches fileless malware, polymorphic payloads, and obfuscated scripts.
    implementationNotes: '1. Cloud option: FortiGuard inline sandbox (no hardware, per-device licensing)

      2. On-prem: FortiSandbox VM or appliance

      3. Forward all file types except known-safe (images, fonts)

      4. Set verdict timeout to 60s — files held until verdict

      5. Enable CPRL for advanced static analysis'
    validationNotes: '# Verify sandbox connectivity:

      diagnose test application scanunit 10

      # Submit test EICAR file through HTTP

      # Check verdict in FortiView > Threats'
    tuningNotes: Large file uploads (>10MB) may delay users. Set size limits and exempt specific applications. Monitor submission queue during peak hours.
    advancedDetection: '# Track sandbox verdicts

      index=fortigate sourcetype=fgt_virus action=analytics

      | stats count by verdict, srcip, filename

      | where verdict="malicious"'
    relatedIds:
    - fg-002
    - fg-003
  tags:
  - sandbox
  - zero-day
  - malware
  - behavioural-analysis
  commandLanguage: fortigate-cli
  commandFull: 'config system fortisandbox

    set status enable

    set server "fortisandbox.fortiguard.com"

    set enc-algorithm AES256

    end'

