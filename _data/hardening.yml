- id: gcp-038
  platform: gcp
  category: patching
  severity: critical
  title: Enable OS Patch Management
  description: Use OS Config agent for automated security patching of all GCE instances.
  reference: CIS GCP Foundations Benchmark 4.11
  command: '# Check OS Config agent status

    gcloud compute instances os-inventory list-instances --format=''table(name,zone)''

    # Create patch job

    gcloud compute os-config patch-jobs execute --instance-filter-all --duration=3600s

    '
  premium:
    attackPerspective: Unpatched VMs are the easiest target. Known CVEs in the OS and installed packages are exploitable with publicly available exploit code — often within days of disclosure. GCP OS Patch
      Management automates patch deployment, reducing the window between vulnerability disclosure and remediation from weeks/months to hours/days. Without it, patches are applied manually (if at all), leaving
      critical vulns open indefinitely.
    implementationNotes: "# Enable OS Config agent (required for patch management):\ngcloud compute project-info add-metadata \\\n  --metadata=enable-osconfig=TRUE\n\n# Create a patch deployment (weekly\
      \ security patches):\ngcloud compute os-config patch-deployments create weekly-security-patches \\\n  --instance-filter-all \\\n  --recurring-schedule-frequency=weekly \\\n  --recurring-schedule-time-zone=America/New_York\
      \ \\\n  --recurring-schedule-time-of-day=02:00 \\\n  --apt-type=upgrade \\\n  --yum-security \\\n  --windows-classifications=CRITICAL,SECURITY\n\n# Create an on-demand patch job (emergency):\ngcloud\
      \ compute os-config patch-jobs execute \\\n  --instance-filter-all \\\n  --async\n\n# View patch compliance:\ngcloud compute os-config patch-deployments describe weekly-security-patches"
    validationNotes: "# Check OS Config agent status on VMs:\ngcloud compute instances os-inventory list-instances --format='table(name,zone,osInfo.shortName,osInfo.version)'\n\n# View patch job results:\n\
      gcloud compute os-config patch-jobs list --format='table(name,state,instanceDetailsSummary)'\n\n# Check patch compliance:\ngcloud compute os-config vulnerability-reports list \\\n  --format='table(name,vulnerabilities[].details.cve)'"
    tuningNotes: Schedule patches during maintenance windows to avoid production impact. Use instance groups and rolling updates for zero-downtime patching. Test patches on a canary group (dev instances)
      before rolling out to production. For critical CVEs (CVSS 9+), use on-demand patch jobs with faster deployment.
    advancedDetection: "-- Monitor patch compliance over time\nSELECT\n  timestamp,\n  resource.labels.instance_id,\n  jsonPayload.patchState,\n  jsonPayload.patchJobId\nFROM `project.dataset.osconfig_googleapis_com_patch_jobs`\n\
      WHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-039
    - gcp-040
  tags:
  - gcp
  - patching
- id: gcp-039
  platform: gcp
  category: patching
  severity: high
  title: Enable Container Analysis for vulnerability scanning
  description: Automatically scan container images in Artifact Registry for known CVEs.
  reference: Google Cloud Security Best Practices
  command: '# Check scanning settings

    gcloud artifacts repositories describe <repo> --location=<location> --format=''value(name)''

    # Enable scanning via on-demand scan

    gcloud artifacts docker images scan <image-url>

    '
  premium:
    attackPerspective: Container images in Artifact Registry may contain vulnerable OS packages, application libraries, or even known malware. Without Container Analysis, you deploy images blindly — discovering
      vulnerabilities only when they're exploited in production. Container Analysis scans images on push and continuously rescans for newly discovered CVEs, providing a pre-deployment security gate.
    implementationNotes: "# Enable Container Analysis API:\ngcloud services enable containeranalysis.googleapis.com --project=PROJECT_ID\n\n# Enable Artifact Analysis (automatic scanning):\ngcloud services\
      \ enable artifactanalysis.googleapis.com --project=PROJECT_ID\n\n# Configure Artifact Registry with scanning:\ngcloud artifacts repositories create docker-repo \\\n  --repository-format=docker \\\n\
      \  --location=us-central1 \\\n  --description='Docker images with scanning'\n\n# Scanning is automatic for images pushed to Artifact Registry\n# View vulnerabilities:\ngcloud artifacts docker images\
      \ list us-central1-docker.pkg.dev/PROJECT/docker-repo \\\n  --show-occurrences \\\n  --format='table(package,version,vulnerability.effectiveSeverity)'\n\n# Integrate with Binary Authorization:\n#\
      \ Only attest images with no CRITICAL vulnerabilities"
    validationNotes: "# Check scanning is enabled:\ngcloud artifacts repositories describe docker-repo \\\n  --location=us-central1 --format='value(cleanupPolicies)'\n\n# List vulnerabilities for a specific\
      \ image:\ngcloud artifacts docker images describe \\\n  us-central1-docker.pkg.dev/PROJECT/docker-repo/image:tag \\\n  --show-all-metadata\n\n# Count critical vulnerabilities across all images:\n\
      gcloud artifacts docker images list us-central1-docker.pkg.dev/PROJECT/docker-repo \\\n  --show-occurrences --occurrence-filter='kind=\"VULNERABILITY\" AND vulnerability.effectiveSeverity=\"CRITICAL\"\
      '"
    tuningNotes: Set up a policy that blocks deployment of images with CRITICAL vulnerabilities (via Binary Authorization). For HIGH vulnerabilities, allow deployment but create a Jira ticket for remediation
      within 7 days. Use base image recommendations from Container Analysis to keep base images updated. Rescan images weekly even after initial push, as new CVEs are continuously discovered.
    advancedDetection: "-- Track vulnerability trends over time\nSELECT\n  DATE(timestamp) as scan_date,\n  COUNTIF(vulnerability.effectiveSeverity = 'CRITICAL') as critical,\n  COUNTIF(vulnerability.effectiveSeverity\
      \ = 'HIGH') as high,\n  COUNTIF(vulnerability.effectiveSeverity = 'MEDIUM') as medium\nFROM `project.dataset.container_analysis_occurrences`\nWHERE kind = 'VULNERABILITY'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(),\
      \ INTERVAL 90 DAY)\nGROUP BY scan_date ORDER BY scan_date DESC"
    relatedIds:
    - gcp-032
    - gcp-036
  tags:
  - gcp
  - patching
- id: gcp-040
  platform: gcp
  category: patching
  severity: high
  title: Monitor for outdated GKE cluster versions
  description: Ensure GKE clusters are running supported and patched Kubernetes versions.
  reference: CIS GKE Benchmark 6.10
  command: '# Check cluster versions

    gcloud container clusters list --format=''table(name,currentMasterVersion,currentNodeVersion,status)''

    # Check for available upgrades

    gcloud container get-server-config --zone=<zone> --format=''value(validMasterVersions[0:3])''

    '
  premium:
    attackPerspective: Outdated GKE cluster versions contain known Kubernetes CVEs that are actively exploited. Each Kubernetes release fixes security vulnerabilities, and exploit code for older versions
      is publicly available. An attacker targeting a cluster running Kubernetes 1.25 when 1.29 is current has access to multiple exploitation paths — from API server bypasses to container escapes. GKE's
      managed cluster model makes upgrading straightforward, but many teams defer upgrades until their clusters fall dangerously behind.
    implementationNotes: "# Enable auto-upgrade for the cluster control plane:\ngcloud container clusters update CLUSTER_NAME \\\n  --zone=ZONE \\\n  --enable-master-authorized-networks\n\n# Enable auto-upgrade\
      \ for node pools:\ngcloud container node-pools update NODE_POOL \\\n  --cluster=CLUSTER_NAME --zone=ZONE \\\n  --enable-autoupgrade\n\n# Set maintenance window:\ngcloud container clusters update CLUSTER_NAME\
      \ \\\n  --zone=ZONE \\\n  --maintenance-window-start=2025-01-01T02:00:00Z \\\n  --maintenance-window-end=2025-01-01T06:00:00Z \\\n  --maintenance-window-recurrence='FREQ=WEEKLY;BYDAY=SA'\n\n# Check\
      \ available versions:\ngcloud container get-server-config --zone=ZONE \\\n  --format='table(channels.channel,channels.validVersions[0])'\n\n# Use Release Channels for managed upgrades:\ngcloud container\
      \ clusters update CLUSTER_NAME \\\n  --zone=ZONE \\\n  --release-channel=regular"
    validationNotes: "# Check current cluster version:\ngcloud container clusters list \\\n  --format='table(name,currentMasterVersion,currentNodeVersion,releaseChannel.channel)'\n\n# Find clusters on unsupported\
      \ versions:\ngcloud container clusters list --format=json | jq '.[] | select(.currentMasterVersion < \"1.28\") | {name, version: .currentMasterVersion}'\n\n# Check node pool auto-upgrade status:\n\
      gcloud container node-pools describe NODE_POOL \\\n  --cluster=CLUSTER_NAME --zone=ZONE \\\n  --format='value(management.autoUpgrade)'"
    tuningNotes: Use the 'Regular' release channel for production — it provides a good balance of stability and security. 'Rapid' is too aggressive for production; 'Stable' is too slow for security patches.
      Set maintenance windows during off-peak hours. Test workload compatibility on a staging cluster enrolled in the 'Rapid' channel before production upgrades roll out.
    advancedDetection: "-- Monitor GKE upgrade events\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  resource.labels.cluster_name,\n  protopayload_auditlog.methodName,\n\
      \  JSON_EXTRACT_SCALAR(protopayload_auditlog.request, '$.update.desiredMasterVersion') as target_version\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName\
      \ = 'google.container.v1.ClusterManager.UpdateCluster'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)"
    relatedIds:
    - gcp-032
    - gcp-038
  tags:
  - gcp
  - patching
- id: m365-001
  platform: m365-defender
  category: services
  severity: critical
  title: Ensure Safe Links for Office Applications is Enabled.
  description: No Safe Links policies found.
  reference: CIS.2.1.1 — CIS M365 / Microsoft Secure Score — Defender
  premium:
    attackPerspective: Safe Links provides time-of-click URL verification — the critical defense against delayed-detonation phishing. Attackers increasingly use URLs that are clean at delivery time but
      redirect to malicious payloads hours later, after email gateway scanning. Without Safe Links, these attacks bypass all initial scanning.
    implementationNotes: '1. Navigate to Microsoft Defender portal → Policies → Threat policies → Safe Links

      2. Create or edit the default policy

      3. Enable: ''On - URLs will be rewritten and checked against a list of known malicious links when user clicks''

      4. Enable for: Email messages AND Microsoft Teams

      5. Apply to: All users in the organization

      6. Enable real-time URL scanning and wait for URL scanning to complete'
    validationNotes: '# PowerShell verification

      Connect-ExchangeOnline

      Get-SafeLinksPolicy | Select Name, IsEnabled, ScanUrls, EnableForInternalSenders


      # Test with EICAR equivalent URL (use Defender testing tools)

      # Check policy application

      Get-SafeLinksRule | Select Name, State, Priority, SentTo'
    tuningNotes: Some organizations exclude specific domains from rewriting (internal portals, trusted SaaS). Use the 'Do not rewrite URLs' list sparingly — each exclusion is a potential bypass. Audit the
      exclusion list quarterly.
