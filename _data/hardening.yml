- id: cop-006
  platform: m365-copilot
  category: services
  severity: critical
  title: Deploy SharePoint Advanced Management to prevent Copilot oversharing
  description: Use SharePoint Advanced Management (SAM) to identify and remediate overshared content before Copilot deployment. Copilot surfaces all content a user has access to via Microsoft Graph — including files shared via "Everyone Except External Users" (EEEU) links. SAM provides Restricted Access Control (RAC) policies to lock down sensitive sites, Restricted Content Discovery (RCD) to hide sites from Copilot and org-wide search, Site Access Reviews for owners to audit permissions, and inactive site lifecycle policies to archive stale content that degrades Copilot response quality.
  reference: https://learn.microsoft.com/en-us/sharepoint/get-ready-copilot-sharepoint-advanced-management
  command: |
    # Connect to SharePoint Online
    Connect-SPOService -Url https://<tenant>-admin.sharepoint.com

    # Hide EEEU from People Picker to prevent future oversharing
    Set-SPOTenant -ShowEveryoneExceptExternalUsersClaim $false

    # Set default sharing link to "Specific people" instead of org-wide
    Set-SPOTenant -DefaultSharingLinkType Direct

    # Apply Restricted Access Control to a sensitive site
    # (Only specified group members can access, even if individual files were shared broadly)
    Set-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/FinanceConfidential" `
      -RestrictedAccessControl $true

    # Apply Restricted Content Discovery — hide site from Copilot and search
    Set-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/HRSensitive" `
      -RestrictedContentDiscovery $true

    # Run oversharing report for top sites
    # Navigate: SharePoint admin center → Reports → Data access governance
    # Run: "Everyone except external users" report
    # Run: "People in your organization" sharing links report

    # Initiate Site Access Review for overshared sites
    # Navigate: SharePoint admin center → Sites → Active sites → select site → Access Review
  premium:
    attackPerspective: SharePoint oversharing is the root cause of most Copilot data exposure incidents. In typical enterprises, 40-60% of SharePoint sites have "Everyone Except External Users" sharing links created years ago. Copilot surfaces this content immediately — a user asking "what salary does the VP of Engineering make?" will get an answer if any shared file contains that data. SAM's Restricted Access Control and Restricted Content Discovery are the primary technical controls to prevent this amplification.
    implementationNotes: |
      1. Disable EEEU from People Picker: Set-SPOTenant -ShowEveryoneExceptExternalUsersClaim $false
      2. Set default sharing to "Specific people": Set-SPOTenant -DefaultSharingLinkType Direct
      3. Run Data Access Governance reports to identify top overshared sites
      4. Apply RAC to all sites classified "Confidential" or higher
      5. Apply RCD to sites that should be searchable by owners but hidden from Copilot
      6. Enable Site Access Reviews for all sites with >100 unique permissions
      7. Create an inactive site lifecycle policy (archive after 180 days of inactivity)
    validationNotes: |
      # Verify EEEU is hidden from People Picker
      Get-SPOTenant | Select ShowEveryoneExceptExternalUsersClaim
      # Expected: False

      # Verify default sharing link type
      Get-SPOTenant | Select DefaultSharingLinkType
      # Expected: Direct (Specific people)

      # Check RAC status on sensitive sites
      Get-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/Finance" |
        Select Url, RestrictedAccessControl, RestrictedContentDiscovery
    tuningNotes: RAC is aggressive — it overrides ALL existing permissions. Users with direct file links will lose access unless they're in the RAC security group. Before enabling RAC, notify site owners and give a 2-week grace period. RCD is less disruptive — it only affects search/Copilot discovery while preserving direct access. Use RCD as a first step, then RAC for truly sensitive sites.
    advancedDetection: |
      // KQL: Monitor sites with oversharing indicators
      SharePointAuditLogs
      | where TimeGenerated > ago(30d)
      | where Operation == "SharingSet" or Operation == "SharingInvitationCreated"
      | extend SharedWith = tostring(TargetUserOrGroupName)
      | where SharedWith has "Everyone" or SharedWith has "Company"
      | summarize OvershareCount=count() by SiteUrl, SharedWith
      | sort by OvershareCount desc
    relatedIds:
    - cop-007
    - cop-002
  tags:
  - copilot
  - sharepoint
  - oversharing
  - sam
  - restricted-access
  - data-governance
  commandLanguage: powershell
- id: cop-007
  platform: m365-copilot
  category: services
  severity: high
  title: Restrict Copilot access to specific SharePoint sites and libraries
  description: Use SharePoint Restricted Access Control (RAC) and Restricted Content Discovery (RCD) policies to explicitly block Copilot from accessing specific high-sensitivity SharePoint sites and document libraries. RAC limits all access (including Copilot) to designated security groups. RCD leaves user access unchanged but prevents content from being surfaced by Copilot or organization-wide search. Use both together for defense-in-depth on business-critical sites containing M&A data, legal holds, executive communications, or HR records.
  reference: https://learn.microsoft.com/en-us/sharepoint/restricted-access-control
  command: |
    # Connect to SharePoint Online
    Connect-SPOService -Url https://<tenant>-admin.sharepoint.com

    # Create a security group for users who should access the sensitive site
    # (Do this in Entra ID first)

    # Apply Restricted Access Control — ONLY group members can access
    Set-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/LegalHold" `
      -RestrictedAccessControl $true `
      -RestrictedAccessControlGroups "<SecurityGroupObjectId>"

    # Apply Restricted Content Discovery — content hidden from Copilot
    Set-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/ExecutiveComms" `
      -RestrictedContentDiscovery $true

    # Block download from sensitive sites (prevents export via Copilot references)
    Set-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/MandA" `
      -BlockDownloadPolicy $true

    # Verify settings
    Get-SPOSite -Identity "https://<tenant>.sharepoint.com/sites/LegalHold" |
      Select Url, RestrictedAccessControl, RestrictedContentDiscovery, BlockDownloadPolicy
  premium:
    attackPerspective: RAC and RCD provide granular site-level control that goes beyond traditional SharePoint permissions. Without RCD, a sensitive site's content appears in Copilot results even if the user found it indirectly through related documents. Without RAC, users who were shared individual files from a sensitive site can still have Copilot summarize the broader context. Both controls are essential for M&A war rooms, legal hold sites, and executive communication sites where even metadata exposure is unacceptable.
    implementationNotes: |
      1. Identify all sites requiring protection: M&A, Legal, HR, Executive, Board
      2. For each site, create a dedicated security group with only authorized members
      3. Apply RAC first: Set-SPOSite -Identity <url> -RestrictedAccessControl $true
      4. Add the security group: Set-SPOSite -Identity <url> -RestrictedAccessControlGroups "<GroupId>"
      5. Apply RCD for additional Copilot isolation: Set-SPOSite -Identity <url> -RestrictedContentDiscovery $true
      6. Block downloads if needed: Set-SPOSite -Identity <url> -BlockDownloadPolicy $true
      7. Document all RAC/RCD sites in a security register for quarterly review
    validationNotes: |
      # Verify RAC and RCD on all sensitive sites
      $sensitiveSites = @(
        "https://<tenant>.sharepoint.com/sites/LegalHold",
        "https://<tenant>.sharepoint.com/sites/MandA",
        "https://<tenant>.sharepoint.com/sites/ExecutiveComms"
      )
      foreach ($site in $sensitiveSites) {
        Get-SPOSite -Identity $site |
          Select Url, RestrictedAccessControl, RestrictedContentDiscovery, BlockDownloadPolicy
      }

      # Test: With a non-RAC user, try to ask Copilot about content in a RAC site
      # Copilot should NOT surface any results from that site
    tuningNotes: RAC overrides granular file-level permissions. If a user was directly shared a file from a RAC-protected site but is NOT in the RAC group, they lose access. Communicate changes to site owners 2 weeks before enforcement. For sites needing read-only broad access but no Copilot discovery, use RCD alone without RAC.
    advancedDetection: |
      // KQL: Monitor access attempts to RAC-protected sites
      SharePointAuditLogs
      | where TimeGenerated > ago(7d)
      | where SiteUrl in~ ("<sensitive-site-urls>")
      | where Operation == "FileAccessed" or Operation == "PageViewed"
      | summarize AccessCount=count() by UserId, SiteUrl, Operation
      | sort by AccessCount desc
    relatedIds:
    - cop-006
    - cop-008
  tags:
  - copilot
  - sharepoint
  - restricted-access
  - content-discovery
  - data-isolation
  - ai-security
  commandLanguage: powershell
- id: cop-008
  platform: m365-copilot
  category: services
  severity: high
  title: Control Semantic Index scope and web search access
  description: The Semantic Index powers Copilot's ability to find and reason over organizational data. Control what data the Semantic Index can access by configuring web search settings and ensuring proper permission boundaries. Disable Copilot web search for tenants handling classified information to prevent data leakage through search query inference. Use the Copilot Control System in the M365 admin center to manage web grounding, plugin permissions, and agent availability. Monitor BingWebSearch references in audit logs to track when Copilot uses external web data.
  reference: https://learn.microsoft.com/en-us/microsoft-365/copilot/manage-public-web-access
  command: |
    # Disable web search for Microsoft 365 Copilot (tenant-wide)
    # Navigate: Microsoft 365 admin center → Copilot → Settings → Web search
    # Toggle OFF: "Allow Copilot to reference web content"

    # PowerShell: Verify web search setting
    # Connect to Microsoft Graph
    Connect-MgGraph -Scopes "OrgSettings-Microsoft365Copilot.ReadWrite.All"

    # Check if web search is enabled
    # GET https://graph.microsoft.com/beta/admin/microsoft365/copilot/settings
    Invoke-MgGraphRequest -Method GET `
      -Uri "https://graph.microsoft.com/beta/admin/microsoft365/copilot/settings"

    # Monitor web search usage in audit logs
    Connect-IPPSSession
    Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-30) -EndDate (Get-Date) `
      -Operations "CopilotInteraction" -ResultSize 100 |
      Where-Object { $_.AuditData -like "*BingWebSearch*" } |
      Select CreationDate, UserIds
  premium:
    attackPerspective: When Copilot web search is enabled, user prompts effectively become search queries sent externally. While Microsoft states prompts aren't shared with Bing, the semantic index still correlates internal data with web results — creating data correlation risks. For organizations handling classified or regulated data, web search allows Copilot to combine internal context with external information, potentially revealing internal project names, vendor relationships, or strategic initiatives through the nature of the queries. Disabling web search limits Copilot to organizational data only.
    implementationNotes: |
      1. Navigate: Microsoft 365 admin center → Copilot → Settings → Web search
      2. Toggle OFF: "Allow Copilot to reference web content" (for classified environments)
      3. For less restrictive environments, keep web search ON but monitor usage
      4. Configure plugin restrictions: disable third-party plugins that may leak data
      5. Review Copilot settings quarterly as Microsoft adds new features and toggles
    validationNotes: |
      # Verify web search setting via Graph API
      Connect-MgGraph -Scopes "OrgSettings-Microsoft365Copilot.ReadWrite.All"
      Invoke-MgGraphRequest -Method GET `
        -Uri "https://graph.microsoft.com/beta/admin/microsoft365/copilot/settings"
      # Check: isWebSearchEnabled should be false for classified environments

      # Monitor web search usage in audit logs
      Connect-IPPSSession
      Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-7) -EndDate (Get-Date) `
        -Operations "CopilotInteraction" -ResultSize 100 |
        Where-Object { $_.AuditData -like "*BingWebSearch*" } |
        Measure-Object
      # Expected: Count = 0 if web search is disabled
    tuningNotes: Disabling web search reduces Copilot usefulness for research tasks. Some teams (marketing, competitive intelligence) may need web search. Consider a phased approach — disable tenant-wide, then selectively enable for specific groups via admin controls as Microsoft releases group-scoped web search settings.
    advancedDetection: |
      // KQL: Monitor Copilot web search usage patterns
      AuditLogs
      | where TimeGenerated > ago(30d)
      | where OperationName == "CopilotInteraction"
      | extend Detail = parse_json(AdditionalDetails)
      | where tostring(Detail) has "BingWebSearch"
      | summarize WebSearchCount=count() by UserPrincipalName, bin(TimeGenerated, 1d)
      | sort by WebSearchCount desc
    relatedIds:
    - cop-005
    - cop-006
  tags:
  - copilot
  - semantic-index
  - web-search
  - data-boundaries
  - ai-security
  - tenant-settings
  commandLanguage: powershell
