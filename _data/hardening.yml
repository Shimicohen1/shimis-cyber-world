  category: services
  severity: critical
  title: Device compliance policies must be configured and assigned to all device groups.
  description: Device compliance policies must be configured and assigned to all device groups.
  reference: MS.INTUNE.2.1v1 — CIS M365 / Microsoft Secure Score — Intune
  tags:
  - intune
  - compliance-policy
  - conditional-access
  - endpoint-security
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Compliance policies without Conditional Access enforcement are merely advisory — devices can be flagged non-compliant but still access all resources. Attackers love environments where
      compliance is configured but not enforced, because the security team has false confidence while the actual access controls are open.
    implementationNotes: "# Create a Windows compliance policy (example)\n$compliancePolicy = @{\n  displayName = 'SCW-Win-Compliance-Baseline'\n  description = 'Baseline compliance for Windows devices'\n\
      \  osMinimumVersion = '10.0.19045'  # Win 10 22H2+\n  bitLockerEnabled = $true\n  secureBootEnabled = $true\n  codeIntegrityEnabled = $true\n  firewallEnabled = $true\n  antivirusRequired = $true\n\
      \  passwordRequired = $true\n  passwordMinimumLength = 12\n  scheduledActionsForRule = @(@{\n    ruleName = 'PasswordRequired'\n    scheduledActionConfigurations = @(@{\n      actionType = 'block'\n\
      \      gracePeriodHours = 72\n      notificationTemplateId = ''\n    })\n  })\n}\n\n# Link to Conditional Access\n# Create CA policy: Require device compliance for all cloud apps\n# Target: All users,\
      \ Exclude: Break-glass accounts\n# Grant: Require device to be marked as compliant"
    validationNotes: "# Verify compliance policies assigned\nGet-MgDeviceManagementDeviceCompliancePolicy | ForEach-Object {\n  $assignments = Get-MgDeviceManagementDeviceCompliancePolicyAssignment -DeviceCompliancePolicyId\
      \ $_.Id\n  [PSCustomObject]@{\n    Policy = $_.DisplayName\n    Assigned = [bool]$assignments\n    GroupCount = $assignments.Count\n  }\n} | Format-Table\n\n# Check overall compliance status\nGet-MgDeviceManagementManagedDevice\
      \ -All | Group-Object ComplianceState | Select Name, Count | Format-Table"
    tuningNotes: Start enforcement with a pilot group before expanding to all users. The 72-hour grace period is recommended for initial rollout — reduce to 24 hours after stabilization. Monitor the Intune
      reports for common non-compliance reasons and address the root cause (e.g., push BitLocker policy rather than just flagging it).
    advancedDetection: '// KQL: Detect non-compliant devices accessing sensitive apps

      SigninLogs

      | where TimeGenerated > ago(24h)

      | where DeviceDetail.isCompliant != true

      | where ResourceDisplayName in (''Microsoft Teams'', ''SharePoint Online'', ''Exchange Online'')

      | summarize AccessCount = count() by UserPrincipalName, tostring(DeviceDetail.displayName), ResourceDisplayName

      | sort by AccessCount desc'
    relatedIds:
    - m365-178
