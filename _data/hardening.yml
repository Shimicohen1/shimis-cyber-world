- id: gcp-012
  platform: gcp
  category: identity
  severity: high
  title: Enable Cloud Identity-Aware Proxy (IAP)
  description: Use IAP to protect internal web apps without VPN, with identity-based access.
  reference: Google Cloud Security Best Practices
  command: '# List IAP-enabled backends

    gcloud iap web get-iam-policy --resource-type=backend-services

    # Enable IAP on backend

    gcloud iap web enable --resource-type=backend-services --service=<service>

    '
  premium:
    attackPerspective: Cloud IAP provides context-aware access control (identity, device, location) in front of web applications and VMs. Without IAP, applications must implement their own authentication
      — often poorly. Attackers target apps behind plain load balancers because a single auth bypass (SSRF, path traversal) gives direct access. IAP adds a Google-managed authentication layer that's significantly
      harder to bypass.
    implementationNotes: "# Enable IAP for a backend service (HTTP Load Balancer)\ngcloud compute backend-services update BACKEND_SVC \\\n  --iap=enabled --global\n\n# Configure OAuth consent screen (required):\n\
      # Google Cloud Console → APIs & Services → OAuth consent screen\n# Set to 'Internal' for organization-only access\n\n# Grant IAP access to specific users/groups:\ngcloud iap web add-iam-policy-binding\
      \ \\\n  --resource-type=backend-services \\\n  --service=BACKEND_SVC \\\n  --member='group:engineering@company.com' \\\n  --role='roles/iap.httpsResourceAccessor'\n\n# For SSH/TCP tunneling via IAP\
      \ (replace SSH bastion hosts):\ngcloud compute instances add-iam-policy-binding VM_NAME \\\n  --zone=us-central1-a \\\n  --member='group:devops@company.com' \\\n  --role='roles/iap.tunnelResourceAccessor'\n\
      \n# Connect via IAP tunnel:\ngcloud compute ssh VM_NAME --zone=us-central1-a --tunnel-through-iap"
    validationNotes: '# Verify IAP is enabled on backend services

      gcloud compute backend-services list --global --format=''table(name, iap.enabled)''


      # List IAP access policies

      gcloud iap web get-iam-policy --resource-type=backend-services --service=BACKEND_SVC


      # Test IAP by accessing the app URL:

      # Should redirect to Google sign-in, then verify identity

      curl -v https://your-app.company.com  # Should get 302 to accounts.google.com


      # Check for bypass routes (direct IP access):

      # Ensure firewall rules block direct access; only allow from IAP ranges:

      # 35.235.240.0/20 (IAP TCP forwarding)'
    tuningNotes: IAP is not a replacement for application-level authorization — it handles authentication. Your app should still check the X-Goog-IAP-JWT-Assertion header and validate the JWT to prevent
      header injection. For sensitive apps, combine IAP with Access Context Manager to require managed devices, specific IP ranges, or risk scores.
    advancedDetection: "-- Monitor IAP access denials (potential brute force)\nSELECT\n  timestamp,\n  httpRequest.remoteIp,\n  httpRequest.requestUrl,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n\
      \  protopayload_auditlog.status.code\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.serviceName = 'iap.googleapis.com'\nAND protopayload_auditlog.status.code\
      \ != 0\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)\nORDER BY timestamp DESC"
    relatedIds:
