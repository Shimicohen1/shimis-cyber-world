- id: pa-001
  platform: paloalto
  category: network
  severity: critical
  title: Deny all traffic by default (explicit deny rule)
  description: Ensure the final rule in the security policy is an explicit deny-all with logging. Palo Alto has an implicit deny but it does not log — you need visibility into dropped traffic.
  reference: Palo Alto Networks Best Practice — Security Policy
  command: '# PAN-OS CLI:
    set rulebase security rules deny-all from any to any application any action deny
    set rulebase security rules deny-all log-end yes
    set rulebase security rules deny-all log-setting default
    # Move to bottom:
    move rulebase security rules deny-all bottom'
  tags:
  - firewall
  - default-deny
  - security-policy
- id: pa-002
  platform: paloalto
  category: network
  severity: critical
  title: Enable Threat Prevention (IPS) on all allowed rules
  description: Attach a Threat Prevention profile (Antivirus, Anti-Spyware, Vulnerability Protection) to every allow rule. Without this, allowed traffic flows uninspected.
  reference: Palo Alto Networks Best Practice — Threat Prevention
  command: '# PAN-OS CLI:
    set rulebase security rules <rule-name> profile-setting profiles virus strict
    set rulebase security rules <rule-name> profile-setting profiles spyware strict
    set rulebase security rules <rule-name> profile-setting profiles vulnerability strict
    # Or attach a Security Profile Group:
    set rulebase security rules <rule-name> profile-setting group strict-security'
  tags:
  - ips
  - threat-prevention
  - antivirus
  - anti-spyware
- id: pa-003
  platform: paloalto
  category: network
  severity: critical
  title: Enable WildFire for zero-day malware analysis
  description: Forward unknown files to WildFire for cloud sandbox analysis. Set action to block on WildFire verdict and ensure all file types are forwarded.
  reference: Palo Alto Networks Best Practice — WildFire
  command: '# PAN-OS CLI:
    set rulebase security rules <rule-name> profile-setting profiles wildfire-analysis default
    # WildFire profile — forward all file types:
    set profiles wildfire-analysis default rules rule1 direction both
    set profiles wildfire-analysis default rules rule1 analysis public-cloud
    set profiles wildfire-analysis default rules rule1 file-type any
    commit'
  tags:
  - wildfire
  - sandbox
  - zero-day
  - malware
- id: pa-004
  platform: paloalto
  category: network
  severity: critical
  title: Enable SSL/TLS decryption for outbound traffic
  description: Without SSL decryption, 80%+ of traffic is invisible — malware and C2 traffic hide in HTTPS. Enable forward proxy decryption with proper CA certificate distribution.
  reference: Palo Alto Networks Best Practice — SSL Decryption
  command: '# PAN-OS CLI:
    # 1. Generate or import forward trust CA certificate
    # 2. Create decryption policy:
    set rulebase decryption rules decrypt-outbound from trust to untrust
    set rulebase decryption rules decrypt-outbound action decrypt
    set rulebase decryption rules decrypt-outbound type ssl-forward-proxy
    # 3. Add no-decrypt exceptions for healthcare, finance, privacy'
  tags:
  - ssl-decryption
  - tls
  - forward-proxy
  - visibility
- id: pa-005
  platform: paloalto
  category: network
  severity: high
  title: Enable URL Filtering with block list for high-risk categories
  description: Block access to known malicious, phishing, command-and-control, malware, and newly-registered domain categories. Log all URL categories.
  reference: Palo Alto Networks Best Practice — URL Filtering
  command: '# PAN-OS CLI:
    set profiles url-filtering strict-url action block category malware
    set profiles url-filtering strict-url action block category phishing
    set profiles url-filtering strict-url action block category command-and-control
    set profiles url-filtering strict-url action block category dynamic-dns
    set profiles url-filtering strict-url action block category newly-registered-domain
    set profiles url-filtering strict-url action alert category unknown
    # Attach to allow rules via security profile group'
  tags:
  - url-filtering
  - phishing
  - c2
  - web-security
- id: pa-006
  platform: paloalto
  category: identity
  severity: critical
  title: Enforce MFA for management access (HTTPS/SSH)
  description: Require multi-factor authentication for all administrative access to the firewall. Integrate with RADIUS/TACACS+ with MFA or SAML IdP.
  reference: Palo Alto Networks Admin Guide — Authentication
  command: '# PAN-OS CLI:
    # Configure SAML authentication profile with IdP MFA:
    set authentication-profile mfa-admins method saml
    set authentication-profile mfa-admins method saml idp-server-profile <idp-name>
    # Apply to admin accounts:
    set mgt-config users <admin> authentication-profile mfa-admins
    # Restrict management access to trusted IPs:
    set deviceconfig system permitted-ip <management-subnet>'
  tags:
  - mfa
  - admin-access
  - authentication
- id: pa-007
  platform: paloalto
  category: identity
  severity: high
  title: Configure User-ID for application-aware policies
  description: Enable User-ID mapping so security policies apply to users/groups, not just IP addresses. Integrate with Active Directory, Syslog, or GlobalProtect.
  reference: Palo Alto Networks User-ID Configuration
  command: '# PAN-OS CLI:
    set user-id-agent setup <dc-name> host <dc-ip>
    set user-id-agent setup <dc-name> port 5007
    # Enable User-ID on zones:
    set zone trust enable-user-identification yes
    # Create user-based rules:
    set rulebase security rules user-web source-user domain\security-group'
  tags:
  - user-id
  - identity
  - active-directory
  - zero-trust
- id: pa-008
  platform: paloalto
  category: network
  severity: high
  title: Enable DNS Security to block C2 and DGA domains
  description: DNS Security uses machine learning to identify C2 domains, DNS tunnelling, and domain generation algorithms (DGA) in real time.
  reference: Palo Alto Networks DNS Security
  command: '# PAN-OS CLI:
    set profiles spyware dns-security strict-dns botnet-domains lists default-paloalto-dns action sinkhole
    set profiles spyware dns-security strict-dns botnet-domains dns-security-categories pan-dns-sec-malware action sinkhole
    set profiles spyware dns-security strict-dns botnet-domains dns-security-categories pan-dns-sec-c2 action sinkhole
    set profiles spyware dns-security strict-dns botnet-domains sinkhole ipv4-address pan-sinkhole-default-ip
    commit'
  tags:
  - dns
  - c2
  - dga
  - sinkhole
- id: pa-009
  platform: paloalto
  category: network
  severity: high
  title: Enable GlobalProtect VPN with HIP checks
  description: Deploy GlobalProtect with Host Information Profiling (HIP) to enforce endpoint posture — require disk encryption, OS patches, and EDR before granting access.
  reference: Palo Alto Networks GlobalProtect HIP
  command: '# PAN-OS CLI:
    # Create HIP object requiring disk encryption + patch level:
    set profiles hip-objects compliant-endpoint host-info criteria disk-encryption is-installed yes
    set profiles hip-objects compliant-endpoint patch-management criteria is-installed yes
    # Create HIP profile:
    set profiles hip-profiles corp-compliance match compliant-endpoint
    # Apply to GP gateway security rules'
  tags:
  - vpn
  - globalprotect
  - hip
  - zero-trust
- id: pa-010
  platform: paloalto
  category: logging
  severity: high
  title: Forward all logs to SIEM via syslog or Cortex Data Lake
  description: Configure log forwarding for traffic, threat, URL, WildFire, and authentication logs. Use CEF or LEEF format for SIEM compatibility.
  reference: Palo Alto Networks Log Forwarding
  command: '# PAN-OS CLI:
    set shared log-settings syslog siem-server server <siem-ip>
    set shared log-settings syslog siem-server transport UDP
    set shared log-settings syslog siem-server port 514
    set shared log-settings syslog siem-server format BSD
    # Forward all log types:
    set shared log-settings profiles default match-list threat send-syslog siem-server
    set shared log-settings profiles default match-list traffic send-syslog siem-server
    set shared log-settings profiles default match-list url send-syslog siem-server
    commit'
  tags:
  - siem
  - syslog
  - logging
  - monitoring
- id: pa-011
  platform: paloalto
  category: services
  severity: high
  title: Disable unused management protocols (Telnet, HTTP, SNMP v1/v2)
  description: Only allow HTTPS and SSH for management. Disable Telnet, HTTP, SNMPv1/v2 (use v3), and other insecure protocols on the management interface.
  reference: Palo Alto Networks Management Hardening
  command: '# PAN-OS CLI:
    set deviceconfig system service disable-telnet yes
    set deviceconfig system service disable-http yes
    # Use SNMPv3 only:
    set deviceconfig system snmp-setting access-setting version v3
    # Restrict management to specific interface:
    set deviceconfig system type static
    set deviceconfig system permitted-ip <mgmt-network/cidr>
    commit'
  tags:
  - management
  - hardening
  - telnet
  - snmp
- id: pa-012
  platform: paloalto
  category: encryption
  severity: high
  title: Enforce TLS 1.2+ for management and GlobalProtect portals
  description: Disable TLS 1.0 and 1.1 on all management and SSL/TLS service profiles. Enforce TLS 1.2 or 1.3 with strong cipher suites.
  reference: Palo Alto Networks TLS Configuration
  command: '# PAN-OS CLI:
    set shared ssl-tls-service-profile mgmt-tls-profile protocol-settings min-version tls1-2
    set shared ssl-tls-service-profile mgmt-tls-profile protocol-settings max-version max
    # Apply to GlobalProtect portal/gateway:
    set network interface ethernet <iface> portal ssl-tls-service-profile mgmt-tls-profile
    commit'
  tags:
  - tls
  - encryption
  - management
  - cipher-suites
- id: pa-013
  platform: paloalto
  category: network
  severity: high
  title: Enable Zone Protection profiles against flood attacks
  description: Apply Zone Protection profiles to protect against SYN flood, UDP flood, ICMP flood, and IP spoofing at the zone level.
  reference: Palo Alto Networks Zone Protection
  command: '# PAN-OS CLI:
    set network profiles zone-protection-profile edge-protect flood tcp-syn enable yes
    set network profiles zone-protection-profile edge-protect flood tcp-syn alert-rate 10000
    set network profiles zone-protection-profile edge-protect flood tcp-syn activate-rate 50000
    set network profiles zone-protection-profile edge-protect flood tcp-syn maximal-rate 100000
    set network profiles zone-protection-profile edge-protect flood udp enable yes
    set network profiles zone-protection-profile edge-protect flood icmp enable yes
    # Apply to untrust zone:
    set zone untrust network zone-protection-profile edge-protect
    commit'
  tags:
  - ddos
  - flood-protection
  - zone-protection
  - network
- id: pa-014
  platform: paloalto
  category: services
  severity: high
  title: Use App-ID based rules instead of port-based
  description: Replace legacy port-based rules with App-ID rules. App-ID identifies applications regardless of port, protocol, or encryption.
  reference: Palo Alto Networks App-ID Best Practice
  command: '# Instead of:
    #   allow tcp/443 from trust to untrust
    # Use:
    set rulebase security rules web-browsing application web-browsing ssl
    set rulebase security rules web-browsing from trust to untrust action allow
    #
    # Identify unused port-based rules:
    # Monitor > App Scope > Rule Usage
    # Migrate port rules to App-ID using Policy Optimizer'
  tags:
  - app-id
  - application-control
  - policy
  - zero-trust
- id: pa-015
  platform: paloalto
  category: network
  severity: critical
  title: Block known bad IP feeds via External Dynamic Lists (EDL)
  description: Subscribe to threat intelligence feeds and block known malicious IPs, domains, and URLs using External Dynamic Lists. Palo Alto provides built-in EDLs and supports custom feeds.
  reference: Palo Alto Networks EDL Configuration
  command: '# PAN-OS CLI — built-in Palo Alto EDL:
    set rulebase security rules block-bad-ips source edl panw-bulletproof-ip-list
    set rulebase security rules block-bad-ips action deny
    # Custom EDL:
    set external-list my-threat-feed type ip source-url https://feeds.example.com/ips.txt
    set external-list my-threat-feed type ip refresh-rate hour 1
    commit'
  tags:
  - threat-intel
  - edl
  - blocklist
  - ioc
- id: pa-016
  platform: paloalto
  category: patching
  severity: critical
  title: Keep PAN-OS and content updates current
  description: Apply PAN-OS security patches promptly and enable automatic content updates (Applications & Threats, WildFire, Antivirus). Palo Alto firewalls have been targeted by CVEs.
  reference: Palo Alto Networks Update Best Practices
  command: '# PAN-OS CLI:
    # Check current version:
    show system info | match sw-version
    # Schedule automatic content updates:
    set deviceconfig system update-schedule threats recurring every-30-mins action download-and-install
    set deviceconfig system update-schedule wildfire recurring every-minute action download-and-install
    set deviceconfig system update-schedule anti-virus recurring hourly action download-and-install
    # Check for PAN-OS updates:
    request system software check
    commit'
  tags:
  - patching
  - updates
  - pan-os
  - content-updates
- id: pa-017
  platform: paloalto
  category: logging
  severity: medium
  title: Enable configuration audit trail and commit locking
  description: Track who changed what in the firewall config. Enable commit locking so concurrent admins cannot overwrite each other. Export config diffs for auditing.
  reference: Palo Alto Networks Configuration Audit
  command: '# PAN-OS CLI:
    # View recent config changes:
    show config audit
    # Enable commit lock before making changes:
    request commit-lock add comment "ticket-12345"
    # Compare running vs candidate config:
    show config diff
    # Export audit log via syslog to SIEM'
  tags:
  - audit
  - configuration
  - change-management
  - compliance
- id: pa-018
  platform: paloalto
  category: network
  severity: high
  title: Segment internal networks with inter-zone policies
  description: Do not place all internal subnets in a single trust zone. Create separate zones for servers, workstations, DMZ, and IoT. Apply least-privilege rules between zones.
  reference: Palo Alto Networks Network Segmentation
  command: '# PAN-OS CLI:
    # Create zones:
    set zone servers network layer3 ethernet1/3
    set zone workstations network layer3 ethernet1/4
    set zone iot network layer3 ethernet1/5
    # Inter-zone rules — only needed traffic:
    set rulebase security rules srv-to-ws from servers to workstations application ms-ds-smbv3 action allow
    set rulebase security rules deny-iot-to-srv from iot to servers action deny log-end yes
    commit'
  tags:
  - segmentation
  - zones
  - micro-segmentation
  - zero-trust
- id: pa-019
  platform: paloalto
  category: services
  severity: high
  title: Enable Panorama central management (multi-firewall)
