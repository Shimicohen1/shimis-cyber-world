  commandLanguage: powershell
  premium:
    attackPerspective: Without sensitivity labels on Power BI content, there's no way to enforce encryption or access controls on exported data. A user can export a 'Highly Confidential' dataset to a CSV
      file that has zero protection. Labels carry the protection with the data, even outside of Power BI.
    implementationNotes: "# Enable sensitivity labels for Power BI in Admin Portal\n# Admin Portal > Tenant Settings > Information Protection:\n#   'Allow users to apply sensitivity labels for Power BI\
      \ content' = Enabled\n#   'Apply sensitivity labels from data sources to their data in Power BI' = Enabled\n\n# Via PowerShell (Graph API)\nConnect-MgGraph -Scopes 'Policy.ReadWrite.ConditionalAccess'\n\
      \n# Verify labels are available in Power BI\nGet-PowerBITenantSetting -SettingName 'SensitivityLabelsForPBIContent' | Select Enabled\n\n# Check which workspaces have unlabeled content\n$workspaces\
      \ = Get-PowerBIWorkspace -Scope Organization -All\nforeach ($ws in $workspaces) {\n  $reports = Get-PowerBIReport -WorkspaceId $ws.Id\n  $unlabeled = $reports | Where-Object { -not $_.SensitivityLabel\
      \ }\n  if ($unlabeled) {\n    Write-Warning \"Workspace '$($ws.Name)' has $($unlabeled.Count) unlabeled reports\"\n  }\n}"
    validationNotes: '# Verify setting is enabled

      Get-PowerBITenantSetting -SettingName ''SensitivityLabelsForPBIContent''

      # Expected: Enabled = True


      # Check label adoption

      $reports = Get-PowerBIReport -Scope Organization

      $labeled = ($reports | Where-Object { $_.SensitivityLabel }).Count

      Write-Host "Labeled: $labeled / $($reports.Count) reports"'
    tuningNotes: Start with enabling labels without mandatory labeling. Use auto-labeling for Power BI datasets connected to sensitive SQL tables or SharePoint sites. Mandatory labeling should be rolled
      out after users are trained and labels are standardized.
    advancedDetection: '// KQL: Detect unlabeled Power BI artifacts being shared

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where Activity in (''ShareReport'', ''ShareDashboard'')

      | where SensitivityLabelId == ''''

      | project TimeGenerated, UserId, Activity, ReportName, WorkspaceName'
