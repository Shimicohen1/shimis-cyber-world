- id: gcp-011
  platform: gcp
  category: identity
  severity: high
  title: Remove primitive roles (Owner/Editor) from SAs
  description: Replace overly broad roles with fine-grained predefined or custom roles.
  reference: CIS GCP Foundations Benchmark 1.5
  command: "# Find primitive role bindings\ngcloud projects get-iam-policy <project> \\\n  --flatten='bindings[].members' \\\n  --filter='bindings.role:(roles/owner OR roles/editor)' \\\n  --format='table(bindings.role,\
    \ bindings.members)'\n"
  premium:
    attackPerspective: Primitive roles (Owner, Editor, Viewer) are overly broad — Editor grants write access to virtually every service in the project. Service accounts with Editor role can modify firewall
      rules, create VMs, read secrets, and write to any bucket. When an SA with Editor is compromised, the blast radius is the entire project. Predefined roles (roles/storage.objectAdmin, roles/bigquery.dataViewer)
      limit damage to specific services.
    implementationNotes: "# Find SAs with primitive roles\ngcloud projects get-iam-policy PROJECT_ID --format=json | \\\n  jq -r '.bindings[] | select(.role | test(\"roles/(owner|editor|viewer)\")) | {role:\
      \ .role, members: [.members[] | select(contains(\"serviceAccount\"))]}'\n\n# Replace Editor with specific predefined roles:\n# Step 1: Identify what the SA actually accesses\ngcloud recommender recommendations\
      \ list \\\n  --recommender=google.iam.policy.Recommender \\\n  --project=PROJECT_ID --location=global \\\n  --format=json | jq '.[] | select(.content.overview.member | contains(\"serviceAccount\"\
      ))'\n\n# Step 2: Remove primitive role\ngcloud projects remove-iam-policy-binding PROJECT_ID \\\n  --member='serviceAccount:SA@PROJECT.iam.gserviceaccount.com' \\\n  --role='roles/editor'\n\n# Step\
      \ 3: Add specific roles\ngcloud projects add-iam-policy-binding PROJECT_ID \\\n  --member='serviceAccount:SA@PROJECT.iam.gserviceaccount.com' \\\n  --role='roles/storage.objectAdmin'\ngcloud projects\
      \ add-iam-policy-binding PROJECT_ID \\\n  --member='serviceAccount:SA@PROJECT.iam.gserviceaccount.com' \\\n  --role='roles/bigquery.dataEditor'"
    validationNotes: "# Audit all primitive role bindings across org\nfor project in $(gcloud projects list --format='value(projectId)'); do\n  primitives=$(gcloud projects get-iam-policy $project --format=json\
      \ 2>/dev/null | \\\n    jq -r '.bindings[] | select(.role | test(\"roles/(owner|editor)\")) | .members[] | select(contains(\"serviceAccount\"))')\n  if [ -n \"$primitives\" ]; then\n    echo \"===\
      \ $project ===\"\n    echo \"$primitives\"\n  fi\ndone\n\n# Use IAM Recommender for right-sizing suggestions:\ngcloud recommender recommendations list \\\n  --recommender=google.iam.policy.Recommender\
      \ \\\n  --project=PROJECT_ID --location=global"
    tuningNotes: Use the IAM Recommender's suggestions as a starting point but validate against actual application requirements. Some workloads have intermittent access patterns that the recommender may
      miss. Test in a staging environment first. The google.iam.policy.Recommender analyzes 90 days of activity, so wait at least 90 days after project creation before right-sizing.
    advancedDetection: "-- BigQuery: Track primitive role grants\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail AS granter,\n  JSON_EXTRACT_SCALAR(binding, '$.role') AS\
      \ role_granted,\n  JSON_EXTRACT_SCALAR(binding, '$.member') AS grantee\nFROM `project.dataset.cloudaudit_googleapis_com_activity`,\n  UNNEST(JSON_EXTRACT_ARRAY(protopayload_auditlog.request.policy,\
      \ '$.bindings')) AS binding\nWHERE protopayload_auditlog.methodName LIKE '%SetIamPolicy%'\nAND JSON_EXTRACT_SCALAR(binding, '$.role') IN ('roles/owner', 'roles/editor')"
    relatedIds:
