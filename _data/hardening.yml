- id: m365-079
  platform: m365-power
  category: services
  severity: high
  title: Ensure access to APIs by Service Principals is restricted.
  description: Check Power BI Admin Portal → Tenant settings → Developer settings.
  reference: CIS.9.1.10 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → Developer settings'
  premium:
    attackPerspective: Unrestricted API access for service principals means any registered Azure AD application can programmatically query Power BI datasets, export reports, and modify workspaces. An attacker
      who compromises or creates a rogue app registration gains full API access to your entire BI estate — extracting data at scale without triggering user-based alerts.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Developer settings

      # ''Allow service principals to use Power BI APIs'' → Specific security groups only


      # Create a dedicated security group:

      New-MgGroup -DisplayName ''PowerBI-API-ServicePrincipals'' -SecurityEnabled:$true -MailEnabled:$false -MailNickname ''pbi-api-sp''


      # Add only approved service principals:

      $sp = Get-MgServicePrincipal -Filter "displayName eq ''YourApprovedApp''"

      New-MgGroupMember -GroupId $groupId -DirectoryObjectId $sp.Id


      # In Power BI Admin:

      # Allow service principals to use Power BI APIs → Specific security groups → Select ''PowerBI-API-ServicePrincipals'''
    validationNotes: "# Verify API access is restricted\nGet-PowerBITenantSetting | Where-Object { $_.SettingName -like '*ServicePrincipal*API*' }\n\n# List all service principals with Power BI API permissions:\n\
      Get-MgServicePrincipal -All | ForEach-Object {\n    $sp = $_\n    $perms = Get-MgServicePrincipalAppRoleAssignment -ServicePrincipalId $sp.Id | Where-Object { $_.ResourceDisplayName -like '*Power\
      \ BI*' }\n    if ($perms) { [PSCustomObject]@{ Name=$sp.DisplayName; AppId=$sp.AppId; Perms=$perms.Count } }\n} | Format-Table"
    tuningNotes: Review the service principals in the allowed group quarterly. Remove any that are no longer actively used. Implement API usage monitoring to detect dormant service principals that suddenly
      become active — a strong indicator of credential compromise.
    advancedDetection: "// KQL: Monitor Service Principal API activity\nPowerBIActivity\n| where TimeGenerated > ago(7d)\n| where Identity has 'ServicePrincipal' or UserType == 'ServicePrincipal'\n| summarize\
      \ ApiCalls=count(), Operations=make_set(Activity) by UserId\n| sort by ApiCalls desc\n\n// Alert on new service principals accessing Power BI\nPowerBIActivity\n| where TimeGenerated > ago(24h)\n|\
      \ where UserType == 'ServicePrincipal'\n| join kind=leftanti (\n    PowerBIActivity\n    | where TimeGenerated between(ago(30d) .. ago(24h))\n    | where UserType == 'ServicePrincipal'\n    | distinct\
      \ UserId\n) on UserId"
