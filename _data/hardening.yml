  description: 'Verify via PowerShell: Get-TransportConfig | fl SmtpClientAuthenticationDisabled. Should be True.'
  reference: CIS.6.5.4 — CIS M365 / Microsoft Secure Score — Exchange Online
  command: 'Get-TransportConfig | fl SmtpClientAuthenticationDisabled

