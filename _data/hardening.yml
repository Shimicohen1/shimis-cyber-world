  title: Ensure 'Allow users to apply sensitivity labels for content' is 'Enabled'.
  description: Check Power BI Admin Portal → Tenant settings → Information protection.
  reference: CIS.9.1.6 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → Information protection'
  premium:
    attackPerspective: Without sensitivity labels on Power BI content, there is no persistent classification that follows the data. Exported reports, downloaded datasets, and shared dashboards lose all
      context about their sensitivity level. An attacker who exfiltrates unlabeled data faces no DRM restrictions, no watermarks, and no policy enforcement — the data is completely unprotected once it leaves
      Power BI.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Information protection

      # ''Allow users to apply sensitivity labels for content'' → Enabled


      # Prerequisites:

      # 1. Sensitivity labels must be published in Microsoft Purview

      # 2. Azure Information Protection P1 or P2 license required

      # 3. Labels must include Power BI as a scope


      # Auto-labeling for Power BI (requires E5 or equivalent):

      # Purview → Information protection → Auto-labeling policies

      # Create policy → Scope: Power BI → Conditions → Apply label


      # Set default label for new Power BI content:

      # Admin Portal → Information protection → ''Apply a default sensitivity label to unapplied Power BI content'' → Select label'
    validationNotes: "# Verify sensitivity labeling is enabled\nGet-PowerBITenantSetting | Where-Object { $_.SettingName -like '*sensitivity*' -or $_.SettingName -like '*information*protection*' }\n\n#\
      \ Check label adoption rate:\n$workspaces = Get-PowerBIWorkspace -Scope Organization -All\n$labeledCount = 0; $totalCount = 0\nforeach ($ws in $workspaces) {\n    $datasets = Get-PowerBIDataset -WorkspaceId\
      \ $ws.Id\n    $totalCount += $datasets.Count\n    $labeledCount += ($datasets | Where-Object { $_.SensitivityLabel }).Count\n}\nWrite-Host \"Label coverage: $labeledCount / $totalCount ($([math]::Round($labeledCount/$totalCount*100,1))%)\"\
      \  "
    tuningNotes: Begin with recommended (not mandatory) labeling to let users adjust. Set a default label of 'General' or 'Internal' for all new content so nothing is unlabeled by default. Graduate to mandatory
      labeling after 30 days. Track adoption metrics weekly and follow up with teams that have low label coverage.
    advancedDetection: '// KQL: Track sensitivity label usage in Power BI

      InformationProtectionLogs_CL

      | where TimeGenerated > ago(14d)

      | where Application_s == ''PowerBI''

      | summarize LabelActions=count() by LabelName_s, Activity_s, UserId_s

      | sort by LabelActions desc


      // Alert on label downgrades

      InformationProtectionLogs_CL

      | where Activity_s == ''SensitivityLabelDowngraded''

      | project TimeGenerated, UserId_s, OldLabel=OldLabelName_s, NewLabel=LabelName_s, ItemName_s'
