- id: m365-022
  platform: m365-collab
  category: services
  severity: critical
  title: Mail transport rules should not forward email externally.
  description: 'Transport rules: 0 total, 0 with forwarding/redirect keywords.'
  reference: MS.EXO.2.1v1 — CIS M365 / Microsoft Secure Score — Exchange Online
  tags:
  - exchange-online
  - mail-flow
  - data-exfiltration
  - transport-rules
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Attackers who compromise a mailbox often create mail transport rules or inbox rules that auto-forward all email to an external address — this is one of the most common persistence
      and data exfiltration techniques in BEC (Business Email Compromise) attacks. A single forwarding rule can silently exfiltrate months of sensitive communications.
    implementationNotes: "# Connect to Exchange Online\nConnect-ExchangeOnline\n\n# Find transport rules that forward externally\nGet-TransportRule | Where-Object {\n  $_.RedirectMessageTo -or $_.BlindCopyTo\
      \ -or $_.CopyTo\n} | Select-Object Name, State, Priority, RedirectMessageTo, BlindCopyTo | Format-List\n\n# Find user-level inbox rules forwarding externally\n$mailboxes = Get-EXOMailbox -ResultSize\
      \ Unlimited -PropertySets Minimum\nforeach ($mbx in $mailboxes) {\n  $rules = Get-InboxRule -Mailbox $mbx.UserPrincipalName -ErrorAction SilentlyContinue\n  $fwd = $rules | Where-Object { $_.ForwardTo\
      \ -or $_.ForwardAsAttachmentTo -or $_.RedirectTo }\n  if ($fwd) {\n    Write-Warning \"$($mbx.UserPrincipalName) has forwarding rules:\"\n    $fwd | Select-Object Name, ForwardTo, RedirectTo | Format-Table\n\
      \  }\n}\n\n# Block auto-forwarding to external domains\nNew-TransportRule -Name 'Block External Auto-Forward' \\\n  -FromScope InOrganization \\\n  -SentToScope NotInOrganization \\\n  -MessageTypeMatches\
      \ AutoForward \\\n  -RejectMessageReasonText 'External mail forwarding is blocked per security policy'"
    validationNotes: '# Verify transport rule blocks forwarding

      Get-TransportRule -Identity ''Block External Auto-Forward'' | Select State, Priority


      # Test by setting a forwarding rule and sending a test email

      # The message should be rejected


      # Check Remote Domains

      Get-RemoteDomain | Select DomainName, AutoForwardEnabled

      # AutoForwardEnabled should be $false for Default (*)'
    tuningNotes: Allow specific forwarding for business-critical integrations (e.g., CRM, ticketing) by adding exceptions to the transport rule. Monitor for users trying to set forwarding via Outlook client
      or OWA — these attempts will appear in audit logs even if blocked.
    advancedDetection: '// KQL: Detect new inbox rules with forwarding

      OfficeActivity

      | where TimeGenerated > ago(24h)

      | where Operation in (''New-InboxRule'', ''Set-InboxRule'', ''Enable-InboxRule'')

      | where Parameters has_any (''ForwardTo'', ''ForwardAsAttachmentTo'', ''RedirectTo'')

      | project TimeGenerated, UserId, Operation, Parameters

      | extend ForwardTarget = extract(''"Value":"([^"]+)"'', 1, tostring(Parameters))

      | where ForwardTarget !endswith ''yourdomain.com'''
    relatedIds:
    - m365-023
    - m365-025
- id: m365-023
  platform: m365-collab
  category: logging
  severity: critical
  title: Ensure 'AuditDisabled' organizationally is set to 'False'.
  description: 'Audit log API: Verify via Get-OrganizationConfig | fl AuditDisabled.'
  reference: CIS.6.1.1 — CIS M365 / Microsoft Secure Score — Exchange Online
  command: Get-OrganizationConfig | fl AuditDisabled
  tags:
  - exchange-online
  - audit-log
  - compliance
  - forensics
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: If auditing is disabled, there is no forensic trail of mailbox access, permission changes, or data exfiltration. Attackers who gain initial access will often check audit status and
      disable it if possible — making their subsequent actions invisible to incident responders.
    implementationNotes: '# Check organization-wide audit status

      Get-OrganizationConfig | Select-Object AuditDisabled

      # Must be False


      # Enable if disabled

      Set-OrganizationConfig -AuditDisabled $false


      # Verify per-mailbox auditing

      Get-EXOMailbox -ResultSize Unlimited -PropertySets Audit | Where-Object { $_.AuditEnabled -eq $false } | Select UserPrincipalName


      # Enable on all mailboxes

      Get-EXOMailbox -ResultSize Unlimited | Set-Mailbox -AuditEnabled $true'
    validationNotes: '# Verify global audit

      (Get-OrganizationConfig).AuditDisabled

      # Expected: False


      # Verify sample mailboxes

      Get-EXOMailbox -Identity admin@domain.com -PropertySets Audit | Select AuditEnabled, AuditLogAgeLimit

      # Expected: AuditEnabled = True, AuditLogAgeLimit = 90+ days'
    tuningNotes: Default audit log retention is 90 days (E3) or 1 year (E5). For compliance requirements beyond that, configure Microsoft Purview audit log retention policies. Focus on high-value mailboxes
      (executives, finance) for extended retention.
    advancedDetection: '// KQL: Detect audit being disabled

      OfficeActivity

      | where Operation == ''Set-OrganizationConfig''

      | where Parameters has ''AuditDisabled''

      | where Parameters has ''True''

      | project TimeGenerated, UserId, Operation, ClientIP

      | extend AlertSeverity = ''Critical'''
    relatedIds:
    - m365-022
    - m365-024
    - m365-025
