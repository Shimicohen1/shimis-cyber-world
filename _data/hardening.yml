- id: aws-008
  platform: aws
  category: encryption
  severity: critical
  title: Enable default S3 bucket encryption
  description: All S3 buckets must have server-side encryption (SSE-S3 or SSE-KMS) enabled by default.
  reference: CIS AWS Foundations Benchmark 2.1.1
  command: "# Check all buckets for encryption\nfor bucket in $(aws s3api list-buckets --query 'Buckets[].Name' --output text); do\n  enc=$(aws s3api get-bucket-encryption --bucket \"$bucket\" 2>&1)\n \
    \ echo \"$bucket: $enc\"\ndone\n"
  premium:
    attackPerspective: Unencrypted S3 buckets are a recurring theme in data breaches. In 2017 alone, Accenture, Verizon, and the US DoD all suffered breaches from exposed S3 data. Even 'private' buckets
      without encryption are at risk if an attacker gains any AWS access — at-rest encryption adds a mandatory key-access layer.
    implementationNotes: "1. Enable default encryption on each bucket: aws s3api put-bucket-encryption\n2. Use SSE-S3 (AES-256) as the minimum, SSE-KMS for sensitive data\n3. For SSE-KMS: create a customer-managed\
      \ key with rotation enabled\n4. Update bucket policies to deny unencrypted uploads:\n   Condition: {\"StringNotEquals\": {\"s3:x-amz-server-side-encryption\": \"aws:kms\"}}"
    validationNotes: "# Check all buckets\nfor bucket in $(aws s3api list-buckets --query 'Buckets[].Name' --output text); do\n  enc=$(aws s3api get-bucket-encryption --bucket \"$bucket\" 2>&1)\n  if echo\
      \ \"$enc\" | grep -q 'ServerSideEncryptionConfigurationNotFoundError'; then\n    echo \"UNENCRYPTED: $bucket\"\n  else\n    echo \"OK: $bucket\"\n  fi\ndone"
