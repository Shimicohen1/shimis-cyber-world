- id: gcp-007
  platform: gcp
  category: identity
  severity: critical
  title: Restrict service account impersonation
  description: Limit who can impersonate service accounts to prevent privilege escalation.
  reference: CIS GCP Foundations Benchmark 1.6
  command: "# List SA impersonation permissions\ngcloud projects get-iam-policy <project> \\\n  --flatten='bindings[].members' \\\n  --filter='bindings.role:roles/iam.serviceAccountTokenCreator' \\\n  --format='table(bindings.members)'\n"
  premium:
    attackPerspective: Service account impersonation allows a user or service to act as another service account, inheriting its permissions. If unrestricted, an attacker who compromises any account with
      the iam.serviceAccounts.getAccessToken permission can impersonate high-privilege SAs — effectively privilege escalation from a low-privilege entry point to project Owner in a single API call.
    implementationNotes: "# Organization Policy to restrict SA impersonation\ngcloud resource-manager org-policies set-policy \\\n  --organization=ORG_ID impersonation-policy.yaml\n\n# policy.yaml:\n# constraint:\
      \ constraints/iam.allowServiceAccountCredentialLifetimeExtension\n# booleanPolicy:\n#   enforced: false  # Don't allow extended token lifetimes\n\n# Restrict who can impersonate each SA:\ngcloud iam\
      \ service-accounts get-iam-policy SA@PROJECT.iam.gserviceaccount.com\n\n# Remove overly broad impersonation grants:\ngcloud iam service-accounts remove-iam-policy-binding SA@PROJECT.iam.gserviceaccount.com\
      \ \\\n  --member='user:developer@company.com' \\\n  --role='roles/iam.serviceAccountTokenCreator'\n\n# Grant impersonation only where needed:\ngcloud iam service-accounts add-iam-policy-binding SA@PROJECT.iam.gserviceaccount.com\
      \ \\\n  --member='serviceAccount:cicd@PROJECT.iam.gserviceaccount.com' \\\n  --role='roles/iam.serviceAccountTokenCreator' \\\n  --condition='expression=request.time < timestamp(\"2025-12-31T00:00:00Z\"\
      ),title=temp-access'"
    validationNotes: "# Find all principals that can impersonate service accounts\nfor project in $(gcloud projects list --format='value(projectId)'); do\n  for sa in $(gcloud iam service-accounts list\
      \ --project=$project --format='value(email)'); do\n    bindings=$(gcloud iam service-accounts get-iam-policy $sa --format=json 2>/dev/null | jq -r '.bindings[]? | select(.role | contains(\"TokenCreator\"\
      ) or contains(\"AccountUser\")) | .members[]')\n    if [ -n \"$bindings\" ]; then\n      echo \"SA: $sa\"\n      echo \"  Can be impersonated by: $bindings\"\n    fi\n  done\ndone"
    tuningNotes: Impersonation is a legitimate pattern for least-privilege — users impersonate short-lived SA tokens instead of having permanent broad roles. The key is restricting WHO can impersonate WHICH
      SA. Use IAM conditions (time-based, resource-based) to further limit impersonation grants. Never grant serviceAccountTokenCreator at the project level.
    advancedDetection: "-- BigQuery: Detect SA impersonation events\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail AS impersonator,\n  protopayload_auditlog.authenticationInfo.serviceAccountDelegationInfo\
      \ AS delegation_chain,\n  protopayload_auditlog.methodName\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.authenticationInfo.serviceAccountDelegationInfo\
      \ IS NOT NULL\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-002
    - gcp-008
    - gcp-011
  tags:
  - gcp
  - identity
- id: gcp-008
  platform: gcp
  category: identity
  severity: high
  title: Disable default service account for GCE
  description: Don't use the Compute Engine default service account. Create purpose-specific SAs.
  reference: CIS GCP Foundations Benchmark 1.5
  command: '# Find instances using default SA

    gcloud compute instances list --format=''table(name,serviceAccounts[].email)'' | grep ''compute@developer''

    '
  premium:
    attackPerspective: The default Compute Engine service account (PROJECT_NUM-compute@developer.gserviceaccount.com) is auto-created with Editor role on the project. Every VM that launches without specifying
      a custom SA inherits Editor — permission to read/write almost everything in the project. An attacker who gets shell access to any such VM immediately has Editor-level access to the entire project
      through the metadata server.
    implementationNotes: "# Organization Policy to disable automatic SA grant\ngcloud resource-manager org-policies set-policy \\\n  --organization=ORG_ID disable-default-sa.yaml\n\n# policy.yaml:\n# constraint:\
      \ constraints/iam.automaticIamGrantsForDefaultServiceAccounts\n# booleanPolicy:\n#   enforced: true\n\n# This prevents the default SA from getting Editor role on new projects\n# For existing projects,\
      \ manually remove the Editor binding:\ngcloud projects remove-iam-policy-binding PROJECT_ID \\\n  --member='serviceAccount:PROJECT_NUM-compute@developer.gserviceaccount.com' \\\n  --role='roles/editor'\n\
      \n# Create dedicated SAs for each workload:\ngcloud iam service-accounts create vm-web-app \\\n  --display-name='Web App VM SA' \\\n  --project=PROJECT_ID\n\n# Grant only needed roles:\ngcloud projects\
      \ add-iam-policy-binding PROJECT_ID \\\n  --member='serviceAccount:vm-web-app@PROJECT_ID.iam.gserviceaccount.com' \\\n  --role='roles/storage.objectViewer'\n\n# Launch VM with custom SA:\ngcloud compute\
      \ instances create my-vm \\\n  --service-account=vm-web-app@PROJECT_ID.iam.gserviceaccount.com \\\n  --scopes=cloud-platform"
    validationNotes: "# Find VMs using the default SA\nfor project in $(gcloud projects list --format='value(projectId)'); do\n  gcloud compute instances list --project=$project \\\n    --format='table(name,zone,serviceAccounts[0].email)'\
      \ \\\n    --filter='serviceAccounts.email:*-compute@developer.gserviceaccount.com' 2>/dev/null\ndone\n\n# Check if default SA has Editor role\ngcloud projects get-iam-policy PROJECT_ID --format=json\
      \ | \\\n  jq '.bindings[] | select(.role==\"roles/editor\") | .members[] | select(contains(\"compute@developer\"))'"
    tuningNotes: Migrating existing VMs off the default SA requires careful planning. Inventory what each VM accesses (GCS buckets, BigQuery datasets, Pub/Sub topics), create a custom SA with those specific
      roles, update the VM's service account, and verify. Do this project by project, starting with production workloads.
    advancedDetection: "-- Alert on VMs launched with default SA\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail AS creator,\n  resource.labels.instance_id,\n  JSON_EXTRACT_SCALAR(protopayload_auditlog.request,\
      \ '$.serviceAccounts[0].email') AS vm_sa\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'v1.compute.instances.insert'\nAND JSON_EXTRACT_SCALAR(protopayload_auditlog.request,\
      \ '$.serviceAccounts[0].email') LIKE '%-compute@developer.gserviceaccount.com'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)"
    relatedIds:
    - gcp-002
    - gcp-011
  tags:
  - gcp
  - identity
- id: gcp-009
  platform: gcp
  category: identity
  severity: critical
  title: Enforce org-wide domain restricted sharing
  description: Prevent sharing GCP resources with external domains using org policies.
  reference: CIS GCP Foundations Benchmark 1.12
  command: 'gcloud resource-manager org-policies describe constraints/iam.allowedPolicyMemberDomains --organization=<org_id>

    '
  premium:
    attackPerspective: Without domain-restricted sharing, any user can share GCP resources (projects, buckets, datasets) with external Gmail accounts or other Google Workspace domains. An attacker who compromises
      an internal account can grant their personal Gmail access to critical projects, creating a persistent backdoor that survives the internal account's password reset or deactivation.
    implementationNotes: "# Organization Policy: Restrict domain sharing\ngcloud resource-manager org-policies set-policy \\\n  --organization=ORG_ID domain-restrict.yaml\n\n# domain-restrict.yaml:\n# constraint:\
      \ constraints/iam.allowedPolicyMemberDomains\n# listPolicy:\n#   allowedValues:\n#     - 'C0xxxxxxx'   # Your Cloud Identity/Workspace customer ID\n#     - 'C0yyyyyyy'   # Partner domain customer\
      \ ID (if needed)\n\n# Find your customer ID:\ngcloud organizations list --format='table(displayName,directoryCustomerId)'\n\n# Apply to entire organization:\ngcloud resource-manager org-policies set-policy\
      \ \\\n  --organization=ORG_ID domain-restrict.yaml\n\n# For exceptions (specific projects that need external access):\n# Use tag-based exceptions in the org policy"
    validationNotes: "# Verify the org policy is active\ngcloud resource-manager org-policies describe \\\n  constraints/iam.allowedPolicyMemberDomains \\\n  --organization=ORG_ID\n\n# Find existing external\
      \ IAM bindings\nfor project in $(gcloud projects list --format='value(projectId)'); do\n  external=$(gcloud projects get-iam-policy $project --format=json | \\\n    jq -r '.bindings[].members[]' |\
      \ grep -v \"@$YOUR_DOMAIN\" | grep -v 'gserviceaccount.com' | grep -v 'group:')\n  if [ -n \"$external\" ]; then\n    echo \"=== $project ===\"\n    echo \"$external\"\n  fi\ndone"
    tuningNotes: 'The allowedPolicyMemberDomains constraint is the single most impactful security policy in GCP. Enable it organization-wide first, then handle exceptions. Common exceptions: projects that
      use Workload Identity Federation (external identities need access), sandbox projects for partner collaboration. Use project-level overrides sparingly and audit them monthly.'
    advancedDetection: "-- BigQuery: Detect IAM grants to external identities (pre-policy)\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail AS granter,\n  JSON_EXTRACT_SCALAR(binding,\
      \ '$.member') AS grantee,\n  JSON_EXTRACT_SCALAR(binding, '$.role') AS role_granted\nFROM `project.dataset.cloudaudit_googleapis_com_activity`,\n  UNNEST(JSON_EXTRACT_ARRAY(protopayload_auditlog.request.policy,\
      \ '$.bindings')) AS binding\nWHERE protopayload_auditlog.methodName LIKE '%SetIamPolicy%'\nAND JSON_EXTRACT_SCALAR(binding, '$.member') NOT LIKE '%@yourdomain.com'\nAND JSON_EXTRACT_SCALAR(binding,\
