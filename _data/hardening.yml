- id: m365-028
  platform: m365-collab
  category: services
  severity: high
  title: Ensure email from external senders is identified.
  description: 'External email tagging rules: 0. No external tagging rule detected. Create in EAC → Mail flow → Rules.'
  reference: CIS.6.2.3 — CIS M365 / Microsoft Secure Score — Exchange Online
  tags:
  - exchange-online
  - external-sender
  - phishing-prevention
  - spoofing
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Without external sender identification, users cannot distinguish emails from inside vs outside the organization. This is exploited in spear-phishing where attackers impersonate internal
      executives or colleagues. The [External] tag in subject line or banner provides a visual cue that helps users spot impersonation.
    implementationNotes: '# Enable external sender tagging via transport rule

      New-TransportRule -Name ''Tag External Emails'' -FromScope NotInOrganization -Priority 0 -PrependSubject ''[External] '' -ApplyHtmlDisclaimerLocation Prepend -ApplyHtmlDisclaimerText ''<div style="background:#fef3cd;padding:8px;border:1px
      solid #ffc107;margin-bottom:10px;font-size:13px;">⚠️ This email originated from outside the organization. Do not click links or open attachments unless you recognize the sender.</div>'' -ApplyHtmlDisclaimerFallbackAction
      Wrap


      # Alternative: Use built-in External Email Tagging (simpler)

      # Exchange Admin Center > Mail flow > Rules > Enable ''External email tagging''

      Set-ExternalInOutlook -Enabled $true'
    validationNotes: '# Verify transport rule is active

      Get-TransportRule ''Tag External Emails'' | Select Name, State, Priority


      # Verify built-in external tagging

      Get-ExternalInOutlook

      # Expected: Enabled = True


      # Test: send email from external account and verify tag appears'
    tuningNotes: The [External] prefix in subject lines breaks reply threading in some email clients. Prefer the HTML disclaimer banner approach or the built-in External Email Tagging feature which adds
      a callout in Outlook without modifying the subject line. Exclude trusted partner domains if false positives annoy users.
    advancedDetection: '// KQL: Detect external emails impersonating internal users

      EmailEvents

      | where TimeGenerated > ago(24h)

      | where SenderFromDomain !endswith ''yourdomain.com''

      | where SenderDisplayName in~ (''CEO Name'',''CFO Name'',''CTO Name'')  // Your exec names

      | project TimeGenerated, SenderFromAddress, SenderDisplayName, RecipientEmailAddress, Subject'
