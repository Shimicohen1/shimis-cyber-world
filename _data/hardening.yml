- id: gcp-017
  platform: gcp
  category: network
  severity: high
  title: Enable Cloud Armor DDoS protection
  description: Protect HTTP(S) Load Balancers with Cloud Armor security policies.
  reference: Google Cloud Security Best Practices
  command: '# Create security policy

    gcloud compute security-policies create scw-policy --description=''WAF and DDoS''

    # Add rate limiting rule

    gcloud compute security-policies rules create 1000 --security-policy=scw-policy --action=throttle --rate-limit-threshold-count=100 --rate-limit-threshold-interval-sec=60

    '
  premium:
    attackPerspective: Cloud Armor provides L7 DDoS protection, WAF rules, and bot management for HTTP(S) load balancers. Without it, your applications are directly exposed to volumetric attacks, application-layer
      floods, and web exploits. GCP's default DDoS protection handles L3/L4 floods, but application-layer attacks (SlowLoris, HTTP floods, SQL injection payloads) pass through unimpeded.
    implementationNotes: "# Create a Cloud Armor security policy\ngcloud compute security-policies create web-policy \\\n  --description='Web application protection'\n\n# Add preconfigured WAF rules (OWASP\
      \ Top 10):\ngcloud compute security-policies rules create 1000 \\\n  --security-policy=web-policy \\\n  --expression='evaluatePreconfiguredExpr(\"sqli-v33-stable\")' \\\n  --action=deny-403 \\\n \
      \ --description='Block SQL injection'\n\ngcloud compute security-policies rules create 1001 \\\n  --security-policy=web-policy \\\n  --expression='evaluatePreconfiguredExpr(\"xss-v33-stable\")' \\\
      \n  --action=deny-403 \\\n  --description='Block XSS'\n\ngcloud compute security-policies rules create 1002 \\\n  --security-policy=web-policy \\\n  --expression='evaluatePreconfiguredExpr(\"rce-v33-stable\"\
      )' \\\n  --action=deny-403 \\\n  --description='Block RCE attempts'\n\n# Rate limiting:\ngcloud compute security-policies rules create 2000 \\\n  --security-policy=web-policy \\\n  --expression='true'\
      \ \\\n  --action=rate-based-ban \\\n  --rate-limit-threshold-count=100 \\\n  --rate-limit-threshold-interval-sec=60 \\\n  --ban-duration-sec=300\n\n# Attach to backend service:\ngcloud compute backend-services\
      \ update BACKEND_SVC \\\n  --security-policy=web-policy --global"
    validationNotes: "# Verify policy is attached\ngcloud compute backend-services describe BACKEND_SVC --global \\\n  --format='value(securityPolicy)'\n\n# List all rules in the policy\ngcloud compute\
      \ security-policies rules list --security-policy=web-policy\n\n# Check Cloud Armor logs for blocked requests\ngcloud logging read 'resource.type=\"http_load_balancer\" AND jsonPayload.enforcedSecurityPolicy.outcome=\"\
      DENY\"' \\\n  --limit=20 --format=json"
    tuningNotes: Start with preconfigured rules in 'preview' mode (log but don't block) for 2 weeks, then review false positives before switching to deny. Tune rate limits based on your application's normal
      traffic patterns — API endpoints may need higher thresholds than web pages. Use adaptive protection for automatic DDoS response at scale.
    advancedDetection: "-- Cloud Armor event analysis\nSELECT\n  timestamp,\n  httpRequest.remoteIp,\n  jsonPayload.enforcedSecurityPolicy.name as policy,\n  jsonPayload.enforcedSecurityPolicy.outcome,\n\
      \  jsonPayload.enforcedSecurityPolicy.matchedFieldType,\n  httpRequest.requestUrl\nFROM `project.dataset.requests`\nWHERE jsonPayload.enforcedSecurityPolicy.outcome = 'DENY'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(),\
      \ INTERVAL 24 HOUR)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-018
    - gcp-012
  tags:
  - gcp
