- id: m365-178
  platform: m365-intune
  category: identity
  severity: critical
  title: Devices must be enrolled in Microsoft Intune for centralized endpoint management.
  description: 'Enrolled devices: 97. Corporate: 97. Personal: 0. OS: Windows: 94, macOS: 3.'
  reference: MS.INTUNE.1.1v1 — CIS M365 / Microsoft Secure Score — Intune
  tags:
  - intune
  - mdm
  - device-enrollment
  - endpoint-management
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Unmanaged devices accessing corporate resources are blind spots — no compliance checks, no patching enforcement, no remote wipe capability. Attackers target users who access corporate
      data from personal devices where there is no EDR, no disk encryption verification, and no conditional access enforcement. A single unmanaged device with cached credentials can be the entry point for
      a full breach.
    implementationNotes: '# Connect to Microsoft Graph for Intune

      Connect-MgGraph -Scopes ''DeviceManagementManagedDevices.Read.All'',''DeviceManagementServiceConfig.ReadWrite.All''


      # Get all managed devices

      $devices = Get-MgDeviceManagementManagedDevice -All

      Write-Host "Total managed devices: $($devices.Count)"


      # Find non-compliant devices

      $nonCompliant = $devices | Where-Object { $_.ComplianceState -ne ''compliant'' }

      Write-Host "Non-compliant: $($nonCompliant.Count)"

      $nonCompliant | Select-Object DeviceName, UserPrincipalName, ComplianceState, OSVersion, LastSyncDateTime | Format-Table


      # Get devices not synced in 30+ days (stale)

      $stale = $devices | Where-Object { $_.LastSyncDateTime -lt (Get-Date).AddDays(-30) }

      Write-Host "Stale (30+ days): $($stale.Count)"

      $stale | Select-Object DeviceName, UserPrincipalName, LastSyncDateTime | Format-Table'
    validationNotes: '# Verify enrollment restrictions are configured

      Get-MgDeviceManagementDeviceEnrollmentConfiguration | Select DisplayName, DeviceEnrollmentConfigurationType | Format-Table


      # Verify compliance policies exist

      Get-MgDeviceManagementDeviceCompliancePolicy | Select DisplayName, LastModifiedDateTime | Format-Table

      # Expected: At least one policy per OS platform'
    tuningNotes: 'Start with a ''report-only'' compliance policy before enforcing to understand the impact. Common initial non-compliance causes: missing BitLocker, outdated OS, no screen lock. Allow a
      24-72 hour grace period for users to remediate before blocking access. Exempt shared/kiosk devices from user-based enrollment.'
    advancedDetection: '// KQL: Detect sign-ins from unmanaged devices

      SigninLogs

      | where TimeGenerated > ago(24h)

      | where DeviceDetail.isManaged != true

      | where AppDisplayName in (''Microsoft Teams'', ''SharePoint Online'', ''Exchange Online'')

      | summarize Count = count(), Apps = make_set(AppDisplayName) by UserPrincipalName, DeviceDetail.operatingSystem, tostring(DeviceDetail.browser)

      | where Count > 5

      | sort by Count desc'
    relatedIds:
    - m365-182
