- id: m365-068
  platform: m365-power
  category: services
  severity: high
  title: External sharing of Power BI reports and dashboards should be restricted.
  description: Verify in Power BI Admin Portal → Tenant Settings → Export and sharing.
  reference: MS.POWERBI.1.1v1 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Power BI Admin Portal → Tenant Settings → Export and sharing'
  tags:
  - power-bi
  - data-exfiltration
  - external-sharing
  - governance
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Power BI reports often contain aggregated sensitive data from multiple sources — financial reports, HR analytics, customer databases. Unrestricted external sharing means any user
      can share a dashboard link with anyone outside the organization, bypassing DLP controls. Attackers who compromise a Power BI user can exfiltrate entire data models, not just individual records.
    implementationNotes: '# Power BI Admin PowerShell

      Connect-PowerBIServiceAccount


      # Check current tenant settings

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -like ''*external*'' -or $_.SettingName -like ''*share*'' } | Select SettingName, Enabled | Format-Table


      # Via Power BI Admin Portal:

      # 1. Go to Admin Portal > Tenant Settings

      # 2. Under ''Export and sharing settings'':

      #    - ''Allow Azure Active Directory guest users to access Power BI'' = Specific security groups only

      #    - ''Invite external users to your organization'' = Disabled or specific groups

      #    - ''Allow users to send Power BI content to external users'' = Disabled

      #    - ''Publish to web'' = Disabled (this creates ANONYMOUS public links)


      # Block ''Publish to web'' (most critical)

      # This setting creates completely public, unauthenticated links to reports

      Set-PowerBITenantSetting -SettingName ''PublishToWeb'' -Enabled $false'
    validationNotes: '# Check for existing ''Publish to web'' embed codes (anonymous access!)

      Get-PowerBIPublishToWebLink | Select ReportName, CreatedBy, Status | Format-Table

      # Expected: No active links (or only approved ones)


      # Verify external sharing settings

      Get-PowerBITenantSetting -SettingName ''AllowExternalSharingOfContent'' | Select Enabled'
    tuningNotes: Publish to web is the highest risk — it creates completely anonymous public URLs. Disable it org-wide first. For external sharing with authenticated guests, use specific security groups
      and require MFA via Conditional Access. Monitor Power BI activity logs for exports to CSV/Excel which bypass sharing controls.
    advancedDetection: '// KQL: Detect Power BI external sharing and exports

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where Activity in (''ShareReport'', ''ExportReport'', ''PublishToWebReport'', ''CreateGateway'')

      | project TimeGenerated, UserId, Activity, ReportName, DatasetName, WorkspaceName

      | extend IsExternal = Activity has ''External'' or Activity has ''PublishToWeb''

      | sort by TimeGenerated desc'
    relatedIds:
    - m365-069
- id: m365-069
  platform: m365-power
  category: services
  severity: high
  title: Power BI service should require sensitivity labels for published content.
  description: 'Sensitivity labels exist in tenant: False. Verify they are applied to Power BI in the admin portal.'
  reference: MS.POWERBI.1.2v1 — CIS M365 / Microsoft Secure Score — Power BI
  tags:
  - power-bi
  - sensitivity-labels
  - data-classification
  - governance
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Without sensitivity labels on Power BI content, there's no way to enforce encryption or access controls on exported data. A user can export a 'Highly Confidential' dataset to a CSV
      file that has zero protection. Labels carry the protection with the data, even outside of Power BI.
    implementationNotes: "# Enable sensitivity labels for Power BI in Admin Portal\n# Admin Portal > Tenant Settings > Information Protection:\n#   'Allow users to apply sensitivity labels for Power BI\
      \ content' = Enabled\n#   'Apply sensitivity labels from data sources to their data in Power BI' = Enabled\n\n# Via PowerShell (Graph API)\nConnect-MgGraph -Scopes 'Policy.ReadWrite.ConditionalAccess'\n\
      \n# Verify labels are available in Power BI\nGet-PowerBITenantSetting -SettingName 'SensitivityLabelsForPBIContent' | Select Enabled\n\n# Check which workspaces have unlabeled content\n$workspaces\
      \ = Get-PowerBIWorkspace -Scope Organization -All\nforeach ($ws in $workspaces) {\n  $reports = Get-PowerBIReport -WorkspaceId $ws.Id\n  $unlabeled = $reports | Where-Object { -not $_.SensitivityLabel\
      \ }\n  if ($unlabeled) {\n    Write-Warning \"Workspace '$($ws.Name)' has $($unlabeled.Count) unlabeled reports\"\n  }\n}"
    validationNotes: '# Verify setting is enabled

      Get-PowerBITenantSetting -SettingName ''SensitivityLabelsForPBIContent''

      # Expected: Enabled = True


      # Check label adoption

      $reports = Get-PowerBIReport -Scope Organization

      $labeled = ($reports | Where-Object { $_.SensitivityLabel }).Count

      Write-Host "Labeled: $labeled / $($reports.Count) reports"'
    tuningNotes: Start with enabling labels without mandatory labeling. Use auto-labeling for Power BI datasets connected to sensitive SQL tables or SharePoint sites. Mandatory labeling should be rolled
      out after users are trained and labels are standardized.
    advancedDetection: '// KQL: Detect unlabeled Power BI artifacts being shared

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where Activity in (''ShareReport'', ''ShareDashboard'')

      | where SensitivityLabelId == ''''

      | project TimeGenerated, UserId, Activity, ReportName, WorkspaceName'
    relatedIds:
    - m365-068
- id: m365-070
  platform: m365-power
  category: services
  severity: high
  title: Ensure guest user access is restricted.
  description: Check Power BI Admin Portal → Tenant settings → Export and sharing.
  reference: CIS.9.1.1 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → Export and sharing'
  premium:
    attackPerspective: Guest users with unrestricted Power BI access can view dashboards, datasets, and dataflows containing sensitive business intelligence. Attackers who compromise a guest account can
      exfiltrate financial forecasts, customer analytics, and operational metrics — data that enables competitive intelligence, insider trading, or targeted social engineering against executives.
    implementationNotes: '# Power BI Admin Portal → Tenant Settings → Export and sharing settings

      # Navigate to: admin.powerbi.com → Tenant settings


      # Via PowerShell (Power BI Management Module):

      Install-Module -Name MicrosoftPowerBIMgmt -Force

      Connect-PowerBIServiceAccount


      # Get current tenant settings

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -like ''*guest*'' }


      # Restrict guest access to specific security groups only

      # Admin Portal → Guest user access → Specific security groups

      # Create a dedicated ''PowerBI-External-Viewers'' group

      # Apply: Enabled for specific security groups → Select group'
    validationNotes: '# Verify guest restrictions are active

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -eq ''AllowGuestLookup'' }

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -eq ''AllowGuestAccess'' }


      # Test with a guest account (ensure they cannot browse workspaces)

      # Check audit logs for guest access attempts:

      Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-7) -EndDate (Get-Date) -RecordType PowerBIAudit -ResultSize 1000 | Where-Object { $_.Operations -like ''*Guest*'' }'
    tuningNotes: Some organizations need external consultants to view specific Power BI reports. Create a dedicated security group for vetted external users rather than opening guest access broadly. Review
      membership quarterly. Use Row-Level Security (RLS) on datasets shared with guests to limit data exposure to only their relevant scope.
    advancedDetection: '// KQL: Detect guest users accessing Power BI content

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where UserId contains ''#EXT#'' or UserType == ''Guest''

      | summarize AccessCount=count() by UserId, Activity, WorkspaceName

      | where AccessCount > 10

      | sort by AccessCount desc'
    relatedIds:
    - m365-071
    - m365-072
  tags:
  - power-platform
  - governance
- id: m365-071
  platform: m365-power
  category: services
  severity: high
  title: Ensure external user invitations are restricted.
  description: Check Power BI Admin Portal → Tenant settings.
  reference: CIS.9.1.2 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings'
  premium:
    attackPerspective: Unrestricted external invitations in Power Platform allow any internal user to share Power Apps, Flows, and BI content with outsiders. An attacker with a single compromised internal
      account can silently invite their own external identity, creating a persistent backdoor that survives password resets of the compromised account.
    implementationNotes: '# Azure AD → External Identities → External collaboration settings

      # Set ''Guest invite restrictions'' to: Only users assigned to specific admin roles can invite guest users


      # Via Microsoft Graph PowerShell:

      Connect-MgGraph -Scopes ''Policy.ReadWrite.Authorization''


      # Get current authorization policy

      $policy = Get-MgPolicyAuthorizationPolicy

      $policy.AllowInvitesFrom   # Should be ''adminsAndGuestInviters'' or ''none''


      # Restrict to admins only:

      Update-MgPolicyAuthorizationPolicy -AllowInvitesFrom ''adminsAndGuestInviters''


      # For Power BI specifically:

      # Admin Portal → Tenant settings → Invite external users to your organization → Disabled'
    validationNotes: '# Verify invitation policy

      $policy = Get-MgPolicyAuthorizationPolicy

      Write-Host "AllowInvitesFrom: $($policy.AllowInvitesFrom)"

      # Expected: ''adminsAndGuestInviters'' or ''none''


      # Check for recent external invitations

      Get-MgAuditLogDirectoryAudit -Filter "activityDisplayName eq ''Invite external user''" -Top 50 | Select ActivityDateTime, InitiatedBy, TargetResources | Format-Table'
    tuningNotes: If business teams frequently need to invite partners, consider creating a self-service request workflow via Power Automate that routes through an approval process rather than granting broad
      invitation rights. This maintains velocity while adding an audit checkpoint.
    advancedDetection: '// KQL: Monitor external invitation patterns

      AuditLogs

      | where TimeGenerated > ago(30d)

      | where OperationName == ''Invite external user''

      | extend Inviter = tostring(InitiatedBy.user.userPrincipalName)

      | extend InvitedEmail = tostring(TargetResources[0].userPrincipalName)

      | summarize InviteCount=count(), Invitees=make_set(InvitedEmail) by Inviter

      | where InviteCount > 5

      | sort by InviteCount desc'
    relatedIds:
    - m365-070
    - m365-072
  tags:
  - power-platform
  - governance
- id: m365-072
  platform: m365-power
  category: services
  severity: high
  title: Ensure guest access to content is restricted.
  description: Check Power BI Admin Portal → Tenant settings.
  reference: CIS.9.1.3 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings'
  premium:
    attackPerspective: When guest users can freely browse organizational content in Power BI, they gain visibility into workspace structures, dataset names, and report titles — even before opening them.
      This metadata alone reveals project codenames, M&A targets, and internal tooling. An adversary performing reconnaissance can map your entire BI landscape from a single guest account.
    implementationNotes: "# Power BI Admin Portal → Tenant settings → Export and sharing settings\n\n# Restrict content access for guest users:\n# 1. Navigate to admin.powerbi.com\n# 2. Tenant settings\
      \ → 'Guest users can browse and access Power BI content' → Disabled\n# 3. Or limit to specific security groups\n\n# Alternatively, use workspace-level permissions:\n# Each workspace → Access → Add\
      \ guest only to specific workspaces they need\n# Never add guests to 'Member' or 'Admin' roles — use 'Viewer' only\n\n# PowerShell verification:\nGet-PowerBIWorkspace -All | ForEach-Object {\n   \
      \ $ws = $_\n    Get-PowerBIWorkspaceUser -Id $ws.Id | Where-Object { $_.UserPrincipalName -like '*#EXT#*' } | Select @{N='Workspace';E={$ws.Name}}, UserPrincipalName, AccessRight\n}"
    validationNotes: "# List all workspaces with guest access\n$workspaces = Get-PowerBIWorkspace -Scope Organization -All\nforeach ($ws in $workspaces) {\n    $guests = Get-PowerBIWorkspaceUser -Id $ws.Id\
      \ | Where-Object { $_.AccessRight -ne 'None' -and $_.UserPrincipalName -like '*#EXT#*' }\n    if ($guests) {\n        Write-Host \"Workspace: $($ws.Name)\"\n        $guests | Format-Table UserPrincipalName,\
      \ AccessRight\n    }\n}"
    tuningNotes: For legitimate external collaboration, use Power BI Embedded or publish-to-web with row-level security rather than granting direct guest workspace access. If guest access is required, implement
      sensitivity labels on datasets to prevent downloads of classified data.
    advancedDetection: "// KQL: Track guest content access patterns  \nPowerBIActivity\n| where TimeGenerated > ago(14d)\n| where UserId contains '#EXT#'\n| where Activity in ('ViewReport', 'ViewDashboard',\
      \ 'ExportReport', 'GetDatasources')\n| summarize Operations=make_set(Activity), Count=count() by UserId, WorkspaceName\n| where Count > 20"
    relatedIds:
    - m365-070
    - m365-073
  tags:
  - power-platform
  - governance
- id: m365-073
  platform: m365-power
  category: services
  severity: high
  title: Ensure 'Publish to web' is restricted.
  description: Check Power BI Admin Portal → Tenant settings → Export and sharing.
  reference: CIS.9.1.4 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → Export and sharing'
  premium:
    attackPerspective: The 'Publish to web' feature creates a publicly accessible embed code for any Power BI report — no authentication required. A single click by an unaware user can expose dashboards
      containing revenue numbers, customer PII, or security metrics to the entire internet. Attackers actively scan for exposed Power BI embed URLs using search engine dorks.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Export and sharing settings

      # ''Publish to web'' → Disabled (or restrict to specific security groups)


      # Check existing publish-to-web embed codes:

      Connect-PowerBIServiceAccount

      # Via REST API (no direct PowerShell cmdlet):

      $headers = Get-PowerBIAccessToken

      $uri = ''https://api.powerbi.com/v1.0/myorg/admin/widelySharedArtifacts/publishedToWeb''

      $response = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get

      $response.value | Select reportId, reportName, artifactId | Format-Table


      # Revoke all existing publish-to-web codes via Admin Portal:

      # Admin Portal → Embed codes → Delete each code'
    validationNotes: '# Verify ''Publish to web'' is disabled

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -eq ''PublishToWeb'' }


      # Scan for existing publicly embedded reports:

      $token = Get-PowerBIAccessToken

      $uri = ''https://api.powerbi.com/v1.0/myorg/admin/widelySharedArtifacts/publishedToWeb''

      $result = Invoke-RestMethod -Uri $uri -Headers $token

      Write-Host "Found $($result.value.Count) public embed codes"

      $result.value | Format-Table'
    tuningNotes: If specific teams (e.g., marketing) need public dashboards, create a dedicated workspace with only non-sensitive, pre-approved reports and enable publish-to-web only for that workspace's
      security group. Monitor embed code creation with alerts. Consider Power BI Embedded with anonymous access as a more controlled alternative.
    advancedDetection: '// KQL: Detect publish-to-web actions

      PowerBIActivity

      | where TimeGenerated > ago(30d)

      | where Activity in (''PublishToWebReport'', ''CreatePublicEmbedCode'')

      | project TimeGenerated, UserId, Activity, ReportName, WorkspaceName

      | sort by TimeGenerated desc'
    relatedIds:
    - m365-074
    - m365-076
  tags:
  - power-platform
  - governance
- id: m365-074
  platform: m365-power
  category: services
  severity: high
  title: Ensure 'Interact with and share R and Python' visuals is 'Disabled'.
  description: Check Power BI Admin Portal → Tenant settings → R and Python visuals.
  reference: CIS.9.1.5 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → R and Python visuals'
  premium:
    attackPerspective: R and Python visuals in Power BI execute arbitrary code on the viewer's machine or the Power BI service. An attacker who can modify a shared report can embed malicious R/Python code
      that exfiltrates data, performs SSRF against internal networks, or establishes reverse shells — all disguised as a harmless data visualization.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → R and Python visuals settings

      # ''Interact with and share R and Python visuals'' → Disabled


      # This blocks:

      # 1. R visuals that execute R scripts

      # 2. Python visuals that execute Python scripts

      # 3. Sharing of reports containing these visuals


      # For organizations that need R/Python analytics:

      # Enable only for a ''DataScience-PowerBI'' security group

      # Ensure these users have dedicated, sandboxed workspaces

      # Monitor execution logs for unusual patterns'
    validationNotes: "# Verify R/Python visuals are disabled\nGet-PowerBITenantSetting | Where-Object { $_.SettingName -like '*Python*' -or $_.SettingName -like '*RVisual*' }\n\n# Search for reports using\
      \ R/Python visuals:\n# Use Power BI REST API to scan report definitions\n$workspaces = Get-PowerBIWorkspace -Scope Organization -All\nforeach ($ws in $workspaces) {\n    $reports = Get-PowerBIReport\
      \ -WorkspaceId $ws.Id\n    # Reports using custom visuals are flagged in metadata\n}"
    tuningNotes: If data science teams require R/Python visuals, isolate them in dedicated Premium workspaces with enhanced logging. Use Power BI dataflows for heavy computation instead of in-visual code
      execution. Consider Azure Machine Learning integration as a safer alternative for complex analytics.
    advancedDetection: '// KQL: Monitor R/Python visual usage

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where Activity has_any (''RVisual'', ''PythonVisual'', ''CustomVisual'')

      | summarize Count=count() by UserId, Activity, ReportName

      | sort by Count desc'
