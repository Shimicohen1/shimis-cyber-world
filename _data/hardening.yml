    tuningNotes: This blocks the sync client on non-domain-joined machines. Users can still access files via browser with Conditional Access controls. For BYOD scenarios, use Intune App Protection policies
      to allow mobile access without sync.
    advancedDetection: '// KQL: Detect OneDrive sync from unregistered devices

      OfficeActivity

      | where RecordType == ''OneDrive''

