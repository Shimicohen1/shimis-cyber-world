  severity: high
  title: Configure session length for Cloud Console
  description: Set maximum session duration for Cloud Console to avoid persistent sessions.
  reference: CIS GCP Foundations Benchmark 1.14
  command: '# Admin Console → Security → Google Cloud session control

    # Set: Session duration = 8 hours or less

    '
  premium:
    attackPerspective: Long-lived Cloud Console sessions allow an attacker who steals a browser cookie or session token to maintain access for hours or days. Without session limits, a compromised session
      from a shared computer, stolen cookie, or XSS attack remains valid indefinitely. Shorter session lengths force re-authentication, limiting the window for session hijacking attacks.
    implementationNotes: "# Google Workspace Admin Console → Security → Google Cloud session control\n# Set session length to 1-4 hours for regular users\n# Set to 1 hour for admin accounts\n\n# Via Google\
      \ Cloud CLI context (for individual sessions):\ngcloud config set auth/token_host https://oauth2.googleapis.com\n# Token lifetime is controlled by the org policy\n\n# For programmatic access, use\
      \ short-lived credentials:\ngcloud auth application-default login --lifetime=3600\n\n# Access Context Manager for additional session controls:\n# Create an access level with session requirements\n\
      gcloud access-context-manager levels create strict-session \\\n  --title='Strict Session' \\\n  --basic-level-spec=spec.yaml\n\n# spec.yaml:\n# conditions:\n#   - devicePolicy:\n#       requireScreenlock:\
      \ true\n#     regions:\n#       - US\n#       - IL"
    validationNotes: '# Verify session length setting

      # Google Workspace Admin Console → Security → Google Cloud session control

      # Expected: 1-4 hours


      # Check via API (Admin SDK):

      # GET https://admin.googleapis.com/admin/directory/v1/customer/my_customer/domains

      # Look for sessionDuration field


      # Test: Log into Cloud Console, wait past session duration

      # Should be prompted to re-authenticate'
    tuningNotes: Balance security with productivity. A 1-hour session for developers running long deployments will cause frustration. Set 4 hours for regular users, 1 hour for admins. For CI/CD service
      accounts, use short-lived tokens (1 hour) via Workload Identity Federation rather than long-lived keys. Consider location-based session policies — shorter sessions from untrusted networks.
    advancedDetection: "-- Monitor long sessions and unusual re-authentication patterns\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.requestMetadata.callerIp,\n\
      \  protopayload_auditlog.requestMetadata.callerSuppliedUserAgent\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.authenticationInfo.principalEmail IS NOT\
      \ NULL\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)\nORDER BY protopayload_auditlog.authenticationInfo.principalEmail, timestamp"
    relatedIds:
