- id: m365-082
  platform: m365-power
  category: encryption
  severity: critical
  title: Data Loss Prevention (DLP) policies must be configured for Power Platform environments.
  description: 'PP DLP API requires Power Platform admin role. Org-wide DLP policies exist: False. Verify in Power Platform Admin Center → Data policies.'
  reference: MS.POWERPLATFORM.1.1v1 — CIS M365 / Microsoft Secure Score — Power Platform
  command: '# Power Platform Admin Center → Data policies'
  premium:
    attackPerspective: Without DLP policies on Power Platform, users can build Power Apps and Power Automate flows that bridge security boundaries — sending SharePoint data to personal Gmail, copying Dataverse
      records to USB-connected Excel, or routing Teams messages to external webhooks. Power Platform becomes the ultimate data exfiltration tool because users can build these pipelines without writing code.
    implementationNotes: '# Power Platform Admin Center → Data policies → New policy

      # https://admin.powerplatform.microsoft.com/dlp


      # Step 1: Create a DLP policy for the default environment

      # Name: ''Default Environment DLP - Restrict Connectors''


      # Step 2: Classify connectors into groups:

      # Business group (allowed together): Office 365, SharePoint, Dataverse, Teams

      # Non-business group: Twitter, Gmail, Dropbox, HTTP connector, Custom connectors

      # Blocked group: Any high-risk connectors


      # Step 3: Apply to all environments or specific ones


      # PowerShell (Power Apps Admin module):

      Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Force

      Add-PowerAppsAccount


      # Create DLP policy:

      New-DlpPolicy -DisplayName ''Production DLP'' -EnvironmentType ''AllEnvironments'' -DefaultConnectorClassification ''Blocked''


      # Add business connectors:

      Add-ConnectorToBusinessGroup -PolicyName ''Production DLP'' -ConnectorId ''/providers/Microsoft.PowerApps/apis/shared_sharepointonline'''
    validationNotes: "# List all DLP policies\nGet-DlpPolicy | Select DisplayName, CreatedTime, EnvironmentType | Format-Table\n\n# Verify connector classifications:\n$policies = Get-DlpPolicy\nforeach\
      \ ($p in $policies) {\n    Write-Host \"Policy: $($p.DisplayName)\"\n    $p.ConnectorGroups | ForEach-Object {\n        Write-Host \"  Group: $($_.Classification) - Connectors: $($_.Connectors.Count)\"\
      \n    }\n}\n\n# Check for environments without DLP coverage:\n$envs = Get-AdminPowerAppEnvironment\n$policies = Get-DlpPolicy\n# Cross-reference to find gaps"
    tuningNotes: Start with a restrictive policy for the default environment (which all users can access) and gradually relax policies for dedicated team environments. The HTTP connector and custom connectors
      are the most dangerous — they allow arbitrary external communication. Block them by default and allow only in developer environments with approval.
    advancedDetection: '// KQL: Monitor DLP policy violations in Power Platform

      PowerPlatformDlpActivity_CL

      | where TimeGenerated > ago(7d)

      | where Result_s == ''Blocked''

      | summarize Violations=count() by UserId_s, ConnectorName_s, EnvironmentName_s

      | sort by Violations desc


      // Track flows using blocked/risky connectors

      PowerPlatformConnectorActivity_CL

      | where TimeGenerated > ago(7d)

      | where ConnectorClassification_s == ''Blocked''

      | project TimeGenerated, UserId_s, FlowName_s, ConnectorName_s'
    relatedIds:
    - m365-083
    - m365-075
  tags:
  - power-platform
