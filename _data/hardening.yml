- id: m365-068
  platform: m365-power
  category: services
  severity: high
  title: External sharing of Power BI reports and dashboards should be restricted.
  description: Verify in Power BI Admin Portal → Tenant Settings → Export and sharing.
  reference: MS.POWERBI.1.1v1 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Power BI Admin Portal → Tenant Settings → Export and sharing'
  tags:
  - power-bi
  - data-exfiltration
  - external-sharing
  - governance
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Power BI reports often contain aggregated sensitive data from multiple sources — financial reports, HR analytics, customer databases. Unrestricted external sharing means any user
      can share a dashboard link with anyone outside the organization, bypassing DLP controls. Attackers who compromise a Power BI user can exfiltrate entire data models, not just individual records.
    implementationNotes: '# Power BI Admin PowerShell

      Connect-PowerBIServiceAccount


      # Check current tenant settings

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -like ''*external*'' -or $_.SettingName -like ''*share*'' } | Select SettingName, Enabled | Format-Table


      # Via Power BI Admin Portal:

      # 1. Go to Admin Portal > Tenant Settings

      # 2. Under ''Export and sharing settings'':

      #    - ''Allow Azure Active Directory guest users to access Power BI'' = Specific security groups only

      #    - ''Invite external users to your organization'' = Disabled or specific groups

      #    - ''Allow users to send Power BI content to external users'' = Disabled

      #    - ''Publish to web'' = Disabled (this creates ANONYMOUS public links)


      # Block ''Publish to web'' (most critical)

      # This setting creates completely public, unauthenticated links to reports

      Set-PowerBITenantSetting -SettingName ''PublishToWeb'' -Enabled $false'
    validationNotes: '# Check for existing ''Publish to web'' embed codes (anonymous access!)

      Get-PowerBIPublishToWebLink | Select ReportName, CreatedBy, Status | Format-Table

