- id: m365-086
  platform: m365-purview
  category: encryption
  severity: critical
  title: Retention policies must be configured for critical workloads.
  description: 'Retention policies found: 0. No retention policies configured. Create policies in Microsoft Purview → Data Lifecycle Management.'
  reference: MS.PURVIEW.3.1v1 — CIS M365 / Microsoft Secure Score — Purview
  command: '# Purview → Data Lifecycle Management'
  tags:
  - purview
  - retention-policy
  - data-governance
  - ediscovery
  - compliance
  commandLanguage: powershell
  premium:
    attackPerspective: Without retention policies, deleted evidence during a breach investigation is gone permanently. Attackers who gain access often delete emails, Teams messages, and files to cover their
      tracks. Retention policies ensure that even 'deleted' content is preserved for forensics and legal hold.
    implementationNotes: "# Connect to Security & Compliance Center\nConnect-IPPSSession\n\n# Create baseline retention policy for Exchange\nNew-RetentionCompliancePolicy -Name 'SCW-Exchange-Retention-1Y'\
      \ \\\n  -ExchangeLocation All \\\n  -Enabled $true\n\nNew-RetentionComplianceRule -Policy 'SCW-Exchange-Retention-1Y' \\\n  -RetentionDuration 365 \\\n  -RetentionComplianceAction Keep \\\n  -ExpirationDateOption\
      \ ModificationAgeInDays\n\n# Create retention for SharePoint/OneDrive\nNew-RetentionCompliancePolicy -Name 'SCW-SPO-Retention-1Y' \\\n  -SharePointLocation All \\\n  -OneDriveLocation All \\\n  -Enabled\
      \ $true\n\nNew-RetentionComplianceRule -Policy 'SCW-SPO-Retention-1Y' \\\n  -RetentionDuration 365 \\\n  -RetentionComplianceAction Keep\n\n# Create litigation hold for executives\n$execs = @('ceo@domain.com','cfo@domain.com','ciso@domain.com')\n\
      $execs | ForEach-Object { Set-Mailbox -Identity $_ -LitigationHoldEnabled $true -LitigationHoldDuration 730 }"
    validationNotes: '# Verify retention policies

      Get-RetentionCompliancePolicy | Select Name, Enabled, Type, Workload | Format-Table

      Get-RetentionComplianceRule | Select Name, RetentionDuration, RetentionComplianceAction | Format-Table


      # Verify litigation hold

      Get-Mailbox -Identity ceo@domain.com | Select LitigationHoldEnabled, LitigationHoldDuration'
    tuningNotes: 'Start with a 1-year keep-everything policy for all workloads as a baseline. Layer specific retention labels for regulated content (PCI: 1 year, HIPAA: 6 years, SOX: 7 years). Retention
      policies can conflict — the longest retention and ''keep'' always wins over ''delete''. Test with a pilot group first.'
    advancedDetection: '// KQL: Detect bulk deletion that retention preserved

      OfficeActivity

      | where TimeGenerated > ago(7d)

      | where Operation in (''SoftDelete'', ''HardDelete'', ''MoveToDeletedItems'')

      | summarize DeleteCount = count() by UserId, bin(TimeGenerated, 1h)

      | where DeleteCount > 50

      | project TimeGenerated, UserId, DeleteCount'
