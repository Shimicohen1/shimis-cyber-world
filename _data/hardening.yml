- id: gcp-027
  platform: gcp
  category: encryption
  severity: high
  title: Enable CMEK for BigQuery datasets
  description: Use Customer-Managed Encryption Keys for sensitive BigQuery datasets.
  reference: CIS GCP Foundations Benchmark 7.2
  command: '# Check encryption on datasets

    bq show --format=prettyjson <project>:<dataset> | jq ''.defaultEncryptionConfiguration''

    '
  premium:
    attackPerspective: BigQuery datasets contain some of the most valuable data in any organization — customer records, financial data, analytics. Default Google-managed encryption protects against physical
      theft of hard drives but not against compromised accounts or insider threats. CMEK gives you the ability to revoke access by disabling the key, perform crypto-shredding by destroying the key, and
      audit every decrypt operation through Cloud KMS audit logs.
    implementationNotes: "# Create a KMS key for BigQuery:\ngcloud kms keys create bq-key \\\n  --keyring=data-keyring \\\n  --location=US \\\n  --purpose=encryption \\\n  --rotation-period=90d\n\n# Grant\
      \ BigQuery SA access to the key:\ngcloud kms keys add-iam-policy-binding bq-key \\\n  --keyring=data-keyring --location=US \\\n  --member='serviceAccount:bq-PROJECT_NUM@bigquery-encryption.iam.gserviceaccount.com'\
      \ \\\n  --role='roles/cloudkms.cryptoKeyEncrypterDecrypter'\n\n# Set CMEK on a dataset:\nbq update --default_kms_key=projects/PROJECT/locations/US/keyRings/data-keyring/cryptoKeys/bq-key PROJECT:dataset_name\n\
      \n# For new datasets:\nbq mk --default_kms_key=projects/PROJECT/locations/US/keyRings/data-keyring/cryptoKeys/bq-key PROJECT:new_dataset\n\n# Tables inherit dataset CMEK or can specify their own"
    validationNotes: '# Verify CMEK on datasets:

      bq ls --format=json | jq ''.[] | {datasetId: .datasetReference.datasetId, cmek: .defaultEncryptionConfiguration}''


      # Verify CMEK on specific tables:

      bq show --format=json PROJECT:dataset.table | jq ''.encryptionConfiguration''


      # Monitor key usage:

      gcloud logging read ''protoPayload.serviceName="cloudkms.googleapis.com" AND protoPayload.methodName:"Decrypt"'' --limit=10'
    tuningNotes: CMEK keys must be in the same region as the BigQuery dataset (or multi-region for multi-region datasets). Plan key hierarchy carefully — one key per sensitivity level, not per dataset.
      Rotation creates new key versions automatically; old versions remain for decryption. Never destroy key versions without confirming all data encrypted with them is no longer needed.
    advancedDetection: "-- Monitor BigQuery decryption operations (data access patterns)\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName\
      \ AS key_used,\n  protopayload_auditlog.requestMetadata.callerIp\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.serviceName = 'cloudkms.googleapis.com'\n\
      AND protopayload_auditlog.methodName = 'Decrypt'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-005
    - gcp-030
  tags:
  - gcp
  - encryption
- id: gcp-028
  platform: gcp
  category: encryption
  severity: critical
  title: Enforce uniform bucket-level access for GCS
  description: Disable ACLs and use IAM-only access control for Cloud Storage buckets.
  reference: CIS GCP Foundations Benchmark 5.2
  command: "# Find buckets not using uniform access\ngsutil ls -p <project> | while read bucket; do\n  gsutil uniformbucketlevelaccess get $bucket\ndone\n"
  premium:
    attackPerspective: Legacy ACL-based access on GCS buckets creates a parallel authorization system alongside IAM, making it nearly impossible to audit who has access. An attacker can use ACLs to grant
      allUsers or allAuthenticatedUsers read access — making the bucket public without touching IAM policies. Security scanners that only check IAM will miss these ACL-based exposures. Uniform bucket-level
      access forces all authorization through IAM, eliminating this blind spot.
    implementationNotes: "# Enable uniform bucket-level access:\ngsutil uniformbucketlevelaccess set on gs://BUCKET_NAME\n\n# For all buckets in a project:\nfor bucket in $(gsutil ls -p PROJECT_ID); do\n\
      \  gsutil uniformbucketlevelaccess set on $bucket 2>/dev/null\n  echo \"Enabled: $bucket\"\ndone\n\n# Organization Policy to enforce for new buckets:\ngcloud resource-manager org-policies set-policy\
      \ \\\n  --organization=ORG_ID uniform-access.yaml\n\n# uniform-access.yaml:\n# constraint: constraints/storage.uniformBucketLevelAccess\n# booleanPolicy:\n#   enforced: true\n\n# Note: Enabling is\
      \ irreversible after 90 days\n# During the 90-day window, you can revert if needed"
    validationNotes: "# Check all buckets for uniform access\nfor bucket in $(gsutil ls); do\n  status=$(gsutil uniformbucketlevelaccess get $bucket 2>/dev/null | grep Enabled)\n  echo \"$bucket: $status\"\
      \ndone\n\n# Verify org policy\ngcloud resource-manager org-policies describe \\\n  constraints/storage.uniformBucketLevelAccess \\\n  --organization=ORG_ID\n\n# Find public buckets (pre-migration\
      \ audit):\nfor bucket in $(gsutil ls); do\n  gsutil iam get $bucket 2>/dev/null | grep -q 'allUsers\\|allAuthenticatedUsers' && echo \"PUBLIC: $bucket\"\ndone"
    tuningNotes: Before enabling uniform access, audit existing ACLs. Some legacy apps may depend on object-level ACLs for per-file access control. These need to be migrated to IAM conditions or signed
      URLs. The 90-day grace period allows reverting, but plan for migration to be permanent.
    advancedDetection: "-- Alert on buckets without uniform access\nSELECT\n  timestamp,\n  protopayload_auditlog.resourceName AS bucket,\n  protopayload_auditlog.authenticationInfo.principalEmail\nFROM\
      \ `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'storage.buckets.create'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\n-- Cross-reference\
      \ with bucket metadata to check uniform access"
    relatedIds:
    - gcp-005
    - gcp-019
  tags:
  - gcp
  - encryption
- id: gcp-029
  platform: gcp
  category: encryption
  severity: high
  title: Enable confidential computing for sensitive VMs
  description: Use Confidential VMs with AMD SEV for encryption-in-use of memory.
  reference: Google Cloud Security Best Practices
  command: "# Create confidential VM\ngcloud compute instances create confidential-vm \\\n  --machine-type=n2d-standard-2 \\\n  --confidential-compute --maintenance-policy=TERMINATE\n"
  premium:
    attackPerspective: Standard VMs decrypt memory contents when the hypervisor reads memory — meaning a compromised hypervisor or memory forensics attack can read all data in VM memory, including encryption
      keys, credentials, and sensitive data being processed. Confidential Computing encrypts VM memory with a per-VM key that even Google's infrastructure cannot access. This protects against physical attacks,
      rogue insiders at the cloud provider, and hypervisor-level exploits.
    implementationNotes: "# Create a Confidential VM:\ngcloud compute instances create confidential-vm \\\n  --machine-type=n2d-standard-4 \\\n  --zone=us-central1-a \\\n  --confidential-compute \\\n  --maintenance-policy=TERMINATE\
      \ \\\n  --image-family=ubuntu-2204-lts \\\n  --image-project=ubuntu-os-cloud\n\n# Note: Confidential VMs require:\n# - N2D or C2D machine types (AMD EPYC with SEV)\n# - Maintenance policy must be\
      \ TERMINATE (no live migration)\n# - Slightly higher cost (~5-10% premium)\n\n# For GKE with Confidential Nodes:\ngcloud container node-pools create confidential-pool \\\n  --cluster=CLUSTER_NAME\
      \ \\\n  --machine-type=n2d-standard-4 \\\n  --enable-confidential-nodes \\\n  --zone=us-central1-a"
    validationNotes: "# Verify Confidential Computing is enabled:\ngcloud compute instances describe VM_NAME --zone=ZONE \\\n  --format='value(confidentialInstanceConfig.enableConfidentialCompute)'\n# Should\
      \ return: True\n\n# Check AMD SEV attestation (from within the VM):\n# dmesg | grep -i sev\n# Should show: AMD SEV enabled\n\n# List all Confidential VMs:\ngcloud compute instances list \\\n  --filter='confidentialInstanceConfig.enableConfidentialCompute=true'\
      \ \\\n  --format='table(name,zone,machineType)'"
    tuningNotes: Confidential Computing is not needed for all workloads. Prioritize it for VMs processing PII, financial data, healthcare records, or cryptographic material. The ~5-10% performance overhead
      and TERMINATE maintenance policy (brief downtime during host maintenance) are acceptable trade-offs for sensitive data. N2D machines have good price/performance ratios.
    advancedDetection: "-- Audit Confidential VM creation/modification\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName,\n  JSON_EXTRACT_SCALAR(protopayload_auditlog.request,\
      \ '$.confidentialInstanceConfig.enableConfidentialCompute') as confidential\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'v1.compute.instances.insert'\n\
      AND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)"
    relatedIds:
    - gcp-005
    - gcp-035
  tags:
  - gcp
  - encryption
- id: gcp-030
  platform: gcp
  category: encryption
  severity: high
  title: Rotate KMS keys on schedule
  description: Configure automatic rotation for Cloud KMS encryption keys.
  reference: CIS GCP Foundations Benchmark 1.10
  command: "# Set rotation schedule (90 days)\ngcloud kms keys update <key> --keyring=<keyring> --location=global \\\n  --rotation-period=90d --next-rotation-time=$(date -u +%Y-%m-%dT%H:%M:%SZ -d '+1 day')\n"
  premium:
    attackPerspective: Encryption keys that never rotate accumulate risk over time. The longer a key exists, the more data it protects and the more opportunities for compromise. If a key is eventually compromised,
      all data ever encrypted with it is exposed. Regular rotation limits the exposure window — compromised key versions only decrypt data from their active period, not all historical data.
    implementationNotes: "# Set automatic rotation on an existing key:\ngcloud kms keys update KEY_NAME \\\n  --keyring=KEYRING \\\n  --location=LOCATION \\\n  --rotation-period=90d \\\n  --next-rotation-time=$(date\
      \ -u -d '+90 days' +%Y-%m-%dT%H:%M:%SZ)\n\n# Create a new key with rotation:\ngcloud kms keys create new-key \\\n  --keyring=KEYRING \\\n  --location=LOCATION \\\n  --purpose=encryption \\\n  --rotation-period=90d\n\
      \n# List keys and their rotation status:\ngcloud kms keys list --keyring=KEYRING --location=LOCATION \\\n  --format='table(name,rotationPeriod,nextRotationTime)'\n\n# Manually rotate a key (for emergency\
      \ rotation):\ngcloud kms keys versions create --key=KEY_NAME \\\n  --keyring=KEYRING --location=LOCATION"
    validationNotes: "# Find keys without rotation set:\nfor keyring in $(gcloud kms keyrings list --location=global --format='value(name)'); do\n  gcloud kms keys list --keyring=$keyring --location=global\
      \ \\\n    --format='table(name,rotationPeriod)' \\\n    --filter='rotationPeriod=\"\"'\ndone\n\n# Verify key versions (old versions should exist from rotations):\ngcloud kms keys versions list --key=KEY_NAME\
      \ \\\n  --keyring=KEYRING --location=LOCATION \\\n  --format='table(name,state,createTime)'"
    tuningNotes: 90-day rotation is a good baseline for most keys. For high-sensitivity keys (PII encryption, financial data), consider 30-day rotation. Old key versions remain in ENABLED state for decryption
      — do not disable or destroy old versions unless migrating data to new keys. Cloud KMS handles re-wrapping automatically for GCP services using the key.
    advancedDetection: "-- Monitor key rotation events\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName,\n  protopayload_auditlog.methodName\n\
      FROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName IN ('CreateCryptoKeyVersion', 'UpdateCryptoKeyPrimaryVersion')\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(),\
      \ INTERVAL 90 DAY)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-005
    - gcp-027
  tags:
  - gcp
  - encryption
- id: gcp-031
  platform: gcp
  category: encryption
  severity: high
  title: Enable Certificate Authority Service for internal TLS
  description: Use Google CA Service for automated certificate management within your org.
  reference: Google Cloud Security Best Practices
  command: '# List CAs

    gcloud privateca roots list --location=<location>

    # Create subordinate CA for service mesh

    gcloud privateca subordinates create scw-sub-ca --location=<location> --issuer-pool=<pool>

    '
  premium:
    attackPerspective: Without a managed CA service, teams use self-signed certificates or manually managed CAs for internal TLS. Self-signed certs are trivially spoofable by MITM attacks, and manually
      managed CAs suffer from key compromise, missed renewals, and no revocation capability. Certificate Authority Service provides audited, policy-enforced certificate issuance with automatic rotation
      and CRL/OCSP revocation.
    implementationNotes: "# Create a Certificate Authority:\ngcloud privateca roots create my-root-ca \\\n  --pool=my-ca-pool \\\n  --location=us-central1 \\\n  --subject='CN=My Organization Root CA,O=My\
      \ Org,C=US' \\\n  --key-algorithm=ec-p256-sha256 \\\n  --max-chain-length=1\n\n# Create a subordinate CA for issuing:\ngcloud privateca subordinates create issuing-ca \\\n  --pool=my-ca-pool \\\n\
      \  --location=us-central1 \\\n  --issuer-pool=my-ca-pool \\\n  --issuer-ca=my-root-ca \\\n  --subject='CN=My Org Issuing CA,O=My Org,C=US' \\\n  --key-algorithm=ec-p256-sha256\n\n# Issue a certificate:\n\
      gcloud privateca certificates create \\\n  --issuer-pool=my-ca-pool \\\n  --issuer-location=us-central1 \\\n  --subject='CN=api.internal.company.com' \\\n  --dns-san='api.internal.company.com' \\\n\
      \  --validity=P365D \\\n  --cert-output-file=cert.pem \\\n  --key-output-file=key.pem"
    validationNotes: "# List CAs and their status:\ngcloud privateca pools list --location=us-central1 \\\n  --format='table(name,tier,issuancePolicy)'\n\ngcloud privateca roots list --pool=my-ca-pool --location=us-central1\
      \ \\\n  --format='table(name,state,expireTime)'\n\n# Verify certificate issuance policy:\ngcloud privateca pools describe my-ca-pool --location=us-central1"
    tuningNotes: 'Use a two-tier CA hierarchy: offline root CA + online issuing CA. The root CA should be disabled after initial subordinate CA creation and only enabled for CA rotation. Set certificate
      policies to enforce minimum key sizes, allowed SANs, and maximum validity periods. Integrate with GKE via cert-manager for automatic certificate lifecycle management.'
    advancedDetection: "-- Monitor certificate issuance patterns\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName,\n  protopayload_auditlog.methodName\n\
      FROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.serviceName = 'privateca.googleapis.com'\nAND protopayload_auditlog.methodName LIKE '%CreateCertificate%'\nAND\
      \ timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-005
    - gcp-029
  tags:
  - gcp
  - encryption
- id: gcp-032
  platform: gcp
  category: services
  severity: critical
  title: Enable Binary Authorization for GKE
  description: Only allow deployment of signed, verified container images to GKE clusters.
  reference: Google Cloud Security Best Practices
  command: '# Check Binary Authorization policy

    gcloud container binauthz policy export

    # Enable on cluster

    gcloud container clusters update <cluster> --enable-binauthz

    '
  premium:
    attackPerspective: Binary Authorization ensures only trusted, signed container images run in GKE. Without it, an attacker who compromises your CI/CD pipeline or container registry can push malicious
      images that get deployed to production. Even with image scanning, a compromised build pipeline can inject backdoors that pass vulnerability scans. Binary Authorization provides cryptographic attestation
      that the image was built by your pipeline and passed your security gates.
    implementationNotes: "# Enable Binary Authorization on a GKE cluster:\ngcloud container clusters update CLUSTER_NAME \\\n  --zone=ZONE \\\n  --enable-binauthz\n\n# Create a Binary Authorization policy:\n\
      gcloud container binauthz policy export > policy.yaml\n\n# Edit policy.yaml:\n# defaultAdmissionRule:\n#   enforcementMode: ENFORCED_BLOCK_AND_AUDIT_LOG\n#   evaluationMode: REQUIRE_ATTESTATION\n\
      #   requireAttestationsBy:\n#     - projects/PROJECT/attestors/build-attestor\n\n# Import the policy:\ngcloud container binauthz policy import policy.yaml\n\n# Create an attestor:\ngcloud container\
      \ binauthz attestors create build-attestor \\\n  --attestation-authority-note=build-note \\\n  --attestation-authority-note-project=PROJECT\n\n# Create attestation (in CI/CD pipeline after successful\
      \ build+scan):\ngcloud container binauthz attestations sign-and-create \\\n  --artifact-url=gcr.io/PROJECT/image@sha256:DIGEST \\\n  --attestor=build-attestor \\\n  --keyversion=projects/PROJECT/locations/global/keyRings/KEYRING/cryptoKeys/KEY/cryptoKeyVersions/1"
    validationNotes: "# Verify Binary Authorization is enabled:\ngcloud container clusters describe CLUSTER_NAME --zone=ZONE \\\n  --format='value(binaryAuthorization.enabled)'\n\n# Check policy:\ngcloud\
      \ container binauthz policy export\n\n# Test: Try deploying an unsigned image (should fail):\nkubectl run test --image=nginx:latest  # Should be blocked\n\n# Check attestation audit logs:\ngcloud\
      \ logging read 'resource.type=\"k8s_cluster\" AND protoPayload.methodName:\"deployments.create\"' --limit=10"
    tuningNotes: Start in DRYRUN_AUDIT_LOG_ONLY mode to observe which deployments would be blocked. Exempt specific namespaces (kube-system, istio-system) from enforcement since system components need to
      deploy without custom attestations. Integrate attestation creation into your CI/CD pipeline as the final step after build, test, and vulnerability scan pass.
    advancedDetection: "-- Monitor Binary Authorization violations\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  resource.labels.cluster_name,\n  jsonPayload.reason,\n\
      \  jsonPayload.pod\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE resource.type = 'k8s_cluster'\nAND jsonPayload.reason = 'BinaryAuthorizationDenied'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(),\
      \ INTERVAL 7 DAY)"
    relatedIds:
    - gcp-033
    - gcp-035
    - gcp-036
  tags:
  - gcp
  - services
- id: gcp-033
  platform: gcp
  category: services
  severity: high
  title: Enable GKE Workload Identity
  description: Map Kubernetes service accounts to GCP service accounts for secure API access.
  reference: CIS GKE Benchmark 6.2
  command: '# Check if Workload Identity is enabled

    gcloud container clusters describe <cluster> --format=''value(workloadIdentityConfig)''

    # Enable

    gcloud container clusters update <cluster> --workload-pool=<project>.svc.id.goog

    '
  premium:
    attackPerspective: Without Workload Identity, GKE pods authenticate to Google APIs using node-level service accounts — every pod on a node shares the same SA credentials. An attacker who compromises
      any pod on the node can access the GCP credentials of all other workloads on that node via the metadata server (169.254.169.254). Workload Identity provides per-pod identity, mapping Kubernetes service
      accounts to GCP service accounts with granular permissions.
    implementationNotes: "# Enable Workload Identity on cluster:\ngcloud container clusters update CLUSTER_NAME \\\n  --zone=ZONE \\\n  --workload-pool=PROJECT_ID.svc.id.goog\n\n# Enable on existing node\
      \ pool:\ngcloud container node-pools update NODE_POOL \\\n  --cluster=CLUSTER_NAME --zone=ZONE \\\n  --workload-metadata=GKE_METADATA\n\n# Create a GCP SA for the workload:\ngcloud iam service-accounts\
      \ create my-app-sa \\\n  --display-name='My App SA'\n\n# Create a Kubernetes service account:\nkubectl create serviceaccount my-app-ksa --namespace=my-namespace\n\n# Bind Kubernetes SA to GCP SA:\n\
      gcloud iam service-accounts add-iam-policy-binding \\\n  my-app-sa@PROJECT.iam.gserviceaccount.com \\\n  --role=roles/iam.workloadIdentityUser \\\n  --member='serviceAccount:PROJECT.svc.id.goog[my-namespace/my-app-ksa]'\n\
      \n# Annotate the Kubernetes SA:\nkubectl annotate serviceaccount my-app-ksa \\\n  --namespace=my-namespace \\\n  iam.gke.io/gcp-service-account=my-app-sa@PROJECT.iam.gserviceaccount.com"
    validationNotes: "# Verify Workload Identity is enabled:\ngcloud container clusters describe CLUSTER_NAME --zone=ZONE \\\n  --format='value(workloadIdentityConfig.workloadPool)'\n\n# Check node pool\
      \ metadata server:\ngcloud container node-pools describe NODE_POOL \\\n  --cluster=CLUSTER_NAME --zone=ZONE \\\n  --format='value(config.workloadMetadataConfig.mode)'\n# Should be: GKE_METADATA\n\n\
      # Test from within a pod:\nkubectl run test --image=google/cloud-sdk:slim --serviceaccount=my-app-ksa -it --rm -- gcloud auth list\n# Should show the GCP SA email"
    tuningNotes: Migrate workloads one at a time, starting with the least critical. After enabling Workload Identity, pods without an annotated Kubernetes SA lose access to the node's SA — which is the
      desired behavior. Map each application to its own GCP SA with minimal permissions. Monitor for pods failing after migration (indicates they were relying on node SA access).
    advancedDetection: "-- Detect pods accessing metadata server directly (bypassing Workload Identity)\n-- From VPC Flow Logs:\nSELECT\n  jsonPayload.connection.src_ip AS pod_ip,\n  jsonPayload.connection.dest_ip,\n\
      \  resource.labels.subnetwork_name\nFROM `project.flow_logs.compute_googleapis_com_vpc_flows`\nWHERE jsonPayload.connection.dest_ip = '169.254.169.254'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(),\
      \ INTERVAL 24 HOUR)"
