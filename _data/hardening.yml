  title: Ensure outbound anti-spam message limits are in place.
  description: Verify rate limits in Defender → Outbound anti-spam policy.
  reference: CIS.2.1.15 — CIS M365 / Microsoft Secure Score — Defender
  command: '# Defender → Outbound anti-spam policy'
  premium:
    attackPerspective: 'Conditional Access is the backbone of Zero Trust in Entra ID. Without it, any valid credential grants full access from ANY device, ANY location. After the 2024 Midnight Blizzard
      attack on Microsoft, Conditional Access policies became the #1 recommended defense against token theft and credential replay.'
    implementationNotes: '1. Entra ID → Security → Conditional Access → Create new policy

      2. Policy 1 — Require MFA: All users → All cloud apps → Grant: Require MFA

      3. Policy 2 — Block legacy auth: All users → Conditions: Client apps (Legacy) → Block

      4. Policy 3 — Require compliant device: All users → All cloud apps → Grant: Require device compliance

      5. Use Report-only mode for 7 days before enforcing

      6. Exclude break-glass accounts from ALL policies'
    validationNotes: '# Check policies via Graph API

      Connect-MgGraph -Scopes ''Policy.Read.All''

      Get-MgIdentityConditionalAccessPolicy | Select DisplayName, State, Conditions, GrantControls


      # Check sign-in logs for policy hits

      # Entra ID → Sign-in logs → Conditional Access tab'
    tuningNotes: Always create 2 break-glass accounts (cloud-only, no MFA, excluded from CA policies) with complex 128-char passwords. Store credentials in a physical safe. Monitor these accounts with alerts
      for any sign-in activity.
    advancedDetection: '# Detect CA policy bypass attempts

      SigninLogs

      | where ConditionalAccessStatus == ''notApplied'' or ConditionalAccessStatus == ''failure''

      | where UserPrincipalName !in (''breakglass1@domain.com'', ''breakglass2@domain.com'')

      | summarize count() by UserPrincipalName, ConditionalAccessStatus, AppDisplayName

      | sort by count_ desc'
