    implementationNotes: '# Review and tighten messaging policies

      Connect-MicrosoftTeams

      Get-CsTeamsMessagingPolicy -Identity Global | Select AllowUrlPreviews, AllowOwnerDeleteMessage, AllowUserEditMessage, AllowGiphy, GiphyRatingType, AllowMemes, AllowStickers, ReadReceiptsEnabledType


      # Tighten for security

      Set-CsTeamsMessagingPolicy -Identity Global -AllowOwnerDeleteMessage $false -AllowGiphy $false -AllowMemes $false'
    validationNotes: 'Get-CsTeamsMessagingPolicy -Identity Global | Select AllowOwnerDeleteMessage, AllowGiphy

      # Expected: False, False (for regulated environments)'
    tuningNotes: In regulated industries (finance, healthcare), disable message deletion and editing to maintain audit trails. In creative/tech companies, this may be too restrictive — focus on disabling
      Giphy and memes for security-critical channels instead.
    advancedDetection: '// KQL: Detect Teams message deletions

      OfficeActivity

      | where RecordType == ''MicrosoftTeams''

      | where Operation == ''MessageDeleted''

