  platform: crowdstrike
  category: network
  severity: high
  title: Enable Falcon for Cloud workload protection
  description: Deploy the Falcon sensor to cloud workloads (EC2, Azure VMs, GKE nodes) and containers. Enable cloud-native IOAs for serverless and container runtime threats.
  reference: CrowdStrike Falcon Cloud Security
  command: '# Kubernetes DaemonSet deployment:
    # helm repo add crowdstrike https://crowdstrike.github.io/falcon-helm
    # helm install falcon-sensor crowdstrike/falcon-sensor \
    #   --set falcon.cid=<CID> \
