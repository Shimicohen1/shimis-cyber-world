  title: Enable Security Key enforcement for admins
  description: Require physical security keys (FIDO2) for all admin accounts.
  reference: CIS GCP Foundations Benchmark 1.2
  command: '# Admin Console → Security → Authentication → 2-Step Verification

    # Set: Security key only for Admin OU

    '
  premium:
    attackPerspective: Admin accounts are the crown jewels. Phishing attacks against GCP Organization Admins, Billing Admins, or Project Owners can bypass SMS-based 2FA via SIM swapping or real-time phishing
      proxies (EvilGinx). Physical security keys (FIDO2/U2F) are phishing-resistant — the browser verifies the origin before signing the challenge, making proxy attacks impossible. Without security key
      enforcement for admins, a single phished admin password compromises the entire GCP organization.
    implementationNotes: '# Google Workspace Admin → Security → Authentication → 2-Step Verification

      # 1. Enforce 2SV for the entire organization

      # 2. Under ''Allowed methods'': Select ''Security key only'' for admin OUs


      # Google Cloud Identity (if not using Workspace):

      # Admin Console → Security → 2-Step Verification → Enforcement


      # Create an admin OU with security key requirement:

      # Admin Console → Directory → OUs → Create ''GCP-Admins''

      # Move all admin accounts to this OU

      # Security → 2-Step Verification → Apply to ''GCP-Admins'' OU

      # Methods: Security key only (disable phone, SMS, TOTP)


      # For BeyondCorp/Context-Aware Access:

      # Google Cloud → Security → Access Context Manager

      # Create access level requiring security key

      # Apply to all admin-level API calls'
    validationNotes: "# List admins and their 2FA status (via Admin SDK)\n# Use Google Workspace Admin Console → Reports → User reports → Security\n\n# Via gcloud (limited):\ngcloud identity groups memberships\
      \ list --group-email=gcp-admins@company.com\n\n# Check org admin bindings:\ngcloud organizations get-iam-policy ORG_ID --format=json | \\\n  jq '.bindings[] | select(.role | contains(\"admin\") or\
      \ contains(\"owner\")) | .members[]'\n\n# Verify each admin has security key enrolled:\n# Admin Console → Directory → Users → Select user → Security → 2-SV"
    tuningNotes: Distribute at least 2 security keys per admin (primary + backup). Use Google's Titan Security Keys or YubiKeys with FIDO2 support. Store backup keys in a secure physical location (safe/lockbox).
      If an admin loses both keys, the recovery process should require in-person identity verification by another admin.
    advancedDetection: "-- Alert on admin sign-ins without security key\n-- (via Google Workspace audit logs exported to BigQuery)\nSELECT\n  timestamp,\n  actor.email,\n  event.name,\n  JSON_EXTRACT_SCALAR(event.parameters,\
      \ '$.login_type') as login_type\nFROM `project.dataset.login_audit`\nWHERE actor.email IN (SELECT email FROM admin_users_table)\nAND JSON_EXTRACT_SCALAR(event.parameters, '$.login_type') != 'security_key'\n\
      AND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)"
