- id: m365-025
  platform: m365-collab
  category: logging
  severity: critical
  title: Ensure 'AuditBypassEnabled' is not enabled on mailboxes.
  description: 'Verify via EXO PowerShell: Get-MailboxAuditBypassAssociation -ResultSize Unlimited. Should return no results.'
  reference: CIS.6.1.3 — CIS M365 / Microsoft Secure Score — Exchange Online
  command: 'Get-MailboxAuditBypassAssociation -ResultSize Unlimited

    # EXO PowerShell: Get-MailboxAuditBypassAssociation -ResultSize Unlimited'
  tags:
  - exchange-online
  - audit-bypass
  - forensics
  - tampering
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: AuditBypassEnabled removes all audit logging for a specific mailbox — it's the ultimate stealth mechanism. If an attacker can enable this on a compromised account, all subsequent
      email access, rule creation, and data exfiltration becomes completely invisible to SIEM and forensic tools.
    implementationNotes: '# Find ALL mailboxes with audit bypass enabled

      Get-EXOMailbox -ResultSize Unlimited -Filter ''AuditBypassEnabled -eq $true'' | Select UserPrincipalName, AuditBypassEnabled


      # Disable audit bypass on any found

      Get-EXOMailbox -ResultSize Unlimited -Filter ''AuditBypassEnabled -eq $true'' | Set-MailboxAuditBypassAssociation -AuditBypassEnabled $false


      # Also check service accounts

      Get-EXOMailbox -ResultSize Unlimited -RecipientTypeDetails SharedMailbox -Filter ''AuditBypassEnabled -eq $true'' | Select UserPrincipalName'
    validationNotes: '# Verify no mailboxes have bypass

      Get-EXOMailbox -ResultSize Unlimited -Filter ''AuditBypassEnabled -eq $true'' | Measure-Object

      # Expected: Count = 0


      # Schedule monthly check

      # Add to your compliance runbook'
    tuningNotes: Some organizations enable AuditBypass on service accounts that generate high log volume (e.g., migration accounts, automated systems). If you must use it, document the business justification,
      set an expiration date, and create a compensating control (monitoring the service account via another mechanism).
    advancedDetection: '// KQL: Alert on AuditBypass being enabled

      OfficeActivity

      | where TimeGenerated > ago(24h)

      | where Operation == ''Set-MailboxAuditBypassAssociation''

      | where Parameters has ''AuditBypassEnabled'' and Parameters has ''True''

      | project TimeGenerated, UserId, Parameters

      | extend AlertSeverity = ''Critical'''
