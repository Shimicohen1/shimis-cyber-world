- id: m365-347
  platform: m365-entra
  category: identity
  severity: critical
  title: Ensure Administrative accounts are cloud-only.
  description: 'Global admins: 3. Cloud-only: 3.'
  reference: CIS.1.1.1 — CIS M365 / Microsoft Secure Score — Entra ID
  tags:
  - entra-id
  - cloud-only-admin
  - identity
  - privilege-escalation
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Hybrid admin accounts (synced from on-prem AD) are high-value targets because compromising the on-prem domain gives attackers a path to Entra ID global admin. Cloud-only accounts
      eliminate this lateral movement path. Attackers routinely target AD Connect servers to harvest synced credentials.
    implementationNotes: "# Audit synced admin accounts\nConnect-MgGraph -Scopes 'User.Read.All','RoleManagement.Read.Directory'\n$admins = Get-MgDirectoryRoleMember -DirectoryRoleId (Get-MgDirectoryRole\
      \ -Filter \"displayName eq 'Global Administrator'\").Id\nforeach ($a in $admins) {\n  $user = Get-MgUser -UserId $a.Id -Property onPremisesSyncEnabled,userPrincipalName\n  if ($user.OnPremisesSyncEnabled)\
      \ {\n    Write-Warning \"SYNCED ADMIN: $($user.UserPrincipalName) — must migrate to cloud-only\"\n  }\n}\n\n# Create cloud-only replacement\n$params = @{\n  AccountEnabled = $true\n  DisplayName =\
      \ 'CloudAdmin-Emergency'\n  MailNickname = 'cloudadmin'\n  UserPrincipalName = 'cloudadmin@yourdomain.onmicrosoft.com'\n  PasswordProfile = @{ ForceChangePasswordNextSignIn = $true; Password = (New-Guid).ToString()\
      \ }\n}\nNew-MgUser @params"
    validationNotes: "# Verify no synced accounts hold admin roles\nGet-MgDirectoryRoleMember -DirectoryRoleId (Get-MgDirectoryRole -Filter \"displayName eq 'Global Administrator'\").Id | ForEach-Object\
      \ {\n  Get-MgUser -UserId $_.Id -Property onPremisesSyncEnabled,userPrincipalName\n} | Where-Object { $_.OnPremisesSyncEnabled -eq $true } | Measure-Object\n# Expected: Count = 0"
    tuningNotes: Service accounts synced from AD that hold directory roles are also a risk. Consider migrating them to Managed Identities or cloud-only service principals. Exclude break-glass accounts from
      Conditional Access but ensure they are cloud-only.
    advancedDetection: "// KQL: Detect sign-ins from synced admin accounts\nSigninLogs\n| where TimeGenerated > ago(24h)\n| where UserType == \"Member\"\n| join kind=inner (\n    IdentityInfo | where OnPremisesDistinguishedName\
      \ != \"\"\n    | project AccountUPN, OnPremisesDistinguishedName\n) on $left.UserPrincipalName == $right.AccountUPN\n| join kind=inner (\n    IdentityDirectoryEvents\n    | where ActionType == \"\
      Role member added\"\n) on AccountUPN\n| project TimeGenerated, UserPrincipalName, AppDisplayName, IPAddress, Location"
    relatedIds:
    - m365-348
    - m365-349
- id: m365-348
  platform: m365-entra
  category: identity
  severity: critical
  title: Ensure two emergency access accounts have been defined.
  description: 'Global admin accounts: 3. At least 2 required as emergency access.'
  reference: CIS.1.1.2 — CIS M365 / Microsoft Secure Score — Entra ID
  tags:
  - entra-id
  - break-glass
  - emergency-access
  - identity
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Without emergency access accounts, an organization can be permanently locked out of their tenant if MFA provider fails, Conditional Access misconfiguration blocks all admins, or during
      a federated IdP outage. Attackers also specifically look for break-glass accounts that lack proper monitoring — they're often excluded from CA policies, making them ideal persistence targets.
    implementationNotes: "# Create two emergency access accounts\n$domains = Get-MgDomain | Where-Object { $_.IsInitial -eq $true }\n$domain = $domains[0].Id\n\nforeach ($i in 1..2) {\n  $upn = \"BreakGlass$i@$domain\"\
      \n  $params = @{\n    AccountEnabled = $true\n    DisplayName = \"Emergency Access $i\"\n    MailNickname = \"breakglass$i\"\n    UserPrincipalName = $upn\n    PasswordProfile = @{\n      ForceChangePasswordNextSignIn\
      \ = $false\n      Password = [System.Web.Security.Membership]::GeneratePassword(24,6)\n    }\n  }\n  $user = New-MgUser @params\n  # Assign Global Admin\n  $role = Get-MgDirectoryRole -Filter \"displayName\
      \ eq 'Global Administrator'\"\n  New-MgDirectoryRoleMember -DirectoryRoleId $role.Id -BodyParameter @{ '@odata.id' = \"https://graph.microsoft.com/v1.0/directoryObjects/$($user.Id)\" }\n  Write-Host\
      \ \"Created $upn — store credentials in physical safe\"\n}"
    validationNotes: "# Verify break-glass accounts exist and have Global Admin\n$role = Get-MgDirectoryRole -Filter \"displayName eq 'Global Administrator'\"\nGet-MgDirectoryRoleMember -DirectoryRoleId\
      \ $role.Id | ForEach-Object {\n  Get-MgUser -UserId $_.Id -Property displayName,userPrincipalName\n} | Where-Object { $_.DisplayName -like '*Emergency*' -or $_.DisplayName -like '*BreakGlass*' }\n\
      # Expected: 2 accounts\n\n# Verify excluded from Conditional Access\nGet-MgIdentityConditionalAccessPolicy | ForEach-Object {\n  $_.Conditions.Users.ExcludeUsers\n}"
    tuningNotes: Store credentials in two separate physical safes. Use FIDO2 keys (not phone MFA) as the second factor. Test break-glass sign-in quarterly. Set up an Azure Monitor alert on any sign-in to
      these accounts — any use outside a declared emergency is a critical incident.
    advancedDetection: '// KQL: Alert on ANY sign-in to break-glass accounts

      let breakGlass = dynamic([''breakglass1@yourdomain.onmicrosoft.com'',''breakglass2@yourdomain.onmicrosoft.com'']);

      SigninLogs

      | where TimeGenerated > ago(1h)

      | where UserPrincipalName in~ (breakGlass)

      | project TimeGenerated, UserPrincipalName, AppDisplayName, IPAddress, Location, ResultType, DeviceDetail

      | extend AlertSeverity = ''Critical'''
    relatedIds:
    - m365-347
    - m365-349
- id: m365-349
  platform: m365-entra
  category: identity
  severity: critical
  title: Ensure that between two and four global admins are designated.
  description: 'Global admin count: 3. CIS recommends between 2 and 4.'
  reference: CIS.1.1.3 — CIS M365 / Microsoft Secure Score — Entra ID
  tags:
  - entra-id
  - global-admin
  - least-privilege
  - identity
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Each Global Admin account is an attack surface. More than 4 increases the blast radius of credential theft. Fewer than 2 creates a single point of failure. Attackers enumerate Global
      Admins via Microsoft Graph API reconnaissance to identify high-value targets for spear-phishing.
    implementationNotes: "# Count current Global Admins\nConnect-MgGraph -Scopes 'RoleManagement.Read.Directory','User.Read.All'\n$gaRole = Get-MgDirectoryRole -Filter \"displayName eq 'Global Administrator'\"\
      \n$members = Get-MgDirectoryRoleMember -DirectoryRoleId $gaRole.Id\nWrite-Host \"Current Global Admins: $($members.Count)\"\n$members | ForEach-Object {\n  $u = Get-MgUser -UserId $_.Id -Property\
      \ displayName,userPrincipalName,onPremisesSyncEnabled\n  [PSCustomObject]@{\n    Name = $u.DisplayName\n    UPN = $u.UserPrincipalName\n    Synced = $u.OnPremisesSyncEnabled\n  }\n} | Format-Table\n\
      \n# Downgrade excess admins to least-privilege roles\n# Example: Move to User Administrator or Security Administrator\n# Remove-MgDirectoryRoleMember -DirectoryRoleId $gaRole.Id -DirectoryObjectId\
      \ <userId>"
    validationNotes: "# Verify count is between 2 and 4 (excluding break-glass)\n$gaRole = Get-MgDirectoryRole -Filter \"displayName eq 'Global Administrator'\"\n$count = (Get-MgDirectoryRoleMember -DirectoryRoleId\
      \ $gaRole.Id | Measure-Object).Count\nif ($count -lt 2 -or $count -gt 4) {\n  Write-Warning \"Global Admin count is $count — should be 2-4 (plus break-glass)\"\n} else {\n  Write-Host \"OK: $count\
      \ Global Admins\" -ForegroundColor Green\n}"
    tuningNotes: The 2-4 count excludes break-glass accounts. In larger orgs, use PIM (Privileged Identity Management) to make GA assignments time-bound and require justification. Active GA assignments
      should still be 2-4; eligible assignments can be higher.
    advancedDetection: '// KQL: Track Global Admin role changes

      AuditLogs

      | where TimeGenerated > ago(7d)

      | where OperationName in (''Add member to role'',''Remove member from role'')

      | where TargetResources[0].modifiedProperties[1].newValue has ''Global Administrator''

      | project TimeGenerated, InitiatedBy.user.userPrincipalName, OperationName, TargetResources[0].userPrincipalName

      | sort by TimeGenerated desc'
    relatedIds:
    - m365-347
    - m365-348
