  - idle-session
  - session-management
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Without idle session timeout, SharePoint sessions remain active indefinitely on shared/public computers. An attacker can walk up to an unlocked machine in a conference room or hotel
      business center and access all the user's SharePoint data without needing credentials.
    implementationNotes: '# Enable idle session sign-out for SharePoint

      Connect-SPOService -Url https://yourtenant-admin.sharepoint.com

      Set-SPOBrowserIdleSignOut -Enabled $true -WarnAfter (New-TimeSpan -Minutes 5) -SignOutAfter (New-TimeSpan -Minutes 15)


      # Verify

      Get-SPOBrowserIdleSignOut'
    validationNotes: 'Get-SPOBrowserIdleSignOut

      # Expected: Enabled = True, WarnAfter = 00:05:00, SignOutAfter = 00:15:00'
    tuningNotes: 15 minutes is recommended. Longer timeouts (30 min) may be appropriate for users who frequently work in SharePoint throughout the day. Too short (5 min) causes frustration and users will
      work around it. Combine with Conditional Access session controls for a comprehensive approach.
    advancedDetection: '// KQL: Track idle session setting changes

      AuditLogs

      | where TimeGenerated > ago(7d)

      | where OperationName has ''Set-SPOBrowserIdleSignOut''

      | project TimeGenerated, InitiatedBy.user.userPrincipalName, TargetResources'
