- id: m365-029
  platform: m365-collab
  category: services
  severity: high
  title: Ensure users installing Outlook add-ins is not allowed.
  description: 'User add-in install: not confirmed blocked — check EAC → Organization → Add-ins → User-owned apps..'
  reference: CIS.6.3.1 — CIS M365 / Microsoft Secure Score — Exchange Online
  command: Add-ins → User-owned apps
  tags:
  - exchange-online
  - outlook-addins
  - supply-chain
  - oauth
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Outlook add-ins run within the context of the user's mailbox session, with access to email content, contacts, and calendar. Malicious or compromised add-ins can read all emails, exfiltrate
      data, and impersonate the user — all without triggering standard email security controls.
    implementationNotes: '# Check current add-in policy

      Get-OwaMailboxPolicy | Select Name, EnabledByDefault, OrganizationEnabled


      # Block user-installed add-ins

      Set-OwaMailboxPolicy -Identity ''OwaMailboxPolicy-Default'' -ActionForUnknownFileAndMIMETypes Block


      # Or restrict to admin-deployed add-ins only:

      # Exchange Admin Center > Organization > Add-ins

      # Set ''User-installed apps'' to Off


      # List all installed add-ins

      Get-App -OrganizationApp | Select DisplayName, Enabled, DefaultStateForUser | Format-Table'
    validationNotes: '# Verify users can''t install add-ins

      Get-RoleAssignmentPolicy | Get-ManagementRoleAssignment | Where-Object { $_.Role -eq ''My Marketplace Apps'' -or $_.Role -eq ''My Custom Apps'' }


      # Check for suspicious installed add-ins

      Get-App -OrganizationApp | Where-Object { $_.DefaultStateForUser -eq ''Enabled'' } | Select DisplayName, AppVersion, MarketplaceAssetId'
    tuningNotes: Don't block all add-ins — many are business-critical (Salesforce, Zoom, etc.). Instead, deploy approved add-ins via centralized deployment and block user self-service installation. Review
      the list of deployed add-ins quarterly for outdated or unnecessary ones.
    advancedDetection: '// KQL: Detect new add-in installations

      OfficeActivity

      | where TimeGenerated > ago(7d)

      | where Operation in (''New-App'',''Set-App'')

      | project TimeGenerated, UserId, Operation, Parameters

      | extend AppName = extract(''"Value":"([^"]+)"'', 1, tostring(Parameters))'
