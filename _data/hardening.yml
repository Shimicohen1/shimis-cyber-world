- id: gcp-015
  platform: gcp
  category: network
  severity: critical
  title: Enable Private Google Access for subnets
  description: Allow VMs without external IPs to reach Google APIs via internal networking.
  reference: CIS GCP Foundations Benchmark 3.8
  command: '# List subnets without Private Google Access

    gcloud compute networks subnets list --format=''table(name,region,privateIpGoogleAccess)'' | grep False

    # Enable

    gcloud compute networks subnets update <subnet> --region=<region> --enable-private-ip-google-access

    '
  premium:
    attackPerspective: Without Private Google Access, VMs in private subnets must go through a NAT gateway or have external IPs to reach Google APIs (GCS, BigQuery, Pub/Sub). This creates unnecessary external
      exposure. If NAT is misconfigured, GCP API traffic traverses the public internet, exposing it to interception. Private Google Access keeps all Google API traffic within Google's network — eliminating
      this entire attack surface.
    implementationNotes: "# Enable Private Google Access for a subnet\ngcloud compute networks subnets update SUBNET_NAME \\\n  --region=REGION \\\n  --enable-private-ip-google-access\n\n# Enable for ALL\
      \ subnets in a VPC:\nfor subnet in $(gcloud compute networks subnets list --network=VPC_NAME --format='value(name,region)'); do\n  name=$(echo $subnet | cut -f1)\n  region=$(echo $subnet | cut -f2)\n\
      \  gcloud compute networks subnets update $name --region=$region --enable-private-ip-google-access\ndone\n\n# For private access to more Google services, configure Private Service Connect:\ngcloud\
      \ compute addresses create psc-endpoint \\\n  --region=REGION \\\n  --subnet=SUBNET_NAME \\\n  --addresses=10.0.0.100\n\ngcloud compute forwarding-rules create psc-endpoint \\\n  --region=REGION \\\
      \n  --network=VPC_NAME \\\n  --address=psc-endpoint \\\n  --target-google-apis-bundle=all-apis\n\n# DNS: Route Google API domains to private endpoints\ngcloud dns managed-zones create google-apis\
      \ \\\n  --dns-name=googleapis.com \\\n  --visibility=private \\\n  --networks=VPC_NAME"
    validationNotes: "# Verify Private Google Access on all subnets\ngcloud compute networks subnets list \\\n  --format='table(name,region,privateIpGoogleAccess)' \\\n  --filter='privateIpGoogleAccess=false'\n\
      # Should return empty (all should be true)\n\n# Test from a VM without external IP:\ngcloud compute ssh --internal-ip VM_NAME --zone=ZONE -- 'curl -s https://storage.googleapis.com'\n# Should succeed\
      \ if Private Google Access is enabled"
    tuningNotes: Private Google Access should be enabled on every subnet by default — there's no downside. For maximum isolation, add Private Service Connect endpoints and custom DNS zones to route all
      Google API traffic through your VPC. This also enables you to apply firewall rules and VPC Service Controls to Google API traffic.
    advancedDetection: "-- Monitor for VMs accessing Google APIs via external IPs (indicating PGA is not working)\nSELECT\n  timestamp,\n  jsonPayload.connection.src_ip,\n  jsonPayload.connection.dest_ip,\n\
      \  jsonPayload.connection.dest_port,\n  resource.labels.subnetwork_name\nFROM `project.dataset.compute_googleapis_com_vpc_flows`\nWHERE jsonPayload.connection.dest_ip LIKE '142.250.%' OR jsonPayload.connection.dest_ip\
      \ LIKE '172.217.%'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)"
    relatedIds:
    - gcp-016
    - gcp-019
    - gcp-020
  tags:
  - gcp
  - network
- id: gcp-016
  platform: gcp
  category: network
  severity: critical
  title: Disable default network
  description: Delete the auto-created default VPC which has overly permissive firewall rules.
  reference: CIS GCP Foundations Benchmark 3.1
  command: '# Check if default network exists

    gcloud compute networks list --filter=''name=default''

    # Delete default firewall rules then network

    gcloud compute firewall-rules list --filter=''network:default'' --format=''value(name)'' | xargs -I{} gcloud compute firewall-rules delete {} --quiet

    gcloud compute networks delete default --quiet

    '
  premium:
    attackPerspective: 'The default VPC network is auto-created with permissive firewall rules: allow-internal (all internal traffic), allow-ssh (0.0.0.0/0:22), allow-rdp (0.0.0.0/0:3389), and allow-icmp.
      These rules make every VM in the default network accessible from the internet on SSH and RDP ports. Attackers scan GCP IP ranges for open port 22/3389 and brute-force credentials. Many breaches start
      with a VM accidentally deployed in the default network.'
    implementationNotes: "# Delete default network (cannot be deleted if resources exist in it)\ngcloud compute networks delete default --project=PROJECT_ID\n\n# Organization Policy to prevent default network\
      \ creation:\ngcloud resource-manager org-policies set-policy \\\n  --organization=ORG_ID no-default-network.yaml\n\n# no-default-network.yaml:\n# constraint: constraints/compute.skipDefaultNetworkCreation\n\
      # booleanPolicy:\n#   enforced: true\n\n# Create a custom VPC with proper security:\ngcloud compute networks create production-vpc \\\n  --subnet-mode=custom \\\n  --bgp-routing-mode=regional\n\n\
      gcloud compute networks subnets create prod-subnet \\\n  --network=production-vpc \\\n  --region=us-central1 \\\n  --range=10.0.0.0/20 \\\n  --enable-private-ip-google-access \\\n  --enable-flow-logs"
    validationNotes: "# Check if default network exists\ngcloud compute networks list --format='table(name,autoCreateSubnetworks)' --filter='name=default'\n# Should return empty\n\n# Verify org policy blocks\
      \ new default networks\ngcloud resource-manager org-policies describe \\\n  constraints/compute.skipDefaultNetworkCreation \\\n  --organization=ORG_ID\n\n# Check for default network in all projects\n\
      for project in $(gcloud projects list --format='value(projectId)'); do\n  has_default=$(gcloud compute networks list --project=$project --format='value(name)' --filter='name=default' 2>/dev/null)\n\
      \  if [ -n \"$has_default\" ]; then\n    echo \"WARNING: $project has default network\"\n  fi\ndone"
    tuningNotes: Before deleting the default network, migrate any resources to a custom VPC. Use Shared VPCs for multi-project environments to centralize network management. The org policy should be applied
      first to prevent new projects from getting a default network, then clean up existing ones project by project.
    advancedDetection: "-- Alert on resources deployed in default network\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName,\n  JSON_EXTRACT_SCALAR(protopayload_auditlog.request,\
      \ '$.networkInterfaces[0].network') as network\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'v1.compute.instances.insert'\nAND JSON_EXTRACT_SCALAR(protopayload_auditlog.request,\
      \ '$.networkInterfaces[0].network') LIKE '%/default'"
    relatedIds:
