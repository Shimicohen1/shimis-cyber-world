- id: gcp-019
  platform: gcp
  category: network
  severity: high
  title: Enable VPC Service Controls
  description: Create security perimeters around GCP resources to prevent data exfiltration.
  reference: CIS GCP Foundations Benchmark 3.10
  command: '# List access policies

    gcloud access-context-manager policies list --organization=<org_id>

    # List service perimeters

    gcloud access-context-manager perimeters list --policy=<policy_id>

    '
  premium:
    attackPerspective: VPC Service Controls create a security perimeter around GCP services, preventing data exfiltration even by authorized users. Without them, a compromised SA in Project A can copy data
      to an attacker-controlled Project B in seconds. VPC-SC blocks this by restricting API calls to only allowed projects and networks — even with valid IAM permissions, data cannot leave the perimeter.
    implementationNotes: "# Create a VPC Service Controls perimeter\ngcloud access-context-manager perimeters create production-perimeter \\\n  --title='Production Data Perimeter' \\\n  --resources='projects/PROJECT_NUM_1,projects/PROJECT_NUM_2'\
      \ \\\n  --restricted-services='bigquery.googleapis.com,storage.googleapis.com,secretmanager.googleapis.com' \\\n  --access-levels=admin-access \\\n  --policy=ACCESS_POLICY_ID\n\n# Create in dry-run\
      \ mode first (logs violations without blocking):\ngcloud access-context-manager perimeters dry-run create production-perimeter \\\n  --title='Production Data Perimeter' \\\n  --resources='projects/PROJECT_NUM_1'\
      \ \\\n  --restricted-services='storage.googleapis.com,bigquery.googleapis.com'\n\n# Common restricted services to include:\n# storage.googleapis.com, bigquery.googleapis.com\n# secretmanager.googleapis.com,\
      \ cloudkms.googleapis.com\n# spanner.googleapis.com, bigtable.googleapis.com\n# pubsub.googleapis.com, dataflow.googleapis.com\n\n# Create ingress/egress rules for controlled exceptions:\ngcloud access-context-manager\
      \ perimeters update production-perimeter \\\n  --set-ingress-policies=ingress.yaml \\\n  --set-egress-policies=egress.yaml"
    validationNotes: "# List perimeters and their status\ngcloud access-context-manager perimeters list --policy=ACCESS_POLICY_ID \\\n  --format='table(name,title,status.resources,status.restrictedServices)'\n\
      \n# Check for violations in dry-run mode\ngcloud logging read 'protoPayload.metadata.@type=\"type.googleapis.com/google.cloud.audit.VpcServiceControlAuditMetadata\" AND protoPayload.metadata.violationReason!=\"\
      \"' \\\n  --limit=50 --format=json\n\n# Test: Try to copy data out of the perimeter\n# gsutil cp gs://protected-bucket/file gs://external-bucket/  # Should fail"
    tuningNotes: Always start with dry-run mode for at least 2 weeks. VPC-SC violations can break legitimate workflows (CI/CD pipelines, partner integrations, cross-project queries). Analyze dry-run logs
      to create precise ingress/egress rules before enforcing. Use access levels to allow specific users from specific networks to cross the perimeter.
    advancedDetection: "-- VPC Service Controls violation monitoring\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.metadata.violationReason,\n\
      \  protopayload_auditlog.metadata.resourceNames,\n  protopayload_auditlog.methodName\nFROM `project.dataset.cloudaudit_googleapis_com_policy`\nWHERE protopayload_auditlog.metadata.violationReason\
      \ IS NOT NULL\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-015
    - gcp-028
  tags:
  - gcp
  - network
- id: gcp-020
  platform: gcp
  category: network
  severity: high
  title: Use Cloud NAT instead of external IPs
  description: Route outbound traffic through Cloud NAT to avoid assigning public IPs to VMs.
  reference: Google Cloud Security Best Practices
  command: '# Check for VMs with external IPs

    gcloud compute instances list --format=''table(name,networkInterfaces[].accessConfigs[].natIP)'' | grep -v ''^$''

    # Create Cloud NAT

    gcloud compute routers create scw-router --region=<region> --network=<vpc>

    gcloud compute routers nats create scw-nat --router=scw-router --region=<region> --auto-allocate-nat-external-ips --nat-all-subnet-ip-ranges

    '
  premium:
    attackPerspective: External IPs on VMs create bidirectional internet exposure — the VM can be reached from the internet AND can establish outbound connections to attacker infrastructure for C2 communication
      and data exfiltration. Cloud NAT provides outbound-only internet access without an external IP, eliminating inbound attack surface while preserving the ability to reach external APIs and package repositories.
    implementationNotes: "# Create a Cloud NAT gateway\ngcloud compute routers create nat-router \\\n  --network=production-vpc \\\n  --region=us-central1\n\ngcloud compute routers nats create nat-gateway\
      \ \\\n  --router=nat-router \\\n  --region=us-central1 \\\n  --nat-all-subnet-ip-ranges \\\n  --auto-allocate-nat-external-ips \\\n  --enable-logging\n\n# Remove external IPs from existing VMs:\n\
      gcloud compute instances delete-access-config VM_NAME \\\n  --zone=us-central1-a \\\n  --access-config-name='External NAT'\n\n# Organization Policy to block external IPs:\ngcloud resource-manager\
      \ org-policies set-policy \\\n  --organization=ORG_ID no-external-ip.yaml\n\n# no-external-ip.yaml:\n# constraint: constraints/compute.vmExternalIpAccess\n# listPolicy:\n#   allValues: DENY"
    validationNotes: "# Find VMs with external IPs\ngcloud compute instances list \\\n  --format='table(name,zone,networkInterfaces[0].accessConfigs[0].natIP)' \\\n  --filter='networkInterfaces[0].accessConfigs[0].natIP:*'\n\
      \n# Verify Cloud NAT is working\ngcloud compute routers nats describe nat-gateway \\\n  --router=nat-router --region=us-central1\n\n# Test outbound connectivity from a VM without external IP:\ngcloud\
      \ compute ssh VM_NAME --internal-ip --tunnel-through-iap -- 'curl -s ifconfig.me'\n# Should return a NAT IP"
    tuningNotes: Some workloads genuinely need external IPs — load balancers, NAT gateways, bastion hosts (though IAP is preferred). Use the org policy constraint with an allow list for specific VMs/projects.
      Cloud NAT supports custom port allocation and endpoint-independent mapping for workloads that need consistent outbound IPs.
    advancedDetection: "-- Alert on VMs created with external IPs\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName,\n  JSON_EXTRACT_SCALAR(protopayload_auditlog.request,\
      \ '$.networkInterfaces[0].accessConfigs[0].natIP') as external_ip\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'v1.compute.instances.insert'\n\
      AND JSON_EXTRACT(protopayload_auditlog.request, '$.networkInterfaces[0].accessConfigs') IS NOT NULL"
    relatedIds:
    - gcp-015
    - gcp-018
  tags:
  - gcp
  - network
- id: gcp-021
  platform: gcp
  category: logging
  severity: critical
  title: Enable Data Access audit logs for all services
  description: Log read/write data operations across all GCP services.
  reference: CIS GCP Foundations Benchmark 2.1
  command: '# Set org-level audit config via policy.json:

    # { "auditConfigs": [{ "service": "allServices",

    #   "auditLogConfigs": [{"logType": "ADMIN_READ"},

    #     {"logType": "DATA_READ"}, {"logType": "DATA_WRITE"}] }] }

    gcloud projects set-iam-policy <project> policy.json

    '
  premium:
    attackPerspective: Admin Activity logs capture who changed what (IAM, firewall, VM creation) but Data Access logs capture who READ what (BigQuery queries, GCS downloads, Secret Manager access). Without
      Data Access logs, an attacker who exfiltrates your entire BigQuery data warehouse or downloads all secrets from Secret Manager leaves zero forensic evidence. You'll know they got in but never know
      what they took.
    implementationNotes: '# Enable Data Access logs for all services at project level:

      gcloud projects get-iam-policy PROJECT_ID --format=json > policy.json


      # Add to policy.json:

      # "auditConfigs": [{

      #   "service": "allServices",

      #   "auditLogConfigs": [

      #     {"logType": "ADMIN_READ"},

      #     {"logType": "DATA_READ"},

      #     {"logType": "DATA_WRITE"}

      #   ]

      # }]


      gcloud projects set-iam-policy PROJECT_ID policy.json


      # For high-priority services, ensure explicitly:

      # BigQuery, Cloud Storage, Secret Manager, Cloud SQL, Spanner,

      # Datastore, Bigtable, Pub/Sub, Cloud KMS


      # Exempt high-volume service accounts to control costs:

      # "exemptedMembers": ["serviceAccount:monitoring@project.iam.gserviceaccount.com"]'
    validationNotes: '# Verify audit config

      gcloud projects get-iam-policy PROJECT_ID --format=json | jq ''.auditConfigs''


      # Test: Access a GCS object and verify log appears

      gsutil cat gs://test-bucket/test.txt

      # Wait 5-10 minutes

      gcloud logging read ''protoPayload.methodName="storage.objects.get" AND protoPayload.resourceName:"test.txt"'' --limit=5


      # Verify for BigQuery:

      bq query --nouse_legacy_sql ''SELECT 1''

      gcloud logging read ''protoPayload.serviceName="bigquery.googleapis.com" AND protoPayload.methodName="jobservice.query"'' --limit=5'
    tuningNotes: Data Access logs for BigQuery can be extremely high-volume (every query generates logs). Consider exempting read-heavy service accounts for cost control while keeping DATA_WRITE logs for
      all principals. For GCS, DATA_READ on object-level access can also be voluminous — consider logging at bucket-level only for non-sensitive buckets.
    advancedDetection: "-- BigQuery: Detect large data reads (potential exfiltration)\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.methodName,\n\
      \  protopayload_auditlog.resourceName,\n  JSON_EXTRACT_SCALAR(protopayload_auditlog.response, '$.totalBytesProcessed') as bytes_read\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\n\
      WHERE protopayload_auditlog.serviceName = 'bigquery.googleapis.com'\nAND SAFE_CAST(JSON_EXTRACT_SCALAR(protopayload_auditlog.response, '$.totalBytesProcessed') AS INT64) > 10737418240  -- 10GB\nAND\
      \ timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)"
    relatedIds:
    - gcp-004
    - gcp-022
  tags:
  - gcp
  - logging
- id: gcp-022
  platform: gcp
  category: logging
  severity: critical
  title: Export logs to BigQuery or Cloud Storage
  description: Create log sinks to export audit logs for long-term retention and analysis.
  reference: CIS GCP Foundations Benchmark 2.2
  command: "# Create BigQuery sink\ngcloud logging sinks create audit-to-bq \\\n  bigquery.googleapis.com/projects/<project>/datasets/audit_logs \\\n  --log-filter='logName:\"cloudaudit.googleapis.com\"\
    '\n"
  premium:
    attackPerspective: Cloud Logging retains logs for 30 days (activity) and 400 days maximum. An attacker who maintains persistence for months may have their initial access logs age out before the breach
      is discovered. Exporting to BigQuery or Cloud Storage provides cost-effective long-term retention, enables complex analytics (cross-log correlation, trend analysis), and creates tamper-resistant copies
      that survive even if the attacker gains logging admin access.
    implementationNotes: "# Create a log sink to BigQuery (for analytics):\ngcloud logging sinks create security-bigquery \\\n  bigquery.googleapis.com/projects/PROJECT_ID/datasets/security_logs \\\n  --log-filter='protoPayload.@type=\"\
      type.googleapis.com/google.cloud.audit.AuditLog\"' \\\n  --organization=ORG_ID \\\n  --include-children\n\n# Create a log sink to GCS (for archival):\ngcloud logging sinks create audit-archive \\\n\
      \  storage.googleapis.com/audit-log-archive-bucket \\\n  --log-filter='logName:\"cloudaudit.googleapis.com\"' \\\n  --organization=ORG_ID \\\n  --include-children\n\n# Grant the sink SA write access:\n\
      # Get the SA email from sink description\ngcloud logging sinks describe security-bigquery --organization=ORG_ID --format='value(writerIdentity)'\n# Grant: roles/bigquery.dataEditor on the dataset\n\
      \n# Set lifecycle on GCS archive (cost control):\ngsutil lifecycle set lifecycle.json gs://audit-log-archive-bucket\n# lifecycle.json: transition to COLDLINE after 90 days, delete after 365 days"
    validationNotes: "# Verify sinks exist and are active\ngcloud logging sinks list --organization=ORG_ID --format='table(name,destination,filter)'\n\n# Check for sink errors:\ngcloud logging sinks describe\
      \ security-bigquery --organization=ORG_ID\n\n# Verify data is flowing to BigQuery:\nbq query --nouse_legacy_sql '\n  SELECT COUNT(*) as log_count, DATE(timestamp) as log_date\n  FROM `project.security_logs.cloudaudit_googleapis_com_activity`\n\
      \  WHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\n  GROUP BY log_date ORDER BY log_date DESC'"
    tuningNotes: Use aggregated sinks at the organization level with --include-children to capture all projects. Filter exports to reduce costs — export all activity logs but only security-relevant data
      access logs (exclude high-volume read operations from monitoring accounts). Partition BigQuery tables by day for query performance and cost control.
    advancedDetection: "-- Verify export completeness (no gaps)\nSELECT\n  DATE(timestamp) as log_date,\n  COUNT(*) as events,\n  COUNT(DISTINCT resource.labels.project_id) as projects\nFROM `project.security_logs.cloudaudit_googleapis_com_activity`\n\
      WHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)\nGROUP BY log_date\nORDER BY log_date DESC"
    relatedIds:
    - gcp-004
    - gcp-021
    - gcp-023
  tags:
  - gcp
  - logging
- id: gcp-023
  platform: gcp
  category: logging
  severity: high
  title: Enable Security Command Center (SCC)
  description: Centralized security findings dashboard for vulnerabilities, threats, and misconfigurations.
  reference: Google Cloud Security Best Practices
  command: '# Check SCC status

    gcloud scc organizations describe <org_id> 2>/dev/null

    # Enable via Console → Security → Security Command Center

    '
  premium:
    attackPerspective: 'Security Command Center (SCC) is GCP''s native CSPM and threat detection platform. Without it, you''re flying blind — no automated detection of misconfigurations, no vulnerability
      scanning, no threat intelligence integration. SCC Premium detects active threats: cryptomining, data exfiltration, malicious scripts, and credential theft. The free tier only covers basic misconfiguration
      scanning.'
    implementationNotes: "# Enable SCC at the organization level (requires Org Admin):\ngcloud scc organizations update ORG_ID --enable-asset-discovery\n\n# Enable SCC Premium tier (via Console):\n# Security\
      \ → Security Command Center → Settings → Tier → Premium\n\n# Enable all built-in detectors:\n# Security Health Analytics (misconfigurations)\n# Event Threat Detection (active threats)\n# Container\
      \ Threat Detection (GKE/container threats)\n# Virtual Machine Threat Detection (VM-level threats)\n# Web Security Scanner (web app vulnerabilities)\n\n# Configure notification channels:\ngcloud scc\
      \ notifications create critical-findings \\\n  --organization=ORG_ID \\\n  --pubsub-topic=projects/PROJECT/topics/scc-findings \\\n  --filter='severity=\"CRITICAL\" OR severity=\"HIGH\"'\n\n# Export\
      \ findings to SIEM via Pub/Sub → Dataflow → Splunk/Chronicle"
    validationNotes: '# Verify SCC is enabled and scanning

      gcloud scc findings list ORG_ID --source=''-'' --limit=10 --format=''table(finding.category,finding.state,finding.severity)''


      # Check asset inventory is populated

      gcloud scc assets list ORG_ID --limit=10 --format=''table(asset.name,asset.securityCenterProperties.resourceType)''


      # Verify all detectors are active

      gcloud scc settings describe --organization=ORG_ID'
    tuningNotes: SCC Premium findings can be noisy initially. Focus on CRITICAL and HIGH severity first. Mute findings for known exceptions (dev sandboxes, intentionally public buckets) using mute rules
      rather than ignoring them. Set up a weekly cadence to review and triage new findings. Integrate with your ticketing system (Jira, ServiceNow) for tracking remediation.
    advancedDetection: "-- SCC Finding analytics in BigQuery (if exported)\nSELECT\n  finding.category,\n  finding.severity,\n  COUNT(*) as finding_count,\n  COUNT(DISTINCT resource.projectDisplayName)\
      \ as affected_projects\nFROM `project.dataset.scc_findings`\nWHERE finding.state = 'ACTIVE'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\nGROUP BY finding.category, finding.severity\n\
      ORDER BY finding_count DESC"
    relatedIds:
    - gcp-024
    - gcp-036
  tags:
  - gcp
  - logging
- id: gcp-024
  platform: gcp
  category: logging
  severity: high
  title: Configure Cloud Monitoring alerting policies
  description: 'Set up alerts for security-critical events: firewall changes, IAM changes, SA key creation.'
  reference: CIS GCP Foundations Benchmark 2.4-2.11
  command: "# Create alert for firewall rule changes\ngcloud alpha monitoring policies create \\\n  --notification-channels=<channel-id> \\\n  --condition-filter='resource.type=\"gce_firewall_rule\" AND\
    \ protoPayload.methodName=\"v1.compute.firewalls.insert\"'\n"
  premium:
    attackPerspective: Without alerting policies, security events go unnoticed until the damage is done. An attacker triggers audit log entries, IAM changes, and resource modifications — all logged but
      never reviewed. Alerting transforms passive logging into active defense by notifying your team within minutes of suspicious activity, drastically reducing dwell time from months to hours.
    implementationNotes: "# Create alerting policies via gcloud:\n\n# Alert on IAM policy changes:\ngcloud alpha monitoring policies create \\\n  --display-name='IAM Policy Change Alert' \\\n  --condition-display-name='IAM\
      \ Changes' \\\n  --condition-filter='resource.type=\"audited_resource\" AND protoPayload.methodName:\"SetIamPolicy\"' \\\n  --notification-channels=CHANNEL_ID\n\n# Alert on firewall rule changes:\n\
      gcloud alpha monitoring policies create \\\n  --display-name='Firewall Change Alert' \\\n  --condition-display-name='Firewall Modified' \\\n  --condition-filter='resource.type=\"gce_firewall_rule\"\
      \ AND protoPayload.methodName:(\"compute.firewalls.insert\" OR \"compute.firewalls.update\" OR \"compute.firewalls.delete\")'\n\n# Create notification channel (email):\ngcloud alpha monitoring channels\
      \ create \\\n  --display-name='Security Team' \\\n  --type=email \\\n  --channel-labels=email_address=security@company.com\n\n# For PagerDuty/Slack integration:\n# Use Pub/Sub notification channel\
      \ → Cloud Function → Webhook"
    validationNotes: "# List all alerting policies\ngcloud alpha monitoring policies list --format='table(displayName,enabled,conditions[0].displayName)'\n\n# Verify notification channels are active\ngcloud\
      \ alpha monitoring channels list --format='table(displayName,type,verificationStatus)'\n\n# Test: Make an IAM change and verify alert fires\ngcloud projects add-iam-policy-binding PROJECT_ID \\\n\
      \  --member='user:test@company.com' --role='roles/viewer'\n# Check for alert within 5 minutes"
    tuningNotes: 'Start with high-signal, low-noise alerts: IAM changes, firewall modifications, SA key creation, project deletion. Avoid alerting on read operations initially. Use log-based metrics with
      aggregation windows (e.g., >5 events in 10 minutes) to prevent alert storms. Integrate with an on-call rotation tool to ensure alerts are acknowledged.'
    advancedDetection: "-- Example log-based metric for monitoring\n-- Create via gcloud:\n-- gcloud logging metrics create iam_changes \\\n--   --description='IAM policy changes' \\\n--   --log-filter='protoPayload.methodName:\"\
      SetIamPolicy\"'\n-- Then create an alerting policy on this metric\n\n-- BigQuery: Aggregate security events for dashboard\nSELECT\n  DATE(timestamp) as event_date,\n  COUNTIF(protopayload_auditlog.methodName\
      \ LIKE '%SetIamPolicy%') as iam_changes,\n  COUNTIF(protopayload_auditlog.methodName LIKE '%firewalls%') as firewall_changes,\n  COUNTIF(protopayload_auditlog.methodName LIKE '%CreateServiceAccountKey%')\
      \ as sa_key_creations\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)\nGROUP BY event_date ORDER BY event_date DESC"
    relatedIds:
    - gcp-023
    - gcp-025
  tags:
  - gcp
  - logging
- id: gcp-025
  platform: gcp
  category: logging
  severity: high
  title: Monitor for service account key creation
  description: Alert when new service account keys are created (potential persistence mechanism).
  reference: CIS GCP Foundations Benchmark 2.10
  command: '# Search audit logs for SA key creation

    gcloud logging read ''protoPayload.methodName="google.iam.admin.v1.CreateServiceAccountKey"'' --limit=50 --format=''table(timestamp,protoPayload.authenticationInfo.principalEmail,protoPayload.request.name)''

    '
  premium:
    attackPerspective: Service account key creation is one of the most critical events in GCP security. An attacker who creates a new key for an existing high-privilege SA gains persistent, credential-based
      access that survives password resets and access revocations. This is a top persistence technique in GCP attacks. Without monitoring, the attacker creates a key, downloads it, and the breach continues
      unnoticed.
    implementationNotes: "# Create a log-based alert for SA key creation:\ngcloud logging metrics create sa_key_creation \\\n  --description='Service account key creation events' \\\n  --log-filter='protoPayload.methodName=\"\
      google.iam.admin.v1.CreateServiceAccountKey\"'\n\n# Create alerting policy on the metric:\ngcloud alpha monitoring policies create \\\n  --display-name='SA Key Creation Alert' \\\n  --condition-display-name='SA\
      \ Key Created' \\\n  --condition-filter='metric.type=\"logging.googleapis.com/user/sa_key_creation\"' \\\n  --condition-threshold-value=0 \\\n  --condition-threshold-comparison=COMPARISON_GT \\\n\
      \  --notification-channels=CHANNEL_ID\n\n# Organization Policy (if not already set):\n# constraints/iam.disableServiceAccountKeyCreation = enforced\n# This prevents key creation entirely (preferred\
      \ approach)\n\n# If keys must be allowed for specific projects:\n# Monitor and alert on every creation event"
    validationNotes: "# Verify alert metric exists\ngcloud logging metrics describe sa_key_creation\n\n# Verify alerting policy is active\ngcloud alpha monitoring policies list --filter='displayName:\"\
      SA Key\"'\n\n# Check recent key creation events\ngcloud logging read 'protoPayload.methodName=\"google.iam.admin.v1.CreateServiceAccountKey\"' \\\n  --limit=20 --format='table(timestamp,protoPayload.authenticationInfo.principalEmail,protoPayload.resourceName)'"
    tuningNotes: Ideally, block key creation entirely via org policy (gcp-002) and treat any alert as a policy violation. If keys are needed for specific exemptions, require tickets and approvals before
      creation. Any unexpected key creation should trigger an immediate investigation and key revocation.
    advancedDetection: "-- BigQuery: SA key lifecycle analysis\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail AS creator,\n  protopayload_auditlog.resourceName AS service_account,\n\
      \  protopayload_auditlog.requestMetadata.callerIp,\n  protopayload_auditlog.requestMetadata.callerSuppliedUserAgent\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName\
      \ = 'google.iam.admin.v1.CreateServiceAccountKey'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)\nORDER BY timestamp DESC"
