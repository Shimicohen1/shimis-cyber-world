    - m365-027
- id: m365-027
  platform: m365-collab
  category: services
  severity: high
  title: Ensure mail transport rules do not whitelist specific domains.
  description: 'Transport rules whitelisting domains: 0. None found.'
  reference: CIS.6.2.2 — CIS M365 / Microsoft Secure Score — Exchange Online
  tags:
  - exchange-online
  - transport-rules
  - domain-whitelist
  - phishing
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Transport rules that whitelist specific domains bypass spam and phishing filters entirely. Attackers research which domains are whitelisted (e.g., partner domains) and then spoof
      or compromise those domains to deliver phishing emails that bypass all protection.
    implementationNotes: "# Find transport rules that whitelist senders/domains\nGet-TransportRule | Where-Object {\n  $_.SetSCL -eq -1 -or\n  $_.SetHeaderName -eq 'X-MS-Exchange-Organization-SkipSafeLinksProcessing'\
      \ -or\n  $_.SenderDomainIs -or\n  $_.SetHeaderName -eq 'X-MS-Exchange-Organization-BypassClutter'\n} | Select Name, State, SenderDomainIs, SetSCL, Priority | Format-List\n\n# Review and remove overly\
      \ broad whitelist rules\n# Remove-TransportRule -Identity 'Whitelist Partner Domain'"
    validationNotes: '# Audit all transport rules with SCL -1 (skip spam filtering)

      Get-TransportRule | Where-Object { $_.SetSCL -eq -1 } | Select Name, SenderDomainIs, FromAddressContainsWords

      # Expected: Minimal rules, well-documented justification


      # Check connection filter allow list

      Get-HostedConnectionFilterPolicy | Select IPAllowList'
    tuningNotes: If partner domains must be trusted, use Tenant Allow/Block List with time limits rather than permanent transport rules. Prefer per-sender allow over per-domain. Never whitelist large email
      providers (gmail.com, outlook.com) — attackers create accounts on these trivially.
    advancedDetection: '// KQL: Monitor transport rule changes

      OfficeActivity

      | where TimeGenerated > ago(7d)

      | where Operation in (''New-TransportRule'',''Set-TransportRule'',''Enable-TransportRule'')

      | project TimeGenerated, UserId, Operation, Parameters

      | where Parameters has_any (''SetSCL'',''-1'',''SenderDomainIs'',''BypassClutter'')'
