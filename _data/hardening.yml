- id: cs-022
  platform: crowdstrike
  category: services
  severity: medium
  title: Exclude performance-sensitive paths (not security-sensitive)
  description: Add targeted exclusions only for verified performance-impacting paths (e.g., database data dirs, build outputs). Never exclude temp, downloads, or user-writable paths.
  reference: CrowdStrike Falcon Exclusion Best Practices
  command: '# Falcon console: Configure > Prevention Policies > Exclusions
    # Safe to exclude (performance):
    #   /var/lib/mysql/data/
    #   /var/lib/postgresql/
    #   C:\Program Files\SQL Server\DATA\
    #
    # NEVER exclude:
    #   %TEMP%, %APPDATA%, Downloads, Desktop
    #   /tmp, /dev/shm, /var/tmp
    #
    # Review exclusions quarterly — attackers abuse stale exclusions'
