- id: gcp-026
  platform: gcp
  category: logging
  severity: high
  title: Enable VPC Flow Logs for all subnets
  description: Capture network flow data for all VPC subnets for security analysis.
  reference: CIS GCP Foundations Benchmark 3.8
  command: '# Find subnets without flow logs

    gcloud compute networks subnets list --format=''table(name,region,logConfig.enable)'' | grep -v True

    # Enable

    gcloud compute networks subnets update <subnet> --region=<region> --enable-flow-logs

    '
  premium:
    attackPerspective: VPC Flow Logs capture metadata about every network connection — source/destination IPs, ports, bytes transferred, and protocols. Without flow logs, network-based attacks (lateral
      movement, C2 communication, data exfiltration over non-standard ports) leave no evidence. Flow logs are the equivalent of NetFlow for your cloud network — essential for detecting abnormal communication
      patterns.
    implementationNotes: "# Enable VPC Flow Logs for a subnet:\ngcloud compute networks subnets update SUBNET_NAME \\\n  --region=REGION \\\n  --enable-flow-logs \\\n  --logging-aggregation-interval=INTERVAL_5_SEC\
      \ \\\n  --logging-flow-sampling=0.5 \\\n  --logging-metadata=include-all\n\n# Enable for ALL subnets:\nfor subnet_info in $(gcloud compute networks subnets list --format='csv[no-heading](name,region)');\
      \ do\n  name=$(echo $subnet_info | cut -d',' -f1)\n  region=$(echo $subnet_info | cut -d',' -f2)\n  gcloud compute networks subnets update $name --region=$region \\\n    --enable-flow-logs --logging-aggregation-interval=INTERVAL_5_SEC\
      \ \\\n    --logging-flow-sampling=0.5 --logging-metadata=include-all\ndone\n\n# Export flow logs to BigQuery for analysis:\ngcloud logging sinks create flow-logs-bq \\\n  bigquery.googleapis.com/projects/PROJECT/datasets/flow_logs\
      \ \\\n  --log-filter='resource.type=\"gce_subnetwork\" AND log_id(\"compute.googleapis.com/vpc_flows\")'"
    validationNotes: "# Verify flow logs are enabled on all subnets\ngcloud compute networks subnets list \\\n  --format='table(name,region,enableFlowLogs)' \\\n  --filter='enableFlowLogs!=true'\n# Should\
      \ return empty\n\n# Check logs are flowing\ngcloud logging read 'resource.type=\"gce_subnetwork\" AND log_id(\"compute.googleapis.com/vpc_flows\")' \\\n  --limit=5 --format=json"
    tuningNotes: Flow logs at 100% sampling generate significant volume and cost. Start with 50% sampling (statistically representative) and 5-second aggregation. For sensitive subnets (databases, secrets
      management), use 100% sampling. For non-sensitive subnets (dev/test), 25% may suffice. Monitor logging costs weekly and adjust.
    advancedDetection: "-- BigQuery: Detect unusual outbound data transfers\nSELECT\n  jsonPayload.connection.src_ip,\n  jsonPayload.connection.dest_ip,\n  jsonPayload.connection.dest_port,\n  SUM(CAST(jsonPayload.bytes_sent\
      \ AS INT64)) as total_bytes\nFROM `project.flow_logs.compute_googleapis_com_vpc_flows`\nWHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)\nAND jsonPayload.reporter = 'SRC'\nAND\
      \ jsonPayload.connection.dest_ip NOT LIKE '10.%' AND jsonPayload.connection.dest_ip NOT LIKE '172.16.%'\nGROUP BY 1,2,3\nHAVING total_bytes > 1073741824  -- 1GB\nORDER BY total_bytes DESC"
    relatedIds:
