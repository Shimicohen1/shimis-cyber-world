- id: az-001
  platform: azure
  category: identity
  severity: critical
  title: Enable MFA for all users
  description: Enforce Multi-Factor Authentication for all Azure AD/Entra ID users via Conditional Access.
  reference: CIS Azure Foundations Benchmark 1.1.1
  command: '# Azure CLI — check Conditional Access policies

    az rest --method get --url "https://graph.microsoft.com/v1.0/identity/conditionalAccess/policies"

    # Create via Portal:

    # Entra ID → Security → Conditional Access → New Policy

    # Target: All users | Conditions: All apps | Grant: Require MFA

    '
  tags:
  - azure-ad
  - mfa
  - identity
  - authentication
  - cis-azure
  commandLanguage: powershell
  premium:
    attackPerspective: Without MFA, a single stolen password grants full access to all Azure resources the user can reach. Password spray, credential stuffing, and phishing attacks succeed over 99% of the
      time when MFA is not enforced. Microsoft reports that MFA blocks 99.9% of automated account compromise attacks.
    implementationNotes: "# Check MFA registration status\nConnect-MgGraph -Scopes 'UserAuthenticationMethod.Read.All','Reports.Read.All'\n\n# Get MFA registration report\nGet-MgReportAuthenticationMethodUserRegistrationDetail\
      \ -All | Select UserPrincipalName, IsMfaRegistered, MethodsRegistered | Where-Object { $_.IsMfaRegistered -eq $false } | Format-Table\n\n# Create Conditional Access policy requiring MFA for all users\n\
      $params = @{\n  displayName = 'Require MFA for All Users'\n  state = 'enabledForReportingButNotEnforced'  # Start in report-only\n  conditions = @{\n    users = @{ includeUsers = @('All'); excludeUsers\
      \ = @('<break-glass-id>') }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy\
      \ @params"
    validationNotes: '# Verify CA policy exists and is enabled

      Get-MgIdentityConditionalAccessPolicy | Where-Object { $_.DisplayName -like ''*MFA*'' } | Select DisplayName, State | Format-Table


      # Check MFA registration completion

      $report = Get-MgReportAuthenticationMethodUserRegistrationDetail -All

      $total = $report.Count

      $mfaEnabled = ($report | Where-Object { $_.IsMfaRegistered }).Count

      Write-Host "MFA Registered: $mfaEnabled / $total ($([math]::Round($mfaEnabled/$total*100,1))%)"'
    tuningNotes: Deploy in report-only mode first to identify users who would be blocked. Exclude break-glass accounts but monitor them separately. Use Authentication Strengths to require phishing-resistant
      MFA (FIDO2/Windows Hello) for admins. Allow 'remember MFA for 14 days' on compliant devices to reduce user friction.
    advancedDetection: '// KQL: Detect sign-ins without MFA

      SigninLogs

      | where TimeGenerated > ago(24h)

      | where AuthenticationRequirement == ''singleFactorAuthentication''

      | where ResultType == 0  // Successful

      | where AppDisplayName !in (''Azure Portal'', ''Microsoft Graph'')  // Focus on cloud apps

      | summarize Count = count() by UserPrincipalName, AppDisplayName

      | sort by Count desc'
    relatedIds:
    - az-002
    - az-003
