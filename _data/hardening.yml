- id: gcp-013
  platform: gcp
  category: identity
  severity: high
  title: Review IAM recommender suggestions
  description: Use IAM Recommender to identify and remove excess permissions.
  reference: Google Cloud Security Best Practices
  command: "gcloud recommender recommendations list \\\n  --recommender=google.iam.policy.Recommender \\\n  --project=<project> --location=global \\\n  --format='table(content.operationGroups[0].operations[0].path,\
    \ priority, stateInfo.state)'\n"
  premium:
    attackPerspective: IAM Recommender analyzes 90 days of actual API usage and suggests removing unused permissions. Ignoring these recommendations means accounts retain permissions they never use — exactly
      the permissions an attacker will use. The delta between 'permissions granted' and 'permissions used' is your attack surface. Every unused permission is a capability an attacker gets for free.
    implementationNotes: "# List all IAM recommendations for a project\ngcloud recommender recommendations list \\\n  --recommender=google.iam.policy.Recommender \\\n  --project=PROJECT_ID \\\n  --location=global\
      \ \\\n  --format='table(name,content.overview.member,content.overview.removedRole,content.overview.addedRoles,stateInfo.state)'\n\n# Apply a recommendation:\ngcloud recommender recommendations mark-claimed\
      \ \\\n  --recommender=google.iam.policy.Recommender \\\n  --project=PROJECT_ID \\\n  --location=global \\\n  --recommendation=RECOMMENDATION_ID \\\n  --etag=ETAG \\\n  --state-metadata=reviewer=security-team\n\
      \n# Automate review with Policy Intelligence API:\n# Set up weekly export of recommendations to BigQuery\n# Create a dashboard tracking recommendation age and priority\n\n# Review and apply insights\
      \ too:\ngcloud recommender insights list \\\n  --insight-type=google.iam.policy.Insight \\\n  --project=PROJECT_ID \\\n  --location=global"
    validationNotes: "# Count pending recommendations\ngcloud recommender recommendations list \\\n  --recommender=google.iam.policy.Recommender \\\n  --project=PROJECT_ID --location=global \\\n  --filter='stateInfo.state=ACTIVE'\
      \ --format=json | jq 'length'\n\n# Track recommendation age (stale recommendations indicate governance gap)\ngcloud recommender recommendations list \\\n  --recommender=google.iam.policy.Recommender\
      \ \\\n  --project=PROJECT_ID --location=global \\\n  --format='table(name,lastRefreshTime,stateInfo.state)' | sort"
    tuningNotes: Not all recommendations should be applied blindly — some workloads have seasonal access patterns (quarterly reporting, annual audits). Cross-reference recommendations with the team before
      applying. Set up a weekly review cadence where the security team triages recommendations. Apply low-risk ones (remove unused viewer roles) immediately, and escalate high-impact ones (role changes
      on production SAs) for team review.
    advancedDetection: "-- Track recommendation application rate\nSELECT\n  DATE(timestamp) as date,\n  COUNT(*) as recommendations_applied\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE\
      \ protopayload_auditlog.methodName LIKE '%recommender%mark%'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 90 DAY)\nGROUP BY date\nORDER BY date DESC"
    relatedIds:
    - gcp-011
    - gcp-009
  tags:
