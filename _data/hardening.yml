      5. Enable firewall rule logging for denied traffic

      6. Delete or disable the ''default-allow-ssh'' and ''default-allow-rdp'' rules'
    validationNotes: "# Verify no open rules remain\ngcloud compute firewall-rules list \\\n  --filter='sourceRanges:0.0.0.0/0 AND direction=INGRESS AND disabled=false' \\\n  --format='table(name,allowed,sourceRanges)'\n\
      \n# Should return empty or only load balancer health check rules\n\n# Test with nmap from external\nnmap -sS -Pn <external_ip>"
    tuningNotes: GCP health checks require 0.0.0.0/0 from Google probe ranges (35.191.0.0/16, 130.211.0.0/22). Don't remove these. Also, GKE master authorized networks should use a specific CIDR, not 0.0.0.0/0.
