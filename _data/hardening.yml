      aws cloudtrail describe-trails --query ''trailList[].{Name:Name,MultiRegion:IsMultiRegionTrail,Validation:LogFileValidationEnabled}''


      # Check for recent events

      aws cloudtrail lookup-events --max-results 5'
    advancedDetection: "# Detect CloudTrail tampering\nindex=aws sourcetype=aws:cloudtrail\n  eventName IN (\"StopLogging\", \"DeleteTrail\", \"UpdateTrail\", \"PutEventSelectors\")\n| table _time, sourceIPAddress,\
      \ userIdentity.arn, eventName, errorCode\n| sort _time"
