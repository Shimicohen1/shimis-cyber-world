  title: Ensure modern authentication for Exchange Online is enabled.
  description: Modern authentication is enabled by default for all Exchange Online tenants since 2020. Verify via Get-OrganizationConfig | fl OAuth2ClientProfileEnabled.
  reference: CIS.6.5.1 — CIS M365 / Microsoft Secure Score — Exchange Online
  command: Get-OrganizationConfig | fl OAuth2ClientProfileEnabled
  tags:
  - exchange-online
  - modern-auth
  - legacy-protocols
  - authentication
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Legacy authentication protocols (POP3, IMAP, SMTP, EWS with basic auth) don't support MFA. Attackers use credential stuffing against these endpoints — even if MFA is enforced on modern
      auth, a user's password alone grants mailbox access via legacy protocols. This is the most common MFA bypass in M365.
    implementationNotes: "# Check modern auth status\nGet-OrganizationConfig | Select OAuth2ClientProfileEnabled\n# Must be True\n\n# Block legacy auth via Conditional Access (recommended)\n$params = @{\n\
      \  DisplayName = 'Block Legacy Authentication'\n  State = 'enabled'\n  Conditions = @{\n    ClientAppTypes = @('exchangeActiveSync','other')\n    Users = @{ IncludeUsers = @('All') }\n    Applications\
      \ = @{ IncludeApplications = @('All') }\n  }\n  GrantControls = @{ BuiltInControls = @('block'); Operator = 'OR' }\n}\nNew-MgIdentityConditionalAccessPolicy @params\n\n# Also disable per-protocol\n\
      Set-CASMailboxPlan -Identity 'ExchangeOnlineEnterprise' -ImapEnabled $false -PopEnabled $false"
    validationNotes: '# Verify OAuth2 is enabled

      (Get-OrganizationConfig).OAuth2ClientProfileEnabled

      # Expected: True


      # Check for legacy auth sign-ins

      # Azure AD > Sign-in logs > Filter: Client App = Legacy

      Get-MgAuditLogSignIn -Filter "clientAppUsed ne ''Browser'' and clientAppUsed ne ''Mobile Apps and Desktop clients''" -Top 10 | Select UserPrincipalName, ClientAppUsed, Status'
    tuningNotes: 'Before blocking legacy auth, run a Conditional Access policy in report-only mode for 2-4 weeks to identify who''s using legacy protocols. Common offenders: old Outlook versions, multifunction
      printers scanning to email, and legacy LOB apps. Migrate these before enforcing.'
    advancedDetection: '// KQL: Detect successful legacy auth sign-ins

      SigninLogs

      | where TimeGenerated > ago(24h)

      | where ClientAppUsed in (''Exchange ActiveSync'',''IMAP4'',''POP3'',''MAPI Over HTTP'',''Authenticated SMTP'',''Other clients'')

      | where ResultType == 0

      | summarize Count=count() by UserPrincipalName, ClientAppUsed, IPAddress

      | sort by Count desc'
