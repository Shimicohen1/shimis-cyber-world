- id: m365-080
  platform: m365-power
  category: services
  severity: high
  title: Ensure Service Principals cannot create and use profiles.
  description: Check Power BI Admin Portal → Tenant settings.
  reference: CIS.9.1.11 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings'
  premium:
    attackPerspective: Service principal profiles allow apps to impersonate different identities when accessing Power BI, creating multiple 'virtual users' from a single credential. If unrestricted, a compromised
      service principal can create profiles to access data across workspace boundaries, evading per-principal access controls and making forensic attribution nearly impossible.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Developer settings

      # ''Service principals can create and use profiles'' → Disabled


      # Service principal profiles are a multi-tenancy feature for ISVs

      # Most organizations should disable this unless building SaaS on Power BI


      # If needed for ISV scenarios:

      # Enable only for a specific security group containing ISV app registrations

      # Monitor profile creation and usage through audit logs


      # Alternative for multi-tenancy:

      # Use separate service principals per tenant/customer

      # This provides better isolation and auditability'
    validationNotes: '# Verify service principal profiles are disabled

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -like ''*profile*'' }


      # Check if any profiles exist:

      Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-90) -EndDate (Get-Date) -RecordType PowerBIAudit -Operations ''CreateServicePrincipalProfile'' | Format-Table CreationDate, UserIds'
    tuningNotes: This setting is primarily relevant for ISV scenarios where Power BI Embedded is used for multi-tenant applications. If your organization is not building SaaS products on Power BI, disable
      this without impact. If you are an ISV, restrict to the specific app registrations that need it.
    advancedDetection: '// KQL: Monitor service principal profile operations

      PowerBIActivity

      | where TimeGenerated > ago(30d)

      | where Activity has ''Profile'' and Activity has ''ServicePrincipal''

      | project TimeGenerated, UserId, Activity, ItemName

      | sort by TimeGenerated desc'
    relatedIds:
    - m365-079
    - m365-081
  tags:
  - power-platform
  - governance
- id: m365-081
  platform: m365-power
  category: services
  severity: high
  title: Ensure service principals ability to create workspaces, connections and deployment pipelines is restricted.
  description: Check Power BI Admin Portal → Tenant settings.
  reference: CIS.9.1.12 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings'
  premium:
    attackPerspective: When service principals can create workspaces, connections, and deployment pipelines, an attacker with a compromised app registration can build an entire shadow BI infrastructure.
      They can create workspaces to stage exfiltrated data, establish connections to on-premises data gateways, and set up pipelines that promote malicious content to production — all without human interaction.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Workspace settings

      # ''Service principals can create workspaces'' → Disabled or specific groups only


      # Developer settings:

      # ''Allow service principals to create and manage workspace connections'' → Disabled

      # ''Allow service principals to create deployment pipelines'' → Disabled


      # For CI/CD scenarios that need automated deployments:

      # Create a dedicated ''PowerBI-CICD'' security group

      # Add only the deployment service principal

      # Enable workspace creation and pipeline management only for this group


      # Use Managed Identity instead of app registrations where possible:

      # Managed identities are tied to Azure resources and don''t have extractable credentials'
    validationNotes: "# Verify service principal workspace/pipeline restrictions\nGet-PowerBITenantSetting | Where-Object { \n    $_.SettingName -like '*ServicePrincipal*workspace*' -or \n    $_.SettingName\
      \ -like '*ServicePrincipal*pipeline*' -or \n    $_.SettingName -like '*ServicePrincipal*connection*' \n}\n\n# List workspaces created by service principals:\nSearch-UnifiedAuditLog -StartDate (Get-Date).AddDays(-90)\
      \ -EndDate (Get-Date) -RecordType PowerBIAudit -Operations 'CreateFolder' | Where-Object {\n    ($_.AuditData | ConvertFrom-Json).UserType -eq 'ServicePrincipal'\n} | Format-Table CreationDate, UserIds"
    tuningNotes: In mature DevOps organizations, one or two service principals legitimately need these capabilities for CI/CD. Document these exceptions, use Managed Identities where possible, and ensure
      the service principal credentials are stored in Azure Key Vault with automatic rotation.
    advancedDetection: '// KQL: Detect service principal infrastructure creation

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where UserType == ''ServicePrincipal''

      | where Activity in (''CreateFolder'', ''CreateDeploymentPipeline'', ''CreateConnection'', ''CreateGatewayCluster'')

      | project TimeGenerated, UserId, Activity, ItemName

      | sort by TimeGenerated desc'
    relatedIds:
