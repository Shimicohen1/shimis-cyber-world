  tags:
  - exchange-online
  - smtp-auth
  - legacy-auth
  - brute-force
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: SMTP AUTH allows direct mailbox authentication with username/password — no MFA. Attackers use it for credential stuffing, sending phishing from compromised accounts, and establishing
      persistent access. It's the most abused legacy protocol endpoint in M365.
    implementationNotes: '# Disable SMTP AUTH org-wide

      Set-TransportConfig -SmtpClientAuthenticationDisabled $true


      # Check per-mailbox overrides

      Get-EXOMailbox -ResultSize Unlimited | Where-Object { $_.SmtpClientAuthenticationDisabled -eq $false } | Select UserPrincipalName


      # Disable per-mailbox overrides

      Get-EXOMailbox -ResultSize Unlimited | Where-Object { $_.SmtpClientAuthenticationDisabled -eq $false } | Set-CASMailbox -SmtpClientAuthenticationDisabled $true'
    validationNotes: '# Verify org-wide setting

      (Get-TransportConfig).SmtpClientAuthenticationDisabled

      # Expected: True


      # Verify no per-mailbox exceptions

      Get-EXOMailbox -ResultSize Unlimited | Where-Object { $_.SmtpClientAuthenticationDisabled -eq $false } | Measure

      # Expected: Count = 0'
    tuningNotes: 'Multifunction printers and LOB apps often require SMTP AUTH to send email. Migrate these to: (1) Azure Communication Services, (2) Direct Send (no auth needed for internal), or (3) OAuth2
      SMTP if the device supports it. If SMTP AUTH is absolutely required, enable it only on a dedicated service mailbox with a strong unique password.'
    advancedDetection: '// KQL: Detect SMTP AUTH usage

      SigninLogs

      | where TimeGenerated > ago(7d)

      | where ClientAppUsed == ''Authenticated SMTP''

      | summarize Count=count() by UserPrincipalName, IPAddress, ResultType

      | sort by Count desc'
