- id: cop-001
  platform: m365-copilot
  category: encryption
  severity: critical
  title: Enforce DLP policies for Copilot responses
  description: Configure Microsoft Purview Data Loss Prevention policies to detect and block sensitive information (PII, financial data, health records) in Copilot prompts and responses. DLP policies prevent Copilot from surfacing regulated data such as credit card numbers, SSNs, or health information in generated output. Without DLP enforcement, Copilot may inadvertently expose sensitive data in its responses to users who have broad file access.
  reference: https://learn.microsoft.com/en-us/purview/ai-microsoft-purview
  command: |
    # Connect to Security & Compliance PowerShell
    Connect-IPPSSession

    # Create a DLP policy targeting Copilot interactions
    New-DlpCompliancePolicy -Name "Copilot DLP - Block Sensitive Data" `
      -Comment "Prevents Copilot from surfacing regulated data" `
      -ExchangeLocation All `
      -SharePointLocation All `
      -OneDriveLocation All `
      -TeamsLocation All `
      -Mode Enable

    # Add a rule to detect credit card numbers in Copilot context
    New-DlpComplianceRule -Name "Block Credit Cards in Copilot" `
      -Policy "Copilot DLP - Block Sensitive Data" `
      -ContentContainsSensitiveInformation @{Name="Credit Card Number"; minCount="1"} `
      -BlockAccess $true `
      -NotifyUser "SiteAdmin"

    # Verify policy
    Get-DlpCompliancePolicy -Identity "Copilot DLP - Block Sensitive Data" | FL Name, Mode, Workload
  premium:
    attackPerspective: Without DLP enforcement, Copilot becomes an uncontrolled data exfiltration tool. A user with broad file access can ask Copilot to "summarize all documents mentioning salary ranges" or "list all credit card numbers in our finance folder" and Copilot will comply — returning sensitive data in a conversational format that bypasses traditional DLP controls on file downloads and email. Attackers with compromised accounts specifically target Copilot for rapid data reconnaissance.
    implementationNotes: |
      1. Connect to Security & Compliance PowerShell: Connect-IPPSSession
      2. Create a DLP policy scoping Exchange, SharePoint, OneDrive, and Teams
      3. Add rules for each sensitive info type: Credit Card, SSN, IBAN, health records
      4. Set action to Block with admin notification
      5. Start in TestWithNotifications mode — review matches for 2 weeks
      6. Escalate to Enforce mode after validating no false positives on business-critical workflows
    validationNotes: |
      # Verify DLP policy is active and scoped to Copilot workloads
      Get-DlpCompliancePolicy | Where-Object { $_.Name -like "*Copilot*" } |
        Select Name, Mode, Workload, Enabled
      # Expected: Mode = Enable, Workload includes SharePointOnline, Exchange, Teams

      # Test: Ask Copilot to summarize a document containing test credit card numbers
      # Copilot should return a policy tip or redacted response

      # Check DLP alerts in Microsoft Purview
      # Navigate: Purview portal → Data Loss Prevention → Alerts
    tuningNotes: Start with high-confidence sensitive info types (credit cards, SSNs) before expanding to custom types. Some organizations need to allow Copilot to reference financial data for authorized users — use scoped DLP policies per user group rather than tenant-wide blocks. Monitor false positive rates in DLP Activity Explorer.
    advancedDetection: |
      // KQL: Monitor DLP policy matches on Copilot interactions
      DLPEvents
      | where TimeGenerated > ago(7d)
      | where Application contains "Copilot" or Application contains "M365Chat"
      | summarize MatchCount=count() by UserPrincipalName, PolicyName, SensitiveInfoType
      | sort by MatchCount desc
    relatedIds:
    - cop-002
    - cop-005
  tags:
  - copilot
  - dlp
  - purview
  - data-leakage
  - compliance
  - ai-security
  commandLanguage: powershell
- id: cop-002
  platform: m365-copilot
  category: encryption
  severity: critical
  title: Enforce sensitivity label inheritance for Copilot outputs
  description: Ensure Microsoft 365 Copilot respects and inherits sensitivity labels from source documents. When Copilot accesses encrypted files, it must honor the EXTRACT usage right — users without EXTRACT permission cannot have that data returned by Copilot. Configure auto-labeling policies to ensure Copilot-generated content inherits the highest sensitivity label from referenced sources. Without this, Copilot could create unprotected copies of classified content.
  reference: https://learn.microsoft.com/en-us/purview/sensitivity-labels
  command: |
    # Connect to Security & Compliance PowerShell
    Connect-IPPSSession

    # Verify sensitivity labels are published
    Get-LabelPolicy | Select Name, Labels, ExchangeLocation

    # Ensure sensitivity labels are enabled for SharePoint and OneDrive
    # (Required for Copilot to honor labels on stored files)
    Set-SPOTenant -EnableAIPIntegration $true

    # Verify label settings — ensure EXTRACT right is NOT granted to broad groups
    Get-Label | ForEach-Object {
      $label = $_
      Get-LabelPolicy | Where-Object { $_.Labels -contains $label.Name } |
        Select @{N='Label';E={$label.Name}}, @{N='Policy';E={$_.Name}}, @{N='Encryption';E={$label.EncryptionEnabled}}
    }

    # Create auto-labeling policy for Copilot-generated content
    New-AutoSensitivityLabelPolicy -Name "Auto-Label Copilot Content" `
      -SharePointLocation All `
      -OneDriveLocation All `
      -Mode TestWithNotifications
  premium:
    attackPerspective: Sensitivity labels are the last line of defense against Copilot data leakage. If Copilot generates a Word document summarizing a "Highly Confidential" source, but the new document has no label, that summary can be freely shared, emailed, or downloaded — bypassing all encryption and access controls on the original. Attackers who compromise a licensed account use Copilot to create unprotected copies of classified content, effectively laundering data through AI.
    implementationNotes: |
      1. Enable sensitivity labels for SharePoint/OneDrive: Set-SPOTenant -EnableAIPIntegration $true
      2. Verify all critical labels have encryption with EXTRACT right restricted
      3. Deploy auto-labeling policies to catch Copilot-generated content in test mode first
      4. Enable "mandatory labeling" in the Label Policy so users must classify Copilot outputs
      5. For SharePoint sites with Confidential/HC labels — verify RAC is also enabled (defense in depth)
    validationNotes: |
      # Verify AIP integration is enabled
      Get-SPOTenant | Select EnableAIPIntegration
      # Expected: True

      # Check which labels have EXTRACT right restrictions
      Get-Label | Where-Object { $_.EncryptionEnabled -eq $true } |
        Select Name, EncryptionEnabled, EncryptionContentExpiredOnDateInDaysOrNever

      # Test: Open a "Highly Confidential" encrypted doc, ask Copilot to summarize
      # The summary should inherit the HC label and encryption
    tuningNotes: Auto-labeling policies can generate high false-positive rates on generic content. Scope auto-labeling to specific SharePoint sites or document libraries first. Use simulation mode for 30 days before enforcement. Users who frequently use Copilot for drafting may find mandatory labeling disruptive — provide training and pre-configured label defaults.
    advancedDetection: |
      // KQL: Detect Copilot creating files with lower sensitivity than source
      CopilotInteractionEvents
      | where TimeGenerated > ago(7d)
      | extend SourceLabel = tostring(parse_json(AccessedResources)[0].SensitivityLabel)
      | extend OutputLabel = tostring(parse_json(AuditData).OutputSensitivityLabel)
      | where SourceLabel != "" and (OutputLabel == "" or OutputLabel == "General")
      | project TimeGenerated, UserPrincipalName, SourceLabel, OutputLabel
    relatedIds:
    - cop-001
    - cop-006
  tags:
  - copilot
  - sensitivity-labels
  - purview
  - encryption
  - data-classification
  - ai-security
  commandLanguage: powershell
- id: cop-003
  platform: m365-copilot
  category: identity
  severity: critical
  title: Apply Conditional Access policies for Copilot access
  description: Configure Entra ID Conditional Access policies to control who can access Microsoft 365 Copilot and under what conditions. Require MFA, compliant devices, and trusted locations for Copilot usage. Copilot inherits tenant-level Conditional Access policies for SharePoint and other M365 services. Without CA enforcement, Copilot could be accessed from unmanaged devices on untrusted networks, increasing the risk of data exfiltration through AI-generated summaries.
  reference: https://learn.microsoft.com/en-us/entra/identity/conditional-access/overview
  command: |
    # Connect to Microsoft Graph
    Connect-MgGraph -Scopes "Policy.ReadWrite.ConditionalAccess"

    # Create Conditional Access policy requiring MFA and compliant device for Office 365
    # (Copilot inherits Office 365 / SharePoint CA policies)
    $params = @{
      DisplayName = "Require MFA + Compliant Device for Copilot Access"
      State = "enabledForReportingButNotEnforced"
      Conditions = @{
        Applications = @{
          IncludeApplications = @("Office365")
        }
        Users = @{
          IncludeGroups = @("<Copilot-Users-Group-ID>")
        }
        Platforms = @{
          IncludePlatforms = @("all")
        }
      }
      GrantControls = @{
        Operator = "AND"
        BuiltInControls = @("mfa", "compliantDevice")
      }
    }
    New-MgIdentityConditionalAccessPolicy -BodyParameter $params

    # Verify the policy
    Get-MgIdentityConditionalAccessPolicy | Where-Object { $_.DisplayName -like "*Copilot*" } |
      Select DisplayName, State
  premium:
    attackPerspective: Copilot inherits access through Microsoft Graph — if a compromised account has a valid session from an unmanaged device or untrusted network, Copilot becomes a rapid data extraction tool. An attacker can ask "show me all documents about Project X" from a hotel kiosk. Without CA policies requiring MFA and device compliance for Copilot access, there's no friction between a stolen session token and full organizational data access via AI.
    implementationNotes: |
      1. Create a dedicated CA policy targeting "Office365" cloud app (Copilot inherits this)
      2. Scope to the Copilot-licensed users security group
      3. Require: MFA + Compliant device (or Hybrid Azure AD joined)
      4. Block: Legacy authentication protocols (Copilot doesn't need them)
      5. Start in Report-only mode — review sign-in logs for 1 week
      6. Move to Enabled after confirming no legitimate user impact
    validationNotes: |
      # Verify CA policy is active
      Connect-MgGraph -Scopes "Policy.Read.All"
      Get-MgIdentityConditionalAccessPolicy |
        Where-Object { $_.DisplayName -like "*Copilot*" } |
        Select DisplayName, State, GrantControls

      # Test from non-compliant device — Copilot should be blocked
      # Test from compliant device with MFA — should work

      # Check sign-in logs for Copilot access
      Get-MgAuditLogSignIn -Filter "appDisplayName eq 'Microsoft 365 Copilot'" -Top 20 |
        Select UserPrincipalName, AppDisplayName, ConditionalAccessStatus, DeviceDetail
    tuningNotes: Some organizations allow Copilot access from mobile devices via Intune MAM without full device enrollment. In that case, use App Protection Policies as a grant control instead of requiring device compliance. Exclude break-glass accounts but ensure they have separate monitoring.
    advancedDetection: |
      // KQL: Detect Copilot access from non-compliant devices
      SigninLogs
      | where TimeGenerated > ago(24h)
      | where AppDisplayName has "Copilot" or ResourceDisplayName has "Copilot"
      | where DeviceDetail.isCompliant != true
      | project TimeGenerated, UserPrincipalName, IPAddress, Location, DeviceDetail, ConditionalAccessStatus
    relatedIds:
    - cop-004
    - cop-005
  tags:
  - copilot
  - conditional-access
  - entra-id
  - mfa
  - zero-trust
  - ai-security
  commandLanguage: powershell
- id: cop-004
  platform: m365-copilot
  category: identity
  severity: high
  title: Restrict Copilot access to authorized user groups only
  description: Limit Microsoft 365 Copilot license assignment to specific security groups rather than deploying organization-wide. Use a phased rollout approach — assign licenses only to vetted groups after oversharing remediation is complete for their data scope. Unrestricted Copilot deployment amplifies existing permission sprawl, as Copilot surfaces all content a user can access, including documents shared via overly broad "Everyone Except External Users" links.
  reference: https://learn.microsoft.com/en-us/microsoft-365/copilot/microsoft-365-copilot-setup
  command: |
    # Connect to Microsoft Graph
    Connect-MgGraph -Scopes "User.ReadWrite.All", "Directory.ReadWrite.All"

    # Create a security group for Copilot-licensed users
    New-MgGroup -DisplayName "Copilot Licensed Users" `
      -MailEnabled:$false `
      -SecurityEnabled:$true `
      -MailNickname "CopilotLicensedUsers" `
      -Description "Users approved for Microsoft 365 Copilot access"

    # Assign Copilot license to a specific user via Group-based licensing
    # Navigate: Entra admin center → Groups → Copilot Licensed Users → Licenses
    # Assign: Microsoft 365 Copilot license to the group

    # PowerShell: Verify license assignment
    Get-MgUser -Filter "assignedLicenses/any(l:l/skuId eq '<Copilot-SKU-ID>')" |
      Select DisplayName, UserPrincipalName | Format-Table

    # Remove Copilot license from unauthorized users
    # Set-MgUserLicense -UserId "<user-id>" -RemoveLicenses @("<Copilot-SKU-ID>") -AddLicenses @{}
  premium:
    attackPerspective: Deploying Copilot organization-wide before remediating oversharing is the #1 mistake enterprises make. Copilot surfaces ALL content a user can access — including files shared years ago via "Everyone Except External Users" links that users forgot about. A single marketing intern with a Copilot license can discover board meeting minutes, M&A documents, and salary data simply by asking the right question. Phased rollout with permission audits first prevents this amplification effect.
    implementationNotes: |
      1. Create an Entra ID security group: "Copilot Licensed Users"
      2. Use group-based licensing to assign Copilot licenses only to this group
      3. Before adding users, run SharePoint oversharing reports for their data scope
      4. Add users in waves: IT first, then finance, then general — each wave after permission review
      5. Monitor Copilot audit logs for unexpected data access patterns after each wave
    validationNotes: |
      # List all users with Copilot license
      Connect-MgGraph -Scopes "User.Read.All"
      Get-MgUser -Filter "assignedLicenses/any(l:l/skuId eq '<Copilot-SKU-ID>')" -CountVariable count |
        Select DisplayName, UserPrincipalName, Department
      Write-Host "Total Copilot users: $count"

      # Verify no unintended users have Copilot
      # Compare against the approved security group membership
      $approved = Get-MgGroupMember -GroupId "<group-id>" | Select -ExpandProperty Id
      $licensed = Get-MgUser -Filter "assignedLicenses/any(l:l/skuId eq '<Copilot-SKU-ID>')" | Select -ExpandProperty Id
      $unauthorized = $licensed | Where-Object { $_ -notin $approved }
      if ($unauthorized) { Write-Warning "Unauthorized Copilot users found: $($unauthorized.Count)" }
    tuningNotes: Some organizations use self-service license requests via MyAccess portal. If enabled, add an approval workflow requiring manager + IT security sign-off before Copilot access is granted. Set up a recurring access review (quarterly) to remove Copilot licenses from users who have changed roles or left sensitive projects.
    advancedDetection: |
      // KQL: Monitor Copilot license assignment changes
      AuditLogs
      | where TimeGenerated > ago(7d)
      | where OperationName == "Change user license"
      | extend License = tostring(TargetResources[0].modifiedProperties)
      | where License has "Copilot"
      | project TimeGenerated, InitiatedBy, TargetResources[0].userPrincipalName, License
    relatedIds:
    - cop-003
    - cop-006
  tags:
  - copilot
  - license-management
  - access-control
  - entra-id
  - least-privilege
  commandLanguage: powershell
- id: cop-005
  platform: m365-copilot
  category: logging
  severity: critical
  title: Enable audit logging for all Copilot interactions
  description: Enable Microsoft Purview unified audit logging to capture all Copilot user interactions, including prompts, responses, accessed resources, sensitivity labels on referenced files, and jailbreak detection flags. Audit records include the CopilotInteraction record type with details such as AppHost, AccessedResources, Messages (with JailbreakDetected flag), and AgentId. Without audit logging, you have no visibility into what data Copilot accesses or whether prompt injection attacks are occurring.
  reference: https://learn.microsoft.com/en-us/purview/audit-copilot
  command: |
    # Connect to Security & Compliance PowerShell
    Connect-IPPSSession

    # Verify unified audit logging is enabled
    Get-AdminAuditLogConfig | Select UnifiedAuditLogIngestionEnabled

    # If not enabled:
    Set-AdminAuditLogConfig -UnifiedAuditLogIngestionEnabled $true

    # Search for Copilot interactions in audit log
    Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-7) -EndDate (Get-Date) `
      -Operations "CopilotInteraction" `
      -ResultSize 50 | Select CreationDate, UserIds, Operations

    # Create audit log retention policy for Copilot events (requires E5)
    New-UnifiedAuditLogRetentionPolicy -Name "Copilot Interactions - 1 Year" `
      -Description "Retain all Copilot interaction audit logs for 1 year" `
      -Operations @("CopilotInteraction") `
      -RetentionDuration TwelveMonths `
      -Priority 100

    # Verify retention policy
    Get-UnifiedAuditLogRetentionPolicy | Where-Object { $_.Name -like "*Copilot*" }
  premium:
    attackPerspective: Without audit logging, Copilot is a blind spot in your security posture. An insider can use Copilot to query sensitive documents, extract key findings, and exfiltrate data — all without triggering traditional file download alerts. Audit logs capture every Copilot prompt, the resources it accessed, and whether jailbreak attempts were detected. In a real compromise, these logs are the only way to determine what data the attacker accessed via AI. The JailbreakDetected flag specifically catches prompt injection attacks.
    implementationNotes: |
      1. Verify unified audit logging is enabled: Get-AdminAuditLogConfig | Select UnifiedAuditLogIngestionEnabled
      2. If not enabled: Set-AdminAuditLogConfig -UnifiedAuditLogIngestionEnabled $true
      3. Create a retention policy for CopilotInteraction events (1 year minimum for compliance)
      4. Configure Microsoft Sentinel data connector for M365 to ingest Copilot audit logs
      5. Create analytics rules for JailbreakDetected=true events
      6. Schedule weekly review of top Copilot users by volume and data sensitivity accessed
    validationNotes: |
      # Verify audit logging is enabled
      Get-AdminAuditLogConfig | Select UnifiedAuditLogIngestionEnabled
      # Expected: True

      # Search for recent Copilot interactions
      Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-1) -EndDate (Get-Date) `
        -Operations "CopilotInteraction" -ResultSize 10 |
        Select CreationDate, UserIds

      # Verify retention policy exists
      Get-UnifiedAuditLogRetentionPolicy | Where-Object { $_.Name -like "*Copilot*" } |
        Select Name, RetentionDuration, Priority
    tuningNotes: Copilot interaction logs can be high volume in large organizations. Focus Sentinel analytics rules on high-risk patterns — jailbreak attempts, access to "Highly Confidential" labeled resources, and unusual query volumes from single users. Set up workbook dashboards for weekly security review rather than alerting on every interaction.
    advancedDetection: |
      // KQL: Detect jailbreak attempts and sensitive data access via Copilot
      let JailbreakAttempts = AuditLogs
      | where TimeGenerated > ago(24h)
      | where OperationName == "CopilotInteraction"
      | extend AuditDetail = parse_json(AdditionalDetails)
      | where AuditDetail.JailbreakDetected == true
      | project TimeGenerated, UserPrincipalName, AuditDetail;
      // Alert on any jailbreak detection
      JailbreakAttempts
      | extend AlertSeverity = "High"
    relatedIds:
