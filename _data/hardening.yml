# ═══════════════════════════════════════════════════════════════
#  CrowdStrike Falcon
# ═══════════════════════════════════════════════════════════════
- id: cs-001
  platform: crowdstrike
  category: services
  severity: critical
  title: Enable sensor anti-tamper protection
  description: Prevent local admins and malware from disabling or uninstalling the Falcon sensor. Enable Sensor Tamper Protection in the prevention policy.
  reference: CrowdStrike Falcon Best Practices — Sensor Hardening
  command: '# Falcon console: Host setup > Sensor update policies
    # Enable "Sensor Tamper Protection" toggle
    # Or via PSFalcon:
    Set-CsPreventionPolicy -Id <policy_id> -Settings @{sensor_anti_tamper=@{enabled=$true}}'
  tags:
  - edr
  - tamper-protection
  - endpoint
- id: cs-002
  platform: crowdstrike
  category: services
  severity: critical
  title: Set sensor update policy to auto-update (N-1)
  description: Configure Falcon sensors to auto-update to N-1 (one version behind latest) for stability while staying current on detection content.
  reference: CrowdStrike Falcon Best Practices — Sensor Updates
  command: '# Falcon console: Host setup > Sensor update policies
    # Set build: N-1 (recommended)
    # Assign policy to all host groups'
  tags:
  - edr
  - patching
  - sensor
- id: cs-003
  platform: crowdstrike
  category: services
  severity: critical
  title: Enable all prevention policy detections in "Prevent" mode
  description: Ensure prevention policies are set to Prevent (not Detect-only) for malware, exploits, and suspicious processes. Detect-only mode logs threats but does not block them.
  reference: CrowdStrike Falcon Prevention Policy Guide
  command: '# Falcon console: Configure > Prevention Policies
    # For each category (Malware, Exploits, Suspicious Processes):
    # Toggle ALL items from "Detect" to "Prevent"
    #
    # Via PSFalcon PowerShell:
    Get-CsPreventionPolicy | Select Id,Name,Prevention_settings'
  tags:
  - edr
  - malware
  - prevention
  - exploit
- id: cs-004
  platform: crowdstrike
  category: services
  severity: critical
  title: Enable cloud-based machine learning (cloud ML) at aggressive level
  description: Set Cloud ML to aggressive or extra aggressive for both on-sensor and cloud-based ML detections. This maximises detection coverage against unknown threats.
  reference: CrowdStrike Falcon ML Configuration
  command: '# Falcon console: Configure > Prevention Policies > Machine Learning
    # On-Sensor ML: Aggressive
    # Cloud ML: Aggressive
    # Apply to all host groups'
  tags:
  - edr
  - machine-learning
  - detection
- id: cs-005
  platform: crowdstrike
  category: identity
  severity: critical
  title: Enforce MFA for Falcon console access
  description: Enable multi-factor authentication for all Falcon console users. A compromised admin credential without MFA allows an attacker to disable protections enterprise-wide.
  reference: CrowdStrike Falcon Console Security
  command: '# Falcon console: Settings > Users > User Management
    # Enforce MFA for all users
    # Support > API Clients: revoke unused API keys
    # Enable SAML SSO with your IdP for centralized access control'
  tags:
  - authentication
  - mfa
  - console-security
