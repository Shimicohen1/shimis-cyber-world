      # Some legacy embedded reports may use ResourceKey

      # Migrate these to service principal or user identity authentication'
    validationNotes: "# Verify ResourceKey Authentication is blocked\nGet-PowerBITenantSetting | Where-Object { $_.SettingName -eq 'BlockResourceKeyAuthentication' }\n\n# Search audit logs for ResourceKey\
      \ usage before blocking:\nSearch-UnifiedAuditLog -StartDate (Get-Date).AddDays(-14) -EndDate (Get-Date) -RecordType PowerBIAudit | Where-Object {\n    $_.AuditData -like '*ResourceKey*'\n} | Select-Object\
      \ CreationDate, UserIds, Operations"
    tuningNotes: Before enabling this setting, inventory all embedded reports and third-party integrations. Some legacy BI portals may rely on ResourceKey auth. Plan a migration window of 2-4 weeks where
      you notify integration owners and help them switch to service principal authentication.
    advancedDetection: '// KQL: Detect ResourceKey authentication attempts

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where AuthenticationMethod has ''ResourceKey'' or Activity has ''ResourceKey''

      | project TimeGenerated, Activity, UserId, ClientIP, UserAgent

