- id: gcp-027
  platform: gcp
  category: encryption
  severity: high
  title: Enable CMEK for BigQuery datasets
  description: Use Customer-Managed Encryption Keys for sensitive BigQuery datasets.
  reference: CIS GCP Foundations Benchmark 7.2
  command: '# Check encryption on datasets

    bq show --format=prettyjson <project>:<dataset> | jq ''.defaultEncryptionConfiguration''

    '
  premium:
    attackPerspective: BigQuery datasets contain some of the most valuable data in any organization — customer records, financial data, analytics. Default Google-managed encryption protects against physical
      theft of hard drives but not against compromised accounts or insider threats. CMEK gives you the ability to revoke access by disabling the key, perform crypto-shredding by destroying the key, and
      audit every decrypt operation through Cloud KMS audit logs.
    implementationNotes: "# Create a KMS key for BigQuery:\ngcloud kms keys create bq-key \\\n  --keyring=data-keyring \\\n  --location=US \\\n  --purpose=encryption \\\n  --rotation-period=90d\n\n# Grant\
      \ BigQuery SA access to the key:\ngcloud kms keys add-iam-policy-binding bq-key \\\n  --keyring=data-keyring --location=US \\\n  --member='serviceAccount:bq-PROJECT_NUM@bigquery-encryption.iam.gserviceaccount.com'\
      \ \\\n  --role='roles/cloudkms.cryptoKeyEncrypterDecrypter'\n\n# Set CMEK on a dataset:\nbq update --default_kms_key=projects/PROJECT/locations/US/keyRings/data-keyring/cryptoKeys/bq-key PROJECT:dataset_name\n\
      \n# For new datasets:\nbq mk --default_kms_key=projects/PROJECT/locations/US/keyRings/data-keyring/cryptoKeys/bq-key PROJECT:new_dataset\n\n# Tables inherit dataset CMEK or can specify their own"
    validationNotes: '# Verify CMEK on datasets:

      bq ls --format=json | jq ''.[] | {datasetId: .datasetReference.datasetId, cmek: .defaultEncryptionConfiguration}''


      # Verify CMEK on specific tables:

      bq show --format=json PROJECT:dataset.table | jq ''.encryptionConfiguration''


      # Monitor key usage:

      gcloud logging read ''protoPayload.serviceName="cloudkms.googleapis.com" AND protoPayload.methodName:"Decrypt"'' --limit=10'
    tuningNotes: CMEK keys must be in the same region as the BigQuery dataset (or multi-region for multi-region datasets). Plan key hierarchy carefully — one key per sensitivity level, not per dataset.
      Rotation creates new key versions automatically; old versions remain for decryption. Never destroy key versions without confirming all data encrypted with them is no longer needed.
    advancedDetection: "-- Monitor BigQuery decryption operations (data access patterns)\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName\
      \ AS key_used,\n  protopayload_auditlog.requestMetadata.callerIp\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.serviceName = 'cloudkms.googleapis.com'\n\
      AND protopayload_auditlog.methodName = 'Decrypt'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-005
    - gcp-030
  tags:
  - gcp
  - encryption
- id: gcp-028
  platform: gcp
  category: encryption
  severity: critical
  title: Enforce uniform bucket-level access for GCS
  description: Disable ACLs and use IAM-only access control for Cloud Storage buckets.
  reference: CIS GCP Foundations Benchmark 5.2
  command: "# Find buckets not using uniform access\ngsutil ls -p <project> | while read bucket; do\n  gsutil uniformbucketlevelaccess get $bucket\ndone\n"
  premium:
    attackPerspective: Legacy ACL-based access on GCS buckets creates a parallel authorization system alongside IAM, making it nearly impossible to audit who has access. An attacker can use ACLs to grant
      allUsers or allAuthenticatedUsers read access — making the bucket public without touching IAM policies. Security scanners that only check IAM will miss these ACL-based exposures. Uniform bucket-level
      access forces all authorization through IAM, eliminating this blind spot.
    implementationNotes: "# Enable uniform bucket-level access:\ngsutil uniformbucketlevelaccess set on gs://BUCKET_NAME\n\n# For all buckets in a project:\nfor bucket in $(gsutil ls -p PROJECT_ID); do\n\
      \  gsutil uniformbucketlevelaccess set on $bucket 2>/dev/null\n  echo \"Enabled: $bucket\"\ndone\n\n# Organization Policy to enforce for new buckets:\ngcloud resource-manager org-policies set-policy\
      \ \\\n  --organization=ORG_ID uniform-access.yaml\n\n# uniform-access.yaml:\n# constraint: constraints/storage.uniformBucketLevelAccess\n# booleanPolicy:\n#   enforced: true\n\n# Note: Enabling is\
      \ irreversible after 90 days\n# During the 90-day window, you can revert if needed"
    validationNotes: "# Check all buckets for uniform access\nfor bucket in $(gsutil ls); do\n  status=$(gsutil uniformbucketlevelaccess get $bucket 2>/dev/null | grep Enabled)\n  echo \"$bucket: $status\"\
      \ndone\n\n# Verify org policy\ngcloud resource-manager org-policies describe \\\n  constraints/storage.uniformBucketLevelAccess \\\n  --organization=ORG_ID\n\n# Find public buckets (pre-migration\
      \ audit):\nfor bucket in $(gsutil ls); do\n  gsutil iam get $bucket 2>/dev/null | grep -q 'allUsers\\|allAuthenticatedUsers' && echo \"PUBLIC: $bucket\"\ndone"
    tuningNotes: Before enabling uniform access, audit existing ACLs. Some legacy apps may depend on object-level ACLs for per-file access control. These need to be migrated to IAM conditions or signed
      URLs. The 90-day grace period allows reverting, but plan for migration to be permanent.
    advancedDetection: "-- Alert on buckets without uniform access\nSELECT\n  timestamp,\n  protopayload_auditlog.resourceName AS bucket,\n  protopayload_auditlog.authenticationInfo.principalEmail\nFROM\
      \ `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'storage.buckets.create'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\n-- Cross-reference\
      \ with bucket metadata to check uniform access"
    relatedIds:
    - gcp-005
    - gcp-019
  tags:
  - gcp
