  description: 'Enable Defender plans for all resource types: Servers, Storage, SQL, Key Vault, App Service.'
  reference: CIS Azure Foundations Benchmark 2.1
  command: '# Check Defender status

    az security pricing list --query "[].{Name:name, Tier:pricingTier}" --output table

    # Enable for key resources

    az security pricing create --name VirtualMachines --tier Standard

    az security pricing create --name SqlServers --tier Standard

    az security pricing create --name StorageAccounts --tier Standard

    '
  tags:
  - defender-for-cloud
  - azure-security
  - monitoring
  - threat-detection
  - cis-azure
  commandLanguage: powershell
  premium:
    attackPerspective: Microsoft Defender for Cloud provides the central security posture and threat detection layer for Azure. Without it, there's no unified view of misconfigurations, no vulnerability
      assessments for VMs, no threat alerts for storage/SQL/Key Vault, and no Secure Score tracking. Attackers specifically target subscriptions without monitoring.
    implementationNotes: "# Check current Defender plans\nConnect-AzAccount\nGet-AzSecurityPricing | Format-Table Name, PricingTier, FreeTrialRemainingTime\n\n# Enable all critical plans\n$plans = @('VirtualMachines','SqlServers','AppServices','StorageAccounts','KeyVaults','Dns','Arm','Containers')\n\
      foreach ($plan in $plans) {\n  Set-AzSecurityPricing -Name $plan -PricingTier 'Standard'\n  Write-Host \"Enabled Defender for $plan\"\n}\n\n# Enable auto-provisioning of Log Analytics agent\nSet-AzSecurityAutoProvisioningSetting\
      \ -Name 'default' -EnableAutoProvision\n\n# Check Secure Score\nGet-AzSecuritySecureScore | Select DisplayName, CurrentScore, MaxScore, Percentage | Format-Table"
    validationNotes: '# Verify all plans are Standard

      Get-AzSecurityPricing | Where-Object { $_.PricingTier -eq ''Free'' }

      # Expected: Empty (all should be Standard)


      # Check active security alerts

      Get-AzSecurityAlert | Where-Object { $_.Status -eq ''Active'' } | Measure-Object


      # Verify Secure Score

      Get-AzSecuritySecureScore | Select Percentage'
    tuningNotes: 'Enable plans incrementally starting with VirtualMachines and StorageAccounts (highest ROI). Review Secure Score recommendations weekly — focus on Quick Wins (high impact, low effort).
      Suppress false positive alerts using suppression rules rather than disabling plans. Cost optimization: use Defender for Servers P1 ($5/server) for dev/test.'
    advancedDetection: '// KQL: Track Defender plan changes (potential tampering)

      AzureActivity

      | where TimeGenerated > ago(7d)

      | where OperationNameValue == ''Microsoft.Security/pricings/write''

      | extend Tier = tostring(parse_json(Properties).resource.properties.pricingTier)

      | extend PlanName = tostring(parse_json(Properties).resource.name)

      | project TimeGenerated, Caller, PlanName, Tier, SubscriptionId

      | where Tier == ''Free''

      | extend AlertSeverity = ''High'''
    relatedIds:
