- id: lin-001
  platform: linux
  category: identity
  severity: critical
  title: Disable root SSH login
  description: Prevent direct root login via SSH. Use sudo for privilege escalation.
  reference: CIS Linux Benchmark 5.2.10
  command: '# /etc/ssh/sshd_config

    PermitRootLogin no

    # Then restart:

    sudo systemctl restart sshd

    '
  premium:
    attackPerspective: Attackers who gain initial access via SSH brute-force or leaked credentials will attempt to escalate to root. If root login is permitted, a single compromised password gives full
      system control. In the 2021 Codecov supply chain attack, SSH keys were the pivot point for lateral movement.
    implementationNotes: '1. Edit /etc/ssh/sshd_config and set PermitRootLogin no

      2. Ensure at least one sudo-capable user exists before disabling

      3. Test SSH access with the sudo user in a SEPARATE session before restarting sshd

      4. For break-glass: configure a local console-only root password via passwd'
    validationNotes: '# Verify root login is disabled

      sudo sshd -T | grep permitrootlogin

      # Expected: permitrootlogin no


      # Test from another machine

      ssh root@<server> # Should be rejected


      # Check auth log for attempts

      sudo grep ''root'' /var/log/auth.log | tail -20'
    tuningNotes: On some legacy systems, automated backup tools or config management agents (Ansible, Puppet) may connect as root. Before disabling, audit authorized_keys on root and migrate those to a
      dedicated service account with limited sudo.
    advancedDetection: '# Detect root login attempts in SIEM

      index=linux sourcetype=syslog "Failed password for root"

      | stats count by src_ip

      | where count > 5

      | sort -count'
    relatedIds:
    - lin-002
    - lin-010
    - lin-016
  tags:
  - ssh
  - cis-benchmark
  - privilege-escalation
  - initial-access
  commandLanguage: bash
  commandFull: '# Full hardening script for SSH root login

    # Step 1: Backup current config

    sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak.$(date +%Y%m%d)


    # Step 2: Disable root login

    sudo sed -i ''s/^#*PermitRootLogin.*/PermitRootLogin no/'' /etc/ssh/sshd_config


    # Step 3: Verify the change

    grep ''^PermitRootLogin'' /etc/ssh/sshd_config


    # Step 4: Test config before restart

    sudo sshd -t


    # Step 5: Restart (only if test passes)

    sudo systemctl restart sshd


    # Step 6: Verify from another session

    ssh root@localhost 2>&1 | grep -i ''denied\|refused''


    # Step 7: Check auth log for confirmation

    sudo tail -5 /var/log/auth.log'
- id: lin-002
  platform: linux
  category: identity
  severity: critical
  title: Enforce SSH key-based authentication
  description: Disable password authentication for SSH. Require public key auth only.
  reference: CIS Linux Benchmark 5.2.12
  command: '# /etc/ssh/sshd_config

    PasswordAuthentication no

    PubkeyAuthentication yes

    # Restart sshd

    sudo systemctl restart sshd

    '
  premium:
    attackPerspective: 'Password-based SSH is the #1 vector for automated attacks. Botnets like Mirai scan millions of IPs for SSH password auth. After the 2024 XZ Utils backdoor attempt (CVE-2024-3094),
      key-based auth became even more critical as a defense-in-depth layer.'
    implementationNotes: '1. Generate ED25519 key pair: ssh-keygen -t ed25519 -C ''admin@org''

      2. Copy public key: ssh-copy-id -i ~/.ssh/id_ed25519.pub user@host

      3. Test key-based login in a NEW terminal session

      4. Only after confirming key login works: set PasswordAuthentication no

      5. Restart sshd: sudo systemctl restart sshd'
    validationNotes: '# Verify password auth is off

      sudo sshd -T | grep passwordauthentication

      # Expected: passwordauthentication no


      # Attempt password login (should fail)

      ssh -o PreferredAuthentications=password user@<host>'
    tuningNotes: If you use SFTP for automated transfers, ensure those accounts also use key-based auth or are in a Match block with forced-commands.
    relatedIds:
    - lin-001
    - lin-016
    - lin-025
  tags:
  - ssh
  - authentication
  - cis-benchmark
  - brute-force-prevention
  commandLanguage: bash
- id: lin-003
  platform: linux
  category: identity
  severity: high
  title: Set password complexity and aging
  description: Enforce minimum password length, complexity, and 90-day expiration.
  reference: CIS Linux Benchmark 5.4.1
  command: '# /etc/security/pwquality.conf

    minlen = 14

    minclass = 4

    # /etc/login.defs

    PASS_MAX_DAYS 90

    PASS_MIN_DAYS 7

    PASS_WARN_AGE 14

    '
- id: lin-004
  platform: linux
  category: identity
  severity: high
  title: Restrict sudo access
  description: Limit sudo privileges to a dedicated admin group. Audit sudoers regularly.
  reference: CIS Linux Benchmark 5.3
  command: '# List current sudo users

    grep -r ''ALL'' /etc/sudoers /etc/sudoers.d/

    # Restrict to admin group only

    sudo visudo

    # Ensure: %admin ALL=(ALL:ALL) ALL

    '
- id: lin-005
  platform: linux
  category: identity
  severity: medium
  title: Lock inactive user accounts
  description: Automatically lock accounts after 30 days of inactivity.
  reference: CIS Linux Benchmark 5.4.1.4
  command: 'sudo useradd -D -f 30

    # For existing users:

    sudo chage --inactive 30 <username>

    '
- id: lin-006
  platform: linux
  category: network
  severity: critical
  title: Configure firewall (iptables/nftables)
  description: Default deny inbound. Allow only required ports (SSH, HTTPS). Log dropped packets.
  reference: CIS Linux Benchmark 3.5
  command: '# UFW example (Ubuntu)

    sudo ufw default deny incoming

    sudo ufw default allow outgoing

    sudo ufw allow 22/tcp

    sudo ufw allow 443/tcp

    sudo ufw enable

    sudo ufw status verbose

    '
  premium:
    attackPerspective: An open firewall means every listening service is directly attackable from the network. In the Capital One breach (2019), a misconfigured WAF combined with open ports enabled SSRF
      exploitation. Defense-in-depth starts at the network layer.
    implementationNotes: '1. Inventory all required ports: ss -tlnp

      2. Set default deny: sudo ufw default deny incoming

      3. Allow only required ports: sudo ufw allow 22/tcp; sudo ufw allow 443/tcp

      4. Enable: sudo ufw enable

      5. For iptables: use iptables-persistent to survive reboots'
    validationNotes: '# Check firewall status

      sudo ufw status verbose


      # Port scan yourself

      nmap -sS -p 1-65535 localhost


      # From external machine

      nmap -sS -Pn <target_ip>'
    tuningNotes: For containerized workloads, remember that Docker modifies iptables directly and may bypass UFW rules. Use --iptables=false in Docker daemon config and manage container networking through
      the firewall.
    relatedIds:
    - lin-007
    - lin-008
    - lin-021
  tags:
  - firewall
  - network-security
  - cis-benchmark
  - ufw
  - iptables
  commandLanguage: bash
  commandFull: '# Complete firewall hardening script (UFW)

    # Step 1: Reset to defaults

    sudo ufw --force reset


    # Step 2: Set default policies

    sudo ufw default deny incoming

    sudo ufw default allow outgoing


    # Step 3: Allow required services

    sudo ufw allow 22/tcp comment ''SSH''

    sudo ufw allow 443/tcp comment ''HTTPS''

    # Add more as needed:

    # sudo ufw allow from 10.0.0.0/8 to any port 5432 comment ''Postgres internal''


    # Step 4: Enable logging

    sudo ufw logging on


    # Step 5: Enable firewall

    sudo ufw --force enable


    # Step 6: Verify

    sudo ufw status verbose

    sudo ufw status numbered'
- id: lin-007
  platform: linux
  category: network
  severity: high
  title: Disable IP forwarding
  description: Unless the system is a router, disable IP forwarding to prevent packet routing attacks.
  reference: CIS Linux Benchmark 3.1.1
  command: '# /etc/sysctl.conf

    net.ipv4.ip_forward = 0

    net.ipv6.conf.all.forwarding = 0

    # Apply

    sudo sysctl -p

    '
- id: lin-008
  platform: linux
  category: network
  severity: high
  title: Disable ICMP redirects
  description: Prevent ICMP redirect acceptance which can be used for man-in-the-middle attacks.
  reference: CIS Linux Benchmark 3.2.2
  command: '# /etc/sysctl.conf

    net.ipv4.conf.all.accept_redirects = 0

    net.ipv4.conf.default.accept_redirects = 0

    net.ipv6.conf.all.accept_redirects = 0

    sudo sysctl -p

    '
- id: lin-009
  platform: linux
  category: logging
  severity: critical
  title: Enable and configure auditd
  description: Install and configure the Linux audit daemon for security event logging.
  reference: CIS Linux Benchmark 4.1
  command: 'sudo apt install auditd audispd-plugins  # Debian/Ubuntu

    sudo systemctl enable auditd

    sudo systemctl start auditd

    # Key rules (/etc/audit/rules.d/audit.rules):

    -w /etc/passwd -p wa -k identity

    -w /etc/shadow -p wa -k identity

    -w /var/log/auth.log -p wa -k auth_log

    -a always,exit -F arch=b64 -S execve -k exec

    '
  premium:
    attackPerspective: Without auditd, attackers operate blind to defenders. Post-exploitation tools like LinPEAS check if auditd is running and adjust their evasion accordingly. In the SolarWinds attack,
      the lack of comprehensive audit logging on some endpoints delayed detection by months.
    implementationNotes: '1. Install: sudo apt install auditd audispd-plugins

      2. Enable and start: sudo systemctl enable --now auditd

      3. Add rules to /etc/audit/rules.d/audit.rules

      4. Load rules: sudo augenrules --load

      5. Set audit log rotation in /etc/audit/auditd.conf'
    validationNotes: '# Check auditd is running

      sudo systemctl status auditd


      # Verify rules are loaded

      sudo auditctl -l


      # Test: modify /etc/passwd and check

      sudo ausearch -k identity -ts recent'
    advancedDetection: '# Key auditd rules for SOC visibility

      -a always,exit -F arch=b64 -S execve -k exec_commands

      -w /etc/passwd -p wa -k identity

      -w /etc/shadow -p wa -k identity

      -a always,exit -F arch=b64 -S connect -k network_connect

      -w /usr/bin/wget -p x -k download_tools

      -w /usr/bin/curl -p x -k download_tools'
    relatedIds:
    - lin-010
    - lin-027
    - lin-028
  tags:
  - auditd
  - logging
  - siem
  - forensics
  - cis-benchmark
  commandLanguage: bash
- id: lin-010
  platform: linux
  category: logging
  severity: high
  title: Ship logs to remote syslog / SIEM
  description: Forward critical logs to a central SIEM or syslog server to prevent local log tampering.
  reference: CIS Linux Benchmark 4.2.1
  command: '# /etc/rsyslog.conf (rsyslog)

    *.* @@siem.company.com:514

    # Or use Elastic Agent / Splunk UF / Azure AMA

    '
- id: lin-011
  platform: linux
  category: encryption
  severity: high
  title: Enforce TLS 1.2+ system-wide
  description: Disable TLS 1.0/1.1 and weak cipher suites across all services.
  reference: CIS Linux Benchmark 1.10
  command: '# /etc/ssl/openssl.cnf

    MinProtocol = TLSv1.2

    # For SSH (/etc/ssh/sshd_config):

    Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com

    MACs hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com

    '
- id: lin-012
  platform: linux
  category: encryption
  severity: medium
  title: Enable filesystem encryption at rest
  description: Use LUKS for full disk encryption or encrypted volumes for sensitive data.
  reference: CIS Linux Benchmark 1.1.1
  command: '# Check if LUKS is configured

    sudo lsblk -f | grep crypto_LUKS

    # Create encrypted volume

    sudo cryptsetup luksFormat /dev/sdX

    sudo cryptsetup open /dev/sdX encrypted_vol

    '
- id: lin-013
  platform: linux
  category: services
  severity: high
  title: Disable unnecessary services
  description: 'Remove or disable services not required: avahi, cups, rpcbind, etc.'
  reference: CIS Linux Benchmark 2.1-2.2
  command: '# List running services

    sudo systemctl list-units --type=service --state=running

    # Disable unnecessary ones

    sudo systemctl disable --now avahi-daemon

    sudo systemctl disable --now cups

    sudo systemctl disable --now rpcbind

    '
- id: lin-014
  platform: linux
  category: services
  severity: high
  title: Set secure file permissions
  description: 'Ensure correct permissions on critical files: passwd, shadow, ssh config.'
  reference: CIS Linux Benchmark 6.1
  command: 'sudo chmod 644 /etc/passwd

    sudo chmod 640 /etc/shadow

    sudo chmod 600 /etc/ssh/sshd_config

    sudo chmod 700 /root

    # Find world-writable files

    sudo find / -type f -perm -0002 -not -path ''/proc/*'' 2>/dev/null

    '
- id: lin-015
  platform: linux
  category: patching
  severity: critical
  title: Enable automatic security updates
  description: Configure unattended-upgrades for automatic security patching.
  reference: CIS Linux Benchmark 1.9
  command: '# Ubuntu/Debian

    sudo apt install unattended-upgrades

    sudo dpkg-reconfigure -plow unattended-upgrades

    # RHEL/CentOS

    sudo dnf install dnf-automatic

    sudo systemctl enable --now dnf-automatic-install.timer

    '
- id: win-001
  platform: windows
  category: identity
  severity: critical
  title: Rename and disable built-in Administrator
  description: Rename the default Administrator account and create a separate admin account.
  reference: CIS Windows Server Benchmark 2.3.1.1
  command: '# PowerShell

    Rename-LocalUser -Name "Administrator" -NewName "scw_admin_disabled"

    Disable-LocalUser -Name "scw_admin_disabled"

    '
  premium:
    attackPerspective: 'The built-in Administrator (RID 500) account has special properties: it cannot be locked out and bypasses UAC. Attackers specifically target it with pass-the-hash. Tools like CrackMapExec
      and Mimikatz prioritize RID 500 for lateral movement.'
    implementationNotes: '1. Create new admin account first: New-LocalUser -Name ''secadmin''

      2. Add to Administrators: Add-LocalGroupMember -Group ''Administrators'' -Member ''secadmin''

      3. Verify new account works with admin privileges

      4. Rename: Rename-LocalUser -Name ''Administrator'' -NewName ''scw_disabled''

      5. Disable: Disable-LocalUser -Name ''scw_disabled'''
    validationNotes: '# Verify Administrator is disabled

      Get-LocalUser | Where-Object {$_.SID -like ''*-500''} | Select Name,Enabled


      # Check no services run as the old account

      Get-WmiObject Win32_Service | Where-Object {$_.StartName -like ''*Administrator*''}'
    tuningNotes: 'Some third-party backup and monitoring agents hardcode ''Administrator'' as the account name. Audit all scheduled tasks and services before renaming. Use: Get-ScheduledTask | Where-Object
      {$_.Principal.UserId -like ''*admin*''}'
    advancedDetection: '# Detect RID 500 logon attempts (Event ID 4624/4625)

      index=windows EventCode IN (4624,4625) TargetUserSid="*-500"

      | stats count by EventCode, SourceNetworkAddress

      | sort -count'
    relatedIds:
    - win-002
    - win-004
    - win-012
  tags:
  - active-directory
  - lateral-movement
  - mimikatz
  - cis-benchmark
  commandLanguage: powershell
  commandFull: '# Full Administrator account hardening script

    # Step 1: Create replacement admin

    $securePass = Read-Host -AsSecureString -Prompt ''Enter password for new admin''

    New-LocalUser -Name ''scw_secadmin'' -Password $securePass -Description ''SCW Security Admin''

    Add-LocalGroupMember -Group ''Administrators'' -Member ''scw_secadmin''


    # Step 2: Verify new admin works (test in separate session first!)


    # Step 3: Rename built-in Administrator

    Rename-LocalUser -Name ''Administrator'' -NewName ''scw_legacy_disabled''


    # Step 4: Disable it

    Disable-LocalUser -Name ''scw_legacy_disabled''


    # Step 5: Verify

    Get-LocalUser | Where-Object { $_.SID -like ''*-500'' } | Select Name, Enabled, LastLogon


    # Step 6: Check no services depend on it

    Get-WmiObject Win32_Service | Where-Object { $_.StartName -like ''*Administrator*'' } | Select Name, StartName

    Get-ScheduledTask | Where-Object { $_.Principal.UserId -like ''*Administrator*'' } | Select TaskName'
- id: win-002
  platform: windows
  category: identity
  severity: critical
  title: Enforce account lockout policy
  description: Lock accounts after 5 failed login attempts for 30 minutes.
  reference: CIS Windows Server Benchmark 1.2
  command: '# PowerShell (GPO or local policy)

    net accounts /lockoutthreshold:5

    net accounts /lockoutduration:30

    net accounts /lockoutwindow:30

    '
- id: win-003
  platform: windows
  category: identity
  severity: high
  title: Require NTLMv2 and refuse LM/NTLMv1
  description: Force NTLMv2 authentication and reject legacy LM hashes.
  reference: CIS Windows Server Benchmark 2.3.11.7
  command: '# GPO: Computer Configuration → Policies → Windows Settings →

    # Security Settings → Local Policies → Security Options

    # "Network security: LAN Manager authentication level"

    # → "Send NTLMv2 response only. Refuse LM & NTLM"

    # Registry:

    Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -Name "LmCompatibilityLevel" -Value 5

    '
- id: win-004
  platform: windows
  category: network
  severity: critical
  title: Enable Windows Firewall on all profiles
  description: Ensure Windows Defender Firewall is enabled for Domain, Private, and Public profiles.
  reference: CIS Windows Server Benchmark 9.1
  command: '# PowerShell

    Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True

    # Verify

    Get-NetFirewallProfile | Select Name, Enabled

    '
- id: win-005
  platform: windows
  category: network
  severity: high
  title: Disable SMBv1
  description: SMBv1 is exploited by WannaCry, EternalBlue, and other attacks. Disable it completely.
  reference: CIS Windows Server Benchmark 18.3.3
  command: '# PowerShell

    Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force

    # Disable SMBv1 client

    Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart

    '
  premium:
    attackPerspective: SMBv1 is the protocol behind EternalBlue (MS17-010), used by WannaCry, NotPetya, and countless ransomware campaigns. Even patched systems remain at risk from new zero-days targeting
      SMBv1. It's an obsolete protocol with no legitimate modern use case.
    implementationNotes: '1. Check current SMB status: Get-SmbServerConfiguration | Select EnableSMB1Protocol

      2. Disable server: Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force

      3. Disable client feature: Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart

      4. Schedule reboot during maintenance window

      5. Monitor for 30 days for any compatibility issues'
    validationNotes: '# Verify SMBv1 is off

      Get-SmbServerConfiguration | Select EnableSMB1Protocol

      # Expected: False


      # Check Windows Feature status

      Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol

      # Expected: State = Disabled


      # Scan for SMBv1 connections in logs

      Get-WinEvent -FilterHashtable @{LogName=''Microsoft-Windows-SMBServer/Audit''} -MaxEvents 100'
    tuningNotes: 'Legacy printers, scanners, and NAS devices from pre-2017 may require SMBv1. Inventory these devices first. Use SMB1 audit logging for 30 days before disabling: Set-SmbServerConfiguration
      -AuditSmb1Access $true'
    relatedIds:
    - win-004
    - win-015
    - win-025
  tags:
  - smb
  - eternalblue
  - wannacry
  - lateral-movement
  - cis-benchmark
  commandLanguage: powershell
- id: win-006
  platform: windows
  category: logging
  severity: critical
  title: Enable PowerShell script block logging
  description: Log all PowerShell script execution for forensic visibility.
  reference: CIS Windows Server Benchmark 18.9.100
  command: '# GPO: Computer Configuration → Administrative Templates →

    # Windows Components → Windows PowerShell

    # → "Turn on PowerShell Script Block Logging" = Enabled

    # Registry:

    New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" -Force

    Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" -Name "EnableScriptBlockLogging" -Value 1

    '
  premium:
    attackPerspective: Without PowerShell logging, attackers can execute encoded commands, download payloads, and extract data with no trace. Tools like PowerSploit, Empire, and Cobalt Strike heavily abuse
      PowerShell. Script Block Logging captures the DECODED content, exposing obfuscation.
    implementationNotes: '1. Open Group Policy Editor: gpedit.msc

      2. Navigate: Computer Configuration → Administrative Templates → Windows Components → Windows PowerShell

      3. Enable ''Turn on PowerShell Script Block Logging''

      4. Enable ''Turn on PowerShell Transcription'' (optional but recommended)

      5. Set transcript directory to a protected location

      6. Deploy via GPO to all servers and workstations'
    validationNotes: '# Check if logging is enabled via registry

      Get-ItemProperty ''HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging''

      # EnableScriptBlockLogging should be 1


      # Test: run a suspicious command

      Invoke-Expression ''whoami''


      # Check for the log entry

      Get-WinEvent -LogName ''Microsoft-Windows-PowerShell/Operational'' -MaxEvents 5'
    advancedDetection: '# SIEM query for suspicious PowerShell (encoded commands)

      index=windows source=WinEventLog:Microsoft-Windows-PowerShell/Operational EventCode=4104

      | search ScriptBlockText="*-enc*" OR ScriptBlockText="*EncodedCommand*" OR ScriptBlockText="*Net.WebClient*" OR ScriptBlockText="*DownloadString*"

      | table _time, ComputerName, ScriptBlockText'
    relatedIds:
    - win-007
    - win-018
    - win-023
  tags:
  - powershell
  - logging
  - detection
  - siem
  - cis-benchmark
  commandLanguage: powershell
- id: win-007
  platform: windows
  category: logging
  severity: critical
  title: Configure Windows Event Forwarding (WEF)
  description: Forward Security, System, and PowerShell event logs to your SIEM.
  reference: CIS Windows Server Benchmark 17
  command: '# Enable audit policies

    auditpol /set /category:"Logon/Logoff" /success:enable /failure:enable

    auditpol /set /category:"Account Logon" /success:enable /failure:enable

    auditpol /set /category:"Object Access" /success:enable /failure:enable

    auditpol /set /category:"Privilege Use" /success:enable /failure:enable

    # Forward to SIEM via Windows Event Forwarding or agent

    '
- id: win-008
  platform: windows
  category: encryption
  severity: high
  title: Enable BitLocker on all volumes
  description: Encrypt all drives with BitLocker using AES-256. Store recovery keys in AD.
  reference: CIS Windows Server Benchmark 18.9.12
  command: '# PowerShell

    Enable-BitLocker -MountPoint "C:" -EncryptionMethod Aes256 -RecoveryPasswordProtector

    # Backup key to AD

    Backup-BitLockerKeyProtector -MountPoint "C:" -KeyProtectorId (Get-BitLockerVolume -MountPoint "C:").KeyProtector[1].KeyProtectorId

    '
- id: win-009
  platform: windows
  category: services
  severity: high
  title: Disable unnecessary Windows features
  description: 'Remove unused features: Telnet, TFTP, IIS (if not needed), Windows Subsystem for Linux.'
  reference: CIS Windows Server Benchmark 2.1
  command: '# PowerShell — list enabled features

    Get-WindowsOptionalFeature -Online | Where-Object State -eq ''Enabled''

    # Disable examples

    Disable-WindowsOptionalFeature -Online -FeatureName TelnetClient -NoRestart

    Disable-WindowsOptionalFeature -Online -FeatureName TFTP -NoRestart

    '
- id: win-010
  platform: windows
  category: patching
  severity: critical
  title: Configure WSUS or Windows Update for Business
  description: Ensure automatic security updates with max 48-hour deployment window.
  reference: CIS Windows Server Benchmark 18.9.101
  command: '# PowerShell — check update settings

    Get-WUSettings

    # Force install all available updates

    Install-WindowsUpdate -AcceptAll -AutoReboot

    # Or configure via GPO for enterprise management

