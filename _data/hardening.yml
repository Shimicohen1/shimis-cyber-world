  title: Ensure external content sharing is restricted.
  description: 'SharePoint sharing: ''''. Sharing allows new external users — restrict in SP Admin → Sharing.'
  reference: CIS.7.2.3 — CIS M365 / Microsoft Secure Score — SharePoint Online
  tags:
  - sharepoint-online
  - external-sharing
  - data-leakage
  - governance
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Unrestricted external sharing means any employee can share any document with anyone outside the organization — no approval, no tracking. This is the primary data leakage vector. A
      single compromised account or disgruntled employee can expose entire document libraries.
    implementationNotes: '# Set sharing to most restrictive appropriate level

      # Options: Disabled, ExistingExternalUserSharingOnly, ExternalUserAndGuestSharing, ExternalUserSharingOnly

      Set-SPOTenant -SharingCapability ExistingExternalUserSharingOnly


      # Or allow new guests but require authentication

      Set-SPOTenant -SharingCapability ExternalUserAndGuestSharing -RequireAcceptingAccountMatchInvitedAccount $true -DefaultSharingLinkType Internal


      # Set a per-site override for collaboration sites

      Set-SPOSite -Identity https://tenant.sharepoint.com/sites/partnerships -SharingCapability ExternalUserAndGuestSharing'
    validationNotes: '# Check tenant-level sharing

      (Get-SPOTenant).SharingCapability


      # Check all sites

      Get-SPOSite -Limit All | Select Title, Url, SharingCapability | Where-Object { $_.SharingCapability -ne ''Disabled'' } | Format-Table'
    tuningNotes: Don't set Disabled org-wide — it kills legitimate collaboration. Use ExistingExternalUserSharingOnly as the default (guests must be in the directory first), then allow broader sharing on
      specific sites that need it. Combine with access expiration and access reviews.
    advancedDetection: '// KQL: Detect external sharing events

      OfficeActivity

      | where TimeGenerated > ago(24h)

      | where Operation in (''SharingInvitationCreated'',''AnonymousLinkCreated'',''CompanyLinkCreated'',''SecureLinkCreated'')

      | where TargetUserOrGroupName has_any (''@gmail.com'',''@yahoo.com'',''@hotmail.com'')

      | project TimeGenerated, UserId, Operation, TargetUserOrGroupName, Site_'
