- id: m365-076
  platform: m365-power
  category: services
  severity: high
  title: Ensure shareable links are restricted.
  description: Check Power BI Admin Portal → Tenant settings.
  reference: CIS.9.1.7 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings'
  premium:
    attackPerspective: Unrestricted shareable links in Power BI create 'anyone with the link' access — exactly like a public URL but harder to discover. Attackers target link-sharing culture because a single
      forwarded email or leaked Slack message grants full report access. Unlike workspace permissions, these links are invisible to most governance tools and survive user deprovisioning.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Export and sharing settings

      # ''Allow shareable links to grant access to everyone in your organization'' → Disabled

      # ''Allow specific users to turn on external data sharing'' → Disabled or restricted


      # Better approach — use direct access sharing:

      # Workspace → Report → Share → Enter specific email addresses

      # This creates auditable, revocable permissions


      # For external sharing, use B2B + workspace permissions:

      # Add guest user → Assign to workspace as Viewer

      # This provides named, trackable access'
    validationNotes: '# Verify shareable link settings

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -like ''*share*link*'' }


      # Audit existing shares:

      Search-UnifiedAuditLog -StartDate (Get-Date).AddDays(-30) -EndDate (Get-Date) -Operations ''ShareReport'' -RecordType PowerBIAudit | Select-Object -ExpandProperty AuditData | ConvertFrom-Json | Select
      UserId, ItemName, SharingAction | Format-Table'
    tuningNotes: If broad sharing is needed for specific reports (e.g., company-wide HR dashboards), use Power BI apps instead of direct links. Apps provide a curated, governed portal experience with built-in
      access management and usage analytics.
    advancedDetection: '// KQL: Monitor sharing activity for oversharing patterns

      PowerBIActivity

      | where TimeGenerated > ago(14d)

      | where Activity in (''ShareReport'', ''ShareDashboard'', ''CreateLink'')

      | extend ShareTarget = tostring(parse_json(tostring(SharingInformation)).recipientEmail)

      | summarize ShareCount=count(), UniqueTargets=dcount(ShareTarget) by UserId

      | where ShareCount > 20 or UniqueTargets > 10

      | sort by ShareCount desc'
