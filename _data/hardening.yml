  - mail-relay
  - spoofing
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Direct Send allows unauthenticated SMTP relay to internal recipients via the MX endpoint. While useful for printers/apps, it can be abused to send spoofed internal emails that bypass
      external sender warnings.
    implementationNotes: '# Check inbound connector for Direct Send

      Get-InboundConnector | Where-Object { $_.ConnectorType -eq ''Partner'' } | Select Name, SenderIPAddresses, RequireTls, RestrictDomainsToIPAddresses


      # If Direct Send from unauthorized IPs is allowed, restrict:

      # Set-InboundConnector -Identity ''Direct Send'' -SenderIPAddresses @(''10.0.0.0/8'') -RestrictDomainsToIPAddresses $true'
    validationNotes: '# Verify no open relay

      Get-InboundConnector | Select Name, ConnectorType, SenderIPAddresses, RequireTls | Format-List


      # Check accepted domains

      Get-AcceptedDomain | Select DomainName, DomainType'
    tuningNotes: Direct Send only works for sending TO internal addresses — it can't send externally. The risk is internal spoofing. Restrict by source IP if possible, and ensure SPF/DKIM/DMARC validate
      internal messages.
    advancedDetection: '// KQL: Monitor Direct Send usage

      EmailEvents

      | where TimeGenerated > ago(24h)

      | where SenderFromDomain == ''yourdomain.com''

