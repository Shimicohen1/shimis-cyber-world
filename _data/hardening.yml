  - id: lin-016
    platform: linux
    category: identity
    severity: critical
    title: "Configure SSH idle timeout"
    description: "Disconnect idle SSH sessions after 300 seconds to prevent session hijacking."
    reference: "CIS Linux Benchmark 5.2.16"
    command: |
      # /etc/ssh/sshd_config
      ClientAliveInterval 300
      ClientAliveCountMax 0
      sudo systemctl restart sshd

  - id: lin-017
    platform: linux
    category: identity
    severity: high
    title: "Restrict cron to authorized users"
    description: "Only allow specific users to create cron jobs. Deny all others by default."
    reference: "CIS Linux Benchmark 5.1.8"
    command: |
      sudo rm -f /etc/cron.deny
      echo root | sudo tee /etc/cron.allow
      sudo chmod 600 /etc/cron.allow

  - id: lin-018
    platform: linux
    category: identity
    severity: high
    title: "Set default umask to 027"
    description: "Ensure new files are not world-readable by default."
    reference: "CIS Linux Benchmark 5.4.4"
    command: |
      # /etc/profile and /etc/bashrc
      umask 027

  - id: lin-019
    platform: linux
    category: identity
    severity: critical
    title: "Ensure no accounts have empty passwords"
    description: "Find and remediate any accounts that can authenticate without a password."
    reference: "CIS Linux Benchmark 6.2.1"
    command: |
      # Find accounts with empty passwords
      sudo awk -F: '($2 == "") {print $1}' /etc/shadow
      # Lock any found accounts
      sudo passwd -l <username>

  - id: lin-020
    platform: linux
    category: identity
    severity: high
    title: "Ensure root is the only UID 0 account"
    description: "No account other than root should have UID 0."
    reference: "CIS Linux Benchmark 6.2.2"
    command: |
      awk -F: '($3 == 0) { print $1 }' /etc/passwd
      # Should only show: root

  - id: lin-021
    platform: linux
    category: identity
    severity: medium
    title: "Set SSH MaxAuthTries to 4"
    description: "Limit authentication attempts per connection to mitigate brute force attacks."
    reference: "CIS Linux Benchmark 5.2.7"
    command: |
      # /etc/ssh/sshd_config
      MaxAuthTries 4
      sudo systemctl restart sshd

  - id: lin-022
    platform: linux
    category: identity
    severity: high
    title: "Disable SSH X11 forwarding"
    description: "Prevent X11 forwarding which can be exploited for session hijacking."
    reference: "CIS Linux Benchmark 5.2.6"
    command: |
      # /etc/ssh/sshd_config
      X11Forwarding no
      sudo systemctl restart sshd

  - id: lin-023
    platform: linux
    category: identity
    severity: medium
    title: "Configure SSH banner"
    description: "Display legal warning banner before SSH authentication."
    reference: "CIS Linux Benchmark 5.2.15"
    command: |
      echo 'Authorized users only. All activity is monitored.' | sudo tee /etc/issue.net
      # /etc/ssh/sshd_config
      Banner /etc/issue.net

  - id: lin-024
    platform: linux
    category: identity
    severity: high
    title: "Enforce minimum password age (7 days)"
    description: "Prevent users from immediately changing passwords back to bypass rotation."
    reference: "CIS Linux Benchmark 5.4.1.2"
    command: |
      # /etc/login.defs
      PASS_MIN_DAYS 7
      # For existing users
      sudo chage --mindays 7 <username>

  - id: lin-025
    platform: linux
    category: identity
    severity: critical
    title: "Restrict SSH to specific users/groups"
    description: "Use AllowUsers or AllowGroups to limit who can SSH into the system."
    reference: "CIS Linux Benchmark 5.2.4"
    command: |
      # /etc/ssh/sshd_config
      AllowGroups sshusers
      # Add users to group
      sudo groupadd sshusers
      sudo usermod -aG sshusers <username>
      sudo systemctl restart sshd

  - id: lin-026
    platform: linux
    category: network
    severity: high
    title: "Disable source routing"
    description: "Prevent attackers from specifying the route packets take through the network."
    reference: "CIS Linux Benchmark 3.2.1"
    command: |
      # /etc/sysctl.conf
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.default.accept_source_route = 0
      net.ipv6.conf.all.accept_source_route = 0
      sudo sysctl -p

  - id: lin-027
    platform: linux
    category: network
    severity: high
    title: "Enable TCP SYN cookies"
    description: "Protect against SYN flood denial-of-service attacks."
    reference: "CIS Linux Benchmark 3.2.8"
    command: |
      # /etc/sysctl.conf
      net.ipv4.tcp_syncookies = 1
      sudo sysctl -p

  - id: lin-028
    platform: linux
    category: network
    severity: high
    title: "Enable reverse path filtering"
    description: "Drop packets with spoofed source addresses using reverse path validation."
    reference: "CIS Linux Benchmark 3.2.7"
    command: |
      # /etc/sysctl.conf
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      sudo sysctl -p

  - id: lin-029
    platform: linux
    category: network
    severity: medium
    title: "Disable IPv6 if not required"
    description: "Reduce attack surface by disabling IPv6 when not in use."
    reference: "CIS Linux Benchmark 3.1.2"
    command: |
      # /etc/sysctl.conf
      net.ipv6.conf.all.disable_ipv6 = 1
      net.ipv6.conf.default.disable_ipv6 = 1
      net.ipv6.conf.lo.disable_ipv6 = 1
      sudo sysctl -p

  - id: lin-030
    platform: linux
    category: network
    severity: critical
    title: "Log suspicious (martian) packets"
    description: "Enable logging of packets with impossible addresses for network forensics."
    reference: "CIS Linux Benchmark 3.2.4"
    command: |
      # /etc/sysctl.conf
      net.ipv4.conf.all.log_martians = 1
      net.ipv4.conf.default.log_martians = 1
      sudo sysctl -p

  - id: lin-031
    platform: linux
    category: network
    severity: high
    title: "Disable DCCP, SCTP, RDS, TIPC protocols"
    description: "Disable uncommon network protocols that are rarely needed but increase attack surface."
    reference: "CIS Linux Benchmark 3.4"
    command: |
      # /etc/modprobe.d/CIS.conf
      install dccp /bin/true
      install sctp /bin/true
      install rds /bin/true
      install tipc /bin/true

  - id: lin-032
    platform: linux
    category: network
    severity: high
    title: "Disable wireless interfaces (servers)"
    description: "Servers should not have active wireless interfaces. Disable them."
    reference: "CIS Linux Benchmark 3.1.3"
    command: |
      # List wireless interfaces
      iwconfig 2>/dev/null | grep -v 'no wireless'
      # Disable
      sudo ip link set wlan0 down
      # Blacklist driver
      echo 'blacklist cfg80211' | sudo tee /etc/modprobe.d/nowifi.conf

  - id: lin-033
    platform: linux
    category: logging
    severity: critical
    title: "Configure auditd rules for privilege escalation"
    description: "Audit all use of sudo, su, and setuid/setgid changes."
    reference: "CIS Linux Benchmark 4.1.12"
    command: |
      # /etc/audit/rules.d/privilege.rules
      -a always,exit -F path=/usr/bin/sudo -F perm=x -k priv_esc
      -a always,exit -F path=/usr/bin/su -F perm=x -k priv_esc
      -w /etc/sudoers -p wa -k scope
      -w /etc/sudoers.d/ -p wa -k scope
      sudo augenrules --load

  - id: lin-034
    platform: linux
    category: logging
    severity: high
    title: "Audit file deletions by users"
    description: "Log when users delete files to detect data destruction or covering tracks."
    reference: "CIS Linux Benchmark 4.1.14"
    command: |
      # /etc/audit/rules.d/delete.rules
      -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -F auid>=1000 -F auid!=4294967295 -k delete
      sudo augenrules --load

  - id: lin-035
    platform: linux
    category: logging
    severity: high
    title: "Ensure log files have correct permissions"
    description: "Log files should not be readable by unprivileged users."
    reference: "CIS Linux Benchmark 4.2.3"
    command: |
      sudo find /var/log -type f -exec chmod g-wx,o-rwx {} +
      sudo chmod 640 /var/log/syslog /var/log/auth.log

  - id: lin-036
    platform: linux
    category: logging
    severity: critical
    title: "Audit kernel module loading/unloading"
    description: "Detect rootkits and unauthorized kernel modifications by auditing module changes."
    reference: "CIS Linux Benchmark 4.1.17"
    command: |
      # /etc/audit/rules.d/modules.rules
      -w /sbin/insmod -p x -k modules
      -w /sbin/rmmod -p x -k modules
      -w /sbin/modprobe -p x -k modules
      -a always,exit -F arch=b64 -S init_module -S delete_module -k modules
      sudo augenrules --load

  - id: lin-037
    platform: linux
    category: logging
    severity: high
    title: "Monitor login/logout events"
    description: "Audit successful and failed login attempts for threat detection."
    reference: "CIS Linux Benchmark 4.1.8"
    command: |
      # /etc/audit/rules.d/logins.rules
      -w /var/log/lastlog -p wa -k logins
      -w /var/run/faillock/ -p wa -k logins
      -w /var/log/tallylog -p wa -k logins
      sudo augenrules --load

  - id: lin-038
    platform: linux
    category: logging
    severity: high
    title: "Enable process accounting"
    description: "Track all process execution for forensic investigations."
    reference: "CIS Linux Benchmark 4.1.3"
    command: |
      sudo apt install acct  # Debian/Ubuntu
      sudo systemctl enable --now acct
      # View last commands
      lastcomm --user <username>

  - id: lin-039
    platform: linux
    category: logging
    severity: medium
    title: "Configure log rotation"
    description: "Ensure logs are rotated and retained for at least 90 days."
    reference: "CIS Linux Benchmark 4.3"
    command: |
      # /etc/logrotate.conf
      rotate 13
      weekly
      compress
      delaycompress
      # Verify
      logrotate -d /etc/logrotate.conf

  - id: lin-040
    platform: linux
    category: encryption
    severity: critical
    title: "Disable SSH weak key exchange algorithms"
    description: "Remove diffie-hellman-group1-sha1 and other weak KEX algorithms."
    reference: "CIS Linux Benchmark 5.2.14"
    command: |
      # /etc/ssh/sshd_config
      KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
      sudo systemctl restart sshd

  - id: lin-041
    platform: linux
    category: encryption
    severity: high
    title: "Set SSH protocol to version 2 only"
    description: "SSH protocol version 1 has known vulnerabilities. Enforce version 2."
    reference: "CIS Linux Benchmark 5.2.2"
    command: |
      # /etc/ssh/sshd_config
      Protocol 2
      sudo systemctl restart sshd

  - id: lin-042
    platform: linux
    category: encryption
    severity: high
    title: "Configure SSH host key algorithms"
    description: "Use only strong host key algorithms (Ed25519, RSA with SHA-256+)."
    reference: "CIS Linux Benchmark 5.2.13"
    command: |
      # /etc/ssh/sshd_config
      HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256
      sudo systemctl restart sshd

  - id: lin-043
    platform: linux
    category: encryption
    severity: medium
    title: "Verify integrity of installed packages"
    description: "Check that no system packages have been tampered with."
    reference: "CIS Linux Benchmark 1.8"
    command: |
      # Debian/Ubuntu
      sudo debsums --changed
      # RHEL/CentOS
      sudo rpm -Va --nomtime --nosize --nomd5

  - id: lin-044
    platform: linux
    category: services
    severity: critical
    title: "Disable USB storage (servers)"
    description: "Prevent data exfiltration via USB on servers."
    reference: "CIS Linux Benchmark 1.1.24"
    command: |
      # /etc/modprobe.d/usb-storage.conf
      install usb-storage /bin/true
      # Blacklist immediately
      sudo rmmod usb-storage 2>/dev/null

  - id: lin-045
    platform: linux
    category: services
    severity: high
    title: "Set sticky bit on world-writable directories"
    description: "Prevent users from deleting/renaming files owned by others in shared directories."
    reference: "CIS Linux Benchmark 1.1.21"
    command: |
      # Find world-writable dirs without sticky bit
      sudo find / -type d \( -perm -0002 -a ! -perm -1000 \) 2>/dev/null
      # Fix
      sudo chmod +t /tmp /var/tmp

  - id: lin-046
    platform: linux
    category: services
    severity: high
    title: "Disable core dumps"
    description: "Prevent core dumps that may contain sensitive data like passwords or encryption keys."
    reference: "CIS Linux Benchmark 1.5.1"
    command: |
      # /etc/security/limits.conf
      * hard core 0
      # /etc/sysctl.conf
      fs.suid_dumpable = 0
      sudo sysctl -p

  - id: lin-047
    platform: linux
    category: services
    severity: critical
    title: "Enable SELinux or AppArmor"
    description: "Mandatory Access Control limits the blast radius of compromised processes."
    reference: "CIS Linux Benchmark 1.6"
    command: |
      # Check SELinux status
      sudo sestatus
      # Or AppArmor
      sudo aa-status
      # Enable AppArmor (Debian/Ubuntu)
      sudo systemctl enable --now apparmor

  - id: lin-048
    platform: linux
    category: services
    severity: high
    title: "Disable automounting (autofs)"
    description: "Prevent automatic mounting of removable media that could introduce malware."
    reference: "CIS Linux Benchmark 1.1.22"
    command: |
      sudo systemctl disable --now autofs 2>/dev/null
      sudo apt purge autofs 2>/dev/null

  - id: lin-049
    platform: linux
    category: services
    severity: high
    title: "Set GRUB bootloader password"
    description: "Protect bootloader to prevent single-user mode access or boot parameter changes."
    reference: "CIS Linux Benchmark 1.4.1"
    command: |
      # Generate password hash
      sudo grub2-mkpasswd-pbkdf2
      # Add to /etc/grub.d/40_custom:
      set superusers="admin"
      password_pbkdf2 admin <hash>
      sudo update-grub

  - id: lin-050
    platform: linux
    category: services
    severity: high
    title: "Restrict access to /boot/grub/grub.cfg"
    description: "Ensure bootloader config is only accessible by root."
    reference: "CIS Linux Benchmark 1.4.2"
    command: |
      sudo chown root:root /boot/grub/grub.cfg
      sudo chmod 600 /boot/grub/grub.cfg

  - id: lin-051
    platform: linux
    category: services
    severity: medium
    title: "Disable Ctrl-Alt-Del reboot"
    description: "Prevent physical console users from rebooting the system."
    reference: "CIS Linux Benchmark 1.5.2"
    command: |
      sudo systemctl mask ctrl-alt-del.target
      sudo systemctl daemon-reload

  - id: lin-052
    platform: linux
    category: services
    severity: high
    title: "Mount /tmp with noexec,nosuid,nodev"
    description: "Prevent execution of binaries and setuid programs from /tmp."
    reference: "CIS Linux Benchmark 1.1.2-1.1.4"
    command: |
      # /etc/fstab
      tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev 0 0
      sudo mount -o remount /tmp
      # Verify
      mount | grep /tmp

  - id: lin-053
    platform: linux
    category: services
    severity: high
    title: "Separate /var, /var/log, /var/log/audit partitions"
    description: "Isolate log partitions to prevent log exhaustion from filling root filesystem."
    reference: "CIS Linux Benchmark 1.1.10-1.1.13"
    command: |
      # Check current mounts
      df -h /var /var/log /var/log/audit
      # Should be separate partitions
      lsblk

  - id: lin-054
    platform: linux
    category: services
    severity: medium
    title: "Configure AIDE file integrity monitoring"
    description: "Detect unauthorized changes to critical system files using AIDE."
    reference: "CIS Linux Benchmark 1.3"
    command: |
      sudo apt install aide aide-common
      sudo aideinit
      # Add cron job for daily checks
      echo '0 5 * * * root /usr/bin/aide --check' | sudo tee /etc/cron.d/aide

  - id: lin-055
    platform: linux
    category: patching
    severity: critical
    title: "Verify GPG keys for package repositories"
    description: "Ensure all repositories use signed packages to prevent supply chain attacks."
    reference: "CIS Linux Benchmark 1.2.2"
    command: |
      # Debian/Ubuntu
      apt-key list
      # RHEL/CentOS
      rpm -qa gpg-pubkey*
      # Verify repo config
      grep -r 'gpgcheck' /etc/yum.repos.d/

  - id: lin-056
    platform: linux
    category: patching
    severity: high
    title: "Remove unnecessary packages"
    description: "Minimize attack surface by removing packages not required for the server's role."
    reference: "CIS Linux Benchmark 2.2"
    command: |
      # List installed packages
      dpkg -l | wc -l  # Debian
      rpm -qa | wc -l  # RHEL
      # Remove common unnecessary packages
      sudo apt purge telnet rsh-client xinetd ypbind 2>/dev/null

  - id: lin-057
    platform: linux
    category: patching
    severity: high
    title: "Enable kernel live patching"
    description: "Apply critical kernel patches without rebooting using Livepatch or kpatch."
    reference: "AWS Well-Architected — Reliability"
    command: |
      # Ubuntu
      sudo snap install canonical-livepatch
      sudo canonical-livepatch enable <token>
      # RHEL
      sudo yum install kpatch
      sudo systemctl enable --now kpatch

  - id: lin-058
    platform: linux
    category: patching
    severity: medium
    title: "Check for known vulnerable packages"
    description: "Scan installed packages against CVE databases."
    reference: "NIST SP 800-40"
    command: |
      # Debian/Ubuntu
      sudo apt install debsecan
      debsecan --suite $(lsb_release -cs)
      # RHEL
      sudo yum updateinfo list security

  - id: win-011
    platform: windows
    category: identity
    severity: critical
    title: "Enable Credential Guard"
    description: "Isolate LSASS process using virtualization-based security to prevent credential theft (Mimikatz)."
    reference: "CIS Windows Server Benchmark 18.3.6"
    command: |
      # PowerShell (requires Hyper-V)
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\DeviceGuard' -Name 'EnableVirtualizationBasedSecurity' -Value 1
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'LsaCfgFlags' -Value 1

  - id: win-012
    platform: windows
    category: identity
    severity: critical
    title: "Configure account lockout duration (30 min)"
    description: "Set account lockout duration to at least 30 minutes after failed attempts."
    reference: "CIS Windows Server Benchmark 1.2.1"
    command: |
      # PowerShell
      net accounts /lockoutduration:30
      # Verify
      net accounts | findstr /i 'lockout'

  - id: win-013
    platform: windows
    category: identity
    severity: high
    title: "Restrict anonymous access to SAM/shares"
    description: "Prevent anonymous enumeration of SAM accounts and network shares."
    reference: "CIS Windows Server Benchmark 2.3.10.1-2.3.10.2"
    command: |
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'RestrictAnonymousSAM' -Value 1
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'RestrictAnonymous' -Value 1

  - id: win-014
    platform: windows
    category: identity
    severity: critical
    title: "Disable Guest account"
    description: "The Guest account must be disabled on all systems."
    reference: "CIS Windows Server Benchmark 2.3.1.2"
    command: |
      Disable-LocalUser -Name 'Guest'
      Get-LocalUser Guest | Select Name,Enabled

  - id: win-015
    platform: windows
    category: identity
    severity: high
    title: "Enable LAPS (Local Admin Password Solution)"
    description: "Randomize local admin passwords across all domain workstations and servers."
    reference: "CIS Windows Server Benchmark 18.2.1"
    command: |
      # Check LAPS status
      Get-AdmPwdPassword -ComputerName <hostname>
      # Or Windows LAPS (new)
      Get-LapsAADPassword -DeviceIds <device_id>

  - id: win-016
    platform: windows
    category: identity
    severity: high
    title: "Set password length to minimum 14 characters"
    description: "Enforce minimum password length of 14 characters via Group Policy."
    reference: "CIS Windows Server Benchmark 1.1.4"
    command: |
      # GPO: Computer Configuration → Windows Settings → Security Settings →
      # Account Policies → Password Policy → Minimum password length = 14
      net accounts /minpwlen:14

  - id: win-017
    platform: windows
    category: identity
    severity: high
    title: "Enable password history (24 passwords)"
    description: "Prevent password reuse by remembering the last 24 passwords."
    reference: "CIS Windows Server Benchmark 1.1.1"
    command: |
      net accounts /uniquepw:24

  - id: win-018
    platform: windows
    category: identity
    severity: high
    title: "Set maximum password age to 365 days"
    description: "Force password rotation at least annually."
    reference: "CIS Windows Server Benchmark 1.1.3"
    command: |
      net accounts /maxpwage:365

  - id: win-019
    platform: windows
    category: identity
    severity: critical
    title: "Configure User Account Control (UAC)"
    description: "Ensure UAC is enabled and set to 'always notify' for admin actions."
    reference: "CIS Windows Server Benchmark 2.3.17"
    command: |
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System' -Name 'EnableLUA' -Value 1
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System' -Name 'ConsentPromptBehaviorAdmin' -Value 2

  - id: win-020
    platform: windows
    category: identity
    severity: high
    title: "Restrict remote desktop access"
    description: "Limit RDP access to specific security groups and require NLA."
    reference: "CIS Windows Server Benchmark 18.9.65"
    command: |
      # Require Network Level Authentication
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 1
      # Restrict to RDP Users group only via GPO

  - id: win-021
    platform: windows
    category: network
    severity: critical
    title: "Disable WDigest authentication"
    description: "Prevent plaintext password storage in memory (used by Mimikatz)."
    reference: "CIS Windows Server Benchmark 18.3.7"
    command: |
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest' -Name 'UseLogonCredential' -Value 0

  - id: win-022
    platform: windows
    category: network
    severity: high
    title: "Disable NetBIOS over TCP/IP"
    description: "Reduce attack surface by disabling NetBIOS name resolution."
    reference: "CIS Windows Server Benchmark 18.5.8"
    command: |
      # Disable via PowerShell for all NICs
      Get-WmiObject Win32_NetworkAdapterConfiguration -Filter 'IPEnabled=True' | ForEach-Object { $_.SetTcpipNetbios(2) }

  - id: win-023
    platform: windows
    category: network
    severity: high
    title: "Disable LLMNR"
    description: "Prevent LLMNR poisoning attacks used for credential harvesting (Responder)."
    reference: "CIS Windows Server Benchmark 18.5.5"
    command: |
      # Registry
      New-Item -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient' -Force
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient' -Name 'EnableMulticast' -Value 0

  - id: win-024
    platform: windows
    category: network
    severity: critical
    title: "Enable Windows Firewall logging"
    description: "Log all dropped and allowed connections for forensic analysis."
    reference: "CIS Windows Server Benchmark 9.1.7-9.1.8"
    command: |
      Set-NetFirewallProfile -Profile Domain,Public,Private -LogAllowed True -LogBlocked True -LogMaxSizeKilobytes 16384
      # Check log location
      Get-NetFirewallProfile | Select Name,LogFileName

  - id: win-025
    platform: windows
    category: network
    severity: high
    title: "Configure SMB signing (required)"
    description: "Require SMB packet signing to prevent man-in-the-middle attacks."
    reference: "CIS Windows Server Benchmark 2.3.8.1-2.3.8.2"
    command: |
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters' -Name 'RequireSecuritySignature' -Value 1
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters' -Name 'RequireSecuritySignature' -Value 1

  - id: win-026
    platform: windows
    category: network
    severity: high
    title: "Disable mDNS (Multicast DNS)"
    description: "Prevent mDNS poisoning attacks on the local network."
    reference: "MITRE ATT&CK T1557"
    command: |
      # Registry
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\Dnscache\Parameters' -Name 'EnableMDNS' -Value 0

  - id: win-027
    platform: windows
    category: network
    severity: high
    title: "Configure IPSec for sensitive traffic"
    description: "Use Windows IPSec policies for encryption of sensitive internal traffic."
    reference: "CIS Windows Server Benchmark 9.3"
    command: |
      # Create IPSec rule via PowerShell
      New-NetIPsecRule -DisplayName 'Encrypt-Sensitive' -InboundSecurity Require -OutboundSecurity Require

  - id: win-028
    platform: windows
    category: logging
    severity: critical
    title: "Enable command line in process creation events"
    description: "Log full command line in Event ID 4688 for process tracking."
    reference: "CIS Windows Server Benchmark 18.9.3.1"
    command: |
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\Audit' -Name 'ProcessCreationIncludeCmdLine_Enabled' -Value 1

  - id: win-029
    platform: windows
    category: logging
    severity: critical
    title: "Configure Sysmon for endpoint telemetry"
    description: "Deploy Sysmon with a comprehensive config for advanced threat detection."
    reference: "MITRE ATT&CK Data Source: Process"
    command: |
      # Download Sysmon from Sysinternals
      # Use SwiftOnSecurity config:
      Sysmon64.exe -accepteula -i sysmonconfig-export.xml
      # Verify
      Get-Service sysmon64 | Select Status

  - id: win-030
    platform: windows
    category: logging
    severity: high
    title: "Enable Windows Defender exploit logging"
    description: "Log all exploit protection events for detection engineering."
    reference: "CIS Windows Server Benchmark 18.9.47"
    command: |
      # GPO: Computer Configuration → Administrative Templates →
      # Windows Components → Microsoft Defender Antivirus → Real-time Protection
      # Enable all audit logs
      Set-MpPreference -EnableControlledFolderAccess AuditMode

  - id: win-031
    platform: windows
    category: logging
    severity: high
    title: "Audit logon events (success + failure)"
    description: "Enable auditing for all logon types including interactive, network, and service."
    reference: "CIS Windows Server Benchmark 17.5"
    command: |
      auditpol /set /subcategory:'Logon' /success:enable /failure:enable
      auditpol /set /subcategory:'Logoff' /success:enable
      auditpol /set /subcategory:'Special Logon' /success:enable /failure:enable

  - id: win-032
    platform: windows
    category: logging
    severity: high
    title: "Increase Security event log size to 1GB"
    description: "Default 20MB security log is insufficient. Increase to retain more history."
    reference: "CIS Windows Server Benchmark 18.9.27"
    command: |
      wevtutil sl Security /ms:1073741824
      wevtutil sl 'Microsoft-Windows-PowerShell/Operational' /ms:1073741824

  - id: win-033
    platform: windows
    category: logging
    severity: high
    title: "Enable DNS client logging"
    description: "Log all DNS queries for threat hunting and C2 detection."
    reference: "MITRE ATT&CK T1071.004"
    command: |
      # Enable DNS Client ETW logging
      wevtutil sl Microsoft-Windows-DNS-Client/Operational /e:true
      # Or use Sysmon Event ID 22

  - id: win-034
    platform: windows
    category: logging
    severity: critical
    title: "Audit privilege use events"
    description: "Monitor use of sensitive privileges (SeTakeOwnershipPrivilege, SeDebugPrivilege)."
    reference: "CIS Windows Server Benchmark 17.8"
    command: |
      auditpol /set /subcategory:'Sensitive Privilege Use' /success:enable /failure:enable
      auditpol /set /subcategory:'Non Sensitive Privilege Use' /success:enable /failure:enable

  - id: win-035
    platform: windows
    category: encryption
    severity: critical
    title: "Enforce TLS 1.2+ and disable SSL/TLS 1.0/1.1"
    description: "Disable legacy SSL/TLS versions in Windows SChannel registry."
    reference: "CIS Windows Server Benchmark 18.4"
    command: |
      # Disable TLS 1.0
      New-Item -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.0\Server' -Force
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.0\Server' -Name 'Enabled' -Value 0
      # Disable TLS 1.1
      New-Item -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.1\Server' -Force
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.1\Server' -Name 'Enabled' -Value 0

  - id: win-036
    platform: windows
    category: encryption
    severity: high
    title: "Disable weak cipher suites (RC4, DES, 3DES)"
    description: "Remove deprecated cipher suites from Windows SChannel configuration."
    reference: "NIST SP 800-52 Rev.2"
    command: |
      # Disable RC4
      @('RC4 128/128','RC4 56/128','RC4 40/128') | ForEach-Object {
        New-Item -Path "HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\$_" -Force
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Ciphers\$_" -Name 'Enabled' -Value 0
      }

  - id: win-037
    platform: windows
    category: encryption
    severity: high
    title: "Enable LDAP signing"
    description: "Require LDAP signing to prevent LDAP relay attacks."
    reference: "CIS Windows Server Benchmark 2.3.6.1"
    command: |
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\NTDS\Parameters' -Name 'LDAPServerIntegrity' -Value 2
      # 2 = Require signing

  - id: win-038
    platform: windows
    category: encryption
    severity: high
    title: "Enable LDAP channel binding"
    description: "Prevent LDAP relay attacks by requiring channel binding tokens."
    reference: "CVE-2017-8563 / ADV190023"
    command: |
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\NTDS\Parameters' -Name 'LdapEnforceChannelBinding' -Value 2

  - id: win-039
    platform: windows
    category: services
    severity: critical
    title: "Disable Print Spooler on servers"
    description: "PrintNightmare (CVE-2021-34527) exploits the spooler. Disable on all non-print servers."
    reference: "CVE-2021-34527 / CIS 5.1"
    command: |
      Stop-Service -Name Spooler -Force
      Set-Service -Name Spooler -StartupType Disabled

  - id: win-040
    platform: windows
    category: services
    severity: high
    title: "Disable Remote Registry service"
    description: "Prevent remote modification of the Windows registry."
    reference: "CIS Windows Server Benchmark 5.27"
    command: |
      Stop-Service -Name RemoteRegistry -Force
      Set-Service -Name RemoteRegistry -StartupType Disabled

  - id: win-041
    platform: windows
    category: services
    severity: high
    title: "Disable Windows Remote Management (if unused)"
    description: "Disable WinRM on systems that don't require remote PowerShell management."
    reference: "CIS Windows Server Benchmark 5.30"
    command: |
      # Only if WinRM is not required
      Stop-Service -Name WinRM -Force
      Set-Service -Name WinRM -StartupType Disabled
      # Or restrict access
      Set-Item WSMan:\localhost\Service\AllowRemoteAccess -Value $false

  - id: win-042
    platform: windows
    category: services
    severity: high
    title: "Enable Attack Surface Reduction (ASR) rules"
    description: "Enable Defender ASR rules to block Office macros, script injection, credential stealing."
    reference: "CIS Windows Benchmark 18.9.47.5"
    command: |
      # Enable key ASR rules
      # Block Office from creating child processes
      Add-MpPreference -AttackSurfaceReductionRules_Ids D4F940AB-401B-4EFC-AADC-AD5F3C50688A -AttackSurfaceReductionRules_Actions Enabled
      # Block credential stealing from LSASS
      Add-MpPreference -AttackSurfaceReductionRules_Ids 9e6c4e1f-7d60-472f-ba1a-a39ef669e4b2 -AttackSurfaceReductionRules_Actions Enabled

  - id: win-043
    platform: windows
    category: services
    severity: high
    title: "Configure Windows Defender exclusions audit"
    description: "Review Defender exclusions that could be hiding malware."
    reference: "MITRE ATT&CK T1562.001"
    command: |
      # List all Defender exclusions
      Get-MpPreference | Select -ExpandProperty ExclusionPath
      Get-MpPreference | Select -ExpandProperty ExclusionProcess
      Get-MpPreference | Select -ExpandProperty ExclusionExtension

  - id: win-044
    platform: windows
    category: services
    severity: critical
    title: "Enable Secure Boot and UEFI"
    description: "Verify Secure Boot is enabled to prevent bootkit/rootkit attacks."
    reference: "CIS Windows Server Benchmark 1.1"
    command: |
      Confirm-SecureBootUEFI
      # Should return True

  - id: win-045
    platform: windows
    category: services
    severity: high
    title: "Configure AppLocker/WDAC policies"
    description: "Whitelist allowed applications to prevent execution of unauthorized software."
    reference: "CIS Windows Server Benchmark 18.9.67"
    command: |
      # Check AppLocker status
      Get-AppLockerPolicy -Effective | Select -ExpandProperty RuleCollections
      # Or check WDAC
      citool --list-policies

  - id: win-046
    platform: windows
    category: services
    severity: high
    title: "Disable autorun and autoplay"
    description: "Prevent malware spread via USB autorun."
    reference: "CIS Windows Server Benchmark 18.9.8"
    command: |
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer' -Name 'NoDriveTypeAutoRun' -Value 255

  - id: win-047
    platform: windows
    category: services
    severity: medium
    title: "Disable Windows Script Host"
    description: "Block execution of VBScript/JScript which are commonly abused by malware."
    reference: "MITRE ATT&CK T1059.005"
    command: |
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows Script Host\Settings' -Name 'Enabled' -Value 0

  - id: win-048
    platform: windows
    category: patching
    severity: critical
    title: "Enable Microsoft Defender Antivirus real-time protection"
    description: "Ensure real-time protection is enabled and definitions are up to date."
    reference: "CIS Windows Server Benchmark 18.9.47.4"
    command: |
      Set-MpPreference -DisableRealtimeMonitoring $false
      Update-MpSignature
      # Check status
      Get-MpComputerStatus | Select AntivirusEnabled,RealTimeProtectionEnabled,AntivirusSignatureLastUpdated

  - id: win-049
    platform: windows
    category: patching
    severity: high
    title: "Configure Windows Update deferral policy"
    description: "Auto-install security updates within 24h. Defer feature updates 30 days."
    reference: "CIS Windows Server Benchmark 18.9.101"
    command: |
      # Registry (Windows Update for Business)
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate' -Name 'DeferQualityUpdates' -Value 1
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate' -Name 'DeferQualityUpdatesPeriodInDays' -Value 0

  - id: win-050
    platform: windows
    category: patching
    severity: high
    title: "Remove outdated .NET Framework versions"
    description: "Remove .NET 2.0/3.0/3.5 if not required. They have known vulnerabilities."
    reference: "NIST NVD"
    command: |
      # Check installed .NET versions
      Get-ChildItem 'HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP' -Recurse | Get-ItemProperty -Name Version -EA 0 | Select PSChildName,Version
      # Remove old versions
      Disable-WindowsOptionalFeature -Online -FeatureName NetFx3 -NoRestart

  - id: aws-011
    platform: aws
    category: identity
    severity: critical
    title: "Enable AWS SSO / IAM Identity Center"
    description: "Use centralized identity federation instead of per-account IAM users."
    reference: "CIS AWS Foundations Benchmark 1.21"
    command: |
      # Check if Identity Center is enabled
      aws sso-admin list-instances
      # Best practice: Federate via SSO, eliminate long-term IAM keys

  - id: aws-012
    platform: aws
    category: identity
    severity: high
    title: "Rotate IAM access keys every 90 days"
    description: "Enforce access key rotation for all IAM users with programmatic access."
    reference: "CIS AWS Foundations Benchmark 1.14"
    command: |
      # Find keys older than 90 days
      aws iam generate-credential-report
      aws iam get-credential-report --output text --query Content | base64 -d | \
        awk -F, 'NR>1 && $9=="true" { print $1,$10 }'

  - id: aws-013
    platform: aws
    category: identity
    severity: critical
    title: "Enforce IAM password policy (14+ chars, complexity)"
    description: "Set minimum 14-character passwords with uppercase, lowercase, numbers, and symbols."
    reference: "CIS AWS Foundations Benchmark 1.8"
    command: |
      aws iam update-account-password-policy \
        --minimum-password-length 14 \
        --require-symbols --require-numbers \
        --require-uppercase-characters --require-lowercase-characters \
        --max-password-age 90 --password-reuse-prevention 24

  - id: aws-014
    platform: aws
    category: identity
    severity: high
    title: "Remove unused IAM users and credentials"
    description: "Identify and remove IAM users with no activity in the last 90 days."
    reference: "CIS AWS Foundations Benchmark 1.12"
    command: |
      # Find unused users
      aws iam generate-credential-report
      aws iam get-credential-report --output text --query Content | base64 -d | \
        awk -F, 'NR>1 { print $1,$5,$11,$16 }'

  - id: aws-015
    platform: aws
    category: identity
    severity: critical
    title: "Enable SCP (Service Control Policies) for org"
    description: "Use SCPs to set permission guardrails across all AWS Organization accounts."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List current SCPs
      aws organizations list-policies --filter SERVICE_CONTROL_POLICY
      # Example: Deny root user actions
      # Attach to OU via aws organizations attach-policy

  - id: aws-016
    platform: aws
    category: identity
    severity: high
    title: "Enforce IMDSv2 on all EC2 instances"
    description: "Require Instance Metadata Service v2 to prevent SSRF-based credential theft."
    reference: "CIS AWS Foundations Benchmark 5.6"
    command: |
      # Find instances using IMDSv1
      aws ec2 describe-instances --query 'Reservations[].Instances[].{ID:InstanceId,IMDS:MetadataOptions.HttpTokens}' --output table
      # Enforce IMDSv2
      aws ec2 modify-instance-metadata-options --instance-id <id> --http-tokens required --http-endpoint enabled

  - id: aws-017
    platform: aws
    category: identity
    severity: high
    title: "Use IAM roles instead of access keys for EC2"
    description: "Attach IAM roles to EC2 instances instead of embedding access keys."
    reference: "CIS AWS Foundations Benchmark 1.17"
    command: |
      # Check instances with roles
      aws ec2 describe-instances --query 'Reservations[].Instances[].{ID:InstanceId,Role:IamInstanceProfile.Arn}' --output table
      # Find instances WITHOUT roles
      aws ec2 describe-instances --query 'Reservations[].Instances[?!IamInstanceProfile].InstanceId' --output text

  - id: aws-018
    platform: aws
    category: identity
    severity: high
    title: "Enable cross-account access via roles (not users)"
    description: "Use AssumeRole for cross-account access instead of sharing IAM credentials."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List cross-account roles
      aws iam list-roles --query 'Roles[?AssumeRolePolicyDocument.Statement[?Principal.AWS]]' --output table

  - id: aws-019
    platform: aws
    category: network
    severity: critical
    title: "Enable VPC Flow Logs for all VPCs"
    description: "Capture all network traffic metadata for security monitoring and forensics."
    reference: "CIS AWS Foundations Benchmark 3.9"
    command: |
      # List VPCs without flow logs
      for vpc in $(aws ec2 describe-vpcs --query 'Vpcs[].VpcId' --output text); do
        fl=$(aws ec2 describe-flow-logs --filter Name=resource-id,Values=$vpc --query 'FlowLogs[].FlowLogId' --output text)
        [ -z "$fl" ] && echo "NO FLOW LOG: $vpc"
      done
      # Enable
      aws ec2 create-flow-logs --resource-ids <vpc-id> --resource-type VPC --traffic-type ALL --log-destination-type cloud-watch-logs --log-group-name vpc-flow-logs

  - id: aws-020
    platform: aws
    category: network
    severity: critical
    title: "Disable SSH (port 22) from 0.0.0.0/0"
    description: "No security group should allow SSH from the internet. Use Session Manager instead."
    reference: "CIS AWS Foundations Benchmark 5.2"
    command: |
      # Find SGs with SSH open to world
      aws ec2 describe-security-groups --filters Name=ip-permission.from-port,Values=22 Name=ip-permission.to-port,Values=22 Name=ip-permission.cidr,Values='0.0.0.0/0' \
        --query 'SecurityGroups[].{ID:GroupId,Name:GroupName}' --output table

  - id: aws-021
    platform: aws
    category: network
    severity: critical
    title: "Disable RDP (port 3389) from 0.0.0.0/0"
    description: "Never expose RDP to the internet. Use VPN or Fleet Manager."
    reference: "CIS AWS Foundations Benchmark 5.3"
    command: |
      aws ec2 describe-security-groups --filters Name=ip-permission.from-port,Values=3389 Name=ip-permission.to-port,Values=3389 Name=ip-permission.cidr,Values='0.0.0.0/0' \
        --query 'SecurityGroups[].{ID:GroupId,Name:GroupName}' --output table

  - id: aws-022
    platform: aws
    category: network
    severity: high
    title: "Use AWS PrivateLink for service endpoints"
    description: "Access AWS services via VPC endpoints instead of internet gateway."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List existing VPC endpoints
      aws ec2 describe-vpc-endpoints --query 'VpcEndpoints[].{VPC:VpcId,Service:ServiceName,Type:VpcEndpointType}' --output table
      # Create S3 gateway endpoint
      aws ec2 create-vpc-endpoint --vpc-id <vpc-id> --service-name com.amazonaws.<region>.s3 --route-table-ids <rtb-id>

  - id: aws-023
    platform: aws
    category: network
    severity: high
    title: "Enable AWS WAF on public ALBs and CloudFront"
    description: "Protect web applications with AWS WAF managed rules."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List WAF Web ACLs
      aws wafv2 list-web-acls --scope REGIONAL --query 'WebACLs[].{Name:Name,ID:Id}' --output table
      # Check ALBs without WAF
      aws elbv2 describe-load-balancers --query 'LoadBalancers[].{ARN:LoadBalancerArn,Name:LoadBalancerName}' --output text

  - id: aws-024
    platform: aws
    category: network
    severity: high
    title: "Enable Network Firewall for VPC"
    description: "Deploy AWS Network Firewall for stateful inspection and IDS/IPS capabilities."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List network firewalls
      aws network-firewall list-firewalls --query 'Firewalls[].{Name:FirewallName,VPC:VpcId}' --output table

  - id: aws-025
    platform: aws
    category: network
    severity: high
    title: "Restrict default security group to deny all"
    description: "The default SG in each VPC should have no inbound/outbound rules."
    reference: "CIS AWS Foundations Benchmark 5.4"
    command: |
      # Check default SGs with rules
      aws ec2 describe-security-groups --filters Name=group-name,Values=default --query 'SecurityGroups[?IpPermissions[0] || IpPermissionsEgress[0]].{VPC:VpcId,GroupId:GroupId}' --output table

  - id: aws-026
    platform: aws
    category: logging
    severity: critical
    title: "Enable CloudTrail log file validation"
    description: "Ensure CloudTrail log integrity validation is enabled to detect tampering."
    reference: "CIS AWS Foundations Benchmark 3.2"
    command: |
      aws cloudtrail describe-trails --query 'trailList[].{Name:Name,Validation:LogFileValidationEnabled}' --output table

  - id: aws-027
    platform: aws
    category: logging
    severity: critical
    title: "Enable AWS Config in all regions"
    description: "AWS Config records resource configuration changes for compliance and auditing."
    reference: "CIS AWS Foundations Benchmark 3.5"
    command: |
      # Check Config recorders
      aws configservice describe-configuration-recorders
      # Check delivery channels
      aws configservice describe-delivery-channels

  - id: aws-028
    platform: aws
    category: logging
    severity: critical
    title: "Enable S3 access logging for CloudTrail bucket"
    description: "Log all access to the CloudTrail S3 bucket to detect unauthorized access to audit logs."
    reference: "CIS AWS Foundations Benchmark 3.6"
    command: |
      # Check if logging is enabled on the trail bucket
      aws s3api get-bucket-logging --bucket <cloudtrail-bucket>

  - id: aws-029
    platform: aws
    category: logging
    severity: high
    title: "Enable CloudWatch alarms for root account usage"
    description: "Alert immediately when the root account is used."
    reference: "CIS AWS Foundations Benchmark 3.3"
    command: |
      # Create metric filter for root login
      aws logs put-metric-filter --log-group-name CloudTrail/DefaultLogGroup \
        --filter-name RootAccountUsage \
        --filter-pattern '{ $.userIdentity.type = "Root" && $.userIdentity.invokedBy NOT EXISTS && $.eventType != "AwsServiceEvent" }' \
        --metric-transformations metricName=RootAccountUsage,metricNamespace=CISBenchmark,metricValue=1

  - id: aws-030
    platform: aws
    category: logging
    severity: high
    title: "Enable CloudWatch alarms for unauthorized API calls"
    description: "Detect and alert on AccessDenied or UnauthorizedAccess events."
    reference: "CIS AWS Foundations Benchmark 3.1"
    command: |
      aws logs put-metric-filter --log-group-name CloudTrail/DefaultLogGroup \
        --filter-name UnauthorizedAPICalls \
        --filter-pattern '{ ($.errorCode = "*UnauthorizedAccess*") || ($.errorCode = "AccessDenied*") }' \
        --metric-transformations metricName=UnauthorizedAPICalls,metricNamespace=CISBenchmark,metricValue=1

  - id: aws-031
    platform: aws
    category: logging
    severity: high
    title: "Monitor IAM policy changes"
    description: "Alert when IAM policies are created, modified, or deleted."
    reference: "CIS AWS Foundations Benchmark 3.4"
    command: |
      aws logs put-metric-filter --log-group-name CloudTrail/DefaultLogGroup \
        --filter-name IAMPolicyChanges \
        --filter-pattern '{ ($.eventName=CreatePolicy) || ($.eventName=DeletePolicy) || ($.eventName=AttachRolePolicy) || ($.eventName=DetachRolePolicy) || ($.eventName=PutUserPolicy) || ($.eventName=DeleteUserPolicy) }' \
        --metric-transformations metricName=IAMPolicyChanges,metricNamespace=CISBenchmark,metricValue=1

  - id: aws-032
    platform: aws
    category: logging
    severity: high
    title: "Enable Security Hub for centralized findings"
    description: "Aggregate findings from GuardDuty, Inspector, Macie, Firewall Manager in one view."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # Enable Security Hub
      aws securityhub enable-security-hub --enable-default-standards
      # Check findings
      aws securityhub get-findings --query 'Findings[].{Title:Title,Severity:Severity.Label}' --max-items 10

  - id: aws-033
    platform: aws
    category: logging
    severity: high
    title: "Enable AWS CloudTrail insights"
    description: "Detect unusual API activity patterns using CloudTrail Insights."
    reference: "CIS AWS Foundations Benchmark 3.10"
    command: |
      aws cloudtrail put-insight-selectors --trail-name <trail-name> \
        --insight-selectors '[{"InsightType":"ApiCallRateInsight"},{"InsightType":"ApiErrorRateInsight"}]'

  - id: aws-034
    platform: aws
    category: encryption
    severity: critical
    title: "Enable EBS default encryption"
    description: "Ensure all new EBS volumes are encrypted by default in every region."
    reference: "CIS AWS Foundations Benchmark 2.2.1"
    command: |
      # Check current setting
      aws ec2 get-ebs-encryption-by-default
      # Enable
      aws ec2 enable-ebs-encryption-by-default

  - id: aws-035
    platform: aws
    category: encryption
    severity: critical
    title: "Encrypt RDS instances"
    description: "All RDS databases must use encryption at rest."
    reference: "CIS AWS Foundations Benchmark 2.3.1"
    command: |
      # Find unencrypted RDS instances
      aws rds describe-db-instances --query 'DBInstances[?StorageEncrypted==`false`].{ID:DBInstanceIdentifier,Engine:Engine}' --output table

  - id: aws-036
    platform: aws
    category: encryption
    severity: high
    title: "Enable KMS key rotation"
    description: "Enable automatic annual rotation for all customer-managed KMS keys."
    reference: "CIS AWS Foundations Benchmark 3.8"
    command: |
      # List keys and rotation status
      for key in $(aws kms list-keys --query 'Keys[].KeyId' --output text); do
        rot=$(aws kms get-key-rotation-status --key-id $key --query 'KeyRotationEnabled' --output text 2>/dev/null)
        echo "$key: rotation=$rot"
      done

  - id: aws-037
    platform: aws
    category: encryption
    severity: critical
    title: "Enforce S3 bucket policy to deny HTTP"
    description: "All S3 buckets should deny non-SSL (HTTP) requests via bucket policy."
    reference: "CIS AWS Foundations Benchmark 2.1.2"
    command: |
      # Check for SSL enforcement
      for bucket in $(aws s3api list-buckets --query 'Buckets[].Name' --output text); do
        policy=$(aws s3api get-bucket-policy --bucket $bucket --output text 2>&1)
        echo "$bucket: $(echo $policy | grep -c 'aws:SecureTransport') SSL conditions"
      done

  - id: aws-038
    platform: aws
    category: encryption
    severity: high
    title: "Enable CloudTrail log encryption with KMS"
    description: "Encrypt CloudTrail logs using a customer-managed KMS key."
    reference: "CIS AWS Foundations Benchmark 3.7"
    command: |
      aws cloudtrail describe-trails --query 'trailList[].{Name:Name,KMS:KmsKeyId}' --output table
      # Update if missing
      aws cloudtrail update-trail --name <trail> --kms-key-id <key-arn>

  - id: aws-039
    platform: aws
    category: encryption
    severity: high
    title: "Enable Secrets Manager rotation"
    description: "Configure automatic rotation for all secrets in AWS Secrets Manager."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List secrets without rotation
      aws secretsmanager list-secrets --query 'SecretList[?!RotationEnabled].{Name:Name,ARN:ARN}' --output table

  - id: aws-040
    platform: aws
    category: encryption
    severity: high
    title: "Enforce SSL on RDS connections"
    description: "Require SSL/TLS for all database connections to RDS instances."
    reference: "CIS AWS Foundations Benchmark 2.3.2"
    command: |
      # Create parameter group enforcing SSL
      aws rds modify-db-parameter-group --db-parameter-group-name <pg> \
        --parameters 'ParameterName=rds.force_ssl,ParameterValue=1,ApplyMethod=pending-reboot'

  - id: aws-041
    platform: aws
    category: services
    severity: critical
    title: "Enable Amazon Inspector for vulnerability scanning"
    description: "Continuously scan EC2 instances and container images for software vulnerabilities."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # Enable Inspector
      aws inspector2 enable --resource-types EC2 ECR LAMBDA
      # Check findings
      aws inspector2 list-findings --filter-criteria '{"severity":[{"comparison":"EQUALS","value":"CRITICAL"}]}' --query 'findings[].title'

  - id: aws-042
    platform: aws
    category: services
    severity: high
    title: "Enable Amazon Macie for S3 data classification"
    description: "Discover and protect sensitive data (PII, credentials) in S3 buckets."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # Enable Macie
      aws macie2 enable-macie
      # Run discovery job
      aws macie2 list-findings --query 'findingIds'

  - id: aws-043
    platform: aws
    category: services
    severity: high
    title: "Enable ECR image scanning"
    description: "Scan container images for vulnerabilities when pushed to ECR."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # Enable scan on push
      aws ecr put-image-scanning-configuration --repository-name <repo> --image-scanning-configuration scanOnPush=true
      # Check scan findings
      aws ecr describe-image-scan-findings --repository-name <repo> --image-id imageTag=latest

  - id: aws-044
    platform: aws
    category: services
    severity: critical
    title: "Restrict Lambda function permissions"
    description: "Apply least-privilege IAM policies to Lambda execution roles."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # List Lambda functions and their roles
      aws lambda list-functions --query 'Functions[].{Name:FunctionName,Role:Role}' --output table
      # Check for wildcard permissions in role policies

  - id: aws-045
    platform: aws
    category: services
    severity: high
    title: "Enable ECS/EKS audit logging"
    description: "Enable control plane logging for EKS or task-level logging for ECS."
    reference: "AWS Well-Architected Security Pillar"
    command: |
      # EKS — enable audit logging
      aws eks update-cluster-config --name <cluster> --logging '{"clusterLogging":[{"types":["api","audit","authenticator","controllerManager","scheduler"],"enabled":true}]}'

  - id: aws-046
    platform: aws
    category: patching
    severity: critical
    title: "Enable SSM Patch Manager auto-patching"
    description: "Configure maintenance windows for automatic security patching of all instances."
    reference: "AWS Well-Architected Reliability Pillar"
    command: |
      # Check SSM managed instances
      aws ssm describe-instance-information --query 'InstanceInformationList[].{ID:InstanceId,Ping:PingStatus,Platform:PlatformType}' --output table

  - id: aws-047
    platform: aws
    category: patching
    severity: high
    title: "Enable AMI auto-updates with Image Builder"
    description: "Use EC2 Image Builder to automatically create patched AMIs on a schedule."
    reference: "AWS Well-Architected Reliability Pillar"
    command: |
      # List image pipelines
      aws imagebuilder list-image-pipelines --query 'imagePipelineList[].{Name:name,Status:status}' --output table

  - id: aws-048
    platform: aws
    category: patching
    severity: high
    title: "Monitor for AWS service deprecations"
    description: "Track AWS Health events for service deprecations and security bulletins."
    reference: "AWS Well-Architected Operational Excellence"
    command: |
      # Check AWS Health events
      aws health describe-events --filter '{"eventTypeCategories":["accountNotification"],"eventStatusCodes":["open","upcoming"]}' --query 'events[].{Service:service,Description:eventTypeCode}' --output table

  - id: gcp-007
    platform: gcp
    category: identity
    severity: critical
    title: "Restrict service account impersonation"
    description: "Limit who can impersonate service accounts to prevent privilege escalation."
    reference: "CIS GCP Foundations Benchmark 1.6"
    command: |
      # List SA impersonation permissions
      gcloud projects get-iam-policy <project> \
        --flatten='bindings[].members' \
        --filter='bindings.role:roles/iam.serviceAccountTokenCreator' \
        --format='table(bindings.members)'

  - id: gcp-008
    platform: gcp
    category: identity
    severity: high
    title: "Disable default service account for GCE"
    description: "Don't use the Compute Engine default service account. Create purpose-specific SAs."
    reference: "CIS GCP Foundations Benchmark 1.5"
    command: |
      # Find instances using default SA
      gcloud compute instances list --format='table(name,serviceAccounts[].email)' | grep 'compute@developer'

  - id: gcp-009
    platform: gcp
    category: identity
    severity: critical
    title: "Enforce org-wide domain restricted sharing"
    description: "Prevent sharing GCP resources with external domains using org policies."
    reference: "CIS GCP Foundations Benchmark 1.12"
    command: |
      gcloud resource-manager org-policies describe constraints/iam.allowedPolicyMemberDomains --organization=<org_id>

  - id: gcp-010
    platform: gcp
    category: identity
    severity: high
    title: "Enable Security Key enforcement for admins"
    description: "Require physical security keys (FIDO2) for all admin accounts."
    reference: "CIS GCP Foundations Benchmark 1.2"
    command: |
      # Admin Console → Security → Authentication → 2-Step Verification
      # Set: Security key only for Admin OU

  - id: gcp-011
    platform: gcp
    category: identity
    severity: high
    title: "Remove primitive roles (Owner/Editor) from SAs"
    description: "Replace overly broad roles with fine-grained predefined or custom roles."
    reference: "CIS GCP Foundations Benchmark 1.5"
    command: |
      # Find primitive role bindings
      gcloud projects get-iam-policy <project> \
        --flatten='bindings[].members' \
        --filter='bindings.role:(roles/owner OR roles/editor)' \
        --format='table(bindings.role, bindings.members)'

  - id: gcp-012
    platform: gcp
    category: identity
    severity: high
    title: "Enable Cloud Identity-Aware Proxy (IAP)"
    description: "Use IAP to protect internal web apps without VPN, with identity-based access."
    reference: "Google Cloud Security Best Practices"
    command: |
      # List IAP-enabled backends
      gcloud iap web get-iam-policy --resource-type=backend-services
      # Enable IAP on backend
      gcloud iap web enable --resource-type=backend-services --service=<service>

  - id: gcp-013
    platform: gcp
    category: identity
    severity: high
    title: "Review IAM recommender suggestions"
    description: "Use IAM Recommender to identify and remove excess permissions."
    reference: "Google Cloud Security Best Practices"
    command: |
      gcloud recommender recommendations list \
        --recommender=google.iam.policy.Recommender \
        --project=<project> --location=global \
        --format='table(content.operationGroups[0].operations[0].path, priority, stateInfo.state)'

  - id: gcp-014
    platform: gcp
    category: identity
    severity: high
    title: "Configure session length for Cloud Console"
    description: "Set maximum session duration for Cloud Console to avoid persistent sessions."
    reference: "CIS GCP Foundations Benchmark 1.14"
    command: |
      # Admin Console → Security → Google Cloud session control
      # Set: Session duration = 8 hours or less

  - id: gcp-015
    platform: gcp
    category: network
    severity: critical
    title: "Enable Private Google Access for subnets"
    description: "Allow VMs without external IPs to reach Google APIs via internal networking."
    reference: "CIS GCP Foundations Benchmark 3.8"
    command: |
      # List subnets without Private Google Access
      gcloud compute networks subnets list --format='table(name,region,privateIpGoogleAccess)' | grep False
      # Enable
      gcloud compute networks subnets update <subnet> --region=<region> --enable-private-ip-google-access

  - id: gcp-016
    platform: gcp
    category: network
    severity: critical
    title: "Disable default network"
    description: "Delete the auto-created default VPC which has overly permissive firewall rules."
    reference: "CIS GCP Foundations Benchmark 3.1"
    command: |
      # Check if default network exists
      gcloud compute networks list --filter='name=default'
      # Delete default firewall rules then network
      gcloud compute firewall-rules list --filter='network:default' --format='value(name)' | xargs -I{} gcloud compute firewall-rules delete {} --quiet
      gcloud compute networks delete default --quiet

  - id: gcp-017
    platform: gcp
    category: network
    severity: high
    title: "Enable Cloud Armor DDoS protection"
    description: "Protect HTTP(S) Load Balancers with Cloud Armor security policies."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Create security policy
      gcloud compute security-policies create scw-policy --description='WAF and DDoS'
      # Add rate limiting rule
      gcloud compute security-policies rules create 1000 --security-policy=scw-policy --action=throttle --rate-limit-threshold-count=100 --rate-limit-threshold-interval-sec=60

  - id: gcp-018
    platform: gcp
    category: network
    severity: high
    title: "Restrict firewall rule source ranges"
    description: "Audit firewall rules allowing 0.0.0.0/0 and restrict to specific CIDRs."
    reference: "CIS GCP Foundations Benchmark 3.6"
    command: |
      gcloud compute firewall-rules list --filter='sourceRanges:0.0.0.0/0 AND direction=INGRESS AND disabled=false' --format='table(name,allowed[].map().firewall_rule().list(),sourceRanges)'

  - id: gcp-019
    platform: gcp
    category: network
    severity: high
    title: "Enable VPC Service Controls"
    description: "Create security perimeters around GCP resources to prevent data exfiltration."
    reference: "CIS GCP Foundations Benchmark 3.10"
    command: |
      # List access policies
      gcloud access-context-manager policies list --organization=<org_id>
      # List service perimeters
      gcloud access-context-manager perimeters list --policy=<policy_id>

  - id: gcp-020
    platform: gcp
    category: network
    severity: high
    title: "Use Cloud NAT instead of external IPs"
    description: "Route outbound traffic through Cloud NAT to avoid assigning public IPs to VMs."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Check for VMs with external IPs
      gcloud compute instances list --format='table(name,networkInterfaces[].accessConfigs[].natIP)' | grep -v '^$'
      # Create Cloud NAT
      gcloud compute routers create scw-router --region=<region> --network=<vpc>
      gcloud compute routers nats create scw-nat --router=scw-router --region=<region> --auto-allocate-nat-external-ips --nat-all-subnet-ip-ranges

  - id: gcp-021
    platform: gcp
    category: logging
    severity: critical
    title: "Enable Data Access audit logs for all services"
    description: "Log read/write data operations across all GCP services."
    reference: "CIS GCP Foundations Benchmark 2.1"
    command: |
      # Set org-level audit config via policy.json:
      # { "auditConfigs": [{ "service": "allServices",
      #   "auditLogConfigs": [{"logType": "ADMIN_READ"},
      #     {"logType": "DATA_READ"}, {"logType": "DATA_WRITE"}] }] }
      gcloud projects set-iam-policy <project> policy.json

  - id: gcp-022
    platform: gcp
    category: logging
    severity: critical
    title: "Export logs to BigQuery or Cloud Storage"
    description: "Create log sinks to export audit logs for long-term retention and analysis."
    reference: "CIS GCP Foundations Benchmark 2.2"
    command: |
      # Create BigQuery sink
      gcloud logging sinks create audit-to-bq \
        bigquery.googleapis.com/projects/<project>/datasets/audit_logs \
        --log-filter='logName:"cloudaudit.googleapis.com"'

  - id: gcp-023
    platform: gcp
    category: logging
    severity: high
    title: "Enable Security Command Center (SCC)"
    description: "Centralized security findings dashboard for vulnerabilities, threats, and misconfigurations."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Check SCC status
      gcloud scc organizations describe <org_id> 2>/dev/null
      # Enable via Console → Security → Security Command Center

  - id: gcp-024
    platform: gcp
    category: logging
    severity: high
    title: "Configure Cloud Monitoring alerting policies"
    description: "Set up alerts for security-critical events: firewall changes, IAM changes, SA key creation."
    reference: "CIS GCP Foundations Benchmark 2.4-2.11"
    command: |
      # Create alert for firewall rule changes
      gcloud alpha monitoring policies create \
        --notification-channels=<channel-id> \
        --condition-filter='resource.type="gce_firewall_rule" AND protoPayload.methodName="v1.compute.firewalls.insert"'

  - id: gcp-025
    platform: gcp
    category: logging
    severity: high
    title: "Monitor for service account key creation"
    description: "Alert when new service account keys are created (potential persistence mechanism)."
    reference: "CIS GCP Foundations Benchmark 2.10"
    command: |
      # Search audit logs for SA key creation
      gcloud logging read 'protoPayload.methodName="google.iam.admin.v1.CreateServiceAccountKey"' --limit=50 --format='table(timestamp,protoPayload.authenticationInfo.principalEmail,protoPayload.request.name)'

  - id: gcp-026
    platform: gcp
    category: logging
    severity: high
    title: "Enable VPC Flow Logs for all subnets"
    description: "Capture network flow data for all VPC subnets for security analysis."
    reference: "CIS GCP Foundations Benchmark 3.8"
    command: |
      # Find subnets without flow logs
      gcloud compute networks subnets list --format='table(name,region,logConfig.enable)' | grep -v True
      # Enable
      gcloud compute networks subnets update <subnet> --region=<region> --enable-flow-logs

  - id: gcp-027
    platform: gcp
    category: encryption
    severity: high
    title: "Enable CMEK for BigQuery datasets"
    description: "Use Customer-Managed Encryption Keys for sensitive BigQuery datasets."
    reference: "CIS GCP Foundations Benchmark 7.2"
    command: |
      # Check encryption on datasets
      bq show --format=prettyjson <project>:<dataset> | jq '.defaultEncryptionConfiguration'

  - id: gcp-028
    platform: gcp
    category: encryption
    severity: critical
    title: "Enforce uniform bucket-level access for GCS"
    description: "Disable ACLs and use IAM-only access control for Cloud Storage buckets."
    reference: "CIS GCP Foundations Benchmark 5.2"
    command: |
      # Find buckets not using uniform access
      gsutil ls -p <project> | while read bucket; do
        gsutil uniformbucketlevelaccess get $bucket
      done

  - id: gcp-029
    platform: gcp
    category: encryption
    severity: high
    title: "Enable confidential computing for sensitive VMs"
    description: "Use Confidential VMs with AMD SEV for encryption-in-use of memory."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Create confidential VM
      gcloud compute instances create confidential-vm \
        --machine-type=n2d-standard-2 \
        --confidential-compute --maintenance-policy=TERMINATE

  - id: gcp-030
    platform: gcp
    category: encryption
    severity: high
    title: "Rotate KMS keys on schedule"
    description: "Configure automatic rotation for Cloud KMS encryption keys."
    reference: "CIS GCP Foundations Benchmark 1.10"
    command: |
      # Set rotation schedule (90 days)
      gcloud kms keys update <key> --keyring=<keyring> --location=global \
        --rotation-period=90d --next-rotation-time=$(date -u +%Y-%m-%dT%H:%M:%SZ -d '+1 day')

  - id: gcp-031
    platform: gcp
    category: encryption
    severity: high
    title: "Enable Certificate Authority Service for internal TLS"
    description: "Use Google CA Service for automated certificate management within your org."
    reference: "Google Cloud Security Best Practices"
    command: |
      # List CAs
      gcloud privateca roots list --location=<location>
      # Create subordinate CA for service mesh
      gcloud privateca subordinates create scw-sub-ca --location=<location> --issuer-pool=<pool>

  - id: gcp-032
    platform: gcp
    category: services
    severity: critical
    title: "Enable Binary Authorization for GKE"
    description: "Only allow deployment of signed, verified container images to GKE clusters."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Check Binary Authorization policy
      gcloud container binauthz policy export
      # Enable on cluster
      gcloud container clusters update <cluster> --enable-binauthz

  - id: gcp-033
    platform: gcp
    category: services
    severity: high
    title: "Enable GKE Workload Identity"
    description: "Map Kubernetes service accounts to GCP service accounts for secure API access."
    reference: "CIS GKE Benchmark 6.2"
    command: |
      # Check if Workload Identity is enabled
      gcloud container clusters describe <cluster> --format='value(workloadIdentityConfig)'
      # Enable
      gcloud container clusters update <cluster> --workload-pool=<project>.svc.id.goog

  - id: gcp-034
    platform: gcp
    category: services
    severity: high
    title: "Restrict public access to Cloud SQL"
    description: "Ensure Cloud SQL instances don't have public IPs. Use Cloud SQL Proxy."
    reference: "CIS GCP Foundations Benchmark 6.5"
    command: |
      # Find SQL instances with public IPs
      gcloud sql instances list --format='table(name,ipAddresses[].type,settings.ipConfiguration.authorizedNetworks[].value)'

  - id: gcp-035
    platform: gcp
    category: services
    severity: high
    title: "Enable GKE Shielded Nodes"
    description: "Use Shielded GKE Nodes to verify node integrity with Secure Boot and vTPM."
    reference: "CIS GKE Benchmark 6.5"
    command: |
      gcloud container clusters describe <cluster> --format='value(shieldedNodes)'
      # Enable
      gcloud container clusters update <cluster> --enable-shielded-nodes

  - id: gcp-036
    platform: gcp
    category: services
    severity: high
    title: "Enable Container Threat Detection"
    description: "Detect runtime threats in GKE containers: malicious binaries, reverse shells, crypto mining."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Enable via SCC
      # Security Command Center → Settings → Container Threat Detection → Enable
      # Or via gcloud:
      gcloud scc settings update --organization=<org_id> --enable-service=CONTAINER_THREAT_DETECTION

  - id: gcp-037
    platform: gcp
    category: services
    severity: high
    title: "Disable serial port access to VMs"
    description: "Block interactive serial console access which can bypass OS-level security."
    reference: "CIS GCP Foundations Benchmark 4.5"
    command: |
      # Org policy
      gcloud resource-manager org-policies enable-enforce compute.disableSerialPortAccess --organization=<org_id>
      # Per-instance
      gcloud compute instances add-metadata <vm> --metadata serial-port-enable=false

  - id: gcp-038
    platform: gcp
    category: patching
    severity: critical
    title: "Enable OS Patch Management"
    description: "Use OS Config agent for automated security patching of all GCE instances."
    reference: "CIS GCP Foundations Benchmark 4.11"
    command: |
      # Check OS Config agent status
      gcloud compute instances os-inventory list-instances --format='table(name,zone)'
      # Create patch job
      gcloud compute os-config patch-jobs execute --instance-filter-all --duration=3600s

  - id: gcp-039
    platform: gcp
    category: patching
    severity: high
    title: "Enable Container Analysis for vulnerability scanning"
    description: "Automatically scan container images in Artifact Registry for known CVEs."
    reference: "Google Cloud Security Best Practices"
    command: |
      # Check scanning settings
      gcloud artifacts repositories describe <repo> --location=<location> --format='value(name)'
      # Enable scanning via on-demand scan
      gcloud artifacts docker images scan <image-url>

  - id: gcp-040
    platform: gcp
    category: patching
    severity: high
    title: "Monitor for outdated GKE cluster versions"
    description: "Ensure GKE clusters are running supported and patched Kubernetes versions."
    reference: "CIS GKE Benchmark 6.10"
    command: |
      # Check cluster versions
      gcloud container clusters list --format='table(name,currentMasterVersion,currentNodeVersion,status)'
      # Check for available upgrades
      gcloud container get-server-config --zone=<zone> --format='value(validMasterVersions[0:3])'

