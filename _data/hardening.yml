  title: Deploy sensor to all endpoints (100% coverage)
  description: Unmanaged hosts are blind spots. Deploy the Falcon sensor to every server, workstation, and cloud instance. Use Discover to identify unmanaged assets.
  reference: CrowdStrike Sensor Deployment Guide
  command: '# Check coverage gaps:
