- id: m365-026
  platform: m365-collab
  category: services
  severity: critical
  title: Ensure all forms of mail forwarding are blocked and/or disabled.
  description: 'Remote domain API returned no default (*) domain. Verify via EXO PowerShell: Get-RemoteDomain Default | fl AutoForwardEnabled.'
  reference: CIS.6.2.1 — CIS M365 / Microsoft Secure Score — Exchange Online
  command: 'Get-RemoteDomain Default | fl AutoForwardEnabled

    # EXO PowerShell: Get-RemoteDomain Default | fl AutoForwardEnabled'
  tags:
  - exchange-online
  - mail-forwarding
  - data-exfiltration
  - bec
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: 'Mail forwarding is the #1 persistence mechanism in Business Email Compromise. Attackers set forwarding rules that silently copy all incoming mail to an external address. There are
      THREE different forwarding mechanisms: transport rules, inbox rules, and SMTP forwarding — all three must be blocked.'
    implementationNotes: '# Block all three forwarding vectors:


      # 1. Transport rule-based forwarding

      New-TransportRule -Name ''Block External Auto-Forward'' -FromScope InOrganization -SentToScope NotInOrganization -MessageTypeMatches AutoForward -RejectMessageReasonText ''External forwarding blocked
      by policy''


      # 2. Disable SMTP forwarding on all mailboxes

      Get-EXOMailbox -ResultSize Unlimited | Set-Mailbox -DeliverToMailboxAndForward $false -ForwardingSmtpAddress $null -ForwardingAddress $null


      # 3. Block client-side inbox rules from forwarding

      # Remote Domains

      Get-RemoteDomain | Set-RemoteDomain -AutoForwardEnabled $false


      # 4. Find existing forwarding rules

      Get-EXOMailbox -ResultSize Unlimited | Where-Object { $_.ForwardingSmtpAddress -or $_.ForwardingAddress } | Select UserPrincipalName, ForwardingSmtpAddress, ForwardingAddress'
    validationNotes: '# Check all three vectors:

      # 1. Transport rules

      Get-TransportRule | Where-Object { $_.MessageTypeMatches -eq ''AutoForward'' } | Select Name, State


      # 2. SMTP forwarding

      Get-EXOMailbox -ResultSize Unlimited | Where-Object { $_.ForwardingSmtpAddress } | Measure

      # Expected: 0


      # 3. Remote domain auto-forward

      Get-RemoteDomain Default | Select AutoForwardEnabled

      # Expected: False'
    tuningNotes: 'Legitimate forwarding use cases: shared mailbox to ticketing system, executive assistant access. Handle these with proper delegation or shared mailbox permissions rather than forwarding.
      If forwarding is business-critical, use an allow-list transport rule exception for specific sender-recipient pairs.'
    advancedDetection: '// KQL: Detect new forwarding rules (all types)

      OfficeActivity

      | where TimeGenerated > ago(24h)

      | where Operation in (''New-InboxRule'',''Set-InboxRule'',''Set-Mailbox'',''New-TransportRule'')

      | where Parameters has_any (''ForwardTo'',''ForwardAsAttachmentTo'',''RedirectTo'',''ForwardingSmtpAddress'',''DeliverToMailboxAndForward'')

      | project TimeGenerated, UserId, Operation, Parameters, ClientIP'
