- id: m365-078
  platform: m365-power
  category: services
  severity: high
  title: Ensure 'Block ResourceKey Authentication' is 'Enabled'.
  description: Check Power BI Admin Portal → Tenant settings → Developer settings.
  reference: CIS.9.1.9 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → Developer settings'
  premium:
    attackPerspective: ResourceKey authentication allows anonymous, key-based access to Power BI resources without Azure AD authentication. If enabled, anyone with the resource key URL can access the associated
      content — no identity, no MFA, no conditional access. Attackers who discover these keys (via URL scanning, leaked code repos, or network interception) gain persistent, untraceable access.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Developer settings

      # ''Block ResourceKey Authentication'' → Enabled


      # This disables the legacy authentication method that uses resource keys

      # instead of Azure AD tokens. All access must go through proper identity authentication.


      # Check for existing resources using ResourceKey auth:

      # Admin Portal → Usage metrics → Look for anonymous access patterns

      # These indicate resources still relying on ResourceKey auth


      # After enabling, monitor for broken integrations:

      # Some legacy embedded reports may use ResourceKey

      # Migrate these to service principal or user identity authentication'
    validationNotes: "# Verify ResourceKey Authentication is blocked\nGet-PowerBITenantSetting | Where-Object { $_.SettingName -eq 'BlockResourceKeyAuthentication' }\n\n# Search audit logs for ResourceKey\
      \ usage before blocking:\nSearch-UnifiedAuditLog -StartDate (Get-Date).AddDays(-14) -EndDate (Get-Date) -RecordType PowerBIAudit | Where-Object {\n    $_.AuditData -like '*ResourceKey*'\n} | Select-Object\
      \ CreationDate, UserIds, Operations"
    tuningNotes: Before enabling this setting, inventory all embedded reports and third-party integrations. Some legacy BI portals may rely on ResourceKey auth. Plan a migration window of 2-4 weeks where
      you notify integration owners and help them switch to service principal authentication.
    advancedDetection: '// KQL: Detect ResourceKey authentication attempts

      PowerBIActivity

      | where TimeGenerated > ago(7d)

      | where AuthenticationMethod has ''ResourceKey'' or Activity has ''ResourceKey''

      | project TimeGenerated, Activity, UserId, ClientIP, UserAgent

      | sort by TimeGenerated desc'
