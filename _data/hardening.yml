- id: gcp-004
  platform: gcp
  category: logging
  severity: critical
  title: Enable Cloud Audit Logs
  description: Enable Admin Activity, Data Access, and System Event audit logs for all services.
  reference: CIS GCP Foundations Benchmark 2.1
  command: '# Check audit log config

    gcloud projects get-iam-policy <project_id> --format=json | jq ''.auditConfigs''

    # Enable data access logs for all services

    gcloud projects set-iam-policy <project_id> policy.json

    # Where policy.json includes:

    # "auditConfigs": [{ "service": "allServices",

    #   "auditLogConfigs": [{"logType": "DATA_READ"}, {"logType": "DATA_WRITE"}] }]

    '
  premium:
    attackPerspective: Without Cloud Audit Logs, attackers operate in complete darkness. They can create resources, modify IAM policies, exfiltrate data, and delete evidence without any record. GCP does
      enable Admin Activity logs by default, but Data Access logs (which record who read what data) are disabled by default — meaning data exfiltration from BigQuery, GCS, or Spanner leaves no trace.
    implementationNotes: '# Enable Data Access logs at org level (Admin Activity is on by default)

      gcloud logging org-policies describe --organization=ORG_ID


      # Enable for all services via org-level audit config:

      gcloud organizations set-iam-policy ORG_ID policy.json


      # policy.json should include:

      # "auditConfigs": [

      #   {

      #     "service": "allServices",

      #     "auditLogConfigs": [

      #       {"logType": "ADMIN_READ"},

      #       {"logType": "DATA_READ"},

      #       {"logType": "DATA_WRITE"}

      #     ]

      #   }

      # ]


      # Per-project alternative:

      gcloud projects get-iam-policy PROJECT_ID --format=json > policy.json

      # Add auditConfigs section, then:

      gcloud projects set-iam-policy PROJECT_ID policy.json


      # Exclude high-volume exempt accounts if needed:

      # "exemptedMembers": ["serviceAccount:bigquery-reader@project.iam.gserviceaccount.com"]'
    validationNotes: "# Verify audit config at org level\ngcloud organizations get-iam-policy ORG_ID --format=json | jq '.auditConfigs'\n\n# Check per-project audit config\nfor project in $(gcloud projects\
      \ list --format='value(projectId)'); do\n  echo \"=== $project ===\"\n  gcloud projects get-iam-policy $project --format=json | jq '.auditConfigs // \"NOT CONFIGURED\"'\ndone\n\n# Test by querying\
      \ BigQuery and checking logs\nbq query 'SELECT 1'\n# Wait 5 minutes, then:\ngcloud logging read 'protoPayload.methodName=\"jobservice.query\"' --limit=5"
    tuningNotes: Data Access logs can generate massive volume, especially for BigQuery and GCS. Start with DATA_WRITE for all services, add DATA_READ selectively. Exempt high-frequency service accounts
      (e.g., monitoring pipelines) using exemptedMembers. Budget 10-30% increase in logging costs. Use log routing to send only security-relevant logs to SIEM and archive the rest in cold storage.
    advancedDetection: "-- BigQuery: Verify audit log completeness\nSELECT\n  protopayload_auditlog.serviceName,\n  protopayload_auditlog.methodName,\n  COUNT(*) as event_count\nFROM `project.dataset.cloudaudit_googleapis_com_data_access`\n\
      WHERE timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 24 HOUR)\nGROUP BY 1, 2\nORDER BY event_count DESC\n\n-- Alert on audit log deletion attempts\nSELECT timestamp, protopayload_auditlog.authenticationInfo.principalEmail\n\
      FROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName LIKE '%DeleteLog%'\nOR protopayload_auditlog.methodName LIKE '%DeleteSink%'"
    relatedIds:
    - gcp-021
    - gcp-022
    - gcp-023
  tags:
  - gcp
  - logging
- id: gcp-005
  platform: gcp
  category: encryption
  severity: high
  title: Enable Customer-Managed Encryption Keys (CMEK)
  description: Use Cloud KMS for encryption of sensitive GCS buckets, BigQuery datasets, and disks.
  reference: CIS GCP Foundations Benchmark 2.2
  command: "# Create KMS key\ngcloud kms keyrings create scw-keyring --location=global\ngcloud kms keys create scw-encrypt-key --keyring=scw-keyring \\\n  --location=global --purpose=encryption\n# Apply\
    \ to GCS bucket\ngsutil kms encryption -k projects/<proj>/locations/global/keyRings/scw-keyring/cryptoKeys/scw-encrypt-key gs://<bucket>\n"
  premium:
    attackPerspective: Google-managed encryption keys protect data at rest but Google controls the key lifecycle. With CMEK, your organization holds the encryption keys in Cloud KMS. If you detect a breach,
      you can disable or destroy the key to render all encrypted data permanently unreadable — a nuclear option that Google-managed keys don't provide. This 'crypto-shredding' capability is critical for
      incident response.
    implementationNotes: "# 1. Create a KMS keyring and key\ngcloud kms keyrings create my-keyring --location=us-central1\ngcloud kms keys create my-key \\\n  --keyring=my-keyring \\\n  --location=us-central1\
      \ \\\n  --purpose=encryption \\\n  --rotation-period=90d \\\n  --next-rotation-time=$(date -u -d '+90 days' +%Y-%m-%dT%H:%M:%SZ)\n\n# 2. Grant the service agent access to the key\n# For GCS:\ngcloud\
      \ kms keys add-iam-policy-binding my-key \\\n  --keyring=my-keyring --location=us-central1 \\\n  --member='serviceAccount:service-PROJECT_NUM@gs-project-accounts.iam.gserviceaccount.com' \\\n  --role='roles/cloudkms.cryptoKeyEncrypterDecrypter'\n\
      \n# 3. Create bucket with CMEK\ngsutil mb -l us-central1 -k projects/PROJECT/locations/us-central1/keyRings/my-keyring/cryptoKeys/my-key gs://my-secure-bucket\n\n# Organization Policy to require CMEK:\n\
      # constraints/gcp.restrictNonCmekServices → deny list of services that must use CMEK"
    validationNotes: "# Verify CMEK on GCS buckets\nfor bucket in $(gsutil ls); do\n  enc=$(gsutil kms encryption $bucket 2>/dev/null)\n  echo \"$bucket: $enc\"\ndone\n\n# Verify CMEK on BigQuery datasets\n\
      bq ls --format=json | jq '.[] | {datasetId: .datasetReference.datasetId, defaultEncryptionConfiguration}'\n\n# Verify org policy\ngcloud resource-manager org-policies describe \\\n  constraints/gcp.restrictNonCmekServices\
      \ \\\n  --organization=ORG_ID"
    tuningNotes: 'CMEK adds operational complexity — if you lose access to the key, your data is permanently lost. Implement key rotation (90 days), and never delete key versions immediately (set a 30-day
      scheduled destruction window). Grant minimal KMS roles: separate key admins from key users. For disaster recovery, consider CMEK with Cloud External Key Manager (Cloud EKM) for the highest sensitivity
      data.'
    advancedDetection: "-- Monitor KMS key usage anomalies\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.methodName,\n  protopayload_auditlog.resourceName\n\
      FROM `project.dataset.cloudaudit_googleapis_com_data_access`\nWHERE protopayload_auditlog.serviceName = 'cloudkms.googleapis.com'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\n\
      ORDER BY timestamp DESC\n\n-- Alert on key disable/destroy\nSELECT timestamp, protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\n\
      WHERE protopayload_auditlog.methodName IN (\n  'DisableCryptoKeyVersion', 'DestroyCryptoKeyVersion', 'UpdateCryptoKeyPrimaryVersion')"
    relatedIds:
    - gcp-027
    - gcp-030
  tags:
  - gcp
  - encryption
- id: gcp-006
  platform: gcp
  category: services
  severity: high
  title: Disable unused APIs
  description: Disable GCP APIs not required for the project to reduce attack surface.
  reference: CIS GCP Foundations Benchmark 1.11
  command: '# List enabled APIs

    gcloud services list --enabled --format="table(config.name)"

    # Disable unused

    gcloud services disable <service-name>.googleapis.com

    '
  premium:
    attackPerspective: Every enabled API is an attack surface. Unused APIs like Compute Engine, Cloud Functions, or Deployment Manager may sit dormant with default service accounts and permissive IAM. An
      attacker who gains project-level access exploits these enabled-but-unmonitored APIs to create VMs for cryptomining, deploy malicious functions, or establish persistence — all in services nobody is
      watching.
    implementationNotes: '# List all enabled APIs in a project

      gcloud services list --enabled --project=PROJECT_ID


      # List all available APIs (to compare)

      gcloud services list --available --project=PROJECT_ID | wc -l


      # Disable unused APIs

      gcloud services disable compute.googleapis.com --project=PROJECT_ID

      gcloud services disable deploymentmanager.googleapis.com --project=PROJECT_ID

      gcloud services disable cloudfunctions.googleapis.com --project=PROJECT_ID


      # Common APIs safe to disable if unused:

      # - deploymentmanager.googleapis.com (legacy)

      # - appengine.googleapis.com (if not using App Engine)

      # - genomics.googleapis.com (specialized)

      # - ml.googleapis.com (if not using AI Platform)

      # - sourcerepo.googleapis.com (if using GitHub/GitLab)


      # Organization Policy to restrict allowed APIs:

      # constraints/serviceuser.services → allowedValues list'
    validationNotes: "# Audit API usage to find truly unused APIs\n# Check API dashboard for last 30 days of traffic:\ngcloud services list --enabled --format='table(config.name)' --project=PROJECT_ID\n\
      \n# Use recommender to find unused APIs:\ngcloud recommender recommendations list \\\n  --recommender=google.iam.policy.Recommender \\\n  --project=PROJECT_ID \\\n  --location=global \\\n  --format='table(content.overview.resource,content.overview.removedRole)'\n\
      \n# Check API activity in audit logs:\ngcloud logging read 'protoPayload.serviceName=\"compute.googleapis.com\"' \\\n  --project=PROJECT_ID --freshness=30d --limit=1"
    tuningNotes: Don't disable APIs blindly — some have non-obvious dependencies. Compute Engine API is required by GKE, Cloud Functions needs Cloud Build, etc. Check API dependencies before disabling.
      Start with clearly unused APIs (genomics, dataproc if not used) and work toward less obvious ones. Use the API dashboard's traffic view to confirm zero usage over 90 days before disabling.
    advancedDetection: "-- BigQuery: Find newly enabled APIs (potential attacker staging)\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail AS enabler,\n  protopayload_auditlog.resourceName\
      \ AS api_name\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'google.api.serviceusage.v1.ServiceUsage.EnableService'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(),\
      \ INTERVAL 7 DAY)\nORDER BY timestamp DESC"
    relatedIds:
    - gcp-015
    - gcp-037
  tags:
  - gcp
  - services
