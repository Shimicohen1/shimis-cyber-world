- id: okta-001
  platform: okta
  category: identity
  severity: critical
  title: Enforce phishing-resistant MFA (WebAuthn/FIDO2) for all users
  description: Configure Okta to require phishing-resistant MFA (FIDO2 security keys or platform authenticators) for all users. SMS and TOTP are bypassable by adversary-in-the-middle attacks.
  reference: Okta Security Best Practices — MFA Configuration
  command: '# Okta Admin Console: Security > Authenticators
    # 1. Add: FIDO2 (WebAuthn) as authenticator
    # 2. Security > Authentication Policies > Default Policy
    # 3. Add rule: "All Users" > Require MFA > Factor type: Phishing-resistant
    # 4. Optionally: Disable SMS/Voice as fallback
    #
    # Okta API:
    # POST /api/v1/policies/{policyId}/rules
    # {"type":"ACCESS_POLICY","conditions":{"people":{"users":{"include":["EVERYONE"]}}},"actions":{"appSignOn":{"access":"ALLOW","verificationMethod":{"factorMode":"2FA","reauthenticateIn":"PT2H","constraints":[{"knowledge":{"reauthenticateIn":"PT2H"},"possession":{"deviceBound":"REQUIRED","phishingResistant":"REQUIRED"}}]}}}}'
  premium:
    attackPerspective: The 2023 Okta breach (via social engineering of IT support) and the Twilio/Cloudflare attacks all bypassed SMS-based MFA. Adversary-in-the-middle (AiTM) proxy tools like EvilGinx2 capture TOTP codes in real-time. Only FIDO2/WebAuthn is immune to phishing because the cryptographic challenge is domain-bound — a fake login page cannot intercept it.
    implementationNotes: '1. Phase 1: Enroll admins in FIDO2 first (2 keys per admin — primary + backup)
      2. Phase 2: Roll out hardware keys to privileged users (finance, HR, execs)
      3. Phase 3: Enable platform authenticators (Touch ID, Windows Hello) for all users
      4. Keep one TOTP-based "break glass" admin account locked in a physical safe
      5. Disable OTP via SMS/Voice — they are the weakest link'
    validationNotes: '# Verify authenticator settings:
      # Okta Admin > Security > Authenticators — FIDO2 should be listed and active
      # Check enrollment status:
      # Reports > Authenticator Enrollment — filter by "Not Enrolled"
      #
      # Test: try logging in to a test app — MFA prompt should require FIDO2
      #
      # API: GET /api/v1/users?filter=status eq "ACTIVE"&search=profile.mfaEnrollment eq null'
    tuningNotes: Users with accessibility needs may require alternative authenticators (Okta Verify push with number matching). Allow this as an exception but never SMS. Set re-authentication interval to 2 hours for sensitive apps, 12 hours for low-risk.
    advancedDetection: '# Detect MFA bypass attempts in Okta System Log
      # Splunk: index=okta sourcetype=okta:events eventType="user.authentication.auth_via_mfa" outcome.result="FAILURE"
      # | stats count by actor.alternateId, client.ipAddress
      # | where count > 5

      # Sentinel KQL: OktaSSO
      # | where eventType_s == "user.authentication.auth_via_mfa" and outcome_result_s == "FAILURE"
      # | summarize Failures=count() by actor_alternateId_s, client_ipAddress_s
      # | where Failures > 5'
    relatedIds:
    - okta-002
    - okta-004
  tags:
  - mfa
  - fido2
  - webauthn
  - phishing-resistant
  - authentication
  commandLanguage: okta-admin
  commandFull: '# Step 1: Enable FIDO2 authenticator
    # Admin > Security > Authenticators > Add Authenticator > FIDO2 (WebAuthn)
    # Settings: User verification = Required, Resident key = Preferred

    # Step 2: Update authentication policy
    # Admin > Security > Authentication Policies > Default Policy
    # Add rule: Require Phishing-Resistant factor
    # Apply to: Everyone
    # Re-authentication: Every 2 hours for admin apps

    # Step 3: Disable weak factors
    # Admin > Security > Authenticators > SMS > Deactivate
    # Admin > Security > Authenticators > Voice > Deactivate'
- id: okta-002
  platform: okta
  category: identity
  severity: critical
  title: Restrict admin roles to minimum necessary and enable admin MFA
  description: Apply least-privilege admin roles. Separate Super Admin from Read-Only Admin, App Admin, and Help Desk Admin. Require separate MFA for admin console access.
  reference: Okta Security Best Practices — Admin Governance
  command: '# Okta Admin Console: Security > Administrators
    # 1. Audit all current admins — remove unnecessary Super Admin grants
    # 2. Assign granular roles:
    #    - SOC: Read-Only Admin
    #    - IT Help Desk: Help Desk Admin (password reset only)
    #    - App owners: Application Admin (specific apps only)
    #    - Super Admin: 2-3 break-glass accounts ONLY
    #
    # 3. Security > Authentication Policies > Admin Console
    #    Require: Phishing-resistant MFA + every 1 hour re-auth'
  premium:
    attackPerspective: In the 2023 Okta breach, attackers targeted IT support staff to obtain admin session tokens. A Super Admin token gives full control over the tenant — ability to reset any password, disable MFA, create backdoor admin accounts, and exfiltrate the entire user directory. The Lapsus$ group specifically targeted Okta admin access as a gateway to downstream SaaS applications.
    implementationNotes: '1. Audit: list all users with admin roles — identify over-privileged accounts
      2. Super Admin should be held by 2-3 named individuals only
      3. Create "break glass" Super Admin with hardware FIDO2 key stored in safe
      4. Enable admin session binding to IP — prevents session token theft
      5. Set admin console session timeout to 1 hour
      6. Enable admin email notifications for all role changes'
    validationNotes: '# Verify admin count:
      # Admin > Security > Administrators — count Super Admins (target: 2-3 max)
      #
      # API: GET /api/v1/users?filter=status eq "ACTIVE"
      # Then: GET /api/v1/users/{userId}/roles for each
      #
      # Verify admin MFA policy is set to phishing-resistant:
      # Security > Authentication Policies > Admin Console'
    tuningNotes: Okta API tokens inherit the role of the user who created them. Audit API tokens separately and scope them minimally. Rotate API tokens every 90 days or on admin role changes.
    advancedDetection: '# Detect admin role escalation
      # Splunk: index=okta eventType="user.account.privilege.grant"
      # | stats count by actor.alternateId, target.alternateId, outcome.result

      # KQL: OktaSSO
      # | where eventType_s == "user.account.privilege.grant"
      # | project TimeGenerated, actor_alternateId_s, target_0_alternateId_s'
    relatedIds:
    - okta-001
    - okta-003
  tags:
  - admin
  - rbac
  - least-privilege
  - super-admin
  commandLanguage: okta-admin
  commandFull: '# Audit current admins:
    # GET /api/v1/users?filter=status eq "ACTIVE"
    # For each user: GET /api/v1/users/{id}/roles

    # Remove unnecessary Super Admin:
    # DELETE /api/v1/users/{userId}/roles/{roleId}

    # Assign granular role:
    # POST /api/v1/users/{userId}/roles
    # {"type":"READ_ONLY_ADMIN"}'
- id: okta-003
  platform: okta
  category: identity
  severity: critical
  title: Enable ThreatInsight and block suspicious IPs
  description: Enable Okta ThreatInsight to automatically detect and block credential-stuffing, brute-force, and password-spraying attacks based on Okta's global threat intelligence.
  reference: Okta ThreatInsight Documentation
  command: '# Okta Admin Console: Security > General > Okta ThreatInsight
    # Set action: "Block and log" (not just log)
    #
    # API:
    # PUT /api/v1/threats/configuration
    # {"action":"BLOCK_AND_LOG"}'
  premium:
    attackPerspective: Okta processes billions of authentication requests monthly. ThreatInsight uses this data to identify IPs conducting credential-stuffing across multiple Okta tenants — if an IP is attacking other Okta customers, it is pre-emptively blocked on yours. Without ThreatInsight, your Okta tenant processes every brute-force attempt, which also consumes your rate limits and degrades performance.
    implementationNotes: '1. Enable ThreatInsight in "Block and log" mode (not just "Log")
      2. This blocks known-bad IPs before authentication is attempted
      3. Add legitimate proxy/VPN IPs to the exempt list if needed
      4. Combine with rate limiting for defense in depth
      5. Monitor ThreatInsight events in System Log for intelligence'
    validationNotes: '# Verify ThreatInsight is active:
      # Admin > Security > General > Okta ThreatInsight — should show "Block and log"
      #
      # Check recent blocks:
      # Reports > System Log > Filter: eventType = "security.threat.detected"
      #
      # API: GET /api/v1/threats/configuration'
    tuningNotes: ThreatInsight may block corporate VPN exit IPs if they are shared with other tenants experiencing attacks. Add your VPN egress IPs to the ThreatInsight exempt list proactively.
    advancedDetection: '# Monitor ThreatInsight blocks for patterns
      index=okta eventType="security.threat.detected"
      | stats count by client.ipAddress, client.geographicalContext.country
      | sort -count'
    relatedIds:
    - okta-001
    - okta-005
  tags:
  - threatinsight
  - brute-force
  - credential-stuffing
  - threat-intelligence
  commandLanguage: okta-admin
  commandFull: '# Enable ThreatInsight:
    # PUT /api/v1/threats/configuration
    # Body: {"action":"BLOCK_AND_LOG"}

    # Add VPN exits to exempt list:
    # Admin > Security > General > ThreatInsight > Exempt Zones
    # Add your corporate VPN egress IPs'
- id: okta-004
  platform: okta
  category: identity
  severity: critical
  title: Configure session management with binding and timeout
  description: Bind Okta sessions to the client IP and set aggressive timeouts. Stolen session tokens are the primary pivot after initial compromise.
  reference: Okta Security Best Practices — Session Management
  command: '# Okta Admin Console: Security > Authentication Policies
    # Global Session Policy:
    # Max session lifetime: 12 hours
    # Max idle time: 30 minutes
    # Bind session to: IP address
    # Prompt for MFA: Every sign-in attempt
    #
    # For Admin Console:
    # Max session: 1 hour
    # Max idle: 15 minutes
    # Bind to IP + device'
  premium:
    attackPerspective: Session token theft is the #1 post-compromise technique for cloud identity attacks. Attackers who steal an Okta session cookie (via browser malware, AiTM proxy, or helpdesk social engineering) can access all SSO applications without re-authenticating. In the 2023 Okta breach, stolen session tokens were used to access downstream customer environments. IP binding invalidates tokens immediately when they are used from a different IP.
    implementationNotes: '1. Global sessions: max 12 hours, idle 30 minutes, bind to IP
      2. Admin sessions: max 1 hour, idle 15 minutes, bind to IP + device
      3. High-risk apps (finance, code repos): require re-auth every 2 hours
      4. Enable "Prompt for MFA at every sign-in" for sensitive groups
      5. Watch for session token reuse from different IPs in System Log'
    validationNotes: '# Verify session policy:
      # Admin > Security > Authentication Policies > Global Session Policy
      # Check: max lifetime, idle timeout, factor lifetime
      #
      # Test: log in, change IP (VPN switch), verify session is invalidated
      #
      # API: GET /api/v1/policies?type=OKTA_SIGN_ON'
    tuningNotes: IP binding may cause issues for users on mobile networks where IPs rotate frequently. Use ASN-aware binding instead of strict IP for mobile user groups if needed.
    advancedDetection: '# Detect session hijacking — same session from different IPs
      index=okta eventType="user.session.start"
      | stats dc(client.ipAddress) as unique_ips, values(client.ipAddress) as ips by authenticationContext.externalSessionId
      | where unique_ips > 1'
    relatedIds:
    - okta-001
    - okta-002
  tags:
  - session
  - token-theft
  - session-binding
  - timeout
  commandLanguage: okta-admin
  commandFull: '# Configure via API:
    # PUT /api/v1/policies/{globalSessionPolicyId}
    # Set maxSessionLifetimeMinutes, maxSessionIdleMinutes
    # Enable usePersistentCookie: false
    # Enable session binding to IP'
- id: okta-005
  platform: okta
  category: identity
  severity: high
  title: Configure Okta System Log forwarding to SIEM
  description: Forward all Okta System Log events to your SIEM for correlation with endpoint and network data. Okta logs are the authoritative source for identity-based attack detection.
  reference: Okta Log Streaming Documentation
  command: '# Option A — Okta Log Streaming (real-time):
    # Admin > Reports > Log Streaming > Create > Splunk Cloud or AWS EventBridge
    #
    # Option B — API polling:
    # GET /api/v1/logs?since=2024-01-01T00:00:00Z&limit=1000
    # Poll every 30-60 seconds
    #
    # Option C — Splunk Add-on for Okta:
    # Install from Splunkbase, configure API token'
  premium:
    attackPerspective: Okta is the front door to every SaaS application via SSO. Monitoring Okta logs is equivalent to monitoring the main gate. Without SIEM integration, you are blind to MFA bypass, session hijacking, admin abuse, and lateral movement to downstream applications. In most cloud-native breaches, Okta System Log is the ONLY place the attack is visible.
    implementationNotes: '1. Use Okta Log Streaming (push) for real-time — lower latency than API polling
      2. If using API polling, set interval to 30 seconds for critical events
      3. Ensure SIEM parses: actor, target, outcome, client.ipAddress, client.userAgent
      4. Create correlation rules with endpoint and network data
      5. Monitor API token health — expired tokens = blind spot'
    validationNotes: '# Verify logs are arriving in SIEM:
      # Splunk: index=okta | stats count by eventType | sort -count | head 20
      #
      # KQL: OktaSSO | summarize count() by eventType_s | top 20
      #
      # Check for gaps: compare Okta System Log event count vs SIEM count'
    tuningNotes: Okta generates high-volume events for app launches and page views. Filter to security-relevant events in SIEM to reduce storage costs while keeping full fidelity for forensics.
    advancedDetection: '# Critical Okta events to alert on:
      # user.session.impersonation.initiate — admin impersonating user
      # user.account.privilege.grant — role escalation
      # policy.lifecycle.update — MFA policy change
      # application.lifecycle.create — new SSO app added
      # user.mfa.factor.deactivate — MFA removed from user'
    relatedIds:
    - okta-003
    - okta-004
  tags:
  - siem
  - logging
  - system-log
  - monitoring
  commandLanguage: okta-admin
  commandFull: '# Create API token for SIEM:
    # Admin > Security > API > Tokens > Create Token
    # Name: "SIEM-Integration"
    # Scope: Read-only
    # Store token securely — it is shown only once

    # Splunk Add-on config:
    # URL: https://<your-org>.okta.com
    # Token: <api-token>
    # Interval: 30 seconds'
- id: okta-006
  platform: okta
  category: identity
  severity: high
  title: Restrict API token permissions and rotate tokens quarterly
  description: Okta API tokens inherit the full permissions of the creating admin. Use service accounts with scoped admin roles for API integrations. Rotate tokens every 90 days.
  reference: Okta API Security Best Practices
  command: '# Okta Admin Console:
    # 1. Create dedicated service account: api-svc@yourdomain.com
    # 2. Assign minimal role (e.g., Read-Only Admin for SIEM)
    # 3. Security > API > Tokens — create token as this service account
    # 4. Set calendar reminder to rotate every 90 days
    #
    # List existing tokens:
    # GET /api/v1/api-tokens'
  premium:
    attackPerspective: Leaked or over-privileged API tokens are a common attack vector. If a Super Admin token is compromised, the attacker has full control equivalent to the admin console. In multiple Okta-related breaches, API tokens stored in code repos or CI/CD configs were the initial compromise vector. Scoped tokens limit blast radius.
    implementationNotes: '1. Create service accounts specifically for API integrations
      2. Assign the minimum required role (Read-Only for monitoring, App Admin for provisioning)
      3. Never use Super Admin tokens in automation
      4. Store tokens in secret managers (Vault, AWS Secrets Manager) — never in code
      5. Set 90-day rotation schedule with automated alerts
      6. Enable API token usage alerts in System Log'
    validationNotes: '# List all API tokens:
      # Admin > Security > API > Tokens
      # Review: creating user, creation date, last used
      #
      # API: GET /api/v1/api-tokens
      # Check for tokens older than 90 days or created by Super Admins'
    tuningNotes: OAuth 2.0 and OIDC integrations are preferred over static API tokens. Migrate to OAuth where possible — tokens have automatic expiry and scoped permissions.
    advancedDetection: '# Detect API token misuse
      index=okta eventType="system.api_token.*"
      | stats count by eventType, actor.alternateId, client.ipAddress
      | sort -count'
    relatedIds:
    - okta-002
    - okta-005
  tags:
  - api
  - tokens
  - rotation
  - service-accounts
  commandLanguage: okta-admin
  commandFull: '# Create scoped service account:
    # POST /api/v1/users (create service user)
    # POST /api/v1/users/{id}/roles (assign Read-Only Admin)
    # Sign in as service user > Security > API > Create Token'
- id: okta-007
  platform: okta
  category: identity
  severity: high
  title: Configure password policy with breach detection
  description: Enable Okta password policy with common password rejection, breach detection (checks against known leaked credentials), and minimum 12-character requirement.
  reference: Okta Password Policy Best Practices
  command: '# Okta Admin Console: Security > Authentication > Password
    # Minimum length: 12
    # Complexity: require uppercase, lowercase, number, symbol
    # Common password check: Enabled
    # Breached password detection: Enabled
    # Lockout: 5 failures = 15 min lockout
    # Max age: 0 (no expiry — per NIST 800-63B)
    # History: 12 previous passwords'
  premium:
    attackPerspective: NIST 800-63B recommends against forced password rotation (it leads to weaker passwords) and instead recommends checking passwords against breach databases. Okta breached password detection compares user passwords against known compromised credential lists in real-time. This catches password reuse — the #1 cause of account compromises.
    implementationNotes: '1. Set minimum 12 characters (NIST recommends 8 minimum, but 12 is practical)
      2. Enable breached password detection — flags passwords found in known breaches
      3. Disable forced rotation — per NIST 800-63B guidance
      4. Enable common password dictionary check
      5. Set lockout after 5 failures for 15 minutes
      6. Preserve 12 password history to prevent cycling'
    validationNotes: '# Verify password policy:
      # Admin > Security > Authentication > Password tab
      # Verify: breached password detection is ON
      #
      # Test: try setting password to "Password123!" — should be rejected as common
      #
      # API: GET /api/v1/policies?type=PASSWORD'
    tuningNotes: If enabling breached password detection on an existing tenant, use "warning" mode first — hundreds of users may have compromised passwords. Notify users before enforcing to avoid mass lockout.
    advancedDetection: '# Detect accounts with breached passwords
      index=okta eventType="user.account.update_password" reason="COMPROMISED_PASSWORD"
      | stats count by actor.alternateId'
    relatedIds:
    - okta-001
    - okta-003
  tags:
  - password
  - breach-detection
  - nist
  - credential-stuffing
  commandLanguage: okta-admin
  commandFull: '# Configure via API:
    # PUT /api/v1/policies/{passwordPolicyId}
    # settings.password.complexity.minLength: 12
    # settings.password.age.maxAgeDays: 0
    # settings.password.lockout.maxAttempts: 5
    # settings.password.lockout.autoUnlockMinutes: 15'
- id: okta-008
  platform: okta
  category: identity
  severity: high
  title: Enable Okta FastPass with device trust for zero-trust access
  description: Deploy Okta Verify with FastPass for passwordless authentication bound to managed devices. Combined with device trust, only compliant corporate devices can access applications.
  reference: Okta FastPass and Device Trust Documentation
  command: '# Okta Admin Console:
    # 1. Security > Authenticators > Okta Verify > Settings
    #    Enable: Okta FastPass
    #    Enable: User verification with biometrics
    # 2. Security > Device Trust > Enable for Windows/macOS
    # 3. Security > Authentication Policies > Create policy
    #    Condition: Device Trust = Trusted
    #    Action: Allow with FastPass (passwordless)
    # 4. Deploy Okta Verify to endpoints via MDM'
  premium:
    attackPerspective: Device trust ensures that even with valid credentials and MFA, access is denied from unmanaged devices. This stops attackers who compromise credentials from using personal devices or VMs to access corporate applications. FastPass provides phishing-resistant authentication without hardware keys — the private key is bound to the device TPM and never leaves it.
    implementationNotes: '1. Deploy Okta Verify app to all managed devices via MDM (Intune, Jamf)
      2. Configure device trust integration with your MDM platform
      3. Enable FastPass with biometric verification (Touch ID, Windows Hello)
      4. Create authentication policy: Trusted device + FastPass = passwordless
      5. Untrusted device = require FIDO2 hardware key + password
      6. Test with pilot group before org-wide deployment'
    validationNotes: '# Verify device trust is enabled:
      # Admin > Security > Device Trust — status should be Active
      #
      # Check device enrollment:
      # Admin > Directory > Devices — review managed vs unmanaged
      #
      # Test: sign in from managed device — should get FastPass prompt
      # Test: sign in from unmanaged device — should require FIDO2'
    tuningNotes: Device trust requires MDM integration (Intune, Jamf, or WS1). Plan 2-4 weeks for MDM certificate deployment before enforcing device trust policies.
    advancedDetection: '# Detect access from untrusted devices
      index=okta eventType="policy.evaluate_sign_on"
      | where "device.managed"="false"
      | stats count by actor.alternateId, client.device'
    relatedIds:
    - okta-001
    - okta-004
  tags:
  - fastpass
  - device-trust
  - zero-trust
  - passwordless
  commandLanguage: okta-admin
  commandFull: '# Enable FastPass:
    # Admin > Security > Authenticators > Okta Verify
    # Enable FastPass, require biometrics

    # Enable Device Trust:
    # Admin > Security > Device Trust > Add platform
    # Configure MDM integration certificate

    # Create Zero Trust policy:
    # Only allow access if device is managed + user has FastPass'
- id: okta-009
  platform: okta
  category: identity
  severity: high
  title: Monitor and restrict Okta network zones
  description: Define network zones for corporate IPs, VPNs, and known locations. Apply stricter authentication requirements when users sign in from unknown or blocked zones.
  reference: Okta Network Zones Documentation
  command: '# Okta Admin Console: Security > Networks
    # 1. Create zone: "Corporate" — add all office/VPN egress IPs
    # 2. Create zone: "Blocked Countries" — add embargoed/untrusted geos
    # 3. Security > Authentication Policies:
    #    Corporate zone: MFA optional (if device trusted)
    #    Unknown zone: Require MFA every sign-in
    #    Blocked zone: Deny access'
  premium:
    attackPerspective: Network zones are the first layer of zero-trust context. Attackers operating from foreign VPNs, Tor exit nodes, or hosting providers trigger "unknown zone" policies. In the Scattered Spider attacks on Okta customers, the initial access came from residential proxy IPs that would have been flagged by proper zone configuration.
    implementationNotes: '1. Define corporate zone with all known egress IPs
      2. Define blocked zone for countries where you have no operations
      3. Create authentication policies per zone:
         - Corporate: standard MFA
         - Unknown: aggressive MFA + step-up
         - Blocked: deny
      4. Add Tor exit nodes and anonymous proxy lists to blocked zone
      5. Review zone definitions quarterly as network changes'
    validationNotes: '# Verify zones:
      # Admin > Security > Networks — list all zones
      # Check: corporate IPs are correctly listed
      #
      # Test: connect from VPN (corporate zone) — standard auth
      # Test: connect from mobile (unknown zone) — should require MFA'
    tuningNotes: Remote workers on home ISPs will be in the "unknown" zone by default. Use device trust + Okta FastPass to provide a good experience while maintaining security for remote workers.
    advancedDetection: '# Detect logins from blocked or suspicious zones
      index=okta eventType="user.session.start"
      | where client.geographicalContext.country NOT IN ("US","IL","GB","DE")
      | stats count by actor.alternateId, client.geographicalContext.country, client.ipAddress'
    relatedIds:
    - okta-003
    - okta-004
  tags:
  - network-zones
  - geo-restriction
  - zero-trust
  - location
  commandLanguage: okta-admin
  commandFull: '# Create zones via API:
    # POST /api/v1/zones
    # Body: {"type":"IP","name":"Corporate","gateways":[{"type":"CIDR","value":"203.0.113.0/24"}]}

    # Create blocked zone:
    # POST /api/v1/zones
    # Body: {"type":"IP","name":"Blocked","proxies":[...],"usage":"BLOCKLIST"}'
- id: okta-010
  platform: okta
  category: identity
  severity: high
  title: Enable Okta Identity Governance for lifecycle management
  description: Automate user provisioning, access reviews, and deprovisioning. Orphaned accounts (active Okta accounts for terminated employees) are a critical risk.
  reference: Okta Identity Governance Best Practices
  command: '# Okta Admin Console:
    # 1. Directory > Profile Sources — configure HR system as source of truth
    # 2. Lifecycle Management > Deactivation:
    #    When user is deactivated in HR > deactivate in Okta > deprovision all apps
    # 3. Identity Governance > Access Certifications:
    #    Schedule quarterly access reviews for all privileged apps
    # 4. Identity Governance > Access Requests:
    #    Require manager approval for sensitive app access'
  premium:
    attackPerspective: Orphaned accounts are attacker gold. A terminated employee account that remains active in Okta gives full SSO access to every assigned application. In insider threat cases, departing employees have used still-active Okta accounts to exfiltrate data weeks after termination. Automated deprovisioning ensures accounts are disabled within minutes of HR action.
    implementationNotes: '1. Integrate Okta with HR system (Workday, BambooHR, etc.) as profile source
      2. Configure automated deactivation: HR termination triggers Okta deactivation within 1 hour
      3. Set up deprovisioning: Okta deactivation triggers app-level deprovisioning (remove Google, Slack, GitHub access)
      4. Schedule quarterly access reviews for privileged applications
      5. Enable access request workflows with manager approval for sensitive apps'
    validationNotes: '# Verify lifecycle rules:
      # Admin > Directory > Profile Sources — HR system should be primary
      #
      # Test: deactivate test user in HR system
      # Verify: Okta account deactivated within SLA
      # Verify: downstream app access revoked
      #
      # Audit: Admin > Reports > Deprovisioned Users — check for gaps'
    tuningNotes: Some shared/service accounts should not be tied to HR lifecycle. Create a separate group for service accounts with manual lifecycle management and dedicated owners.
    advancedDetection: '# Detect orphaned accounts (active in Okta, terminated in HR)
      index=okta eventType="user.lifecycle.*"
      | stats latest(eventType) as last_event by target.alternateId
      | where last_event != "user.lifecycle.deactivate"

      # Cross-reference with HR system termination list'
    relatedIds:
    - okta-002
    - okta-006
  tags:
  - lifecycle
  - deprovisioning
  - access-reviews
  - orphaned-accounts
  commandLanguage: okta-admin
  commandFull: '# Configure HR-driven lifecycle:
    # Admin > Directory > Profile Sources > Add > Workday/BambooHR
    # Map attributes: status, department, manager
    # Set deactivation action: Deactivate user + deprovision apps

    # Set up access certification:
    # Admin > Identity Governance > Access Certifications
    # Create campaign: quarterly review of all admin-level app assignments'

