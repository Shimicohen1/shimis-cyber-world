- id: gcp-003
  platform: gcp
  category: network
  severity: critical
  title: Configure VPC firewall rules
  description: Default deny all ingress. Allow only required ports from specific source ranges.
  reference: CIS GCP Foundations Benchmark 3.6
  command: "# List all firewall rules with 0.0.0.0/0 source\ngcloud compute firewall-rules list \\\n  --filter=\"sourceRanges:0.0.0.0/0 AND direction=INGRESS\" \\\n  --format=\"table(name,allowed,sourceRanges)\"\
    \n"
  premium:
    attackPerspective: Overly permissive VPC firewall rules are the cloud network equivalent of leaving the front door open. In one notable GCP incident, an open SSH rule on a development VPC allowed attackers
      to pivot from a compromised developer machine to production workloads. Google's threat intelligence shows constant scanning of GCP IP ranges.
    implementationNotes: '1. Audit current rules: gcloud compute firewall-rules list

      2. Identify rules with sourceRanges: 0.0.0.0/0

