  title: Configure IOA (Indicator of Attack) custom rules
  description: Create custom IOA rules to detect organisation-specific threats — for example, execution from non-standard directories, unsigned binaries, or known attacker TTPs.
  reference: CrowdStrike Falcon Custom IOA Rules
  command: '# Falcon console: Configure > Custom IOA Rules
