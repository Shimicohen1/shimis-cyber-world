- id: gcp-002
  platform: gcp
  category: identity
  severity: critical
  title: Restrict service account key usage
  description: Avoid user-managed service account keys. Use Workload Identity or attached service accounts.
  reference: CIS GCP Foundations Benchmark 1.4
  command: "# List all service account keys\ngcloud iam service-accounts list --format=\"table(email)\" | while read sa; do\n  gcloud iam service-accounts keys list --iam-account=\"$sa\" \\\n    --filter=\"\
    keyType=USER_MANAGED\" --format=\"table(name,validAfterTime)\"\ndone\n"
  premium:
    attackPerspective: 'Service account keys are the #1 target in GCP compromises. Unlike user credentials that require MFA, a leaked JSON key file provides immediate, persistent access with no additional
      authentication. Keys found in Git repos, CI/CD configs, or developer workstations give attackers the exact permissions of the service account — often project-level Editor. Google''s Threat Horizons
      reports confirm SA key theft is the most common initial access vector in GCP incidents.'
    implementationNotes: "# Organization Policy to block SA key creation\ngcloud resource-manager org-policies set-policy \\\n  --organization=ORG_ID policy.yaml\n\n# policy.yaml content:\n# constraint:\
      \ constraints/iam.disableServiceAccountKeyCreation\n# booleanPolicy:\n#   enforced: true\n\n# For exceptions (specific projects that need keys):\ngcloud resource-manager org-policies set-policy \\\
      \n  --project=EXCEPTION_PROJECT exception-policy.yaml\n# Set enforced: false only for the exception project\n\n# Migrate existing key users to Workload Identity Federation:\n# 1. Create a workload\
      \ identity pool\ngcloud iam workload-identity-pools create github-pool \\\n  --location=global \\\n  --display-name='GitHub Actions Pool'\n\n# 2. Create a provider (e.g., for GitHub Actions)\ngcloud\
      \ iam workload-identity-pools providers create-oidc github-provider \\\n  --workload-identity-pool=github-pool \\\n  --location=global \\\n  --issuer-uri='https://token.actions.githubusercontent.com'\
      \ \\\n  --attribute-mapping='google.subject=assertion.sub'\n\n# 3. Grant the SA impersonation to the external identity\ngcloud iam service-accounts add-iam-policy-binding SA@PROJECT.iam.gserviceaccount.com\
      \ \\\n  --role='roles/iam.workloadIdentityUser' \\\n  --member='principalSet://iam.googleapis.com/projects/PROJECT_NUM/locations/global/workloadIdentityPools/github-pool/attribute.repository/OWNER/REPO'"
    validationNotes: "# List all SA keys across org\nfor project in $(gcloud projects list --format='value(projectId)'); do\n  echo \"=== $project ===\"\n  for sa in $(gcloud iam service-accounts list --project=$project\
      \ --format='value(email)'); do\n    keys=$(gcloud iam service-accounts keys list --iam-account=$sa --managed-by=user --format='value(name)' 2>/dev/null)\n    if [ -n \"$keys\" ]; then\n      echo\
      \ \"  SA: $sa\"\n      echo \"  Keys: $(echo \"$keys\" | wc -l)\"\n    fi\n  done\ndone\n\n# Verify org policy is enforced\ngcloud resource-manager org-policies describe \\\n  constraints/iam.disableServiceAccountKeyCreation\
      \ \\\n  --organization=ORG_ID"
    tuningNotes: Key elimination is a journey. Start by inventorying all keys, identifying their consumers (CI/CD, on-prem apps, partners), and creating a migration plan. Workload Identity Federation covers
      GitHub Actions, GitLab CI, AWS, Azure, and OIDC providers. For on-prem apps, use the GCE metadata server or Workload Identity Federation with SAML. Set a 90-day deadline and track weekly.
    advancedDetection: "-- BigQuery: Detect SA key creation events\nSELECT\n  timestamp, protopayload_auditlog.authenticationInfo.principalEmail AS actor,\n  protopayload_auditlog.resourceName AS service_account,\n\
      \  protopayload_auditlog.methodName\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'google.iam.admin.v1.CreateServiceAccountKey'\nAND timestamp\
      \ > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)\nORDER BY timestamp DESC\n\n-- Alert on key creation from unusual IPs\nSELECT timestamp, protopayload_auditlog.authenticationInfo.principalEmail,\n\
      \  protopayload_auditlog.requestMetadata.callerIp\nFROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName = 'google.iam.admin.v1.CreateServiceAccountKey'\n\
