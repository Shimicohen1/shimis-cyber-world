- id: gcp-035
  platform: gcp
  category: services
  severity: high
  title: Enable GKE Shielded Nodes
  description: Use Shielded GKE Nodes to verify node integrity with Secure Boot and vTPM.
  reference: CIS GKE Benchmark 6.5
  command: 'gcloud container clusters describe <cluster> --format=''value(shieldedNodes)''

    # Enable

    gcloud container clusters update <cluster> --enable-shielded-nodes

    '
  premium:
    attackPerspective: GKE Shielded Nodes use Secure Boot and vTPM to create a verified boot chain from firmware to OS. Without Shielded Nodes, an attacker who gains root on a node can modify the boot loader
      or kernel to install rootkits that persist across reboots and are invisible to container-level security tools. Shielded Nodes detect these modifications and refuse to boot a tampered node.
    implementationNotes: "# Enable Shielded Nodes on a new cluster:\ngcloud container clusters create CLUSTER_NAME \\\n  --zone=ZONE \\\n  --enable-shielded-nodes \\\n  --shielded-secure-boot \\\n  --shielded-integrity-monitoring\n\
      \n# Enable on existing cluster:\ngcloud container clusters update CLUSTER_NAME \\\n  --zone=ZONE \\\n  --enable-shielded-nodes\n\n# For existing node pools:\ngcloud container node-pools update NODE_POOL\
      \ \\\n  --cluster=CLUSTER_NAME --zone=ZONE \\\n  --shielded-secure-boot \\\n  --shielded-integrity-monitoring"
    validationNotes: "# Verify Shielded Nodes:\ngcloud container clusters describe CLUSTER_NAME --zone=ZONE \\\n  --format='value(shieldedNodes.enabled)'\n\n# Check node pool settings:\ngcloud container\
      \ node-pools describe NODE_POOL \\\n  --cluster=CLUSTER_NAME --zone=ZONE \\\n  --format='table(config.shieldedInstanceConfig.enableSecureBoot,config.shieldedInstanceConfig.enableIntegrityMonitoring)'\n\
      \n# Monitor integrity validation:\ngcloud logging read 'resource.type=\"gce_instance\" AND jsonPayload.@type=\"type.googleapis.com/compute.IntegrityReport\"' --limit=10"
    tuningNotes: Shielded Nodes have no performance overhead and should be enabled for all GKE clusters. The only consideration is that custom boot images must be signed to work with Secure Boot. Standard
      GKE node images (COS, Ubuntu) are pre-signed. Integrity monitoring failures should trigger immediate investigation as they indicate potential node tampering.
    advancedDetection: "-- Alert on Shielded Node integrity failures\nSELECT\n  timestamp,\n  resource.labels.instance_id,\n  jsonPayload.earlyBootReportEvent.policyEvaluationPassed,\n  jsonPayload.lateBootReportEvent.policyEvaluationPassed\n\
      FROM `project.dataset.compute_googleapis_com_shielded_vm_integrity`\nWHERE jsonPayload.earlyBootReportEvent.policyEvaluationPassed = false\nOR jsonPayload.lateBootReportEvent.policyEvaluationPassed\
      \ = false"
    relatedIds:
    - gcp-032
    - gcp-033
  tags:
  - gcp
  - services
- id: gcp-036
  platform: gcp
  category: services
  severity: high
  title: Enable Container Threat Detection
  description: 'Detect runtime threats in GKE containers: malicious binaries, reverse shells, crypto mining.'
  reference: Google Cloud Security Best Practices
  command: '# Enable via SCC

    # Security Command Center → Settings → Container Threat Detection → Enable

    # Or via gcloud:

    gcloud scc settings update --organization=<org_id> --enable-service=CONTAINER_THREAT_DETECTION

    '
  premium:
    attackPerspective: 'Container Threat Detection (CTD) monitors GKE containers for runtime threats: reverse shells, cryptomining binaries, privilege escalation, malicious libraries, and suspicious binary
      execution. Without it, a compromised container can establish C2 channels, move laterally, and exfiltrate data while your security team only sees normal Kubernetes API events. CTD operates at the kernel
      level, detecting behaviors that application-level monitoring misses entirely.'
    implementationNotes: "# Container Threat Detection is part of SCC Premium\n# Enable SCC Premium first (gcp-023), then CTD is auto-enabled\n\n# Verify CTD is active:\ngcloud scc settings describe --organization=ORG_ID\n\
      \n# CTD detects:\n# - Added Binary Executed (unknown binary in container)\n# - Added Library Loaded (unknown library loaded)\n# - Reverse Shell (outbound shell connection)\n# - Privilege Escalation\
      \ (setuid, capabilities abuse)\n# - Malicious Script Executed\n# - Cryptocurrency Mining (known mining binaries/pools)\n\n# Configure notification for CTD findings:\ngcloud scc notifications create\
      \ ctd-alerts \\\n  --organization=ORG_ID \\\n  --pubsub-topic=projects/PROJECT/topics/scc-findings \\\n  --filter='category:\"CONTAINER_THREAT_DETECTION\"'"
    validationNotes: "# Check for CTD findings:\ngcloud scc findings list ORG_ID \\\n  --source='-' \\\n  --filter='category:\"CONTAINER_THREAT_DETECTION\"' \\\n  --format='table(finding.category,finding.severity,finding.state,finding.eventTime)'\n\
      \n# Verify CTD is scanning your clusters:\ngcloud scc assets list ORG_ID \\\n  --filter='securityCenterProperties.resourceType=\"google.container.Cluster\"' \\\n  --format='table(asset.name,asset.securityCenterProperties.resourceType)'"
    tuningNotes: CTD may flag legitimate operations — DevOps tools that install binaries in containers, debugging sessions that use exec, monitoring agents that load libraries. Mark these as legitimate
      in SCC mute rules rather than disabling detection. For sensitive namespaces, set up immediate PagerDuty alerts on any CTD finding.
    advancedDetection: "-- Aggregate CTD findings for operational dashboard\nSELECT\n  finding.category,\n  finding.severity,\n  resource.projectDisplayName,\n  COUNT(*) as finding_count\nFROM `project.dataset.scc_findings`\n\
      WHERE finding.category LIKE 'CONTAINER_THREAT_DETECTION%'\nAND finding.state = 'ACTIVE'\nAND timestamp > TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)\nGROUP BY 1,2,3\nORDER BY finding_count\
      \ DESC"
    relatedIds:
    - gcp-023
    - gcp-032
    - gcp-039
  tags:
  - gcp
  - services
- id: gcp-037
  platform: gcp
  category: services
  severity: high
  title: Disable serial port access to VMs
  description: Block interactive serial console access which can bypass OS-level security.
  reference: CIS GCP Foundations Benchmark 4.5
  command: '# Org policy

    gcloud resource-manager org-policies enable-enforce compute.disableSerialPortAccess --organization=<org_id>

    # Per-instance

    gcloud compute instances add-metadata <vm> --metadata serial-port-enable=false

    '
  premium:
    attackPerspective: Serial port access allows interactive console access to a VM, bypassing network-level security controls, firewalls, and IAP. If enabled, an attacker with compute.instances.getSerialPortOutput
      permission can read serial console output (which may contain boot credentials, application logs, and error messages) without any network connectivity to the VM.
    implementationNotes: "# Disable serial port access via org policy:\ngcloud resource-manager org-policies set-policy \\\n  --organization=ORG_ID no-serial-port.yaml\n\n# no-serial-port.yaml:\n# constraint:\
      \ constraints/compute.disableSerialPortAccess\n# booleanPolicy:\n#   enforced: true\n\n# Disable on individual VMs:\ngcloud compute instances add-metadata VM_NAME \\\n  --zone=ZONE \\\n  --metadata=serial-port-enable=false\n\
      \n# Verify interactive serial port is disabled:\ngcloud compute instances describe VM_NAME --zone=ZONE \\\n  --format='value(metadata.items[serial-port-enable])'"
    validationNotes: "# Verify org policy\ngcloud resource-manager org-policies describe \\\n  constraints/compute.disableSerialPortAccess \\\n  --organization=ORG_ID\n\n# Find VMs with serial port enabled:\n\
      for project in $(gcloud projects list --format='value(projectId)'); do\n  gcloud compute instances list --project=$project \\\n    --format='table(name,zone)' \\\n    --filter='metadata.items.key=serial-port-enable\
      \ AND metadata.items.value=true' 2>/dev/null\ndone"
    tuningNotes: 'Serial port access is occasionally needed for debugging boot failures on VMs that can''t be reached via SSH. Keep the org policy enforced and create a break-glass procedure: temporarily
      disable the policy on a specific project, debug, and re-enable. Log the exception with a ticket number.'
    advancedDetection: "-- Alert on serial port access attempts\nSELECT\n  timestamp,\n  protopayload_auditlog.authenticationInfo.principalEmail,\n  protopayload_auditlog.resourceName,\n  protopayload_auditlog.methodName\n\
      FROM `project.dataset.cloudaudit_googleapis_com_activity`\nWHERE protopayload_auditlog.methodName LIKE '%serialPort%'\nOR protopayload_auditlog.methodName LIKE '%getSerialPort%'"
    relatedIds:
    - gcp-008
    - gcp-016
  tags:
