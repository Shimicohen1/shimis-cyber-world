  command: '# Portal → Tenant settings'
  premium:
    attackPerspective: External data sharing in Power BI allows datasets and reports to be shared with users outside the organization. If unrestricted, an attacker who compromises an external partner's
      account gains access to your organization's BI content. The shared data can include live connections to on-premises databases, effectively bridging air-gapped networks through the cloud.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Export and sharing settings

      # ''Allow Azure Active Directory guest users to access Power BI'' → Specific security groups

      # ''Allow specific users to turn on external data sharing'' → Disabled or restricted


      # For controlled external sharing:

      # 1. Create dedicated ''External-BI-Sharing'' security group

      # 2. Only add users who have completed data handling training

      # 3. Enable external sharing only for this group

      # 4. Apply sensitivity labels to all externally shared content


      # Block external sharing for sensitive workspaces:

      # Workspace → Settings → License → Premium → Block external sharing'
    validationNotes: "# Verify external sharing settings\nGet-PowerBITenantSetting | Where-Object { $_.SettingName -like '*external*' }\n\n# List externally shared content:\nSearch-UnifiedAuditLog -StartDate\
      \ (Get-Date).AddDays(-30) -EndDate (Get-Date) -RecordType PowerBIAudit -Operations 'ShareReport' | ForEach-Object {\n    $data = $_.AuditData | ConvertFrom-Json\n    if ($data.SharingInformation.recipientEmail\
      \ -like '*#EXT#*') { $data }\n} | Format-Table UserId, ItemName"
    tuningNotes: External sharing should be treated as data export. Apply the same controls you would for file downloads — sensitivity label requirements, manager approval for confidential data, and automatic
      expiration of shared access after 90 days.
    advancedDetection: '// KQL: Track external data sharing

      PowerBIActivity

      | where TimeGenerated > ago(30d)

      | where Activity has ''Share'' or Activity has ''ExternalSharing''

      | extend RecipientDomain = tostring(split(tostring(parse_json(tostring(SharingInformation)).recipientEmail), ''@'')[1])

      | where RecipientDomain != '''' and RecipientDomain !has ''yourdomain.com''

      | summarize ExternalShares=count() by UserId, RecipientDomain

      | sort by ExternalShares desc'
