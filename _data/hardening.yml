- id: cps-001
  platform: copilot-studio
  category: identity
  severity: critical
  title: Enforce Entra ID authentication for all Copilot Studio agents
  description: Configure a Power Platform data policy to block the "Chat without Microsoft Entra ID authentication in Copilot Studio" connector, ensuring all published agents require user authentication via Microsoft Entra ID. Without this, agent makers can publish bots with "No authentication" — allowing anyone with the link to interact with the agent, potentially accessing internal data sources, running automated actions, or extracting organizational information without any identity verification.
  reference: https://learn.microsoft.com/en-us/microsoft-copilot-studio/admin-data-loss-prevention
  command: |
    # In Power Platform admin center:
    # 1. Navigate to: Security → Data and privacy → Data policy
    # 2. Create or edit a data policy
    # 3. Find connector: "Chat without Microsoft Entra ID authentication in Copilot Studio"
    # 4. Move it to the "Blocked" data group
    # 5. Apply policy to all environments or specific environments

    # PowerShell: Configure DLP error contact info
    Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Force
    Add-PowerAppsAccount

    $ContactDetails = [pscustomobject] @{
        Enabled=$true
        Email="security@contoso.com"
    }
    $ErrorMessageDetails = [pscustomobject] @{
        Enabled=$true
        Url="https://contoso.sharepoint.com/sites/IT/copilot-policy"
    }
    $ErrorSettingsObj = [pscustomobject] @{
        ErrorMessageDetails=$ErrorMessageDetails
        ContactDetails=$ContactDetails
    }
    New-PowerAppDlpErrorSettings -TenantId "<tenant-id>" -ErrorSettings $ErrorSettingsObj

    # Verify in Copilot Studio: agents without auth will show error banner
    # and the Publish button will be disabled
  premium:
    attackPerspective: An unauthenticated Copilot Studio agent is an open door to your organization's data. Without Entra ID auth, anyone who discovers the agent's URL can interact with it — querying internal knowledge bases, triggering Power Automate flows, or extracting organizational information. Attackers specifically scan for unauthenticated bot endpoints. The "Chat without Microsoft Entra ID authentication" connector is the single most dangerous default in Copilot Studio — blocking it via DLP policy is the first step in any agent security program.
    implementationNotes: |
      1. Navigate to Power Platform admin center → Security → Data and privacy → Data policy
      2. Create new policy: "Block Unauthenticated Agents"
      3. Find connector: "Chat without Microsoft Entra ID authentication in Copilot Studio"
      4. Move it to the "Blocked" data group
      5. Scope: Apply to All environments (including Default)
      6. Configure DLP error settings with security team contact info
      7. Verify: Existing agents without auth will display error banners and cannot be published
    validationNotes: |
      # Verify DLP policy is active
      Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Force
      Add-PowerAppsAccount
      Get-DlpPolicy | Select DisplayName, CreatedTime | Format-Table

      # Test: In Copilot Studio, create a new agent with "No authentication"
      # Attempt to publish — should show DLP violation error
      # The Publish button should be disabled with error banner

      # Audit existing agents for auth configuration
      # Navigate: Power Platform admin center → Environments → Resources → Copilot Studio agents
      # Check each agent's authentication setting
    tuningNotes: Some organizations need unauthenticated agents for external customer support. In that case, create a dedicated environment for external-facing agents with a separate DLP policy that allows unauthenticated chat, but restrict the connectors and knowledge sources available in that environment. Never allow unauthenticated agents in the Default or production environments.
    advancedDetection: |
      // KQL: Monitor for agents published without authentication
      PowerPlatformAdminActivity
      | where TimeGenerated > ago(7d)
      | where Operation == "PublishBot" or Operation == "UpdateBot"
      | extend BotDetails = parse_json(AdditionalInfo)
      | where tostring(BotDetails.AuthenticationMode) == "None"
      | project TimeGenerated, UserId, Operation, BotDetails
      | extend AlertSeverity = "Critical"
    relatedIds:
    - cps-002
    - cps-006
  tags:
  - copilot-studio
  - authentication
  - entra-id
  - data-policy
  - power-platform
  - zero-trust
  commandLanguage: powershell
- id: cps-002
  platform: copilot-studio
  category: services
  severity: critical
  title: Restrict who can create and publish Copilot Studio agents
  description: Control agent creation and publishing by disabling generative AI agent publishing for unauthorized makers, configuring environment routing to sandbox environments, and using Power Platform environment-level security roles. Admins can disable agent publishing tenant-wide in the Power Platform admin center. Without restrictions, any licensed user can create agents that connect to organizational data sources, execute automated actions, and expose internal information through conversational interfaces.
  reference: https://learn.microsoft.com/en-us/microsoft-copilot-studio/security-and-governance
  command: |
    # Disable generative AI agent publishing (tenant-wide)
    # Navigate: Power Platform admin center → Environments → Settings
    # → Features → Copilot Studio → Toggle OFF "Publish agents with AI features"

    # Configure environment routing for makers
    # Navigate: Power Platform admin center → Environments → Default environment
    # → Settings → Environment routing → Enable managed environments

    # PowerShell: Restrict environment creation
    Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Force
    Add-PowerAppsAccount

    # Restrict who can create environments to Global Admins only
    Set-TenantSettings -RequestBody @{
      powerPlatform = @{
        governance = @{
          disableEnvironmentCreationByNonAdminUsers = $true
        }
      }
    }

    # Set maker welcome message with compliance requirements
    # Navigate: Power Platform admin center → Environments → [env] →
    # Settings → Maker welcome message → Enable and set message

    # Verify agent publishing restrictions
    Get-TenantSettings | Select-Object -ExpandProperty powerPlatform |
      Select-Object -ExpandProperty governance
  premium:
    attackPerspective: Unrestricted agent creation is a shadow IT problem amplified by AI. Any licensed user can create an agent that connects to SharePoint, Dataverse, SQL, or external APIs — then publish it to Teams where other users interact with it. An insider or compromised account can create a data exfiltration agent that looks like a helpful HR bot but silently funnels data to an external endpoint via an HTTP connector. Restricting creation to approved makers and managed environments is essential governance.
    implementationNotes: |
      1. Disable environment creation for non-admins:
         Set-TenantSettings -RequestBody @{ powerPlatform = @{ governance = @{ disableEnvironmentCreationByNonAdminUsers = $true } } }
      2. Enable Managed Environments for all production environments
      3. Configure environment routing: redirect new maker activity to sandbox environments
      4. Set maker welcome message with compliance requirements and approval process
      5. Review and revoke Copilot Studio maker licenses from non-essential users
      6. For approved makers: create a "Copilot Studio Makers" security group with formal approval workflow
    validationNotes: |
      # Verify environment creation is restricted
      Get-TenantSettings | Select-Object -ExpandProperty powerPlatform |
        Select-Object -ExpandProperty governance
      # Expected: disableEnvironmentCreationByNonAdminUsers = True

      # List all existing agents across environments
      Get-AdminPowerAppEnvironment | ForEach-Object {
        $env = $_
        Get-AdminPowerApp -EnvironmentName $env.EnvironmentName |
          Where-Object { $_.Internal.appType -eq "Bot" } |
          Select DisplayName, Owner, EnvironmentName
      }

      # Check for agents published in the Default environment (high risk)
    tuningNotes: Completely blocking agent creation may stifle legitimate innovation. Balance by creating a dedicated "Copilot Studio Sandbox" environment with restricted connectors and no access to production data. Approve agents through a formal review process before promoting to production environments. Use CoE Starter Kit for governance dashboards.
    advancedDetection: |
      // KQL: Monitor agent creation and publishing events
      PowerPlatformAdminActivity
      | where TimeGenerated > ago(7d)
      | where Operation in ("CreateBot", "PublishBot", "UpdateBot")
      | project TimeGenerated, UserId, Operation, EnvironmentId
      | summarize AgentActions=count() by UserId, Operation
      | sort by AgentActions desc
    relatedIds:
    - cps-001
    - cps-003
  tags:
  - copilot-studio
  - agent-governance
  - publishing-control
  - power-platform
  - maker-restrictions
  commandLanguage: powershell
- id: cps-003
  platform: copilot-studio
  category: encryption
  severity: high
  title: Configure DLP policies for Copilot Studio connectors and tools
  description: Create data policies in the Power Platform admin center to control which connectors, knowledge sources, HTTP endpoints, and skills Copilot Studio agents can use. Classify connectors into Business, Non-business, and Blocked data groups. Block sensitive connectors such as HTTP requests (to prevent SSRF-style attacks), public website knowledge sources, and risky Power Platform connectors. Use endpoint filtering to allowlist specific SharePoint sites or APIs rather than granting blanket access. Connectors in different data groups cannot share data, providing cross-boundary protection.
  reference: https://learn.microsoft.com/en-us/microsoft-copilot-studio/admin-data-loss-prevention
  command: |
    # In Power Platform admin center:
    # 1. Navigate to: Security → Data and privacy → Data policy
    # 2. Create new policy: "Copilot Studio Agent Restrictions"
    # 3. Block these connectors:
    #    - "HTTP" (prevents agents from making arbitrary HTTP calls)
    #    - "Knowledge source with public websites and data in Copilot Studio"
    #    - "Skills with Copilot Studio" (prevent unvetted skill usage)
    # 4. Allow with endpoint filtering:
    #    - "Knowledge source with SharePoint and OneDrive in Copilot Studio"
    #      → Only allow: https://contoso.sharepoint.com/sites/approved-*
    # 5. Apply to: All environments

    # PowerShell: List existing DLP policies
    Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Force
    Add-PowerAppsAccount

    Get-DlpPolicy | Select DisplayName, CreatedTime, Environments |
      Format-Table -AutoSize

    # Verify connector classification in a specific policy
    Get-DlpPolicy -PolicyName "<policy-guid>" |
      Select -ExpandProperty connectorGroups
  premium:
    attackPerspective: Copilot Studio agents can use connectors to access SharePoint, Dataverse, SQL Server, external APIs, and even make raw HTTP calls. Without DLP policies on connectors, an agent can be weaponized for Server-Side Request Forgery (SSRF) via the HTTP connector — probing internal networks, accessing metadata endpoints, or exfiltrating data to attacker-controlled servers. The HTTP connector is the most dangerous — it allows arbitrary HTTP requests to any endpoint the agent's maker specifies. Blocking it prevents agents from becoming reverse proxy tools.
    implementationNotes: |
      1. Navigate to Power Platform admin center → Security → Data policy
      2. Create policy: "Copilot Studio Connector Restrictions"
      3. Block these high-risk connectors:
         - HTTP (prevents arbitrary HTTP calls / SSRF)
         - Knowledge source with public websites (prevents grounding on malicious sites)
         - Skills with Copilot Studio (prevents unvetted skill usage)
      4. Use endpoint filtering for SharePoint connector:
         - Allow: https://contoso.sharepoint.com/sites/approved-*
         - Deny: all other patterns
      5. Classify remaining connectors into Business vs. Non-business groups
      6. Apply to all environments
    validationNotes: |
      # List existing DLP policies
      Add-PowerAppsAccount
      Get-DlpPolicy | Select DisplayName, CreatedTime, Environments | Format-Table

      # Verify HTTP connector is blocked
      Get-DlpPolicy -PolicyName "<policy-guid>" |
        Select -ExpandProperty connectorGroups |
        Where-Object { $_.classification -eq "Blocked" }

      # Test: In Copilot Studio, add an HTTP action to an agent
      # Should show DLP violation error and block publishing
    tuningNotes: Some agents legitimately need HTTP access to internal APIs. Create a separate DLP policy for a dedicated "API Integration" environment with HTTP allowed but restricted to specific endpoint patterns (e.g., https://api.contoso.com/*). Never allow HTTP in the Default environment. Use managed connectors (custom connectors with admin-defined endpoints) instead of raw HTTP where possible.
    advancedDetection: |
      // KQL: Monitor connector usage by Copilot Studio agents
      PowerPlatformConnectorActivity
      | where TimeGenerated > ago(7d)
      | where ConnectorType == "Http" or ConnectorType has "Custom"
      | extend TargetUrl = tostring(parse_json(AdditionalInfo).RequestUrl)
      | summarize CallCount=count() by UserId, ConnectorType, TargetUrl
      | where ConnectorType == "Http"
      | extend AlertSeverity = "High"
    relatedIds:
    - cps-001
    - cps-004
  tags:
  - copilot-studio
  - dlp
  - connectors
  - data-policy
  - power-platform
  - endpoint-filtering
  commandLanguage: powershell
- id: cps-004
  platform: copilot-studio
  category: services
  severity: high
  title: Block agents from accessing sensitive data sources via knowledge restrictions
  description: Use data policies to restrict which knowledge sources Copilot Studio agents can use. Block connectors for document uploads, public websites, and unapproved SharePoint sites. Use endpoint filtering to allow only specific SharePoint site URLs as knowledge sources. This prevents agent makers from grounding agents on sensitive HR, legal, or financial document libraries. Agents grounded on unrestricted data sources can inadvertently expose confidential information to any user who interacts with the agent, especially if authentication is not properly enforced.
  reference: https://learn.microsoft.com/en-us/microsoft-copilot-studio/admin-data-loss-prevention
  command: |
    # In Power Platform admin center:
    # 1. Navigate to: Security → Data and privacy → Data policy
    # 2. Create or edit a data policy
    # 3. Block these knowledge source connectors:
    #    - "Knowledge source with documents in Copilot Studio"
    #      (prevents uploading sensitive documents directly)
    #    - "Knowledge source with public websites and data in Copilot Studio"
    #      (prevents grounding on arbitrary external sites)
    # 4. For SharePoint knowledge — use endpoint filtering:
    #    Select connector: "Knowledge source with SharePoint and OneDrive in Copilot Studio"
    #    → Configure connector → Connector endpoints
    #    → Add allowed pattern: https://contoso.sharepoint.com/sites/knowledge-base*
    #    → Deny all other endpoints
    # 5. Apply policy scope: Add all environments

    # Verify: In Copilot Studio, try adding a blocked knowledge source
    # to an agent — a DLP error banner should appear and Publish should be disabled
  premium:
    attackPerspective: Copilot Studio agents grounded on unrestricted knowledge sources become unintentional data brokers. A "helpful" HR FAQ agent grounded on the entire HR SharePoint site — including salary bands, disciplinary records, and termination plans — will answer questions about all of that content to any authenticated user. Restricting knowledge sources to specific, curated SharePoint libraries ensures agents only expose approved information. Document upload restrictions prevent makers from uploading sensitive files directly into the agent.
    implementationNotes: |
      1. Block document upload knowledge sources via DLP:
         - Block connector: "Knowledge source with documents in Copilot Studio"
      2. Block public website knowledge sources:
         - Block connector: "Knowledge source with public websites and data in Copilot Studio"
      3. Restrict SharePoint knowledge to specific sites via endpoint filtering:
         - Allow: https://contoso.sharepoint.com/sites/knowledge-base*
         - Allow: https://contoso.sharepoint.com/sites/it-docs*
         - Deny: all other SharePoint URLs
      4. Require agents to use only pre-approved Dataverse tables as knowledge sources
      5. Audit all existing agents' knowledge source configurations quarterly
    validationNotes: |
      # Verify knowledge source connectors are properly classified
      Add-PowerAppsAccount
      Get-DlpPolicy -PolicyName "<policy-guid>" |
        Select -ExpandProperty connectorGroups |
        ForEach-Object { $_.connectors | Where-Object { $_.name -like "*Knowledge*" } }

      # Test: In Copilot Studio, try adding a blocked knowledge source
      # Should show DLP violation banner and prevent publishing

      # Audit existing agents' knowledge configurations
      # Navigate: Copilot Studio → each agent → Knowledge tab
      # Verify only approved SharePoint sites are listed
    tuningNotes: Endpoint filtering patterns support wildcards. Use site naming conventions (e.g., all approved knowledge base sites start with "kb-") to simplify DLP patterns. For agents that need diverse knowledge sources, create a curated "Agent Knowledge Base" site collection with governance controls and mandatory content review before publishing.
    advancedDetection: |
      // KQL: Monitor knowledge source access by agents
      PowerPlatformAdminActivity
      | where TimeGenerated > ago(7d)
      | where Operation == "UpdateBotKnowledge" or Operation == "AddKnowledgeSource"
      | extend KnowledgeDetails = parse_json(AdditionalInfo)
      | extend SourceType = tostring(KnowledgeDetails.Type)
      | extend SourceUrl = tostring(KnowledgeDetails.Url)
      | project TimeGenerated, UserId, SourceType, SourceUrl
    relatedIds:
    - cps-003
    - cps-001
