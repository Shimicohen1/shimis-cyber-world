- id: m365-073
  platform: m365-power
  category: services
  severity: high
  title: Ensure 'Publish to web' is restricted.
  description: Check Power BI Admin Portal → Tenant settings → Export and sharing.
  reference: CIS.9.1.4 — CIS M365 / Microsoft Secure Score — Power BI
  command: '# Portal → Tenant settings → Export and sharing'
  premium:
    attackPerspective: The 'Publish to web' feature creates a publicly accessible embed code for any Power BI report — no authentication required. A single click by an unaware user can expose dashboards
      containing revenue numbers, customer PII, or security metrics to the entire internet. Attackers actively scan for exposed Power BI embed URLs using search engine dorks.
    implementationNotes: '# Power BI Admin Portal → Tenant settings → Export and sharing settings

      # ''Publish to web'' → Disabled (or restrict to specific security groups)


      # Check existing publish-to-web embed codes:

      Connect-PowerBIServiceAccount

      # Via REST API (no direct PowerShell cmdlet):

      $headers = Get-PowerBIAccessToken

      $uri = ''https://api.powerbi.com/v1.0/myorg/admin/widelySharedArtifacts/publishedToWeb''

      $response = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get

      $response.value | Select reportId, reportName, artifactId | Format-Table


      # Revoke all existing publish-to-web codes via Admin Portal:

      # Admin Portal → Embed codes → Delete each code'
    validationNotes: '# Verify ''Publish to web'' is disabled

      Get-PowerBITenantSetting | Where-Object { $_.SettingName -eq ''PublishToWeb'' }


      # Scan for existing publicly embedded reports:

      $token = Get-PowerBIAccessToken

      $uri = ''https://api.powerbi.com/v1.0/myorg/admin/widelySharedArtifacts/publishedToWeb''

      $result = Invoke-RestMethod -Uri $uri -Headers $token

      Write-Host "Found $($result.value.Count) public embed codes"

      $result.value | Format-Table'
    tuningNotes: If specific teams (e.g., marketing) need public dashboards, create a dedicated workspace with only non-sensitive, pre-approved reports and enable publish-to-web only for that workspace's
      security group. Monitor embed code creation with alerts. Consider Power BI Embedded with anonymous access as a more controlled alternative.
    advancedDetection: '// KQL: Detect publish-to-web actions

      PowerBIActivity

      | where TimeGenerated > ago(30d)

      | where Activity in (''PublishToWebReport'', ''CreatePublicEmbedCode'')

      | project TimeGenerated, UserId, Activity, ReportName, WorkspaceName

      | sort by TimeGenerated desc'
