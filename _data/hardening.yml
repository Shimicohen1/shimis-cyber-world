- id: m365-347
  platform: m365-entra
  category: identity
  severity: critical
  title: Ensure Administrative accounts are cloud-only.
  description: 'Global admins: 3. Cloud-only: 3.'
  reference: CIS.1.1.1 — CIS M365 / Microsoft Secure Score — Entra ID
  tags:
  - entra-id
  - cloud-only-admin
  - identity
  - privilege-escalation
  - cis-m365
  commandLanguage: powershell
  premium:
    attackPerspective: Hybrid admin accounts (synced from on-prem AD) are high-value targets because compromising the on-prem domain gives attackers a path to Entra ID global admin. Cloud-only accounts
      eliminate this lateral movement path. Attackers routinely target AD Connect servers to harvest synced credentials.
    implementationNotes: "# Audit synced admin accounts\nConnect-MgGraph -Scopes 'User.Read.All','RoleManagement.Read.Directory'\n$admins = Get-MgDirectoryRoleMember -DirectoryRoleId (Get-MgDirectoryRole\
      \ -Filter \"displayName eq 'Global Administrator'\").Id\nforeach ($a in $admins) {\n  $user = Get-MgUser -UserId $a.Id -Property onPremisesSyncEnabled,userPrincipalName\n  if ($user.OnPremisesSyncEnabled)\
      \ {\n    Write-Warning \"SYNCED ADMIN: $($user.UserPrincipalName) — must migrate to cloud-only\"\n  }\n}\n\n# Create cloud-only replacement\n$params = @{\n  AccountEnabled = $true\n  DisplayName =\
      \ 'CloudAdmin-Emergency'\n  MailNickname = 'cloudadmin'\n  UserPrincipalName = 'cloudadmin@yourdomain.onmicrosoft.com'\n  PasswordProfile = @{ ForceChangePasswordNextSignIn = $true; Password = (New-Guid).ToString()\
      \ }\n}\nNew-MgUser @params"
    validationNotes: "# Verify no synced accounts hold admin roles\nGet-MgDirectoryRoleMember -DirectoryRoleId (Get-MgDirectoryRole -Filter \"displayName eq 'Global Administrator'\").Id | ForEach-Object\
      \ {\n  Get-MgUser -UserId $_.Id -Property onPremisesSyncEnabled,userPrincipalName\n} | Where-Object { $_.OnPremisesSyncEnabled -eq $true } | Measure-Object\n# Expected: Count = 0"
    tuningNotes: Service accounts synced from AD that hold directory roles are also a risk. Consider migrating them to Managed Identities or cloud-only service principals. Exclude break-glass accounts from
      Conditional Access but ensure they are cloud-only.
    advancedDetection: "// KQL: Detect sign-ins from synced admin accounts\nSigninLogs\n| where TimeGenerated > ago(24h)\n| where UserType == \"Member\"\n| join kind=inner (\n    IdentityInfo | where OnPremisesDistinguishedName\
      \ != \"\"\n    | project AccountUPN, OnPremisesDistinguishedName\n) on $left.UserPrincipalName == $right.AccountUPN\n| join kind=inner (\n    IdentityDirectoryEvents\n    | where ActionType == \"\
      Role member added\"\n) on AccountUPN\n| project TimeGenerated, UserPrincipalName, AppDisplayName, IPAddress, Location"
