categories:
  - Brute Force
  - Lateral Movement
  - Persistence
  - Privilege Escalation
  - Data Exfiltration
  - Credential Access
  - Ransomware
  - Phishing
  - Cloud Security
  - Defense Evasion
  - Initial Access
  - Command and Control
  - Discovery
  - Execution
  - Impact

platforms:
  - KQL (Sentinel)
  - Sigma
  - Splunk SPL
  - Wazuh
  - Multi-SIEM

severity_levels:
  - critical
  - high
  - medium
  - low

rules:
  # ══════════════════════════════════════════════════════════
  # BRUTE FORCE
  # ══════════════════════════════════════════════════════════
  - name: "Brute Force – Failed Logons Spike"
    description: "Detects more than 10 failed sign-in attempts from a single IP within 5 minutes. Classic brute force indicator."
    category: "Brute Force"
    platform: "KQL (Sentinel)"
    mitre: "T1110.001"
    mitre_name: "Brute Force: Password Guessing"
    severity: "high"
    query: |
      SigninLogs
      | where ResultType != "0"
      | summarize FailedCount = count() by IPAddress, bin(TimeGenerated, 5m)
      | where FailedCount > 10
      | project TimeGenerated, IPAddress, FailedCount
    tags: [brute-force, identity, SigninLogs]
    notes: "Tune the threshold based on your environment. Consider excluding known VPN IPs."

  - name: "Password Spray – Distributed Failed Logons"
    description: "Detects a single IP trying different usernames with few attempts each — classic password spray pattern that avoids per-user lockout."
    category: "Brute Force"
    platform: "KQL (Sentinel)"
    mitre: "T1110.003"
    mitre_name: "Brute Force: Password Spraying"
    severity: "high"
    query: |
      SigninLogs
      | where ResultType != "0"
      | summarize
          TargetCount = dcount(UserPrincipalName),
          AttemptCount = count(),
          Users = make_set(UserPrincipalName, 10)
          by IPAddress, bin(TimeGenerated, 15m)
      | where TargetCount > 5 and AttemptCount < TargetCount * 3
      | project TimeGenerated, IPAddress, TargetCount, AttemptCount, Users
    tags: [password-spray, identity, brute-force]
    notes: "Key indicator: many users, few attempts per user from same IP. Correlate with successful logins after spray."

  - name: "Brute Force – SSH Failed Auth Spike"
    description: "Detects excessive SSH authentication failures from a single source — indicates automated password guessing against Linux hosts."
    category: "Brute Force"
    platform: "Splunk SPL"
    mitre: "T1110.001"
    mitre_name: "Brute Force: Password Guessing"
    severity: "high"
    query: |
      index=linux sourcetype=syslog "Failed password"
      | rex "from (?<src_ip>\d+\.\d+\.\d+\.\d+)"
      | stats count as failures by src_ip, host
      | where failures > 15
      | sort -failures
      | table src_ip, host, failures
    tags: [brute-force, ssh, linux]
    notes: "Threshold of 15 works well for internet-facing SSH. Lower to 5 for internal hosts."

  # ══════════════════════════════════════════════════════════
  # CREDENTIAL ACCESS
  # ══════════════════════════════════════════════════════════
  - name: "Azure AD Impossible Travel"
    description: "Detects sign-ins from geographically distant locations within a short time window — indicates compromised credentials."
    category: "Credential Access"
    platform: "KQL (Sentinel)"
    mitre: "T1078"
    mitre_name: "Valid Accounts"
    severity: "high"
    query: |
      SigninLogs
      | where ResultType == "0"
      | extend City = tostring(LocationDetails.city),
               Country = tostring(LocationDetails.countryOrRegion)
      | summarize Locations = make_set(Country),
                  Cities = make_set(City),
                  Count = count()
                  by UserPrincipalName, bin(TimeGenerated, 30m)
      | where array_length(Locations) > 1
    tags: [impossible-travel, identity, azure-ad]
    notes: "Enrich with VPN/proxy IP lists to reduce false positives from corporate VPN."

  - name: "Credential Dumping – LSASS Access"
    description: "Detects processes accessing LSASS memory — the primary technique for credential harvesting on Windows."
    category: "Credential Access"
    platform: "KQL (Sentinel)"
    mitre: "T1003.001"
    mitre_name: "OS Credential Dumping: LSASS Memory"
    severity: "critical"
    query: |
      DeviceProcessEvents
      | where FileName in~ ("mimikatz.exe","procdump.exe",
              "sqldumper.exe","comsvcs.dll")
         or (ProcessCommandLine has "lsass"
             and ProcessCommandLine has_any ("dump","minidump","sekurlsa"))
      | project TimeGenerated, DeviceName, AccountName,
               FileName, ProcessCommandLine
    tags: [credential-dumping, lsass, mimikatz]
    notes: "High confidence. Any LSASS access outside of AV/EDR is suspicious. Trigger immediate investigation."

  - name: "Kerberoasting – Anomalous TGS Requests"
    description: "Detects mass TGS ticket requests for service accounts — Kerberoasting attempts to crack service account passwords offline."
    category: "Credential Access"
    platform: "KQL (Sentinel)"
    mitre: "T1558.003"
    mitre_name: "Steal or Forge Kerberos Tickets: Kerberoasting"
    severity: "high"
    query: |
      SecurityEvent
      | where EventID == 4769
      | where TicketEncryptionType == "0x17"
      | where ServiceName !endswith "$"
      | summarize RequestCount = count(),
          Services = make_set(ServiceName, 20)
          by IpAddress, TargetUserName, bin(TimeGenerated, 10m)
      | where RequestCount > 5
      | project TimeGenerated, IpAddress, TargetUserName,
               RequestCount, Services
    tags: [kerberoasting, kerberos, active-directory]
    notes: "RC4 encryption (0x17) is a strong indicator. Modern domains should enforce AES. Alert on any RC4 TGS request."

  - name: "DCSync – Replication Rights Abuse"
    description: "Detects non-DC devices requesting Active Directory replication — DCSync attack to extract all password hashes from AD."
    category: "Credential Access"
    platform: "KQL (Sentinel)"
    mitre: "T1003.006"
    mitre_name: "OS Credential Dumping: DCSync"
    severity: "critical"
    query: |
      SecurityEvent
      | where EventID == 4662
      | where Properties has "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
         or Properties has "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"
      | where SubjectUserName !endswith "$"
      | join kind=leftanti (
          SecurityEvent
          | where EventID == 4624
          | where TargetUserName endswith "$"
          | where LogonType == 3
          | distinct IpAddress
        ) on $left.IpAddress == $right.IpAddress
      | project TimeGenerated, SubjectUserName, ObjectName, IpAddress
    tags: [dcsync, active-directory, credential-dumping]
    notes: "Critical — DCSync gives full domain credential access. Only DCs should request replication. Immediate P1 escalation."

  - name: "Credential Dumping – SAM Registry Hive Export"
    description: "Detects attempts to export the SAM, SYSTEM, or SECURITY registry hives — used to extract local account password hashes."
    category: "Credential Access"
    platform: "Sigma"
    mitre: "T1003.002"
    mitre_name: "OS Credential Dumping: Security Account Manager"
    severity: "high"
    query: |
      title: SAM Registry Hive Export
      status: stable
      logsource:
        category: process_creation
        product: windows
      detection:
        selection:
          CommandLine|contains|all:
            - 'reg'
            - 'save'
          CommandLine|contains:
            - 'hklm\sam'
            - 'hklm\system'
            - 'hklm\security'
        condition: selection
      level: high
    tags: [credential-dumping, registry, SAM]
    notes: "Near-zero false positive. No legitimate reason and export SAM/SECURITY hives in production."

  - name: "MFA Fatigue – Repeated Push Notifications"
    description: "Detects many MFA push notifications sent to a single user in a short time — MFA fatigue/bombing attack to get the user to accept."
    category: "Credential Access"
    platform: "KQL (Sentinel)"
    mitre: "T1621"
    mitre_name: "Multi-Factor Authentication Request Generation"
    severity: "high"
    query: |
      AADNonInteractiveUserSignInLogs
      | where ResultType == "500121"
      | summarize
          MFAPrompts = count(),
          IPs = make_set(IPAddress, 5)
          by UserPrincipalName, bin(TimeGenerated, 10m)
      | where MFAPrompts > 5
      | project TimeGenerated, UserPrincipalName, MFAPrompts, IPs
    tags: [mfa-fatigue, mfa-bombing, identity]
    notes: "If followed by a successful login, treat as confirmed compromise. Switch to number-matching MFA to prevent."

  # ══════════════════════════════════════════════════════════
  # DEFENSE EVASION
  # ══════════════════════════════════════════════════════════
  - name: "Suspicious PowerShell Execution"
    description: "Flags PowerShell processes with encoded commands, download cradles, or bypass flags — common in initial access and execution stages."
    category: "Defense Evasion"
    platform: "KQL (Sentinel)"
    mitre: "T1059.001"
    mitre_name: "Command and Scripting Interpreter: PowerShell"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where FileName == "powershell.exe" or FileName == "pwsh.exe"
      | where ProcessCommandLine has_any (
          "-enc", "-encodedcommand", "bypass", "hidden",
          "downloadstring", "invoke-webrequest", "iex",
          "invoke-expression", "Net.WebClient"
        )
      | project TimeGenerated, DeviceName, AccountName,
               ProcessCommandLine, InitiatingProcessFileName
    tags: [powershell, execution, evasion]
    notes: "High noise in dev environments. Combine with user risk score for better signal."

  - name: "Defense Evasion – Disable Windows Defender"
    description: "Detects attempts to disable or tamper with Windows Defender via PowerShell, registry, or Group Policy."
    category: "Defense Evasion"
    platform: "KQL (Sentinel)"
    mitre: "T1562.001"
    mitre_name: "Impair Defenses: Disable or Modify Tools"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where ProcessCommandLine has_any (
          "Set-MpPreference -DisableRealtimeMonitoring",
          "DisableAntiSpyware",
          "sc stop WinDefend",
          "sc delete WinDefend",
          "Set-MpPreference -DisableBehaviorMonitoring"
        )
      | project TimeGenerated, DeviceName, AccountName,
               ProcessCommandLine, InitiatingProcessFileName
    tags: [evasion, defender, antivirus]
    notes: "Almost always malicious unless done by authorized IT during maintenance windows."

  - name: "Security Log Cleared"
    description: "Detects clearing of Windows Security event log — attackers clear logs to remove evidence of their activities."
    category: "Defense Evasion"
    platform: "KQL (Sentinel)"
    mitre: "T1070.001"
    mitre_name: "Indicator Removal: Clear Windows Event Logs"
    severity: "critical"
    query: |
      SecurityEvent
      | where EventID == 1102
      | project TimeGenerated, Computer,
               Account = SubjectUserName,
               LogonID = SubjectLogonId
    tags: [log-clearing, evasion, evidence-destruction]
    notes: "Near-zero false positive. Legitimate log rotation uses size/age policies, not manual clearing. Immediate investigation."

  - name: "AMSI Bypass Detected"
    description: "Detects attempts to bypass the Antimalware Scan Interface (AMSI) — used to run malicious PowerShell and .NET without detection."
    category: "Defense Evasion"
    platform: "Sigma"
    mitre: "T1562.001"
    mitre_name: "Impair Defenses: Disable or Modify Tools"
    severity: "high"
    query: |
      title: AMSI Bypass Attempt
      status: experimental
      logsource:
        category: process_creation
        product: windows
      detection:
        selection:
          CommandLine|contains:
            - 'AmsiUtils'
            - 'amsiInitFailed'
            - 'AmsiScanBuffer'
            - 'SetProtection(0'
            - 'Bypass.AMSI'
        condition: selection
      level: high
    tags: [amsi-bypass, evasion, powershell]
    notes: "AMSI bypass is almost always an attack precursor. Check what ran after the bypass."

  - name: "Timestomping – File Time Attribute Modification"
    description: "Detects tools that modify file creation/modification timestamps to blend in with legitimate files."
    category: "Defense Evasion"
    platform: "KQL (Sentinel)"
    mitre: "T1070.006"
    mitre_name: "Indicator Removal: Timestomp"
    severity: "medium"
    query: |
      DeviceProcessEvents
      | where ProcessCommandLine has_any (
          "timestomp", "SetFileTime",
          "NtSetInformationFile",
          "(Get-Item", ".CreationTime",
          ".LastWriteTime", "touch -t"
        )
      | project TimeGenerated, DeviceName, AccountName,
               ProcessCommandLine, FileName
    tags: [timestomping, evasion, forensics]
    notes: "Low volume but high value. Attackers use this to hide recently dropped tools."

  # ══════════════════════════════════════════════════════════
  # LATERAL MOVEMENT
  # ══════════════════════════════════════════════════════════
  - name: "Lateral Movement – PsExec Remote Execution"
    description: "Detects PsExec-style remote service creation — the most common lateral movement technique in enterprise breaches."
    category: "Lateral Movement"
    platform: "KQL (Sentinel)"
    mitre: "T1021.002"
    mitre_name: "Remote Services: SMB/Windows Admin Shares"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where InitiatingProcessFileName in~ ("psexec.exe","psexesvc.exe")
         or (FileName == "cmd.exe"
             and InitiatingProcessFileName == "services.exe"
             and ProcessCommandLine has "\\\\")
      | project TimeGenerated, DeviceName, AccountName,
               FileName, ProcessCommandLine,
               InitiatingProcessFileName
    tags: [lateral-movement, psexec, smb]
    notes: "High confidence. PsExec in production is almost always suspicious. Whitelist IT tooling explicitly."

  - name: "Lateral Movement – RDP from Unusual Source"
    description: "Detects RDP connections from internal hosts that don't normally initiate RDP — potential lateral movement."
    category: "Lateral Movement"
    platform: "Splunk SPL"
    mitre: "T1021.001"
    mitre_name: "Remote Services: Remote Desktop Protocol"
    severity: "medium"
    query: |
      index=windows EventCode=4624 LogonType=10
      | stats count by src_ip, dest, Account
      | lookup rdp_baseline.csv src_ip OUTPUT is_known
      | where isnull(is_known) OR is_known="false"
      | table _time, src_ip, dest, Account, count
    tags: [lateral-movement, rdp, logon]
    notes: "Requires building an RDP baseline lookup first. High value once baseline is established."

  - name: "Lateral Movement – WMI Remote Execution"
    description: "Detects use of WMI for remote command execution — a stealthy lateral movement technique that doesn't drop files."
    category: "Lateral Movement"
    platform: "KQL (Sentinel)"
    mitre: "T1047"
    mitre_name: "Windows Management Instrumentation"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where FileName == "WMIC.exe"
      | where ProcessCommandLine has "/node:"
         and ProcessCommandLine has_any (
           "process call create", "os get", "product"
         )
      | project TimeGenerated, DeviceName, AccountName,
               ProcessCommandLine
    tags: [lateral-movement, wmi, remote-execution]
    notes: "WMI remote execution is rarely used by admins in modern environments. Check source device context."

  - name: "Lateral Movement – Pass-the-Hash"
    description: "Detects NTLM authentication with administrative logon from non-standard sources — potential pass-the-hash attack."
    category: "Lateral Movement"
    platform: "KQL (Sentinel)"
    mitre: "T1550.002"
    mitre_name: "Use Alternate Authentication Material: Pass the Hash"
    severity: "critical"
    query: |
      SecurityEvent
      | where EventID == 4624
      | where LogonType == 3
      | where AuthenticationPackageName == "NTLM"
      | where TargetUserName !endswith "$"
      | where TargetUserName in~ ("Administrator","admin")
         or TargetUserSid endswith "-500"
      | project TimeGenerated, Computer, TargetUserName,
               IpAddress, WorkstationName
    tags: [pass-the-hash, ntlm, lateral-movement]
    notes: "NTLM + admin + network logon is a strong PtH indicator. Investigate source workstation immediately."

  - name: "Lateral Movement – SMB Admin Share Access"
    description: "Detects access to admin shares (C$, ADMIN$) from non-standard hosts — common for file deployment and remote execution."
    category: "Lateral Movement"
    platform: "Sigma"
    mitre: "T1021.002"
    mitre_name: "Remote Services: SMB/Windows Admin Shares"
    severity: "medium"
    query: |
      title: Admin Share Access from Non-Server
      status: stable
      logsource:
        product: windows
        service: security
      detection:
        selection:
          EventID: 5140
          ShareName|contains:
            - '\C$'
            - '\ADMIN$'
        filter:
          IpAddress|startswith:
            - '127.'
        condition: selection and not filter
      level: medium
    tags: [admin-share, smb, lateral-movement]
    notes: "Baseline admin share access from IT management tools. Any access from workstations is suspicious."

  # ══════════════════════════════════════════════════════════
  # PERSISTENCE
  # ══════════════════════════════════════════════════════════
  - name: "New Service Created via sc.exe"
    description: "Detects service creation using sc.exe — a common persistence mechanism used by attackers and malware."
    category: "Persistence"
    platform: "Sigma"
    mitre: "T1543.003"
    mitre_name: "Create or Modify System Process: Windows Service"
    severity: "medium"
    query: |
      title: New Service Created via sc.exe
      status: experimental
      logsource:
        category: process_creation
        product: windows
      detection:
        selection:
          Image|endswith: '\sc.exe'
          CommandLine|contains: 'create'
        condition: selection
      level: medium
    tags: [persistence, service, sigma]
    notes: "Filter out known deployment tools (SCCM, Intune) to reduce false positives."

  - name: "Persistence – Scheduled Task via schtasks"
    description: "Detects creation of scheduled tasks via command line — common persistence technique across all threat actors."
    category: "Persistence"
    platform: "Sigma"
    mitre: "T1053.005"
    mitre_name: "Scheduled Task/Job: Scheduled Task"
    severity: "medium"
    query: |
      title: Scheduled Task Creation via schtasks.exe
      status: stable
      logsource:
        category: process_creation
        product: windows
      detection:
        selection:
          Image|endswith: '\schtasks.exe'
          CommandLine|contains|all:
            - '/create'
        filter:
          User|contains:
            - 'SYSTEM'
        condition: selection and not filter
      level: medium
    tags: [persistence, scheduled-task, sigma]
    notes: "Filter SYSTEM-created tasks to reduce noise. Focus on tasks created by regular user accounts."

  - name: "Persistence – Registry Run Key Modification"
    description: "Detects additions to registry Run/RunOnce keys — classic persistence to survive reboots."
    category: "Persistence"
    platform: "KQL (Sentinel)"
    mitre: "T1547.001"
    mitre_name: "Boot or Logon Autostart Execution: Registry Run Keys"
    severity: "medium"
    query: |
      DeviceRegistryEvents
      | where ActionType == "RegistryValueSet"
      | where RegistryKey has_any (
          @"CurrentVersion\Run",
          @"CurrentVersion\RunOnce",
          @"CurrentVersion\RunServices"
        )
      | where InitiatingProcessFileName !in~
              ("msiexec.exe","OneDriveSetup.exe",
               "MicrosoftEdgeUpdate.exe")
      | project TimeGenerated, DeviceName,
               RegistryKey, RegistryValueName,
               RegistryValueData, InitiatingProcessFileName
    tags: [persistence, registry, run-key]
    notes: "Whitelist known software installers. Unknown entries in Run keys warrant investigation."

  - name: "Persistence – WMI Event Subscription"
    description: "Detects creation of WMI event subscriptions — a stealthy persistence technique that survives reboots."
    category: "Persistence"
    platform: "KQL (Sentinel)"
    mitre: "T1546.003"
    mitre_name: "Event Triggered Execution: WMI Event Subscription"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where ProcessCommandLine has_any (
          "__EventFilter", "__EventConsumer",
          "__FilterToConsumerBinding",
          "ActiveScriptEventConsumer",
          "CommandLineEventConsumer"
        )
      | project TimeGenerated, DeviceName, AccountName,
               ProcessCommandLine, FileName
    tags: [persistence, wmi, event-subscription]
    notes: "Very few legitimate WMI subscriptions in production. Any new creation is suspicious."

  - name: "Persistence – Startup Folder Modification"
    description: "Detects files dropped in user or common Startup folders — simple but effective persistence."
    category: "Persistence"
    platform: "Sigma"
    mitre: "T1547.001"
    mitre_name: "Boot or Logon Autostart Execution: Registry Run Keys"
    severity: "medium"
    query: |
      title: File Dropped in Startup Folder
      status: stable
      logsource:
        category: file_event
        product: windows
      detection:
        selection:
          TargetFilename|contains:
            - '\Start Menu\Programs\Startup\'
            - '\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp\'
        filter:
          Image|endswith:
            - '\explorer.exe'
        condition: selection and not filter
      level: medium
    tags: [persistence, startup, file-drop]
    notes: "Users rarely manually add files to Startup. Processes dropping files there are suspicious."

  # ══════════════════════════════════════════════════════════
  # PRIVILEGE ESCALATION
  # ══════════════════════════════════════════════════════════
  - name: "Privilege Escalation – Token Manipulation"
    description: "Detects access token impersonation techniques commonly used to escalate from user to SYSTEM."
    category: "Privilege Escalation"
    platform: "Sigma"
    mitre: "T1134.001"
    mitre_name: "Access Token Manipulation: Token Impersonation"
    severity: "high"
    query: |
      title: Token Impersonation via Known Tools
      status: experimental
      logsource:
        category: process_creation
        product: windows
      detection:
        selection:
          Image|endswith:
            - '\incognito.exe'
            - '\JuicyPotato.exe'
            - '\PrintSpoofer.exe'
            - '\GodPotato.exe'
            - '\RoguePotato.exe'
        condition: selection
      level: high
    tags: [privilege-escalation, token, potato]
    notes: "Near-zero false positive rate. Detection of these tools almost always indicates compromise."

  - name: "Privilege Escalation – Sudo to Root (Linux)"
    description: "Detects sudo usage to gain root access — monitors for unusual users or commands escalating to root."
    category: "Privilege Escalation"
    platform: "Splunk SPL"
    mitre: "T1548.003"
    mitre_name: "Abuse Elevation Control Mechanism: Sudo and Sudo Caching"
    severity: "medium"
    query: |
      index=linux sourcetype=syslog "sudo:" NOT "pam_unix"
      | rex "(?<user>\w+)\s+:\s+TTY=(?<tty>\S+)\s+;\s+PWD=(?<pwd>\S+)\s+;\s+USER=(?<target_user>\w+)\s+;\s+COMMAND=(?<command>.+)"
      | where target_user="root"
      | stats count by user, command, host
      | sort -count
      | table user, host, command, count
    tags: [privilege-escalation, sudo, linux]
    notes: "Baseline regular sudo users. Alert on first-time sudo users or unusual commands."

  - name: "New Local Admin Created"
    description: "Detects a user being added to the local Administrators group — potential privilege escalation or persistence."
    category: "Privilege Escalation"
    platform: "KQL (Sentinel)"
    mitre: "T1136.001"
    mitre_name: "Create Account: Local Account"
    severity: "high"
    query: |
      SecurityEvent
      | where EventID == 4732
      | where TargetSid endswith "-544"
      | project TimeGenerated, Computer,
               AddedUser = MemberName,
               AddedBy = SubjectUserName,
               GroupName = TargetUserName
    tags: [admin-creation, privilege-escalation, local-admin]
    notes: "Legitimate admin creation should follow change management. Unexpected additions need investigation."

  - name: "Privilege Escalation – UAC Bypass"
    description: "Detects known UAC bypass techniques using fodhelper, eventvwr, or other auto-elevate binaries."
    category: "Privilege Escalation"
    platform: "Sigma"
    mitre: "T1548.002"
    mitre_name: "Abuse Elevation Control Mechanism: Bypass UAC"
    severity: "high"
    query: |
      title: UAC Bypass via Auto-Elevate Binary
      status: experimental
      logsource:
        category: process_creation
        product: windows
      detection:
        selection_fodhelper:
          ParentImage|endswith: '\fodhelper.exe'
        selection_eventvwr:
          ParentImage|endswith: '\eventvwr.exe'
          Image|endswith:
            - '\powershell.exe'
            - '\cmd.exe'
        selection_computerdefaults:
          ParentImage|endswith: '\computerdefaults.exe'
          Image|endswith:
            - '\powershell.exe'
            - '\cmd.exe'
        condition: selection_fodhelper or selection_eventvwr
            or selection_computerdefaults
      level: high
    tags: [uac-bypass, privilege-escalation, evasion]
    notes: "These binaries should not spawn command interpreters. Any child process is suspicious."

  # ══════════════════════════════════════════════════════════
  # DATA EXFILTRATION
  # ══════════════════════════════════════════════════════════
  - name: "Outbound Data Transfer Spike"
    description: "Identifies hosts transferring unusually large amounts of data outbound — potential exfiltration."
    category: "Data Exfiltration"
    platform: "KQL (Sentinel)"
    mitre: "T1048"
    mitre_name: "Exfiltration Over Alternative Protocol"
    severity: "critical"
    query: |
      CommonSecurityLog
      | where DeviceAction == "allow"
      | where DestinationIP !startswith "10." and DestinationIP !startswith "192.168."
      | summarize TotalBytes = sum(SentBytes) by SourceIP, bin(TimeGenerated, 1h)
      | where TotalBytes > 500000000
      | project TimeGenerated, SourceIP, TotalBytesMB = TotalBytes / 1048576
    tags: [exfiltration, network, firewall]
    notes: "500MB threshold — adjust for your baseline. Exclude known backup and update servers."

  - name: "DNS Tunneling – Anomalous Query Volume"
    description: "Detects unusually high DNS query volume to a single domain — indicates potential DNS tunneling for data exfiltration or C2."
    category: "Data Exfiltration"
    platform: "KQL (Sentinel)"
    mitre: "T1048.003"
    mitre_name: "Exfiltration Over Alternative Protocol: DNS"
    severity: "high"
    query: |
      DnsEvents
      | extend TopDomain = strcat(
          tostring(split(Name, ".")[-2]), ".",
          tostring(split(Name, ".")[-1])
        )
      | summarize
          QueryCount = count(),
          UniqueSubdomains = dcount(Name),
          AvgQueryLength = avg(strlen(Name))
          by TopDomain, ClientIP, bin(TimeGenerated, 1h)
      | where QueryCount > 500 or
              (UniqueSubdomains > 100 and AvgQueryLength > 40)
      | project TimeGenerated, ClientIP, TopDomain,
               QueryCount, UniqueSubdomains, AvgQueryLength
    tags: [dns-tunneling, exfiltration, c2]
    notes: "Long subdomain names + high unique count = strong tunneling indicator. Check with iodine, dnscat2 signatures."

  - name: "Exfiltration to Cloud Storage"
    description: "Detects uploads to known cloud storage services from corporate endpoints — potential data exfiltration via legitimate services."
    category: "Data Exfiltration"
    platform: "Splunk SPL"
    mitre: "T1567.002"
    mitre_name: "Exfiltration Over Web Service: Exfiltration to Cloud Storage"
    severity: "medium"
    query: |
      index=proxy OR index=firewall
      | where (dest_host="*.dropbox.com" OR dest_host="*.mega.nz"
         OR dest_host="upload.google.com"
         OR dest_host="*.wetransfer.com"
         OR dest_host="*.sendspace.com"
         OR dest_host="*.file.io")
         AND http_method="POST"
      | stats sum(bytes_out) as total_bytes, count by src_ip, dest_host
      | where total_bytes > 10485760
      | eval MB=round(total_bytes/1048576,2)
      | table src_ip, dest_host, MB, count
    tags: [exfiltration, cloud-storage, web-service]
    notes: "Focus on POST requests. Whitelist approved services (OneDrive, Google Drive) if corporate-sanctioned."

  - name: "Email Exfiltration – Mass Forward Rule"
    description: "Detects mailbox rules that auto-forward all or filtered email to external addresses — common BEC persistence."
    category: "Data Exfiltration"
    platform: "KQL (Sentinel)"
    mitre: "T1114.003"
    mitre_name: "Email Collection: Email Forwarding Rule"
    severity: "critical"
    query: |
      OfficeActivity
      | where Operation == "New-InboxRule"
         or Operation == "Set-InboxRule"
      | where Parameters has "ForwardTo"
         or Parameters has "ForwardAsAttachmentTo"
         or Parameters has "RedirectTo"
      | extend RuleDetails = tostring(Parameters)
      | project TimeGenerated, UserId, Operation,
               RuleDetails, ClientIP
    tags: [email-forwarding, bec, exfiltration]
    notes: "Critical for BEC detection. External forwarding rules should be blocked by transport rules. Investigate immediately."

  # ══════════════════════════════════════════════════════════
  # RANSOMWARE
  # ══════════════════════════════════════════════════════════
  - name: "Ransomware – Mass File Encryption Pattern"
    description: "Detects rapid file rename operations with known ransomware extensions — indicates active encryption in progress."
    category: "Ransomware"
    platform: "KQL (Sentinel)"
    mitre: "T1486"
    mitre_name: "Data Encrypted for Impact"
    severity: "critical"
    query: |
      DeviceFileEvents
      | where ActionType == "FileRenamed"
      | where FileName has_any (".encrypted",".locked",".crypt",
              ".enc",".ransom",".pay",".wasted",".aes256")
      | summarize RenamedCount = count() by DeviceName, bin(TimeGenerated, 5m)
      | where RenamedCount > 50
      | project TimeGenerated, DeviceName, RenamedCount
    tags: [ransomware, encryption, file-events]
    notes: "Critical severity — trigger immediate SOC escalation. Pair with network isolation automation."

  - name: "Ransomware – Shadow Copy Deletion"
    description: "Detects deletion of Volume Shadow Copies — almost always a ransomware precursor to prevent recovery."
    category: "Ransomware"
    platform: "Sigma"
    mitre: "T1490"
    mitre_name: "Inhibit System Recovery"
    severity: "critical"
    query: |
      title: Shadow Copy Deletion
      status: stable
      logsource:
        category: process_creation
        product: windows
      detection:
        selection_vssadmin:
          CommandLine|contains|all:
            - 'vssadmin'
            - 'delete'
            - 'shadows'
        selection_wmic:
          CommandLine|contains|all:
            - 'wmic'
            - 'shadowcopy'
            - 'delete'
        selection_bcdedit:
          CommandLine|contains|all:
            - 'bcdedit'
            - 'recoveryenabled'
            - 'no'
        condition: selection_vssadmin or selection_wmic
            or selection_bcdedit
      level: critical
    tags: [ransomware, shadow-copy, recovery-prevention]
    notes: "Immediate P1 escalation. Shadow copy deletion + file encryption = active ransomware. Isolate host NOW."

  # ══════════════════════════════════════════════════════════
  # PHISHING
  # ══════════════════════════════════════════════════════════
  - name: "Phishing – OAuth Consent Grant Attack"
    description: "Detects when a user grants consent to a suspicious OAuth application — common in modern phishing campaigns."
    category: "Phishing"
    platform: "KQL (Sentinel)"
    mitre: "T1528"
    mitre_name: "Steal Application Access Token"
    severity: "critical"
    query: |
      AuditLogs
      | where OperationName == "Consent to application"
      | extend AppName = tostring(TargetResources[0].displayName)
      | extend User = tostring(InitiatedBy.user.userPrincipalName)
      | extend Permissions = tostring(
          TargetResources[0].modifiedProperties[0].newValue)
      | where Permissions has_any ("Mail.Read","Files.ReadWrite",
              "User.Read.All","Directory.Read.All")
      | project TimeGenerated, User, AppName, Permissions
    tags: [phishing, oauth, consent-grant]
    notes: "Critical — consent grants can give full mailbox access. Investigate immediately and revoke if unauthorized."

  - name: "Phishing – Suspicious Email Attachment Execution"
    description: "Detects Office applications spawning suspicious child processes — indicates malicious macro or embedded content execution."
    category: "Phishing"
    platform: "KQL (Sentinel)"
    mitre: "T1566.001"
    mitre_name: "Phishing: Spearphishing Attachment"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where InitiatingProcessFileName in~
              ("WINWORD.EXE","EXCEL.EXE","POWERPNT.EXE",
               "OUTLOOK.EXE","MSACCESS.EXE")
      | where FileName in~ ("powershell.exe","cmd.exe","wscript.exe",
              "cscript.exe","mshta.exe","certutil.exe","bitsadmin.exe",
              "regsvr32.exe","rundll32.exe")
      | project TimeGenerated, DeviceName, AccountName,
               InitiatingProcessFileName, FileName,
               ProcessCommandLine
    tags: [phishing, macro, attachment, execution]
    notes: "Office apps should not spawn script interpreters. Very high confidence detection."

  # ══════════════════════════════════════════════════════════
  # CLOUD SECURITY
  # ══════════════════════════════════════════════════════════
  - name: "Cloud – S3 Bucket Made Public"
    description: "Detects when an S3 bucket ACL is changed to public — immediate data exposure risk."
    category: "Cloud Security"
    platform: "Splunk SPL"
    mitre: "T1530"
    mitre_name: "Data from Cloud Storage"
    severity: "critical"
    query: |
      index=aws sourcetype=aws:cloudtrail
        eventName=PutBucketAcl OR eventName=PutBucketPolicy
      | spath output=grants path=requestParameters.AccessControlPolicy.AccessControlList.Grant{}
      | search grants="*AllUsers*" OR grants="*AuthenticatedUsers*"
      | table _time, userIdentity.arn, requestParameters.bucketName, grants
    tags: [cloud, aws, s3, public-exposure]
    notes: "Immediate response required. Auto-remediate with Lambda if possible."

  - name: "Cloud – New IAM User Created with Admin"
    description: "Detects creation of new IAM users with administrative policies attached — backdoor account creation."
    category: "Cloud Security"
    platform: "KQL (Sentinel)"
    mitre: "T1136.003"
    mitre_name: "Create Account: Cloud Account"
    severity: "critical"
    query: |
      AWSCloudTrail
      | where EventName == "CreateUser"
      | join kind=inner (
          AWSCloudTrail
          | where EventName == "AttachUserPolicy"
          | where RequestParameters has "AdministratorAccess"
          | project AttachTime = TimeGenerated,
                   UserName2 = tostring(
                     parse_json(RequestParameters).userName)
        ) on $left.ResponseElements has $right.UserName2
      | project TimeGenerated, SourceIpAddress,
               UserIdentityArn, EventName
    tags: [cloud, aws, iam, backdoor]
    notes: "New admin users should only come from IaC pipelines. Console-created admin users are suspicious."

  - name: "Cloud – Azure AD Conditional Access Disabled"
    description: "Detects disabling of Conditional Access policies — removes security controls protecting sign-ins."
    category: "Cloud Security"
    platform: "KQL (Sentinel)"
    mitre: "T1562.001"
    mitre_name: "Impair Defenses: Disable or Modify Tools"
    severity: "critical"
    query: |
      AuditLogs
      | where OperationName == "Update conditional access policy"
      | extend PolicyName = tostring(
          TargetResources[0].displayName)
      | extend ModifiedBy = tostring(
          InitiatedBy.user.userPrincipalName)
      | extend NewState = tostring(
          TargetResources[0].modifiedProperties)
      | where NewState has "disabled"
      | project TimeGenerated, ModifiedBy, PolicyName, NewState
    tags: [cloud, azure-ad, conditional-access]
    notes: "Disabling CA policies removes MFA, location, and device requirements. Investigate why and by whom."

  - name: "Cloud – GCP Firewall Rule Opened to World"
    description: "Detects GCP firewall rules allowing 0.0.0.0/0 ingress — unrestricted inbound access."
    category: "Cloud Security"
    platform: "Splunk SPL"
    mitre: "T1562.007"
    mitre_name: "Impair Defenses: Disable or Modify Cloud Firewall"
    severity: "high"
    query: |
      index=gcp sourcetype=google:gcp:audit
        methodName="v1.compute.firewalls.insert"
        OR methodName="v1.compute.firewalls.patch"
      | spath output=ranges
          path=request.sourceRanges{}
      | search ranges="0.0.0.0/0"
      | table _time, actor.email, request.name,
              request.allowed{}.IPProtocol,
              request.allowed{}.ports{}, ranges
    tags: [cloud, gcp, firewall, exposure]
    notes: "0.0.0.0/0 ingress is almost never needed. Review with network team and restrict to specific IPs."

  - name: "Cloud – AWS Root Account Used"
    description: "Detects any API call using the AWS root account — root should never be used for daily operations."
    category: "Cloud Security"
    platform: "Splunk SPL"
    mitre: "T1078.004"
    mitre_name: "Valid Accounts: Cloud Accounts"
    severity: "critical"
    query: |
      index=aws sourcetype=aws:cloudtrail
        userIdentity.type=Root
      | where eventName!="ConsoleLogin"
      | stats count by eventName, sourceIPAddress, eventTime
      | sort -count
      | table eventTime, eventName, sourceIPAddress, count
    tags: [cloud, aws, root-account]
    notes: "Root account should have no access keys and MFA enabled. Any usage outside initial setup is a red flag."

  # ══════════════════════════════════════════════════════════
  # COMMAND AND CONTROL
  # ══════════════════════════════════════════════════════════
  - name: "C2 – Network Beaconing Pattern"
    description: "Detects regular-interval outbound connections — classic C2 beaconing with consistent timing between callbacks."
    category: "Command and Control"
    platform: "KQL (Sentinel)"
    mitre: "T1071.001"
    mitre_name: "Application Layer Protocol: Web Protocols"
    severity: "high"
    query: |
      DeviceNetworkEvents
      | where RemoteIPType == "Public"
      | where ActionType == "ConnectionSuccess"
      | summarize
          Connections = count(),
          TimeDiffs = make_list(datetime_diff('second',
            TimeGenerated, prev(TimeGenerated, 1)))
          by DeviceName, RemoteIP, bin(TimeGenerated, 1h)
      | where Connections > 20
      | extend AvgInterval = todynamic(TimeDiffs)
      | project TimeGenerated, DeviceName, RemoteIP,
               Connections
    tags: [c2, beaconing, network]
    notes: "Regular intervals (±jitter) to unusual IPs is strong C2 indicator. Cross-reference with threat intel."

  - name: "C2 – Cobalt Strike Default Pipe Names"
    description: "Detects named pipes commonly used by Cobalt Strike beacons for inter-process communication."
    category: "Command and Control"
    platform: "Sigma"
    mitre: "T1570"
    mitre_name: "Lateral Tool Transfer"
    severity: "critical"
    query: |
      title: Cobalt Strike Named Pipe Detection
      status: stable
      logsource:
        product: windows
        category: pipe_created
      detection:
        selection:
          PipeName|startswith:
            - '\MSSE-'
            - '\postex_'
            - '\postex_ssh_'
            - '\status_'
            - '\msagent_'
            - '\interprocess_'
        condition: selection
      level: critical
    tags: [cobalt-strike, c2, named-pipe]
    notes: "Default Cobalt Strike pipe names. Sophisticated actors may rename them. Also check for malleable C2 profiles."

  - name: "C2 – Tor Network Connection"
    description: "Detects outbound connections to known Tor entry/exit nodes — anonymization for C2 or exfiltration."
    category: "Command and Control"
    platform: "Splunk SPL"
    mitre: "T1090.003"
    mitre_name: "Proxy: Multi-hop Proxy"
    severity: "high"
    query: |
      index=firewall OR index=proxy
      | lookup tor_exit_nodes.csv ip as dest_ip OUTPUT is_tor
      | where is_tor="true"
      | stats count by src_ip, dest_ip, dest_port
      | table _time, src_ip, dest_ip, dest_port, count
    tags: [tor, c2, anonymization]
    notes: "Requires Tor exit node list (updated daily). Corporate endpoints should never connect to Tor."

  # ══════════════════════════════════════════════════════════
  # INITIAL ACCESS
  # ══════════════════════════════════════════════════════════
  - name: "Initial Access – Exposed RDP to Internet"
    description: "Detects successful RDP logons from public IP addresses — external RDP is a top initial access vector."
    category: "Initial Access"
    platform: "KQL (Sentinel)"
    mitre: "T1133"
    mitre_name: "External Remote Services"
    severity: "critical"
    query: |
      SecurityEvent
      | where EventID == 4624
      | where LogonType == 10
      | where IpAddress !startswith "10."
         and IpAddress !startswith "172.16."
         and IpAddress !startswith "192.168."
         and IpAddress != "127.0.0.1"
         and IpAddress != "-"
      | project TimeGenerated, Computer, TargetUserName,
               IpAddress, WorkstationName
    tags: [rdp, external-access, initial-access]
    notes: "External RDP should be behind VPN or jump server. Any direct internet RDP is critical risk."

  - name: "Initial Access – VPN Login from Unusual Country"
    description: "Detects VPN connections from countries outside the organization's normal operating locations."
    category: "Initial Access"
    platform: "Splunk SPL"
    mitre: "T1133"
    mitre_name: "External Remote Services"
    severity: "high"
    query: |
      index=vpn sourcetype=vpn_logs action=success
      | iplocation src_ip
      | search NOT [| inputlookup allowed_countries.csv
          | return 100 Country]
      | table _time, user, src_ip, Country, City, action
    tags: [vpn, geo-anomaly, initial-access]
    notes: "Maintain an allowed_countries.csv lookup. Any login from unlisted countries needs verification."

  # ══════════════════════════════════════════════════════════
  # DISCOVERY
  # ══════════════════════════════════════════════════════════
  - name: "Discovery – BloodHound/SharpHound Execution"
    description: "Detects execution of Active Directory enumeration tools used for attack path mapping."
    category: "Discovery"
    platform: "KQL (Sentinel)"
    mitre: "T1087.002"
    mitre_name: "Account Discovery: Domain Account"
    severity: "critical"
    query: |
      DeviceProcessEvents
      | where FileName in~ ("SharpHound.exe","SharpHound.ps1",
              "BloodHound.exe","azurehound.exe","AzureHound.ps1")
         or ProcessCommandLine has_any (
              "Invoke-BloodHound", "Invoke-SharpHound",
              "-CollectionMethod All", "SharpHound")
      | project TimeGenerated, DeviceName, AccountName,
               FileName, ProcessCommandLine
    tags: [bloodhound, sharphound, ad-enumeration]
    notes: "Legitimate use only during authorized pen tests. Any other execution is a confirmed threat."

  - name: "Discovery – Mass Internal Port Scanning"
    description: "Detects a single host connecting to many internal hosts on common service ports — internal network scanning."
    category: "Discovery"
    platform: "KQL (Sentinel)"
    mitre: "T1046"
    mitre_name: "Network Service Discovery"
    severity: "high"
    query: |
      DeviceNetworkEvents
      | where RemoteIPType == "Private"
      | where RemotePort in (22, 80, 135, 139, 443, 445,
              1433, 3306, 3389, 5432, 5985, 8080, 8443)
      | summarize
          TargetCount = dcount(RemoteIP),
          PortsScanned = make_set(RemotePort, 20)
          by DeviceName, bin(TimeGenerated, 5m)
      | where TargetCount > 20
      | project TimeGenerated, DeviceName, TargetCount,
               PortsScanned
    tags: [port-scan, discovery, network]
    notes: "Workstations connecting to 20+ hosts on service ports is highly suspicious. Exclude vulnerability scanners by IP."

  - name: "Discovery – AD Domain Enumeration via net.exe"
    description: "Detects use of native Windows net commands to enumerate domain users, groups, and shares."
    category: "Discovery"
    platform: "Sigma"
    mitre: "T1087.002"
    mitre_name: "Account Discovery: Domain Account"
    severity: "medium"
    query: |
      title: AD Enumeration via net.exe
      status: stable
      logsource:
        category: process_creation
        product: windows
      detection:
        selection:
          Image|endswith:
            - '\net.exe'
            - '\net1.exe'
          CommandLine|contains:
            - 'domain admins'
            - 'enterprise admins'
            - 'domain controllers'
            - 'group "Domain'
            - 'user /domain'
            - 'accounts /domain'
        condition: selection
      level: medium
    tags: [net-commands, ad-enumeration, discovery]
    notes: "Multiple net commands in sequence is a stronger indicator. Check if the user is IT staff."

  # ══════════════════════════════════════════════════════════
  # EXECUTION
  # ══════════════════════════════════════════════════════════
  - name: "Execution – MSHTA Abuse"
    description: "Detects mshta.exe executing remote or suspicious HTA content — a living-off-the-land technique for code execution."
    category: "Execution"
    platform: "KQL (Sentinel)"
    mitre: "T1218.005"
    mitre_name: "System Binary Proxy Execution: Mshta"
    severity: "high"
    query: |
      DeviceProcessEvents
      | where FileName == "mshta.exe"
      | where ProcessCommandLine has_any (
          "http://", "https://", "javascript:",
          "vbscript:", ".hta"
        )
      | where ProcessCommandLine !has "about:blank"
      | project TimeGenerated, DeviceName, AccountName,
               ProcessCommandLine, InitiatingProcessFileName
    tags: [mshta, lolbin, execution]
    notes: "mshta.exe with URLs or script content is almost always malicious. Used heavily by APTs and commodity malware."

  - name: "Execution – Certutil Download"
    description: "Detects certutil.exe used to download files — a well-known living-off-the-land binary abuse technique."
    category: "Execution"
    platform: "Sigma"
    mitre: "T1105"
    mitre_name: "Ingress Tool Transfer"
    severity: "high"
    query: |
      title: Certutil Download or Decode
      status: stable
      logsource:
        category: process_creation
        product: windows
      detection:
        selection_download:
          Image|endswith: '\certutil.exe'
          CommandLine|contains:
            - 'urlcache'
            - '-urlcache'
        selection_decode:
          Image|endswith: '\certutil.exe'
          CommandLine|contains:
            - '-decode'
            - '-decodehex'
        condition: selection_download or selection_decode
      level: high
    tags: [certutil, lolbin, download, execution]
    notes: "Certutil should not be used for downloads in production. High confidence when combined with network connection."

  - name: "Execution – DLL Side-Loading"
    description: "Detects DLL loading from unusual paths by trusted signed executables — DLL hijacking for stealthy execution."
    category: "Execution"
    platform: "KQL (Sentinel)"
    mitre: "T1574.002"
    mitre_name: "Hijack Execution Flow: DLL Side-Loading"
    severity: "high"
    query: |
      DeviceImageLoadEvents
      | where InitiatingProcessFileName in~
              ("teams.exe","slack.exe","chrome.exe",
               "msedge.exe","onedrive.exe")
      | where FolderPath !startswith "C:\\Program Files"
         and FolderPath !startswith "C:\\Windows"
         and FolderPath !startswith "C:\\Users\\*\\AppData\\Local"
      | where FileName endswith ".dll"
      | project TimeGenerated, DeviceName,
               InitiatingProcessFileName, FileName, FolderPath
    tags: [dll-sideloading, hijacking, execution]
    notes: "Trusted apps loading DLLs from temp folders or Downloads is a strong side-loading indicator."

  # ══════════════════════════════════════════════════════════
  # IMPACT
  # ══════════════════════════════════════════════════════════
  - name: "Impact – Mass Account Lockout"
    description: "Detects many accounts being locked out simultaneously — possible destructive attack or worm propagation."
    category: "Impact"
    platform: "KQL (Sentinel)"
    mitre: "T1531"
    mitre_name: "Account Access Removal"
    severity: "critical"
    query: |
      SecurityEvent
      | where EventID == 4740
      | summarize
          LockedAccounts = dcount(TargetUserName),
          AccountList = make_set(TargetUserName, 20)
          by bin(TimeGenerated, 10m)
      | where LockedAccounts > 10
      | project TimeGenerated, LockedAccounts, AccountList
    tags: [account-lockout, impact, disruption]
    notes: "Mass lockout disrupts business operations. Could be ransomware pre-staging or worm with bad credentials."

  - name: "Impact – Mass File Deletion"
    description: "Detects rapid deletion of large numbers of files — destructive attack or disgruntled insider."
    category: "Impact"
    platform: "KQL (Sentinel)"
    mitre: "T1485"
    mitre_name: "Data Destruction"
    severity: "critical"
    query: |
      DeviceFileEvents
      | where ActionType == "FileDeleted"
      | summarize
          DeletedCount = count(),
          FolderList = make_set(FolderPath, 10)
          by DeviceName, AccountName, bin(TimeGenerated, 5m)
      | where DeletedCount > 100
      | project TimeGenerated, DeviceName, AccountName,
               DeletedCount, FolderList
    tags: [data-destruction, file-deletion, impact]
    notes: "Exclude known cleanup tools (CCleaner, temp cleaners). Focus on business-critical file paths."
