about_block:
  heading: "What is Cyber World?"
  body: >
    Shimi's Cyber World is a personal knowledge base built for the cybersecurity community.
    It brings together curated tools, learning resources, threat intelligence references,
    and original write-ups — all in one place. Whether you're just getting started
    or deep in the trenches, there's something here for you.
  cta_text: "Learn more"
  cta_url: /about/

