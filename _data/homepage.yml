# Quick signals — short insight notes for the homepage
quick_signals:
  - title: "Ransomware Gangs Shifting to Data Extortion"
    text: "Encryption is no longer the main play. Exfiltration-first attacks are the new model."
    detail: "Groups like Cl0p and BianLian increasingly skip encryption entirely, focusing on stealing data and threatening public leaks. Organizations need to prioritize DLP, network segmentation, and monitoring outbound traffic — not just backups."
    link: "https://www.cisa.gov/stopransomware"
    link_label: "CISA Ransomware Resources"
    badge: "signal"
    tags:
      - ransomware
      - threat-intel
  - title: "API Security Is the New Perimeter"
    text: "APIs now account for over 80% of web traffic. Most are under-protected."
    detail: "Broken Object Level Authorization (BOLA) remains the #1 API vulnerability. The OWASP API Top 10 maps the critical risks: mass assignment, SSRF via API, unrestricted resource consumption. If you're not testing APIs separately, you're leaving the front door open."
    link: "https://owasp.org/API-Security/"
    link_label: "OWASP API Security Top 10"
    badge: "signal"
    tags:
      - api-security
      - web-security
  - title: "Supply Chain Attacks Are Accelerating"
    text: "Compromised packages, hijacked updates, poisoned containers. Trust nothing upstream."
    detail: "From SolarWinds to the XZ Utils backdoor — supply chain attacks are hitting harder and more frequently. Pin your dependencies, verify checksums, audit your CI/CD pipelines, and monitor for unexpected package changes."
    link: "https://slsa.dev/"
    link_label: "SLSA Framework"
    badge: "signal"
    tags:
      - supply-chain
      - devsecops
  - title: "Cloud Misconfigurations — #1 Breach Vector"
    text: "Exposed S3 buckets, open security groups, over-permissive IAM. Still happening daily."
    detail: "Most cloud breaches aren't sophisticated attacks — they're configuration mistakes. Default settings, wildcard permissions, and public-facing storage cause more incidents than zero-days. Tools like ScoutSuite, Prowler, and CloudSploit can catch these before attackers do."
    link: "https://www.cisecurity.org/benchmark"
    link_label: "CIS Benchmarks"
    badge: "signal"
    tags:
      - cloud-security
      - hardening

