quick_signals:
  - title: Iran Targets US Critical Infrastructure with PLCs
    text: Iranian actors are actively targeting U.S. critical infrastructure PLCs, posing a significant threat to operational technology.
    detail: Iranian-linked threat actors are focusing on internet-exposed Rockwell/Allen-Bradley programmable logic controllers (PLCs) within U.S. critical infrastructure. This trend, highlighted by multiple advisories, necessitates enhanced monitoring and hardening of OT environments to prevent potential disruptions to essential services.
    link: https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-076a
    link_label: CISA Advisory
    badge: signal
    tags:
      - threat-intel
      - critical-infrastructure
      - plc
  - title: Russian APT28 Exploits SOHO Routers for DNS Hijacking
    text: APT28 is leveraging compromised SOHO routers for global DNS hijacking and stealthy token exfiltration.
    detail: Russian state-linked APT28 is actively exploiting vulnerabilities in Small Office/Home Office (SOHO) routers. This campaign is used for both global DNS hijacking and to conduct stealthy Microsoft Office token theft, underscoring the need to secure and update edge network devices.
    link: https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-139a
    link_label: CISA Advisory
    badge: signal
    tags:
      - threat-intel
      - apt28
      - router-vulnerability
      - dns-hijacking
  - title: AI's Growing Influence on Cyber Threats and Defenses
    text: AI is rapidly reshaping the cybersecurity landscape, impacting both attack vectors and defensive strategies.
    detail: Artificial Intelligence is a significant catalyst for change in cybersecurity, as observed at RSAC 2026. Its dual nature is evident, with AI-powered tools enhancing offensive capabilities while also driving advancements in defensive measures and the debate between AI and human defenders.
    link: https://www.nist.gov/artificial-intelligence
    link_label: NIST AI Resources
    badge: signal
    tags:
      - threat-intel
      - ai-security
      - rsac
  - title: Automated Pentesting Limitations Highlight Human Expertise
    text: Automated penetration testing tools often fall short, emphasizing the continued importance of human analysts.
    detail: While automated penetration testing tools offer initial value, they frequently miss complex vulnerabilities requiring human ingenuity. The 'PoC Cliff' problem illustrates this gap, reinforcing the necessity of skilled human analysts for comprehensive security validation and nuanced threat detection.
    link: https://owasp.org/www-project-application-security-testing/
    link_label: OWASP Testing Guide
    badge: signal
    tags:
      - threat-intel
      - penetration-testing
      - ai-security
