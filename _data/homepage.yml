quick_signals:
  - title: Iran Escalates Critical Infrastructure Attacks
    text: Iranian actors are increasingly targeting US critical infrastructure, focusing on PLCs.
    detail: Multiple advisories warn of Iran-linked groups probing and exploiting PLCs in US energy, water, and industrial sectors. Organizations should review PLC security, segment networks, and monitor for suspicious activity targeting operational technology.
    link: https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-077a
    link_label: CISA Advisory
    badge: signal
    tags:
      - threat-intel
      - critical-infrastructure
      - plc
  - title: AI Uncovers Thousands of Zero-Day Vulnerabilities
    text: AI models are identifying a massive number of zero-day vulnerabilities in cloud systems.
    detail: Recent reports indicate AI, like Anthropic's Claude, has discovered thousands of zero-days affecting major cloud systems. This highlights the need for robust AI-driven vulnerability discovery tools and proactive patching strategies for cloud environments.
    link: https://owasp.org/www-project-top-10-ai-security/
    link_label: OWASP AI Security
    badge: signal
    tags:
      - threat-intel
      - vulnerability
      - cloud
      - ai
  - title: Global Cybercrime Losses Surge Dramatically
    text: Cybercrime losses in 2025 jumped 26% to $20.9 billion, driven by widespread scams.
    detail: The FBI's IC3 report shows a significant increase in cybercrime financial losses, underscoring the growing sophistication of scams targeting individuals and businesses. Enhanced user education, robust security controls, and prompt reporting are crucial defenses.
    link: https://www.ic3.gov/
    link_label: FBI IC3
    badge: signal
    tags:
      - threat-intel
      - cybercrime
      - scams
  - title: Emergence of Sophisticated Lua Malware
    text: New Lua-based malware like 'LucidRook' is being used in targeted spear-phishing campaigns.
    detail: Malware families written in Lua, such as 'LucidRook,' are appearing in targeted attacks, particularly against Taiwanese organizations. Defenders must strengthen email security, train users on phishing awareness, and ensure endpoint detection and response (EDR) capabilities are up-to-date.
    link: https://www.mitre.org/about/news/mitre-engenuity-releases-attack-iq-2023-report
    link_label: MITRE ATT&CK
    badge: signal
    tags:
      - threat-intel
      - malware
      - spear-phishing
      - lua
