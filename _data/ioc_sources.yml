# IOC Lookup Sources — grouped by indicator type
# Each source has name, URL template, supported types, and per-type descriptions

sources:
  # ── IP Address ──
  - name: VirusTotal
    icon: "🦠"
    types: [ip, domain, hash, url]
    descs:
      ip: "Community reputation score, passive DNS, related malware samples"
      domain: "DNS records, WHOIS, subdomains, detection ratio across 90+ engines"
      hash: "Antivirus scan results from 70+ engines, behavioral sandbox analysis"
      url: "URL scanning, redirect chains, embedded content analysis"
    urls:
      ip: "https://www.virustotal.com/gui/ip-address/{value}"
      domain: "https://www.virustotal.com/gui/domain/{value}"
      hash: "https://www.virustotal.com/gui/file/{value}"
      url: "https://www.virustotal.com/gui/url/{value}"

  - name: AbuseIPDB
    icon: "🚫"
    types: [ip]
    descs:
      ip: "Abuse reports — who reported this IP, attack categories, confidence score"
    urls:
      ip: "https://www.abuseipdb.com/check/{value}"

  - name: Shodan
    icon: "🔍"
    types: [ip]
    descs:
      ip: "Open ports, running services, banners, known vulnerabilities"
    urls:
      ip: "https://www.shodan.io/host/{value}"

  - name: GreyNoise
    icon: "📡"
    types: [ip]
    descs:
      ip: "Internet-wide scan data — is this a known scanner, bot, or benign crawler?"
    urls:
      ip: "https://viz.greynoise.io/ip/{value}"

  - name: IPVoid
    icon: "🌐"
    types: [ip]
    descs:
      ip: "Multi-blacklist check — scans 30+ IP reputation databases at once"
    urls:
      ip: "https://www.ipvoid.com/ip-blacklist-check/"

  - name: Censys
    icon: "🔎"
    types: [ip]
    descs:
      ip: "Host exposure — certificates, services, cloud provider, geolocation"
    urls:
      ip: "https://search.censys.io/hosts/{value}"

  # ── Domain ──
  - name: URLScan
    icon: "📸"
    types: [domain, url]
    descs:
      domain: "Visual screenshot, DOM analysis, outbound requests, HTTP transactions"
      url: "Full page render, redirect chains, JavaScript behavior, linked resources"
    urls:
      domain: "https://urlscan.io/search/#domain:{value}"
      url: "https://urlscan.io/search/#{value}"

  - name: SecurityTrails
    icon: "🛤️"
    types: [domain]
    descs:
      domain: "Historical DNS records, subdomains, associated IPs, hosting history"
    urls:
      domain: "https://securitytrails.com/domain/{value}"

  - name: DNSDumpster
    icon: "🗺️"
    types: [domain]
    descs:
      domain: "DNS recon — map subdomains, MX records, TXT records, hosting info"
    urls:
      domain: "https://dnsdumpster.com/"

  - name: Whois
    icon: "📋"
    types: [domain, ip]
    descs:
      domain: "Registration details — registrar, creation date, name servers, owner info"
      ip: "IP allocation — owner organization, ASN, network range, abuse contact"
    urls:
      domain: "https://who.is/whois/{value}"
      ip: "https://who.is/whois-ip/ip-address/{value}"

  # ── Hash ──
  - name: MalwareBazaar
    icon: "🧬"
    types: [hash]
    descs:
      hash: "Malware sample database — family classification, tags, first/last seen dates"
    urls:
      hash: "https://bazaar.abuse.ch/browse.php?search={value}"

  - name: Hybrid Analysis
    icon: "🔬"
    types: [hash]
    descs:
      hash: "Free sandbox detonation — process tree, network traffic, dropped files"
    urls:
      hash: "https://www.hybrid-analysis.com/search?query={value}"

  - name: AlienVault OTX
    icon: "👽"
    types: [ip, domain, hash, url]
    descs:
      ip: "Community threat pulses, related indicators, geographic data"
      domain: "Threat pulses, passive DNS, URL list, associated malware"
      hash: "Malware analysis, related indicators, threat pulse associations"
      url: "URL reputation, associated domains, community threat intelligence"
    urls:
      ip: "https://otx.alienvault.com/indicator/ip/{value}"
      domain: "https://otx.alienvault.com/indicator/domain/{value}"
      hash: "https://otx.alienvault.com/indicator/file/{value}"
      url: "https://otx.alienvault.com/indicator/url/{value}"

  - name: ThreatFox
    icon: "🦊"
    types: [ip, domain, hash]
    descs:
      ip: "IOC database — linked malware families, threat actors, first seen, confidence"
      domain: "IOC database — associated malware, C2 infrastructure, reporter notes"
      hash: "IOC database — malware family, threat tags, reporter attribution"
    urls:
      ip: "https://threatfox.abuse.ch/browse.php?search=ioc:{value}"
      domain: "https://threatfox.abuse.ch/browse.php?search=ioc:{value}"
      hash: "https://threatfox.abuse.ch/browse.php?search=ioc:{value}"

  # ── URL ──
  - name: Google Safe Browsing
    icon: "🛡️"
    types: [url, domain]
    descs:
      url: "Google's phishing & malware verdict — blocked in Chrome, Firefox, Safari"
      domain: "Domain safety status — phishing, malware, unwanted software flags"
    urls:
      url: "https://transparencyreport.google.com/safe-browsing/search?url={value}"
      domain: "https://transparencyreport.google.com/safe-browsing/search?url={value}"

  - name: PhishTank
    icon: "🎣"
    types: [url]
    descs:
      url: "Community-verified phishing database — check if URL is a known phish"
    urls:
      url: "https://phishtank.org/phish_search.php?verified=u&active=y"

  # ── Email ──
  - name: Have I Been Pwned
    icon: "💀"
    types: [email]
    descs:
      email: "Breach history — shows EXACTLY which breaches exposed this email: company names, dates, and what data leaked (passwords, phone numbers, addresses, IPs)"
    urls:
      email: "https://haveibeenpwned.com/account/{value}"

  - name: EmailRep
    icon: "📧"
    types: [email]
    descs:
      email: "Reputation profile — is this email suspicious? Shows domain age, linked social profiles, spam history, deliverability score, and whether it's been flagged"
    urls:
      email: "https://emailrep.io/{value}"

  - name: Intelligence X
    icon: "🕵️"
    types: [email]
    descs:
      email: "Deep search — finds this email in leaked databases, paste sites, darknet forums, and public documents. Shows WHERE it appeared and WHEN"
    urls:
      email: "https://intelx.io/?s={value}"

  - name: Hunter.io
    icon: "🎯"
    types: [email]
    descs:
      email: "Email verification — confirms if this address is real, shows the person's name, job title, company, and other public email addresses on the same domain"
    urls:
      email: "https://hunter.io/email-verifier/{value}"

  - name: Dehashed
    icon: "🔓"
    types: [email]
    descs:
      email: "Breach database search — shows leaked passwords (hashed/cleartext), usernames, IPs, phone numbers, and addresses linked to this email across multiple breaches"
    urls:
      email: "https://www.dehashed.com/search?query={value}"

  - name: Holehe (OSINT)
    icon: "👤"
    types: [email]
    descs:
      email: "Account discovery — checks 120+ websites to see where this email has registered accounts (social media, shopping, forums, dating, gaming)"
    urls:
      email: "https://github.com/megadose/holehe"

  - name: Google (Dork)
    icon: "🔍"
    types: [email]
    descs:
      email: "Public exposure — Google search for this email in leaked documents, paste sites, forums, social profiles, and company directories"
    urls:
      email: "https://www.google.com/search?q=%22{value}%22"
