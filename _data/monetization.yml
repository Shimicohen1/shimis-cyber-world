# SCW Monetization Configuration
# Manages all ad placements, recommendations, and AdSense slots.
# Ad types: adsense, affiliate, premium-cta

# ── AdSense Settings ──────────────────────────────────────
adsense:
  enabled: false  # flip to true once AdSense is approved
  publisher_id: "ca-pub-5567674302137832"

# ── Contextual Product Recommendations ────────────────────
# Matched to post tags. Shown in "Why It Matters" / recommendations section.
# Each entry: tag match → product cards shown alongside the post.
recommendations:
  - match_tags: [vpn, privacy, network]
    products:
      - name: "NordVPN"
        desc: "Secure your traffic with threat protection built in. Fast and reliable."
        url: "https://www.anrdoezrs.net/click-101720928-13756265"
        badge: "Our Pick"
      - name: "Proton VPN"
        desc: "Swiss no-logs VPN with NetShield malware filter and Secure Core routing."
        url: "https://www.jdoqocy.com/click-101720928-15834536"
        badge: "Recommended"
      - name: "Surfshark"
        desc: "All-in-one VPN + ad blocker. Unlimited devices."
        url: "https://www.kqzyfj.com/click-101720928-15438560"
        badge: "Great Value"

  # NOTE: malware/ransomware/endpoint and vulnerability/CVE/exploit posts
  # intentionally have NO affiliate recs — VPN is not a relevant mitigation.
  # Only SCW tools (ThreatLens, LockDown) are shown via the post template.

  - match_tags: [training, certification, beginner, ctf, pentest, red-team, labs, blue-team, soc, dfir]
    products:
      - name: "TryHackMe"
        desc: "Guided learning paths with hands-on cyber labs. From beginner to advanced — start for free."
        url: "https://tryhackme.sjv.io/GbDW09"
        badge: "Our Pick"
      - name: "Hack The Box"
        desc: "Real-world hacking labs & enterprise security training. Level up your skills."
        url: "https://hacktheboxltd.sjv.io/DWLa2a"
        badge: "Recommended"

  - match_tags: [osint, reconnaissance, discovery]
    products:
      - name: "NordVPN"
        desc: "Keep your OSINT research anonymous. Threat protection built in."
        url: "https://www.anrdoezrs.net/click-101720928-13756265"
        badge: "Our Pick"
      - name: "Proton VPN"
        desc: "Route OSINT through Secure Core — no logs, Swiss jurisdiction."
        url: "https://www.jdoqocy.com/click-101720928-15834536"
        badge: "Recommended"
      - name: "Surfshark"
        desc: "Anonymous research with unlimited devices. CleanWeb included."
        url: "https://www.kqzyfj.com/click-101720928-15438560"
        badge: "Great Value"

  # NOTE: phishing/social-engineering posts intentionally have NO affiliate recs.
  # VPN "blocks phishing" is a stretch — GoFish and awareness tools are shown instead.

  - match_tags: [password, credential, identity, auth-bypass]
    products:
      - name: "Proton Pass"
        desc: "End-to-end encrypted passwords with built-in 2FA and email aliases."
        url: "https://www.kqzyfj.com/click-101720928-15831601"
        badge: "Our Pick"
      - name: "Proton VPN"
        desc: "Encrypt credentials in transit. Swiss no-logs VPN."
        url: "https://www.jdoqocy.com/click-101720928-15834536"
        badge: "Recommended"

