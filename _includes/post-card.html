<a href="{{ post.url | relative_url }}" class="archive__item">
  <span class="archive__date">{{ post.date | date: "%b %d, %Y" }}</span>
  <div class="archive__body"{% if post.lang == 'he' %} dir="rtl" lang="he"{% endif %}>
    <h3>{{ post.title }}</h3>
    {% if post.excerpt %}<p>{{ post.excerpt | strip_html | truncatewords: 20 }}</p>{% endif %}
  </div>
  <div class="archive__tags">
    {% if post.channel %}<span class="tag">{{ post.channel }}</span>{% endif %}
    {% if post.score %}<span class="tag tag--{{ post.score | downcase }}">{{ post.score }}</span>{% endif %}
    {% for tag in post.tags limit:2 %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
</a>
