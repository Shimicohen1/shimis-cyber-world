<a href="{{ post.url | relative_url }}" class="card post-card">
  {% if post.image %}
  <div class="card-image" style="background-image: url('{{ post.image | relative_url }}')"></div>
  {% endif %}
  <div class="card-body">
    <h3>{{ post.title }}</h3>
    <p>{{ post.excerpt | strip_html | truncate: 140 }}</p>
    <div class="card-meta">
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %d, %Y" }}</time>
      {% if post.tags.size > 0 %}
      <span class="card-tags">{% for tag in post.tags limit:3 %}<span class="tag tag-sm">{{ tag }}</span>{% endfor %}</span>
      {% endif %}
    </div>
  </div>
</a>
