<!-- Newsletter Signup -->
<div id="newsletter" class="newsletter{% if include.variant == 'inline' %} newsletter--inline{% elsif include.variant == 'post' %} newsletter--post{% endif %}">
  <div class="newsletter__icon">
    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
  </div>
  <h3 class="newsletter__title">Stay ahead of threats</h3>
  <p class="newsletter__desc">Get critical CVE alerts, threat intel drops, and curated cyber insights — straight to your inbox.</p>
  <form class="newsletter__form js-newsletter-form" aria-label="Newsletter signup">
    <div class="newsletter__input-wrap">
      <input type="email" class="newsletter__input" placeholder="your@email.com" required autocomplete="email" aria-label="Email address">
      <button type="submit" class="newsletter__btn">
        <span class="newsletter__btn-text">Subscribe</span>
        <span class="newsletter__btn-loading" hidden>&#8987;</span>
      </button>
    </div>
    <div class="newsletter__status" role="alert" aria-live="polite"></div>
  </form>
  <p class="newsletter__privacy">No spam. Unsubscribe anytime. <a href="{{ '/terms/' | relative_url }}">Privacy&nbsp;Policy</a></p>
</div>
