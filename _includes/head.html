<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://api.brevo.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';">
<title>{% if page.title %}{{ page.title | escape }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_html | truncatewords: 30 }}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | escape }}">
<meta property="og:image" content="{{ '/assets/img/logos/logo-full.png' | relative_url }}">
<meta property="og:type" content="website">
<link rel="icon" href="{{ '/assets/img/logos/logo.jpg' | relative_url }}" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3QRH1ZBFH9"></script>
