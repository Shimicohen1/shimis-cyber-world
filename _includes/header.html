<header class="site-header">
  <div class="container">
    <nav class="nav-wrap">
      <a href="{{ '/' | relative_url }}" class="logo-link">
        <img src="{{ '/assets/img/logos/logo.jpg' | relative_url }}" alt="{{ site.title }}" class="nav-logo" width="36" height="36" fetchpriority="high">
        <span class="site-name">{{ site.title }}</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
      <div class="nav-menu">
        <ul class="nav-links">
          {% for item in site.data.navigation %}
          <li><a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.label }}{% if item.badge %}<span class="nav-badge">PRO</span>{% endif %}</a></li>
          {% endfor %}
        </ul>
        <a href="#newsletter" class="nav-subscribe" aria-label="Subscribe to newsletter">✉ Subscribe</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
          <span class="theme-toggle__icon theme-toggle__icon--dark">🌙</span>
          <span class="theme-toggle__icon theme-toggle__icon--light">☀️</span>
        </button>
      </div>
    </nav>
  </div>
</header>
