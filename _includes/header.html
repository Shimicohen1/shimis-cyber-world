<header class="site-header">
  <div class="container">
    <nav class="nav-wrap">
      <a href="{{ '/' | relative_url }}" class="logo-link">
        <img src="{{ '/assets/img/logos/logo.jpg' | relative_url }}" alt="{{ site.title }}" class="nav-logo" width="36" height="36" fetchpriority="high">
        <span class="site-name">{{ site.title }}</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
      <div class="nav-menu">
        <ul class="nav-links">
          {% for item in site.data.navigation %}
          {% if item.dropdown %}
          <li class="nav-dropdown">
            <button class="nav-dropdown__toggle" aria-expanded="false" aria-haspopup="true">{{ item.label }} <svg class="nav-dropdown__chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
            <div class="nav-dropdown__menu">
              {% for sub in item.items %}
              <a href="{{ sub.url | relative_url }}" class="nav-dropdown__item{% if page.url == sub.url %} active{% endif %}">
                <span class="nav-dropdown__icon">{{ sub.icon }}</span>
                <span class="nav-dropdown__text">
                  <span class="nav-dropdown__label">{{ sub.label }}</span>
                  <span class="nav-dropdown__desc">{{ sub.desc }}</span>
                </span>
              </a>
              {% endfor %}
            </div>
          </li>
          {% else %}
          <li><a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.label }}{% if item.badge %}<span class="nav-badge">ELITE</span>{% endif %}</a></li>
          {% endif %}
          {% endfor %}
        </ul>

        <a href="https://www.linkedin.com/company/112773961" target="_blank" rel="noopener" class="nav-linkedin" aria-label="Follow on LinkedIn" title="Follow Shimi's Cyber World on LinkedIn"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>

        </button>
      </div>
    </nav>
  </div>
</header>
