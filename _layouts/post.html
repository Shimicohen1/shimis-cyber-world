---
layout: default
---
<div class="container">
  <article class="post">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
        {% if page.author %}<span class="meta-sep">/</span><span>{{ page.author }}</span>{% endif %}
        {% if page.tags.size > 0 %}
        <span class="meta-sep">/</span>
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
        {% endif %}
      </div>
    </header>
    <div class="post-body prose">
      {{ content }}
    </div>
    <nav class="post-nav">
      <a href="{{ '/posts/' | relative_url }}" class="btn btn--ghost btn--sm">&larr; All Drops</a>
    </nav>
  </article>
</div>
