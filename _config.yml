title: "Shimi's Cyber World"
description: "Cybersecurity insights, tools, and resources by Shimi Cohen"
url: "https://shimicohen1.github.io"
baseurl: "/shimis-cyber-world"
timezone: Asia/Jerusalem

remote_theme: pages-themes/midnight@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: /blog/:year/:month/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - _backup
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

collections:
  pages:
    output: true
    permalink: /:title/
