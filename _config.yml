title: "Shimi's Cyber World"
description: "Community, insights, resources, and security tools"
theme: null
markdown: kramdown
permalink: /posts/:title/

collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - _backup
  - Gemfile
  - Gemfile.lock
  - vendor
