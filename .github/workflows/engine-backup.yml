name: Engine Config Backup

on:
  schedule:
    - cron: '0 5 * * 0'   # Every Sunday at 05:00 UTC (before enrichment)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Note backup timestamp
        run: |
          echo "Last auto-backup: $(date -u '+%Y-%m-%d %H:%M UTC')" > .engine-backup/.last-backup
          git config user.name "SCW Feed Bot"
          git config user.email "shimicyberworld@gmail.com"
          git add .engine-backup/.last-backup
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: engine backup timestamp [automated]"
            git push
          fi
