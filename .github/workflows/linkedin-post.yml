name: LinkedIn Post

on:
  schedule:
    - cron: '0 7 * * *'    # Every day at 07:00 UTC (10:00 Israel)
    - cron: '0 16 * * *'   # Every day at 16:00 UTC (19:00 Israel)
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_IMAGES_PAT: ${{ secrets.GH_IMAGES_PAT }}
        run: node .github/scripts/linkedin-post.mjs

      - name: Check token expiry and alert
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node .github/scripts/linkedin-token-check.mjs

      - name: Commit state
        run: |
          git config user.name "SCW Feed Bot"
          git config user.email "shimicyberworld@gmail.com"
          git add .github/linkedin-state.json
          git diff --staged --quiet || git commit -m "chore: update LinkedIn post state"
          git push
