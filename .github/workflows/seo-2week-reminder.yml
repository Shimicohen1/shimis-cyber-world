name: SEO 2-Week Check Reminder

# One-shot reminder: fires May 7, 2026 at 09:00 UTC (12:00 Israel) to
# remind Shimi to verify the SEO stack deployed on April 23, 2026.
# After firing, this workflow can be deleted.

on:
  schedule:
    # Daily at 09:00 UTC; the job exits unless today is the target date
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check date gate
        id: gate
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          TARGET="2026-05-07"
          if [ "$TODAY" = "$TARGET" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "fire=true" >> "$GITHUB_OUTPUT"
          else
            echo "Today $TODAY != target $TARGET; skipping."
            echo "fire=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send reminder email via Brevo
        if: steps.gate.outputs.fire == 'true'
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BREVO_API_KEY:-}" ]; then
            echo "::error::BREVO_API_KEY secret not set"
            exit 1
          fi

          PAYLOAD=$(cat <<'JSON'
          {
            "sender": {"name": "SCW SEO Monitor", "email": "shimicyberworld@gmail.com"},
            "to": [{"email": "shimicyberworld@gmail.com", "name": "Shimi"}],
            "subject": "🔍 SCW SEO 2-Week Check — Verify Traffic Impact",
            "htmlContent": "<div style=\"font-family:Inter,system-ui,sans-serif;max-width:640px;margin:0 auto;padding:24px;background:#0d0d14;color:#f0f0f5\"><h1 style=\"color:#3b82f6;font-size:22px;margin:0 0 16px\">SEO Stack — 2-Week Health Check</h1><p style=\"color:#cccccc;line-height:1.6\">Two weeks ago (April 23, 2026), the following SEO infrastructure was deployed. Time to verify it is producing the expected traffic lift.</p><h2 style=\"color:#a855f7;font-size:16px;margin:24px 0 8px\">✅ What to check (5 min)</h2><table style=\"width:100%;border-collapse:collapse;font-size:14px\"><tr style=\"background:#16161f\"><td style=\"padding:10px;border:1px solid #333\"><b>1. Google Search Console</b><br><a href=\"https://search.google.com/search-console/performance/search-analytics?resource_id=sc-domain%3Ashimiscyberworld.com\" style=\"color:#3b82f6\">Open GSC Performance →</a><br><span style=\"color:#888\">Look for: clicks ↑, impressions ↑↑, breadcrumb-style URLs in results</span></td></tr><tr><td style=\"padding:10px;border:1px solid #333\"><b>2. Bing Webmaster Tools</b><br><a href=\"https://www.bing.com/webmasters/performancereport?siteUrl=https://shimiscyberworld.com/\" style=\"color:#3b82f6\">Open Bing Performance →</a><br><span style=\"color:#888\">Look for: AI Performance tab — Bing Copilot citations</span></td></tr><tr style=\"background:#16161f\"><td style=\"padding:10px;border:1px solid #333\"><b>3. GA4 Organic Traffic</b><br><a href=\"https://analytics.google.com\" style=\"color:#3b82f6\">Open GA4 →</a><br><span style=\"color:#888\">Acquisition → Traffic acquisition → Organic Search trend</span></td></tr><tr><td style=\"padding:10px;border:1px solid #333\"><b>4. AI search citations</b><br><span style=\"color:#888\">Test prompts in ChatGPT/Perplexity:<br>• \"What are the latest INCD alerts?\"<br>• \"Recent CVE-2026 critical vulnerabilities\"<br>Look for shimiscyberworld.com in citations.</span></td></tr><tr style=\"background:#16161f\"><td style=\"padding:10px;border:1px solid #333\"><b>5. Google Publisher Center</b><br><a href=\"https://publishercenter.google.com\" style=\"color:#3b82f6\">Check approval status →</a><br><span style=\"color:#888\">Google News review usually 2–4 weeks; should be in progress.</span></td></tr></table><h2 style=\"color:#a855f7;font-size:16px;margin:24px 0 8px\">📊 Expected by now (Day 14)</h2><ul style=\"color:#cccccc;line-height:1.8\"><li>Breadcrumbs visible in Google search results</li><li>Image search starting to drive a few visits</li><li>Bing crawl coverage near 100% (5K URLs)</li><li>Early AI citations from Perplexity/Bing Copilot</li><li>~50–200 extra organic visits/week vs baseline</li></ul><h2 style=\"color:#a855f7;font-size:16px;margin:24px 0 8px\">⚠️ Red flags to escalate</h2><ul style=\"color:#cccccc;line-height:1.8\"><li>Indexed page count <em>dropped</em> instead of growing → check 404s in GSC</li><li>Sitemaps showing errors in GSC or Bing</li><li>Zero AI citations after 14 days → verify llms.txt is reachable</li></ul><p style=\"color:#888;font-size:12px;margin-top:32px;border-top:1px solid #333;padding-top:16px\">Reminder workflow: <code>.github/workflows/seo-2week-reminder.yml</code><br>After today, this workflow can be deleted.</p></div>"
          }
          JSON
          )

          echo "Sending reminder email..."
          HTTP_CODE=$(curl -sS -o /tmp/brevo.json -w "%{http_code}" \
            -X POST 'https://api.brevo.com/v3/smtp/email' \
            -H "api-key: $BREVO_API_KEY" \
            -H 'Content-Type: application/json' \
            -H 'accept: application/json' \
            -d "$PAYLOAD")
          echo "Brevo HTTP: $HTTP_CODE"
          cat /tmp/brevo.json
          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Brevo API returned $HTTP_CODE"
            exit 1
          fi
          echo "✅ Reminder email sent."
