name: INCD Publications Scraper

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scrape-incd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Run INCD Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node .github/scripts/incd-scraper.mjs

      - name: Commit new posts
        run: |
          git config user.name "SCW Feed Bot"
          git config user.email "shimicyberworld@gmail.com"
          git add _posts/
          git add .github/incd-state.json
          if git diff --cached --quiet; then
            echo "No new INCD publications"
          else
            git commit -m "Add INCD publications [automated]"
            for i in 1 2 3; do
              git push && break
              echo "Push failed (attempt $i), rebasing and retrying..."
              git pull --rebase
            done
          fi
